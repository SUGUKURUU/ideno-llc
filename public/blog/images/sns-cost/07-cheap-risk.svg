<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">格安代行会社を選ぶリスク一覧</text>

  <!-- Warning banner -->
  <rect x="30" y="55" width="740" height="36" rx="6" fill="rgba(255,80,80,0.08)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="400" y="78" text-anchor="middle" fill="rgba(255,150,150,0.85)" font-size="12">月額3〜5万円の格安プランには必ず「安い理由」があります。以下のリスクを理解した上で選択してください。</text>

  <!-- 5 risk cards -->
  <!-- Row 1: 3 cards -->
  <rect x="30" y="105" width="228" height="120" rx="8" fill="rgba(255,60,60,0.06)" stroke="rgba(255,100,100,0.3)" stroke-width="1.5"/>
  <text x="144" y="132" text-anchor="middle" fill="rgba(255,150,150,0.9)" font-size="22">📋</text>
  <text x="144" y="156" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">テンプレ投稿</text>
  <text x="144" y="177" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">業種・ブランドに関係なく</text>
  <text x="144" y="193" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">同じ文章・フォーマットを使用</text>
  <text x="144" y="213" text-anchor="middle" fill="rgba(255,150,150,0.7)" font-size="10">→ フォロワーに見透かされる</text>

  <rect x="286" y="105" width="228" height="120" rx="8" fill="rgba(255,60,60,0.06)" stroke="rgba(255,100,100,0.3)" stroke-width="1.5"/>
  <text x="400" y="132" text-anchor="middle" fill="rgba(255,150,150,0.9)" font-size="22">📝</text>
  <text x="400" y="156" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">コピペキャプション</text>
  <text x="400" y="177" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">競合他社や海外コンテンツから</text>
  <text x="400" y="193" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">コピーしたキャプション</text>
  <text x="400" y="213" text-anchor="middle" fill="rgba(255,150,150,0.7)" font-size="10">→ 著作権・信頼性リスク</text>

  <rect x="542" y="105" width="228" height="120" rx="8" fill="rgba(255,60,60,0.06)" stroke="rgba(255,100,100,0.3)" stroke-width="1.5"/>
  <text x="656" y="132" text-anchor="middle" fill="rgba(255,150,150,0.9)" font-size="22">🔥</text>
  <text x="656" y="156" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">炎上リスク</text>
  <text x="656" y="177" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">業界知識のない担当者が</text>
  <text x="656" y="193" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">不適切な投稿をするケース</text>
  <text x="656" y="213" text-anchor="middle" fill="rgba(255,150,150,0.7)" font-size="10">→ ブランド毀損・謝罪対応</text>

  <!-- Row 2: 2 cards centered -->
  <rect x="158" y="242" width="228" height="120" rx="8" fill="rgba(255,60,60,0.06)" stroke="rgba(255,100,100,0.3)" stroke-width="1.5"/>
  <text x="272" y="269" text-anchor="middle" fill="rgba(255,150,150,0.9)" font-size="22">🚫</text>
  <text x="272" y="293" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">アカウント停止リスク</text>
  <text x="272" y="314" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">フォロワー購入・自動ツール等</text>
  <text x="272" y="330" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">利用規約違反の手法を使用</text>
  <text x="272" y="350" text-anchor="middle" fill="rgba(255,150,150,0.7)" font-size="10">→ アカウント凍結・永久BAN</text>

  <rect x="414" y="242" width="228" height="120" rx="8" fill="rgba(255,60,60,0.06)" stroke="rgba(255,100,100,0.3)" stroke-width="1.5"/>
  <text x="528" y="269" text-anchor="middle" fill="rgba(255,150,150,0.9)" font-size="22">📉</text>
  <text x="528" y="293" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">成果ゼロ</text>
  <text x="528" y="314" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">6ヶ月間費用を払い続けても</text>
  <text x="528" y="330" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">問い合わせが1件も来ない</text>
  <text x="528" y="350" text-anchor="middle" fill="rgba(255,150,150,0.7)" font-size="10">→ 総額30万円以上の損失</text>

  <text x="400" y="400" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">安さの理由を必ず確認し「手法・実績・担当者スキル」を事前にチェックすること</text>
</svg>
