  <text x="430" y="364" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">広告費別途</text>
  <text x="680" y="338" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="14">月 30本〜</text>

  <text x="400" y="405" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">★印はコスパと成果のバランスが良いスタンダードプラン</text>
