    <rect x="570" y="305" width="210" height="80" rx="5" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
    <text x="590" y="323" fill="#a855f7" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">推奨戦略</text>
    <text x="590" y="340" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ SEO対策（タイトル・説明）</text>
    <text x="590" y="353" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ 長尺動画への導線</text>
    <text x="590" y="366" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ 専門的・信頼性重視</text>
  </g>
