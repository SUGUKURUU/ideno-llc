    <!-- Feature 2 -->
    <rect x="570" y="175" width="210" height="50" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="590" y="195" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">チャネル権威性を反映</text>
    <text x="590" y="210" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">既存チャンネル評価が有利</text>
    <text x="590" y="222" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">長尺動画への導線が強い</text>

    <!-- Feature 3 -->
    <rect x="570" y="235" width="210" height="50" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="590" y="255" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">高評価率が評価される</text>
    <text x="590" y="270" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">コンテンツの質が問われる</text>
    <text x="590" y="282" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">Shortsから長尺への流れ</text>

