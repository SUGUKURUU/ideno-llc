    <rect x="50" y="305" width="210" height="80" rx="5" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <text x="70" y="323" fill="#60a5fa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">推奨戦略</text>
