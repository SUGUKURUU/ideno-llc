    <rect x="50" y="115" width="210" height="50" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="70" y="135" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">フォロワー関係型</text>
    <text x="70" y="150" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">フォロワーとの相互作用を重視</text>
    <text x="70" y="162" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">フォロワー数↑ = リーチ↑</text>

    <!-- Feature 2 -->
    <rect x="50" y="175" width="210" height="50" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="70" y="195" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">エンゲージメント重視</text>
    <text x="70" y="210" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">保存・シェア数が高評価</text>
    <text x="70" y="222" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">いいね数よりも質が重要</text>

