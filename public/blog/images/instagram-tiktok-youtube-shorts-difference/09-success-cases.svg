<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="28" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">成功事例：プラットフォーム選択で成果を出した企業</text>

  <!-- Case 1: Retail Instagram -->
  <g>
    <rect x="30" y="50" width="360" height="350" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1.5"/>
    <text x="210" y="72" fill="#22c55e" font-family="'Hiragino Sans','Noto sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">✓ 事例1：地方小売業 × Instagram</text>

    <!-- Business type -->
    <rect x="50" y="85" width="320" height="50" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="70" y="105" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">事業内容</text>
    <text x="70" y="122" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">地方都市の雑貨ショップ</text>

    <!-- Strategy -->
    <rect x="50" y="145" width="320" height="60" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="70" y="165" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">戦略</text>
    <text x="70" y="182" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">Instagram に絞り込み</text>
    <text x="70" y="195" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">週3〜4回、1年継続投稿</text>

    <!-- Results -->
    <rect x="50" y="215" width="320" height="80" rx="5" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="70" y="235" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">結果（1年後）</text>
    <text x="70" y="252" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ フォロワー数：150人→3,500人</text>
    <text x="70" y="265" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ 「Instagramを見て来た」が月50人超</text>
    <text x="70" y="278" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ 観光客にも発見されるように</text>

    <!-- Learning -->
    <rect x="50" y="305" width="320" height="70" rx="5" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <text x="70" y="325" fill="#60a5fa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">学び</text>
    <text x="70" y="342" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">1つのプラットフォームに集中することで</text>
    <text x="70" y="355" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">安定した成長と信頼を構築できた</text>
    <text x="70" y="368" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">ローカルで強い立地を獲得</text>
  </g>

  <!-- Case 2: Manufacturing YouTube -->
  <g>
    <rect x="410" y="50" width="360" height="350" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1.5"/>
    <text x="590" y="72" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">✓ 事例2：製造業 × YouTube</text>

    <!-- Business type -->
    <rect x="430" y="85" width="320" height="50" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="450" y="105" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">事業内容</text>
    <text x="450" y="122" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">中堅製造業（従業員30名）</text>

    <!-- Strategy -->
    <rect x="430" y="145" width="320" height="60" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="450" y="165" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">戦略</text>
    <text x="450" y="182" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">「製造プロセス」「職人インタビュー」</text>
    <text x="450" y="195" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">を長尺・Shortsで定期投稿</text>

    <!-- Results -->
    <rect x="430" y="215" width="320" height="80" rx="5" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="450" y="235" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">結果（6ヶ月後）</text>
    <text x="450" y="252" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ 応募数：年1〜2件→月3〜5件</text>
    <text x="450" y="265" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ 「動画を見て応募した」という具体的理由</text>
    <text x="450" y="278" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">✓ ミスマッチ減少で定着率UP</text>

    <!-- Learning -->
    <rect x="430" y="305" width="320" height="70" rx="5" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
    <text x="450" y="325" fill="#60a5fa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold">学び</text>
    <text x="450" y="342" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">長期資産化できるYouTubeは採用に</text>
    <text x="450" y="355" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">特に有効。「技術力」「人間性」を</text>
    <text x="450" y="368" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">同時に伝えられることが強み</text>
  </g>

  <!-- Case 3: Startup TikTok -->
  <g>
    <rect x="210" y="410" width="360" height="0" rx="8"/>
  </g>

  <!-- Summary box at bottom -->
  <rect x="30" y="410" width="740" height="0" rx="8" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
</svg>
