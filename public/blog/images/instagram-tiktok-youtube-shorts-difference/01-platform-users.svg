<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="30" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">国内月間アクティブユーザー数（2024年）</text>

  <!-- グリッド x:130-740, y:60-350 max=7500万 -->
  <line x1="130" y1="60" x2="130" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="130" y1="350" x2="740" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="130" y1="60" x2="740" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="130" y1="118" x2="740" y2="118" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="130" y1="176" x2="740" y2="176" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="130" y1="234" x2="740" y2="234" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="130" y1="292" x2="740" y2="292" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y軸: 0〜7500万, y=350-(val/7500)*290 -->
  <text x="122" y="64" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">7500万</text>
  <text x="122" y="122" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">6000万</text>
  <text x="122" y="180" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">4500万</text>
  <text x="122" y="238" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">3000万</text>
  <text x="122" y="296" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">1500万</text>
  <text x="122" y="354" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">0</text>
  <text x="55" y="205" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,55,205)">月間アクティブユーザー数（人）</text>

  <!-- 4本のバー: YouTube=7000万, X=6700万, Instagram=3300万, TikTok=1700万 -->
  <!-- バー中心: 210, 360, 510, 660, w=110 -->
  <!-- YouTube: h=7000/7500*290=271, y=350-271=79 -->
  <rect x="155" y="79" width="110" height="271" fill="#c9a84c" rx="4"/>
  <text x="210" y="71" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">7,000万人</text>
  <text x="210" y="368" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">YouTube</text>
  <text x="210" y="385" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（Shorts含む）</text>

  <!-- X(Twitter): h=6700/7500*290=259.3, y=90.7 -->
  <rect x="305" y="91" width="110" height="259" fill="rgba(255,255,255,0.4)" rx="4"/>
  <text x="360" y="83" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold" text-anchor="middle">6,700万人</text>
  <text x="360" y="368" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="bold" text-anchor="middle">X（旧Twitter）</text>
  <text x="360" y="385" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">（参考値）</text>

  <!-- Instagram: h=3300/7500*290=127.6, y=222.4 -->
  <rect x="455" y="222" width="110" height="128" fill="#e1306c" rx="4" opacity="0.8"/>
  <text x="510" y="214" fill="#e1306c" font-size="14" font-weight="bold" text-anchor="middle">3,300万人</text>
  <text x="510" y="368" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">Instagram</text>

  <!-- TikTok: h=1700/7500*290=65.7, y=284.3 -->
  <rect x="605" y="284" width="110" height="66" fill="#00f2ea" rx="4" opacity="0.7"/>
  <text x="660" y="276" fill="#00f2ea" font-size="14" font-weight="bold" text-anchor="middle">1,700万人</text>
  <text x="660" y="368" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">TikTok</text>

  <!-- 注釈 -->
  <text x="400" y="410" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">※ 各社公表値・推定値（2023〜2024年）より作成</text>
</svg>