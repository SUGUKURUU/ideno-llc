<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="28" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">プラットフォーム選択フローチャート</text>

  <!-- START -->
  <rect x="310" y="50" width="180" height="45" rx="8" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="75" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">🎯 今日のSNS戦略を決めよう</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="95" x2="400" y2="120" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="395,115 400,125 405,115" fill="#c9a84c"/>

  <!-- Question 1: Primary Goal -->
  <rect x="260" y="125" width="280" height="70" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <text x="400" y="145" fill="#60a5fa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Q1: 主な目的は？</text>
  <text x="400" y="162" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">認知拡大？ 信頼構築？ コンバージョン？</text>

  <!-- Branch A: Recognition (left) -->
  <line x1="260" y1="200" x2="140" y2="240" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="144,245 135,235 145,235" fill="#c9a84c"/>

  <rect x="40" y="245" width="200" height="70" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.3)" stroke-width="1.5"/>
  <text x="140" y="265" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">認知拡大が目的</text>
  <text x="140" y="282" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">→ TikTok</text>
  <text x="140" y="295" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">バズのポテンシャル最高</text>

  <!-- Branch B: Trust (center) -->
  <line x1="400" y1="200" x2="400" y2="240" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="395,235 400,245 405,235" fill="#c9a84c"/>

  <rect x="300" y="245" width="200" height="70" rx="8" fill="rgba(236,72,153,0.08)" stroke="rgba(236,72,153,0.3)" stroke-width="1.5"/>
  <text x="400" y="265" fill="#ec4899" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">信頼構築・採用が目的</text>
  <text x="400" y="282" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">→ Instagram</text>
  <text x="400" y="295" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">or YouTube</text>

  <!-- Branch C: Conversion (right) -->
  <line x1="540" y1="200" x2="660" y2="240" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="655,245 665,235 655,235" fill="#c9a84c"/>

  <rect x="560" y="245" width="200" height="70" rx="8" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.3)" stroke-width="1.5"/>
  <text x="660" y="265" fill="#a855f7" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">コンバージョン最優先</text>
  <text x="660" y="282" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">→ Instagram</text>
  <text x="660" y="295" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">ショッピング機能</text>

  <!-- Q2: Target Age -->
  <rect x="260" y="330" width="280" height="70" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <text x="400" y="350" fill="#60a5fa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Q2: ターゲット年齢層は？</text>
  <text x="400" y="367" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">10代？ 20代？ 30代以上？</text>

  <!-- Age branches -->
  <!-- Teens -->
  <line x1="260" y1="405" x2="80" y2="380" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="60" y="395" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">13-19: TikTok</text>

  <!-- 20s -->
  <line x1="400" y1="405" x2="400" y2="380" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="420" y="395" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">20-29: Instagram/TikTok</text>

  <!-- 30s+ -->
  <line x1="540" y1="405" x2="720" y2="380" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="700" y="395" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8">30+: Instagram/YouTube</text>

  <!-- Final Recommendation Box -->
  <rect x="30" y="380" width="740" height="35" rx="8" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="400" y="403" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">✓ 最重要：「全部やる」ではなく「1つに集中」→実行→検証→必要なら拡張</text>
</svg>
