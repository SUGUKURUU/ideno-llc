<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="38" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">採用コンテンツの有無による応募率変化</text>

  <!-- Y axis -->
  <line x1="100" y1="60" x2="100" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="330" x2="760" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Grid + Y labels: max=4%, height=270px, 1%=67.5px -->
  <line x1="100" y1="263" x2="760" y2="263" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4,4"/>
  <line x1="100" y1="195" x2="760" y2="195" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4,4"/>
  <line x1="100" y1="128" x2="760" y2="128" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4,4"/>
  <line x1="100" y1="60" x2="760" y2="60" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4,4"/>
  <text x="92" y="334" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="92" y="267" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">1%</text>
  <text x="92" y="199" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">2%</text>
  <text x="92" y="132" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">3%</text>
  <text x="92" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">4%</text>
  <text x="40" y="200" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,40,200)">応募率</text>

  <!-- Bar 1: 採用情報のみ 1.0% → height=67.5 top=262 -->
  <rect x="140" y="263" width="100" height="67" fill="#c9a84c" opacity="0.4" rx="3"/>
  <text x="190" y="255" fill="rgba(255,255,255,0.8)" font-size="13" font-weight="bold" text-anchor="middle">1.0%</text>
  <text x="190" y="356" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">採用情報のみ</text>

  <!-- Bar 2: 社員インタビュー記事 1.8% → height=121.5 top=209 -->
  <rect x="290" y="209" width="100" height="121" fill="#c9a84c" opacity="0.6" rx="3"/>
  <text x="340" y="201" fill="rgba(255,255,255,0.8)" font-size="13" font-weight="bold" text-anchor="middle">1.8%</text>
  <text x="340" y="356" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">社員インタビュー</text>
  <text x="340" y="371" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">記事あり</text>

  <!-- Bar 3: 社長インタビュー動画 2.4% → height=162 top=168 -->
  <rect x="440" y="168" width="100" height="162" fill="#c9a84c" opacity="0.78" rx="3"/>
  <text x="490" y="160" fill="rgba(255,255,255,0.8)" font-size="13" font-weight="bold" text-anchor="middle">2.4%</text>
  <text x="490" y="356" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">社長インタビュー</text>
  <text x="490" y="371" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">動画あり</text>

  <!-- Bar 4: 密着ドキュメンタリー 3.9% → height=263 top=67 -->
  <rect x="590" y="67" width="100" height="263" fill="#c9a84c" rx="3"/>
  <text x="640" y="59" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">3.9%</text>
  <text x="640" y="356" fill="#c9a84c" font-size="11" font-weight="bold" text-anchor="middle">密着ドキュメンタリー</text>
  <text x="640" y="371" fill="#c9a84c" font-size="10" text-anchor="middle">あり</text>

  <text x="400" y="405" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">密着動画あり企業の応募率は採用情報のみの約3.9倍</text>
</svg>
