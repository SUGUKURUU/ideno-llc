<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="38" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">テキスト vs 動画の情報伝達量比較</text>

  <!-- Y axis -->
  <line x1="120" y1="60" x2="120" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- X axis -->
  <line x1="120" y1="340" x2="740" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="110" y="345" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0</text>
  <text x="110" y="280" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">1,000</text>
  <text x="110" y="200" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">2,500</text>
  <text x="110" y="120" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">5,000</text>
  <text x="60" y="200" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,60,200)">情報伝達量（相対値）</text>

  <!-- Grid lines -->
  <line x1="120" y1="280" x2="740" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="200" x2="740" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="120" x2="740" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bars: scale: 5000=280px height, so 1px=0.056 units, base y=340 -->
  <!-- テキスト記事 100 → height=5.6 → bar top=334 -->
  <rect x="160" y="334" width="100" height="6" fill="#c9a84c" opacity="0.5"/>
  <text x="210" y="326" fill="#ffffff" font-size="12" text-anchor="middle">100</text>
  <text x="210" y="365" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">テキスト記事</text>
  <text x="210" y="380" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（2分読了）</text>

  <!-- 写真コンテンツ 350 → height=19.6 → bar top=320 -->
  <rect x="300" y="321" width="100" height="19" fill="#c9a84c" opacity="0.65"/>
  <text x="350" y="313" fill="#ffffff" font-size="12" text-anchor="middle">350</text>
  <text x="350" y="365" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">写真コンテンツ</text>
  <text x="350" y="380" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（30秒）</text>

  <!-- 動画 1800 → height=100.8 → bar top=239 -->
  <rect x="440" y="239" width="100" height="101" fill="#c9a84c" opacity="0.8"/>
  <text x="490" y="231" fill="#ffffff" font-size="12" text-anchor="middle">1,800</text>
  <text x="490" y="365" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">動画（2分視聴）</text>
  <text x="490" y="380" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle"></text>

  <!-- 密着ドキュメンタリー 5000 → height=280 → bar top=60 -->
  <rect x="580" y="60" width="100" height="280" fill="#c9a84c"/>
  <text x="630" y="52" fill="#c9a84c" font-size="13" font-weight="bold" text-anchor="middle">5,000</text>
  <text x="630" y="365" fill="#c9a84c" font-size="11" font-weight="bold" text-anchor="middle">密着ドキュメンタリー</text>
  <text x="630" y="380" fill="#c9a84c" font-size="10" text-anchor="middle">（5分）</text>
</svg>
