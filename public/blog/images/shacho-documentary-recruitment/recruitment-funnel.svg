<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="500" fill="#111111"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">採用ファネルと経営者密着動画の効果ポイント</text>
  <!-- Funnel stages -->
  <!-- Stage 1: 認知 -->
  <polygon points="150,70 650,70 580,160 220,160" fill="#c9a84c" opacity="0.85"/>
  <text x="400" y="118" text-anchor="middle" fill="#111111" font-size="15" font-weight="bold">認知（求人票・SNS・YouTube発見）</text>
  <text x="400" y="138" text-anchor="middle" fill="#111111" font-size="12">母数: 10,000人</text>
  <!-- Stage 2: 興味 -->
  <polygon points="220,170 580,170 530,260 270,260" fill="#c9a84c" opacity="0.7"/>
  <text x="400" y="215" text-anchor="middle" fill="#111111" font-size="15" font-weight="bold">興味（会社情報・動画を調べる）</text>
  <text x="400" y="235" text-anchor="middle" fill="#111111" font-size="12">3,000人（30%）</text>
  <!-- Stage 3: 検討 -->
  <polygon points="270,270 530,270 490,360 310,360" fill="#c9a84c" opacity="0.55"/>
  <text x="400" y="312" text-anchor="middle" fill="#111111" font-size="15" font-weight="bold">検討（密着動画で社風を確認）</text>
  <text x="400" y="332" text-anchor="middle" fill="#111111" font-size="12">900人（9%）</text>
  <!-- Stage 4: 応募 -->
  <polygon points="310,370 490,370 460,440 340,440" fill="#4ade80" opacity="0.85"/>
  <text x="400" y="408" text-anchor="middle" fill="#111111" font-size="14" font-weight="bold">応募（共感して行動）</text>
  <text x="400" y="428" text-anchor="middle" fill="#111111" font-size="12">270人（2.7%）</text>
  <!-- Stage 5: 内定 -->
  <polygon points="340,450 460,450 440,490 360,490" fill="#4ade80" opacity="1"/>
  <text x="400" y="475" text-anchor="middle" fill="#111111" font-size="13" font-weight="bold">内定・入社</text>
  <!-- Annotations -->
  <rect x="10" y="85" width="130" height="50" rx="5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
  <text x="75" y="106" text-anchor="middle" fill="#c9a84c" font-size="11">動画あり</text>
  <text x="75" y="123" text-anchor="middle" fill="#ffffff" font-size="11">認知→興味</text>
  <text x="75" y="138" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">+47%向上</text>
  <rect x="660" y="175" width="130" height="50" rx="5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
  <text x="725" y="196" text-anchor="middle" fill="#c9a84c" font-size="11">動画あり</text>
  <text x="725" y="213" text-anchor="middle" fill="#ffffff" font-size="11">検討→応募</text>
  <text x="725" y="228" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">+62%向上</text>
  <!-- Lines from annotations -->
  <line x1="140" y1="110" x2="220" y2="175" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="660" y1="200" x2="530" y2="270" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
</svg>
