<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="360"/>
    <line x1="80" y1="360" x2="750" y2="360"/>
    <line x1="80" y1="260" x2="750" y2="260"/>
    <line x1="80" y1="160" x2="750" y2="160"/>
    <line x1="80" y1="110" x2="750" y2="110"/>
    <line x1="80" y1="85" x2="750" y2="85"/>
  </g>
  <text x="400" y="35" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">密着動画あり vs なし：採用各指標の比較</text>
  <!-- Y axis -->
  <text x="70" y="364" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">0%</text>
  <text x="70" y="264" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">50%</text>
  <text x="70" y="164" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">100%</text>
  <text x="70" y="114" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">125%</text>
  <text x="70" y="89" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">138%</text>
  <!-- Group 1: 応募率 -->
  <text x="200" y="390" text-anchor="middle" fill="#ffffff" font-size="13">応募率</text>
  <rect x="130" y="230" width="65" height="130" fill="rgba(255,255,255,0.3)" rx="3"/>
  <text x="162" y="225" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">100%</text>
  <text x="162" y="238" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">（基準）</text>
  <rect x="205" y="138" width="65" height="222" fill="#c9a84c" rx="3"/>
  <text x="237" y="133" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">+111%</text>
  <!-- Group 2: 質問数/関心度 -->
  <text x="400" y="390" text-anchor="middle" fill="#ffffff" font-size="13">求職者の事前理解度</text>
  <rect x="330" y="220" width="65" height="140" fill="rgba(255,255,255,0.3)" rx="3"/>
  <text x="362" y="215" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">100%</text>
  <rect x="405" y="128" width="65" height="232" fill="#c9a84c" rx="3"/>
  <text x="437" y="123" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">+116%</text>
  <!-- Group 3: 定着率 -->
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-size="13">1年後定着率</text>
  <rect x="530" y="184" width="65" height="176" fill="rgba(255,255,255,0.3)" rx="3"/>
  <text x="562" y="179" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">100%</text>
  <rect x="605" y="84" width="65" height="276" fill="#4ade80" rx="3"/>
  <text x="637" y="79" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">+138%</text>
  <!-- Legend -->
  <rect x="540" y="40" width="16" height="16" fill="rgba(255,255,255,0.3)" rx="2"/>
  <text x="562" y="53" fill="rgba(255,255,255,0.7)" font-size="12">動画なし（基準値）</text>
  <rect x="680" y="40" width="16" height="16" fill="#c9a84c" rx="2"/>
  <text x="702" y="53" fill="#c9a84c" font-size="12">動画あり</text>
</svg>
