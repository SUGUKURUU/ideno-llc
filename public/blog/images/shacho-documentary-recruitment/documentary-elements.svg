<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="500" fill="#111111"/>
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="0" y1="125" x2="800" y2="125"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>
  <text x="400" y="35" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">密着動画に含めるべき要素マップ</text>
  <!-- Center circle -->
  <circle cx="400" cy="255" r="55" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">密着動画</text>
  <text x="400" y="268" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">コア要素</text>
  <!-- Element 1: 社長の素顔 -->
  <circle cx="200" cy="145" r="55" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="200" y="140" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">社長の素顔・</text>
  <text x="200" y="158" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">本音の言葉</text>
  <line x1="250" y1="172" x2="348" y2="218" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Element 2: 日常業務 -->
  <circle cx="600" cy="145" r="55" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="600" y="140" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">日常業務・</text>
  <text x="600" y="158" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">現場シーン</text>
  <line x1="550" y1="172" x2="452" y2="218" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Element 3: 社員インタビュー -->
  <circle cx="130" cy="310" r="55" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="130" y="305" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">社員インタビュー</text>
  <text x="130" y="323" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">（リアルな声）</text>
  <line x1="182" y1="290" x2="348" y2="265" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Element 4: 会議・判断 -->
  <circle cx="670" cy="310" r="55" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="670" y="305" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">会議・意思決定</text>
  <text x="670" y="323" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">（経営の現場）</text>
  <line x1="618" y1="290" x2="452" y2="265" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Element 5: 会社の歴史 -->
  <circle cx="270" cy="430" r="50" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="270" y="425" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">創業ストーリー・</text>
  <text x="270" y="443" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">ビジョン</text>
  <line x1="305" y1="382" x2="375" y2="305" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Element 6: 職場環境 -->
  <circle cx="530" cy="430" r="50" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="530" y="425" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">職場環境・</text>
  <text x="530" y="443" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">チームの雰囲気</text>
  <line x1="495" y1="382" x2="425" y2="305" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Must-have labels -->
  <text x="200" y="210" text-anchor="middle" fill="#4ade80" font-size="10">必須①</text>
  <text x="600" y="210" text-anchor="middle" fill="#4ade80" font-size="10">必須②</text>
  <text x="50" y="310" text-anchor="middle" fill="#4ade80" font-size="10">必須③</text>
  <text x="750" y="310" text-anchor="middle" fill="#4ade80" font-size="10">必須④</text>
</svg>
