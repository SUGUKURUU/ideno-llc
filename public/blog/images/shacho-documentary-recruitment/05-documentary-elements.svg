<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">密着動画に含めるべき要素</text>

  <!-- Center circle -->
  <circle cx="400" cy="220" r="54" fill="#c9a84c"/>
  <text x="400" y="215" fill="#111111" font-size="14" font-weight="bold" text-anchor="middle">密着</text>
  <text x="400" y="233" fill="#111111" font-size="14" font-weight="bold" text-anchor="middle">動画</text>

  <!-- Branch lines + nodes -->
  <!-- 朝のルーティン (top-left) -->
  <line x1="362" y1="175" x2="250" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="210" cy="93" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="210" y="88" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">朝の</text>
  <text x="210" y="104" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">ルーティン</text>

  <!-- 経営判断の瞬間 (top) -->
  <line x1="400" y1="166" x2="400" y2="100" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="72" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="67" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">経営判断</text>
  <text x="400" y="83" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">の瞬間</text>

  <!-- 社員との会話 (top-right) -->
  <line x1="438" y1="175" x2="550" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="590" cy="93" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="590" y="88" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">社員との</text>
  <text x="590" y="104" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">会話</text>

  <!-- ビジョン語り (right) -->
  <line x1="454" y1="220" x2="670" y2="220" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="714" cy="220" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="714" y="215" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">ビジョン</text>
  <text x="714" y="231" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">語り</text>

  <!-- 失敗談 (bottom-right) -->
  <line x1="438" y1="265" x2="550" y2="330" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="590" cy="350" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="590" y="345" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">失敗談・</text>
  <text x="590" y="361" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">葛藤</text>

  <!-- 趣味・人間性 (bottom) -->
  <line x1="400" y1="274" x2="400" y2="340" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="366" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="361" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">趣味・</text>
  <text x="400" y="377" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">人間性</text>

  <!-- 現場巡回 (bottom-left) -->
  <line x1="362" y1="265" x2="250" y2="330" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="210" cy="350" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="210" y="345" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">現場</text>
  <text x="210" y="361" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">巡回</text>

  <!-- Left (left) -->
  <line x1="346" y1="220" x2="130" y2="220" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <circle cx="86" cy="220" r="44" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="86" y="215" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">素の</text>
  <text x="86" y="231" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">表情</text>
</svg>
