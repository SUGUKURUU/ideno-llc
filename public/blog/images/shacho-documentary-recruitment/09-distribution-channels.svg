<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">採用動画の配信チャネルと効果</text>

  <!-- Center: 採用動画 -->
  <circle cx="400" cy="210" r="52" fill="#c9a84c"/>
  <text x="400" y="205" fill="#111111" font-size="14" font-weight="bold" text-anchor="middle">採用</text>
  <text x="400" y="223" fill="#111111" font-size="14" font-weight="bold" text-anchor="middle">動画</text>

  <!-- YouTube (top-left) -->
  <line x1="358" y1="168" x2="240" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <rect x="100" y="58" width="270" height="90" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="235" y="82" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">YouTube</text>
  <text x="235" y="102" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ SEO効果・長期資産化</text>
  <text x="235" y="120" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ 検索流入で継続的に露出</text>
  <text x="235" y="138" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">★★★★★ 長期効果</text>

  <!-- Instagram/TikTok (top-right) -->
  <line x1="442" y1="168" x2="560" y2="110" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <rect x="430" y="58" width="270" height="90" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="565" y="82" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">Instagram / TikTok</text>
  <text x="565" y="102" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ 20〜30代へのリーチ最大化</text>
  <text x="565" y="120" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ ショートクリップで拡散</text>
  <text x="565" y="138" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">★★★★☆ 認知・拡散</text>

  <!-- 採用サイト埋め込み (bottom-left) -->
  <line x1="358" y1="252" x2="240" y2="310" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <rect x="100" y="272" width="270" height="90" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="235" y="296" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">採用サイト埋め込み</text>
  <text x="235" y="316" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ 検討中の候補者に直接訴求</text>
  <text x="235" y="334" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ 応募直前の背中を押す</text>
  <text x="235" y="352" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">★★★★★ CV率向上</text>

  <!-- LinkedIn (bottom-right) -->
  <line x1="442" y1="252" x2="560" y2="310" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
  <rect x="430" y="272" width="270" height="90" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="565" y="296" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">LinkedIn シェア</text>
  <text x="565" y="316" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ BtoB人材・経営層への認知</text>
  <text x="565" y="334" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">✓ 専門職・管理職採用に有効</text>
  <text x="565" y="352" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">★★★☆☆ 質の高い人材</text>

  <text x="400" y="408" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">複数チャネルを組み合わせることで採用リーチを最大化</text>
</svg>
