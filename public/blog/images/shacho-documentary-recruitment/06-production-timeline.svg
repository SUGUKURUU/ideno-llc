<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">密着動画の制作〜公開スケジュール</text>

  <!-- Row definitions: y positions -->
  <!-- Header row -->
  <rect x="40" y="58" width="720" height="32" fill="#1e1e1e"/>
  <text x="150" y="79" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">工程</text>
  <text x="470" y="79" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">日程（目安）</text>

  <!-- Total scale: ~14 days = 500px wide, starts x=270 -->
  <!-- Day markers -->
  <line x1="270" y1="90" x2="270" y2="380" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="270" y="104" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">Day1</text>
  <line x1="306" y1="90" x2="306" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="342" y1="90" x2="342" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="378" y1="90" x2="378" y2="380" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="378" y="104" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">5日</text>
  <line x1="414" y1="90" x2="414" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="450" y1="90" x2="450" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="486" y1="90" x2="486" y2="380" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="486" y="104" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">10日</text>
  <line x1="522" y1="90" x2="522" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="558" y1="90" x2="558" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="594" y1="90" x2="594" y2="380" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="594" y="104" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">14日</text>
  <line x1="630" y1="90" x2="630" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="666" y1="90" x2="666" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="702" y1="90" x2="702" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="738" y1="90" x2="738" y2="380" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="738" y="104" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">21日</text>

  <!-- Row 1: 事前打ち合わせ 1週間: day1-7 = x270 to x468 width=198 -->
  <rect x="40" y="108" width="720" height="42" fill="#1a1a1a"/>
  <text x="150" y="134" fill="#ffffff" font-size="13" text-anchor="middle">事前打ち合わせ</text>
  <rect x="270" y="116" width="198" height="26" fill="#c9a84c" opacity="0.8" rx="4"/>
  <text x="369" y="134" fill="#111111" font-size="12" font-weight="bold" text-anchor="middle">1週間</text>

  <!-- Row 2: 撮影 1日 = day8 = x468 width=36 -->
  <rect x="40" y="158" width="720" height="42" fill="#161616"/>
  <text x="150" y="184" fill="#ffffff" font-size="13" text-anchor="middle">撮影（密着）</text>
  <rect x="468" y="166" width="36" height="26" fill="#c9a84c" rx="4"/>
  <text x="486" y="184" fill="#111111" font-size="12" font-weight="bold" text-anchor="middle">1日</text>

  <!-- Row 3: 粗編集 3日: day9-11 = x504 to x594 width=90 -->
  <rect x="40" y="208" width="720" height="42" fill="#1a1a1a"/>
  <text x="150" y="234" fill="#ffffff" font-size="13" text-anchor="middle">粗編集</text>
  <rect x="504" y="216" width="90" height="26" fill="#c9a84c" opacity="0.7" rx="4"/>
  <text x="549" y="234" fill="#111111" font-size="12" font-weight="bold" text-anchor="middle">3日</text>

  <!-- Row 4: 本編集 5日: day12-16 = x594 to x738 width=144 -->
  <rect x="40" y="258" width="720" height="42" fill="#161616"/>
  <text x="150" y="284" fill="#ffffff" font-size="13" text-anchor="middle">本編集</text>
  <rect x="594" y="266" width="144" height="26" fill="#c9a84c" opacity="0.6" rx="4"/>
  <text x="666" y="284" fill="#111111" font-size="12" font-weight="bold" text-anchor="middle">5日</text>

  <!-- Row 5: 確認・修正 3日: day17-19 = x738 to x828→clamp to 758 -->
  <rect x="40" y="308" width="720" height="42" fill="#1a1a1a"/>
  <text x="150" y="334" fill="#ffffff" font-size="13" text-anchor="middle">確認・修正</text>
  <rect x="738" y="316" width="22" height="26" fill="#c9a84c" opacity="0.5" rx="4"/>
  <text x="740" y="334" fill="#111111" font-size="11" font-weight="bold" text-anchor="start">3日</text>

  <!-- Row 6: 公開 -->
  <rect x="40" y="358" width="720" height="32" fill="#161616"/>
  <text x="150" y="379" fill="#ffffff" font-size="13" text-anchor="middle">公開・拡散</text>
  <text x="490" y="379" fill="#c9a84c" font-size="13" font-weight="bold" text-anchor="middle">▶ 公開後すぐにSNS・採用サイトへ展開</text>
</svg>
