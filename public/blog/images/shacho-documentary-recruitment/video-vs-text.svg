<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="360"/>
    <line x1="80" y1="360" x2="760" y2="360"/>
    <line x1="80" y1="260" x2="760" y2="260"/>
    <line x1="80" y1="160" x2="760" y2="160"/>
    <line x1="80" y1="110" x2="760" y2="110"/>
  </g>
  <text x="400" y="35" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">テキスト vs 動画：情報伝達量・感情移入度・記憶定着率の比較</text>
  <!-- Y axis labels -->
  <text x="70" y="364" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">0%</text>
  <text x="70" y="264" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">50%</text>
  <text x="70" y="164" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">100%</text>
  <text x="70" y="114" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">125%</text>
  <!-- Categories -->
  <text x="200" y="390" text-anchor="middle" fill="#ffffff" font-size="13">情報伝達量</text>
  <text x="400" y="390" text-anchor="middle" fill="#ffffff" font-size="13">感情移入度</text>
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-size="13">記憶定着率</text>
  <!-- Text bars (left) -->
  <rect x="120" y="230" width="70" height="130" fill="rgba(255,255,255,0.4)" rx="3"/>
  <text x="155" y="225" text-anchor="middle" fill="#ffffff" font-size="12">30%</text>
  <!-- Video bars (left) -->
  <rect x="210" y="100" width="70" height="260" fill="#c9a84c" rx="3"/>
  <text x="245" y="95" text-anchor="middle" fill="#c9a84c" font-size="12">130%</text>
  <!-- Text bars (middle) -->
  <rect x="320" y="260" width="70" height="100" fill="rgba(255,255,255,0.4)" rx="3"/>
  <text x="355" y="255" text-anchor="middle" fill="#ffffff" font-size="12">25%</text>
  <!-- Video bars (middle) -->
  <rect x="410" y="100" width="70" height="260" fill="#c9a84c" rx="3"/>
  <text x="445" y="95" text-anchor="middle" fill="#c9a84c" font-size="12">130%</text>
  <!-- Text bars (right) -->
  <rect x="520" y="280" width="70" height="80" fill="rgba(255,255,255,0.4)" rx="3"/>
  <text x="555" y="275" text-anchor="middle" fill="#ffffff" font-size="12">20%</text>
  <!-- Video bars (right) -->
  <rect x="610" y="160" width="70" height="200" fill="#c9a84c" rx="3"/>
  <text x="645" y="155" text-anchor="middle" fill="#c9a84c" font-size="12">100%</text>
  <!-- Legend -->
  <rect x="100" y="40" width="16" height="16" fill="rgba(255,255,255,0.4)" rx="2"/>
  <text x="122" y="53" fill="rgba(255,255,255,0.7)" font-size="12">テキスト</text>
  <rect x="200" y="40" width="16" height="16" fill="#c9a84c" rx="2"/>
  <text x="222" y="53" fill="#c9a84c" font-size="12">動画（密着ドキュメンタリー）</text>
  <!-- Note -->
  <text x="400" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">※テキストを100%とした場合の相対指標。各種調査・研究を基に作成。</text>
</svg>
