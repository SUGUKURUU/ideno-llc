<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="280" y1="60" x2="280" y2="390"/>
    <line x1="280" y1="390" x2="780" y2="390"/>
    <line x1="380" y1="60" x2="380" y2="390"/>
    <line x1="480" y1="60" x2="480" y2="390"/>
    <line x1="580" y1="60" x2="580" y2="390"/>
    <line x1="680" y1="60" x2="680" y2="390"/>
    <line x1="780" y1="60" x2="780" y2="390"/>
  </g>
  <text x="400" y="35" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">求職者が最も気にすること TOP10</text>
  <!-- X axis labels -->
  <text x="280" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">0%</text>
  <text x="380" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">20%</text>
  <text x="480" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">40%</text>
  <text x="580" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">60%</text>
  <text x="680" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">80%</text>
  <text x="780" y="408" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">100%</text>
  <!-- Items with bars -->
  <!-- Item 1 -->
  <text x="270" y="83" text-anchor="end" fill="#ffffff" font-size="12">①社風・職場の雰囲気</text>
  <rect x="282" y="70" width="448" height="20" fill="#c9a84c" rx="2"/>
  <text x="738" y="85" fill="#4ade80" font-size="12" font-weight="bold">89%</text>
  <!-- Item 2 -->
  <text x="270" y="113" text-anchor="end" fill="#ffffff" font-size="12">②上司・経営者の人柄</text>
  <rect x="282" y="100" width="410" height="20" fill="#c9a84c" opacity="0.85" rx="2"/>
  <text x="700" y="115" fill="#4ade80" font-size="12">82%</text>
  <!-- Item 3 -->
  <text x="270" y="143" text-anchor="end" fill="#ffffff" font-size="12">③仕事内容のリアル</text>
  <rect x="282" y="130" width="380" height="20" fill="#c9a84c" opacity="0.75" rx="2"/>
  <text x="670" y="145" fill="#ffffff" font-size="12">76%</text>
  <!-- Item 4 -->
  <text x="270" y="173" text-anchor="end" fill="#ffffff" font-size="12">④給与・待遇の詳細</text>
  <rect x="282" y="160" width="370" height="20" fill="#c9a84c" opacity="0.65" rx="2"/>
  <text x="660" y="175" fill="#ffffff" font-size="12">74%</text>
  <!-- Item 5 -->
  <text x="270" y="203" text-anchor="end" fill="#ffffff" font-size="12">⑤キャリアパス・成長機会</text>
  <rect x="282" y="190" width="330" height="20" fill="#c9a84c" opacity="0.6" rx="2"/>
  <text x="620" y="205" fill="#ffffff" font-size="12">66%</text>
  <!-- Item 6 -->
  <text x="270" y="233" text-anchor="end" fill="#ffffff" font-size="12">⑥離職率・定着率</text>
  <rect x="282" y="220" width="310" height="20" fill="rgba(255,255,255,0.4)" rx="2"/>
  <text x="600" y="235" fill="#ffffff" font-size="12">62%</text>
  <!-- Item 7 -->
  <text x="270" y="263" text-anchor="end" fill="#ffffff" font-size="12">⑦働いている人の顔・声</text>
  <rect x="282" y="250" width="290" height="20" fill="rgba(255,255,255,0.35)" rx="2"/>
  <text x="580" y="265" fill="#ffffff" font-size="12">58%</text>
  <!-- Item 8 -->
  <text x="270" y="293" text-anchor="end" fill="#ffffff" font-size="12">⑧会社の将来性・安定性</text>
  <rect x="282" y="280" width="270" height="20" fill="rgba(255,255,255,0.3)" rx="2"/>
  <text x="560" y="295" fill="#ffffff" font-size="12">54%</text>
  <!-- Item 9 -->
  <text x="270" y="323" text-anchor="end" fill="#ffffff" font-size="12">⑨福利厚生</text>
  <rect x="282" y="310" width="235" height="20" fill="rgba(255,255,255,0.25)" rx="2"/>
  <text x="525" y="325" fill="#ffffff" font-size="12">47%</text>
  <!-- Item 10 -->
  <text x="270" y="353" text-anchor="end" fill="#ffffff" font-size="12">⑩会社の規模・歴史</text>
  <rect x="282" y="340" width="185" height="20" fill="rgba(255,255,255,0.2)" rx="2"/>
  <text x="475" y="355" fill="#ffffff" font-size="12">37%</text>
  <!-- Note about video impact -->
  <rect x="530" y="65" width="220" height="40" rx="5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
  <text x="640" y="82" text-anchor="middle" fill="#c9a84c" font-size="11">上位3項目は密着動画で</text>
  <text x="640" y="97" text-anchor="middle" fill="#4ade80" font-size="11">直接解消できる不安</text>
</svg>
