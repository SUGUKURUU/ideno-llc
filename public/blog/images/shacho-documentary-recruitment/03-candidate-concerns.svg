<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="38" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">求職者が入社前に最も知りたいこと TOP5</text>

  <!-- Bars (horizontal) -->
  <!-- Scale: 100%=480px, base x=200 -->
  <!-- 職場の雰囲気 78% -->
  <rect x="200" y="70" width="374" height="36" fill="#c9a84c" rx="3"/>
  <text x="192" y="95" fill="rgba(255,255,255,0.8)" font-size="13" text-anchor="end">職場の雰囲気</text>
  <text x="582" y="95" fill="#111111" font-size="14" font-weight="bold" text-anchor="start"> 78%</text>

  <!-- 社長・経営者の人柄 71% -->
  <rect x="200" y="126" width="341" height="36" fill="#c9a84c" opacity="0.88" rx="3"/>
  <text x="192" y="151" fill="rgba(255,255,255,0.8)" font-size="13" text-anchor="end">社長・経営者の人柄</text>
  <text x="549" y="151" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="start"> 71%</text>

  <!-- 実際の仕事内容 68% -->
  <rect x="200" y="182" width="326" height="36" fill="#c9a84c" opacity="0.76" rx="3"/>
  <text x="192" y="207" fill="rgba(255,255,255,0.8)" font-size="13" text-anchor="end">実際の仕事内容</text>
  <text x="534" y="207" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="start"> 68%</text>

  <!-- 社員同士の関係性 65% -->
  <rect x="200" y="238" width="312" height="36" fill="#c9a84c" opacity="0.64" rx="3"/>
  <text x="192" y="263" fill="rgba(255,255,255,0.8)" font-size="13" text-anchor="end">社員同士の関係性</text>
  <text x="520" y="263" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="start"> 65%</text>

  <!-- キャリアパス 58% -->
  <rect x="200" y="294" width="278" height="36" fill="#c9a84c" opacity="0.52" rx="3"/>
  <text x="192" y="319" fill="rgba(255,255,255,0.8)" font-size="13" text-anchor="end">キャリアパス</text>
  <text x="486" y="319" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="start"> 58%</text>

  <!-- X axis scale -->
  <line x1="200" y1="348" x2="680" y2="348" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="200" y="363" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">0%</text>
  <text x="392" y="363" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">40%</text>
  <text x="584" y="363" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">80%</text>
  <line x1="392" y1="65" x2="392" y2="348" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="584" y1="65" x2="584" y2="348" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="400" y="398" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">出典：求職者意識調査（複数回答）</text>
</svg>
