<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">よくある失敗パターン 4選（NGケース）</text>
  <!-- Card 1 -->
  <rect x="30" y="60" width="355" height="155" rx="10" fill="#1e1414" stroke="#8b2020" stroke-width="2"/>
  <rect x="30" y="60" width="355" height="42" rx="10" fill="#8b2020"/>
  <rect x="30" y="88" width="355" height="14" fill="#8b2020"/>
  <text x="50" y="88" fill="#ffffff" font-size="13" font-weight="bold">❌ NG①：どちらも中途半端に始める</text>
  <text x="50" y="120" fill="#ffffff" font-size="12">SNSもHPも「とりあえず」スタート</text>
  <text x="50" y="141" fill="#aaaaaa" font-size="12">→ どちらも更新が止まり逆効果に</text>
  <text x="50" y="162" fill="#c9a84c" font-size="11">✅ 対策：メインを1つ決めて集中</text>
  <text x="50" y="182" fill="#c9a84c" font-size="11">　　もう1つは最低限維持にとどめる</text>
  <!-- Card 2 -->
  <rect x="415" y="60" width="355" height="155" rx="10" fill="#1e1414" stroke="#8b2020" stroke-width="2"/>
  <rect x="415" y="60" width="355" height="42" rx="10" fill="#8b2020"/>
  <rect x="415" y="88" width="355" height="14" fill="#8b2020"/>
  <text x="435" y="88" fill="#ffffff" font-size="13" font-weight="bold">❌ NG②：SNS発信→着地先がない</text>
  <text x="435" y="120" fill="#ffffff" font-size="12">SNSで認知を得てもHPが未整備</text>
  <text x="435" y="141" fill="#aaaaaa" font-size="12">→ 興味を持った人が離脱してしまう</text>
  <text x="435" y="162" fill="#c9a84c" font-size="11">✅ 対策：SNS先行でも最低限の</text>
  <text x="435" y="182" fill="#c9a84c" font-size="11">　　問合せページを先に用意する</text>
  <!-- Card 3 -->
  <rect x="30" y="235" width="355" height="155" rx="10" fill="#1e1414" stroke="#8b2020" stroke-width="2"/>
  <rect x="30" y="235" width="355" height="42" rx="10" fill="#8b2020"/>
  <rect x="30" y="263" width="355" height="14" fill="#8b2020"/>
  <text x="50" y="263" fill="#ffffff" font-size="13" font-weight="bold">❌ NG③：HPを作ったが誰も見ない</text>
  <text x="50" y="295" fill="#ffffff" font-size="12">SEO・SNS・広告なしで制作だけ完了</text>
  <text x="50" y="316" fill="#aaaaaa" font-size="12">→ 月間アクセス数十件で終わる</text>
  <text x="50" y="337" fill="#c9a84c" font-size="11">✅ 対策：HP制作と同時にSNSで</text>
  <text x="50" y="357" fill="#c9a84c" font-size="11">　　告知・誘導施策をセットで実施</text>
  <!-- Card 4 -->
  <rect x="415" y="235" width="355" height="155" rx="10" fill="#1e1414" stroke="#8b2020" stroke-width="2"/>
  <rect x="415" y="235" width="355" height="42" rx="10" fill="#8b2020"/>
  <rect x="415" y="263" width="355" height="14" fill="#8b2020"/>
  <text x="435" y="263" fill="#ffffff" font-size="13" font-weight="bold">❌ NG④：SNS・HPのメッセージ不一致</text>
  <text x="435" y="295" fill="#ffffff" font-size="12">SNSはカジュアル、HPは硬い文体</text>
  <text x="435" y="316" fill="#aaaaaa" font-size="12">→ ブランドへの不信感につながる</text>
  <text x="435" y="337" fill="#c9a84c" font-size="11">✅ 対策：発信者像・世界観を先に</text>
  <text x="435" y="357" fill="#c9a84c" font-size="11">　　定義してから各チャネルを設計</text>
  <!-- Footer -->
  <text x="400" y="410" text-anchor="middle" fill="#555555" font-size="11">失敗パターンを知ることが、成功への最短ルート</text>
</svg>