<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">SNS × HP 連携による相乗効果モデル</text>
  <!-- SNS circle -->
  <circle cx="220" cy="200" r="100" fill="#1a2a1a" stroke="#c9a84c" stroke-width="2"/>
  <text x="220" y="185" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">SNS</text>
  <text x="220" y="208" text-anchor="middle" fill="#ffffff" font-size="11">・認知拡大</text>
  <text x="220" y="226" text-anchor="middle" fill="#ffffff" font-size="11">・拡散・エンゲージメント</text>
  <!-- HP circle -->
  <circle cx="580" cy="200" r="100" fill="#1a1a2a" stroke="#c9a84c" stroke-width="2"/>
  <text x="580" y="185" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">HP</text>
  <text x="580" y="208" text-anchor="middle" fill="#ffffff" font-size="11">・信頼形成</text>
  <text x="580" y="226" text-anchor="middle" fill="#ffffff" font-size="11">・詳細情報・CV</text>
  <!-- Overlap zone -->
  <ellipse cx="400" cy="200" rx="60" ry="80" fill="#2a2a1a" opacity="0.7"/>
  <text x="400" y="188" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">相乗</text>
  <text x="400" y="206" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">効果</text>
  <text x="400" y="226" text-anchor="middle" fill="#aaaaaa" font-size="10">問合せ</text>
  <text x="400" y="242" text-anchor="middle" fill="#aaaaaa" font-size="10">最大化</text>
  <!-- Arrows SNS -> HP -->
  <path d="M 312 175 Q 370 140 435 165" fill="none" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="138" text-anchor="middle" fill="#aaaaaa" font-size="11">認知→HP誘導</text>
  <!-- Arrows HP -> SNS -->
  <path d="M 488 225 Q 430 260 365 235" fill="none" stroke="#4a7fa5" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="430" y="272" text-anchor="middle" fill="#aaaaaa" font-size="11">HP→SNSシェア</text>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c9a84c"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a7fa5"/>
    </marker>
  </defs>
  <!-- Bottom benefits -->
  <rect x="60" y="330" width="190" height="56" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1"/>
  <text x="155" y="352" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">SNS単体</text>
  <text x="155" y="372" text-anchor="middle" fill="#aaaaaa" font-size="11">認知は得られるが</text>
  <text x="155" y="388" text-anchor="middle" fill="#aaaaaa" font-size="11">問合せに繋がりにくい</text>
  <rect x="305" y="330" width="190" height="56" rx="8" fill="#1e2a1a" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="352" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">SNS×HP連携</text>
  <text x="400" y="372" text-anchor="middle" fill="#ffffff" font-size="11">問合せ獲得が</text>
  <text x="400" y="388" text-anchor="middle" fill="#ffffff" font-size="11">最大3倍以上に</text>
  <rect x="550" y="330" width="190" height="56" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1"/>
  <text x="645" y="352" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">HP単体</text>
  <text x="645" y="372" text-anchor="middle" fill="#aaaaaa" font-size="11">信頼はあるが</text>
  <text x="645" y="388" text-anchor="middle" fill="#aaaaaa" font-size="11">アクセスが集まらない</text>
</svg>