<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="60" x2="760" y2="60" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="120" x2="760" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="180" x2="760" y2="180" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="240" x2="760" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="300" x2="760" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="360" x2="760" y2="360" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">SNS経由 vs 検索経由の集客特性比較</text>
  <!-- Y-axis labels -->
  <text x="70" y="64" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">高い</text>
  <text x="70" y="304" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">低い</text>
  <!-- Category labels -->
  <text x="160" y="385" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">即効性</text>
  <text x="290" y="385" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">拡散性</text>
  <text x="420" y="385" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">資産性</text>
  <text x="550" y="385" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">信頼性</text>
  <text x="680" y="385" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">コスト効率</text>
  <!-- SNS bars -->
  <rect x="120" y="120" width="60" height="240" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="150" y="115" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">90%</text>
  <rect x="250" y="80" width="60" height="280" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="280" y="75" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">95%</text>
  <rect x="380" y="240" width="60" height="120" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="410" y="235" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">40%</text>
  <rect x="510" y="180" width="60" height="180" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="540" y="175" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">60%</text>
  <rect x="640" y="150" width="60" height="210" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="670" y="145" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">70%</text>
  <!-- SEO bars -->
  <rect x="190" y="240" width="60" height="120" fill="#4ade80" opacity="0.85" rx="3"/>
  <text x="220" y="235" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">40%</text>
  <rect x="320" y="300" width="60" height="60" fill="#4ade80" opacity="0.85" rx="3"/>
  <text x="350" y="295" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">20%</text>
  <rect x="450" y="80" width="60" height="280" fill="#4ade80" opacity="0.85" rx="3"/>
  <text x="480" y="75" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">95%</text>
  <rect x="580" y="120" width="60" height="240" fill="#4ade80" opacity="0.85" rx="3"/>
  <text x="610" y="115" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">80%</text>
  <rect x="710" y="180" width="60" height="180" fill="#4ade80" opacity="0.85" rx="3"/>
  <text x="740" y="175" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">60%</text>
  <!-- Legend -->
  <rect x="200" y="400" width="16" height="12" fill="#c9a84c" rx="2"/>
  <text x="222" y="411" fill="rgba(255,255,255,0.7)" font-size="12">SNS（Instagram/X等）</text>
  <rect x="420" y="400" width="16" height="12" fill="#4ade80" rx="2"/>
  <text x="442" y="411" fill="rgba(255,255,255,0.7)" font-size="12">SEO（検索流入）</text>
</svg>
