<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="500" fill="#111111"/>
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#c9a84c" font-size="20" font-weight="bold">会社フェーズ別 SNS / ホームページ 優先度マトリクス</text>
  <!-- Header row -->
  <rect x="40" y="60" width="180" height="50" fill="rgba(201,168,76,0.15)" rx="4"/>
