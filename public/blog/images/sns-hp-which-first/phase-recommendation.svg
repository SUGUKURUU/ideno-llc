  <rect x="400" y="60" width="160" height="50" fill="rgba(201,168,76,0.1)" rx="4"/>
  <text x="480" y="90" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">HP優先度</text>
  <rect x="570" y="60" width="190" height="50" fill="rgba(255,255,255,0.05)" rx="4"/>
  <text x="665" y="90" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="bold">推奨アクション</text>
  <!-- Row 1 -->
  <rect x="40" y="120" width="720" height="60" fill="rgba(255,255,255,0.03)" rx="4"/>
  <text x="130" y="143" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-weight="bold">フェーズA</text>
  <text x="130" y="162" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">認知ゼロ・立ち上げ期</text>
  <text x="310" y="155" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">★★★★★</text>
  <text x="480" y="155" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">★★☆☆☆</text>
  <text x="665" y="155" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">SNS先行・簡易HP並行</text>
  <!-- Row 2 -->
  <rect x="40" y="190" width="720" height="60" fill="rgba(255,255,255,0.05)" rx="4"/>
  <text x="130" y="213" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-weight="bold">フェーズB</text>
  <text x="130" y="232" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">認知あり・信頼が課題</text>
  <text x="310" y="225" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">★★★☆☆</text>
  <text x="480" y="225" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">★★★★☆</text>
  <text x="665" y="225" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">HP本格整備・SNS継続</text>
  <!-- Row 3 -->
  <rect x="40" y="260" width="720" height="60" fill="rgba(255,255,255,0.03)" rx="4"/>
  <text x="130" y="283" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-weight="bold">フェーズC</text>
  <text x="130" y="302" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">B2B・高単価サービス</text>
  <text x="310" y="295" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">★★★☆☆</text>
  <text x="480" y="295" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">★★★★★</text>
  <text x="665" y="295" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">HP先行・SNS補助</text>
  <!-- Row 4 -->
  <rect x="40" y="330" width="720" height="60" fill="rgba(255,255,255,0.05)" rx="4"/>
  <text x="130" y="353" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-weight="bold">フェーズD</text>
  <text x="130" y="372" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">採用・資金調達が目的</text>
  <text x="310" y="365" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">★★★★☆</text>
  <text x="480" y="365" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">★★★★★</text>
  <text x="665" y="365" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">両方並行・SNS連携強化</text>
  <!-- Row 5 -->
  <rect x="40" y="400" width="720" height="60" fill="rgba(255,255,255,0.03)" rx="4"/>
  <text x="130" y="423" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-weight="bold">フェーズE</text>
  <text x="130" y="442" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">安定・拡大期</text>
  <text x="310" y="435" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="bold">★★★★★</text>
  <text x="480" y="435" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">★★★★★</text>
  <text x="665" y="435" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="11">統合運用・コンテンツ連携</text>
  <!-- Legend -->
  <text x="400" y="490" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">★★★★★=最優先 ★★★☆☆=重要 ★★☆☆☆=補助的</text>
</svg>
