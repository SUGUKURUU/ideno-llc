<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="38" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">SNS vs ホームページ 優先度判断フローチャート</text>
  <!-- Start -->
  <rect x="300" y="60" width="200" height="44" rx="22" fill="#c9a84c"/>
  <text x="400" y="87" text-anchor="middle" fill="#111111" font-size="14" font-weight="bold">スタート：今の状況は？</text>
  <!-- Arrow down -->
  <line x1="400" y1="104" x2="400" y2="130" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="400,140 394,128 406,128" fill="#c9a84c"/>
  <!-- Diamond 1 -->
  <polygon points="400,145 520,190 400,235 280,190" fill="#1e1e1e" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" fill="#ffffff" font-size="12">認知は</text>
  <text x="400" y="201" text-anchor="middle" fill="#ffffff" font-size="12">ゼロに近い？</text>
  <!-- Yes left -->
  <text x="258" y="188" text-anchor="middle" fill="#aaaaaa" font-size="11">YES</text>
  <line x1="280" y1="190" x2="180" y2="190" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="172,190 184,184 184,196" fill="#c9a84c"/>
  <!-- No right -->
  <text x="542" y="188" text-anchor="middle" fill="#aaaaaa" font-size="11">NO</text>
  <line x1="520" y1="190" x2="620" y2="190" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="628,190 616,184 616,196" fill="#c9a84c"/>
  <!-- SNS box -->
  <rect x="90" y="220" width="180" height="50" rx="8" fill="#1a2a1a" stroke="#c9a84c" stroke-width="2"/>
  <text x="180" y="241" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">SNS優先</text>
  <text x="180" y="258" text-anchor="middle" fill="#aaaaaa" font-size="11">Instagram / X から始める</text>
  <line x1="172" y1="204" x2="172" y2="220" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="172,220 166,208 178,208" fill="#c9a84c"/>
  <!-- Arrow -->
  <line x1="172" y1="190" x2="172" y2="204" stroke="#c9a84c" stroke-width="2"/>
  <!-- HP box -->
  <rect x="530" y="160" width="180" height="50" rx="8" fill="#1a1a2a" stroke="#c9a84c" stroke-width="2"/>
  <text x="620" y="181" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">HP優先</text>
  <text x="620" y="198" text-anchor="middle" fill="#aaaaaa" font-size="11">信頼性の担保が優先</text>
  <!-- Diamond 2 -->
  <polygon points="400,290 520,330 400,370 280,330" fill="#1e1e1e" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" fill="#ffffff" font-size="12">予算は</text>
  <text x="400" y="341" text-anchor="middle" fill="#ffffff" font-size="12">30万円以上？</text>
  <line x1="400" y1="235" x2="400" y2="290" stroke="#c9a84c" stroke-width="2"/>
  <!-- YES left from diamond 2 -->
  <text x="258" y="328" text-anchor="middle" fill="#aaaaaa" font-size="11">YES</text>
  <line x1="280" y1="330" x2="180" y2="330" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="172,330 184,324 184,336" fill="#c9a84c"/>
  <rect x="90" y="355" width="180" height="50" rx="8" fill="#2a2a1a" stroke="#c9a84c" stroke-width="2"/>
  <text x="180" y="376" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">並行整備</text>
  <text x="180" y="393" text-anchor="middle" fill="#aaaaaa" font-size="11">SNS+HP 同時スタート</text>
  <line x1="172" y1="330" x2="172" y2="355" stroke="#c9a84c" stroke-width="2"/>
  <!-- NO right from diamond 2 -->
  <text x="542" y="328" text-anchor="middle" fill="#aaaaaa" font-size="11">NO</text>
  <line x1="520" y1="330" x2="620" y2="330" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="628,330 616,324 616,336" fill="#c9a84c"/>
  <rect x="530" y="305" width="180" height="50" rx="8" fill="#1a2a1a" stroke="#c9a84c" stroke-width="2"/>
  <text x="620" y="326" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">SNS先行</text>
  <text x="620" y="343" text-anchor="middle" fill="#aaaaaa" font-size="11">予算はSNSに集中</text>
</svg>