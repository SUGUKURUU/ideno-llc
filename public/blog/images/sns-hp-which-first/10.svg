<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">SNS / HP 統合戦略チェックリスト</text>
  <!-- Left column -->
  <text x="200" y="68" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">SNS 基盤チェック</text>
  <rect x="40" y="78" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="102" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="102" fill="#ffffff" font-size="12">ターゲット顧客が使うSNSを選んでいる</text>
  <rect x="40" y="122" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="146" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="146" fill="#ffffff" font-size="12">プロフィールにHP・連絡先リンクがある</text>
  <rect x="40" y="166" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="190" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="190" fill="#ffffff" font-size="12">週2〜5回の投稿頻度を維持できている</text>
  <rect x="40" y="210" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="234" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="234" fill="#ffffff" font-size="12">投稿テーマが3種類以上設定されている</text>
  <rect x="40" y="254" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="278" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="278" fill="#ffffff" font-size="12">月次でエンゲージメントを確認している</text>
  <rect x="40" y="298" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="322" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="322" fill="#ffffff" font-size="12">宣伝投稿が全体の20%以下になっている</text>
  <rect x="40" y="342" width="320" height="38" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="65" y="366" fill="#c9a84c" font-size="16">□</text>
  <text x="85" y="366" fill="#ffffff" font-size="12">SNS→HP の誘導が設計されている</text>
  <!-- Right column -->
  <text x="600" y="68" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">HP 基盤チェック</text>
  <rect x="440" y="78" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="102" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="102" fill="#ffffff" font-size="12">「何をする会社か」が3秒で伝わる</text>
  <rect x="440" y="122" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="146" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="146" fill="#ffffff" font-size="12">問い合わせ手段が複数用意されている</text>
  <rect x="440" y="166" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="190" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="190" fill="#ffffff" font-size="12">実績・事例ページが掲載されている</text>
  <rect x="440" y="210" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="234" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="234" fill="#ffffff" font-size="12">スマートフォンで正しく表示される</text>
  <rect x="440" y="254" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="278" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="278" fill="#ffffff" font-size="12">SNSへのリンクがフッターにある</text>
  <rect x="440" y="298" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="322" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="322" fill="#ffffff" font-size="12">Google Analytics で計測している</text>
  <rect x="440" y="342" width="320" height="38" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="465" y="366" fill="#c9a84c" font-size="16">□</text>
  <text x="485" y="366" fill="#ffffff" font-size="12">SNS・HPでメッセージが統一されている</text>
  <!-- Footer -->
  <text x="400" y="408" text-anchor="middle" fill="#555555" font-size="11">全項目チェックできれば統合戦略の基盤が整っています</text>
</svg>