<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">スタートアップ最速成長ロードマップ</text>
  <!-- Timeline line -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#c9a84c" stroke-width="2"/>
  <!-- Month markers -->
  <!-- Month 0 -->
  <circle cx="80" cy="200" r="12" fill="#c9a84c"/>
  <text x="80" y="205" text-anchor="middle" fill="#111111" font-size="10" font-weight="bold">0</text>
  <text x="80" y="230" text-anchor="middle" fill="#aaaaaa" font-size="10">創業</text>
  <!-- Month 1 -->
  <circle cx="200" cy="200" r="12" fill="#c9a84c"/>
  <text x="200" y="205" text-anchor="middle" fill="#111111" font-size="10" font-weight="bold">1</text>
  <text x="200" y="230" text-anchor="middle" fill="#aaaaaa" font-size="10">1ヶ月</text>
  <!-- Month 3 -->
  <circle cx="360" cy="200" r="12" fill="#c9a84c"/>
  <text x="360" y="205" text-anchor="middle" fill="#111111" font-size="10" font-weight="bold">3</text>
  <text x="360" y="230" text-anchor="middle" fill="#aaaaaa" font-size="10">3ヶ月</text>
  <!-- Month 6 -->
  <circle cx="540" cy="200" r="12" fill="#c9a84c"/>
  <text x="540" y="205" text-anchor="middle" fill="#111111" font-size="10" font-weight="bold">6</text>
  <text x="540" y="230" text-anchor="middle" fill="#aaaaaa" font-size="10">6ヶ月</text>
  <!-- Month 12 -->
  <circle cx="720" cy="200" r="12" fill="#c9a84c"/>
  <text x="720" y="205" text-anchor="middle" fill="#111111" font-size="10" font-weight="bold">12</text>
  <text x="720" y="230" text-anchor="middle" fill="#aaaaaa" font-size="10">12ヶ月</text>
  <!-- Cards above line -->
  <rect x="50" y="60" width="150" height="110" rx="8" fill="#1a2a1a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="125" y="82" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">STEP 1</text>
  <text x="125" y="100" text-anchor="middle" fill="#ffffff" font-size="11">メッセージ設計</text>
  <text x="125" y="118" text-anchor="middle" fill="#aaaaaa" font-size="10">・誰に何を伝えるか</text>
  <text x="125" y="134" text-anchor="middle" fill="#aaaaaa" font-size="10">・発信コンセプト定義</text>
  <text x="125" y="150" text-anchor="middle" fill="#aaaaaa" font-size="10">・SNSアカウント開設</text>
  <line x1="125" y1="170" x2="125" y2="188" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Cards below line -->
  <rect x="130" y="220" width="160" height="100" rx="8" fill="#1a1a2a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="210" y="242" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">STEP 2</text>
  <text x="210" y="260" text-anchor="middle" fill="#ffffff" font-size="11">最低限HP公開</text>
  <text x="210" y="278" text-anchor="middle" fill="#aaaaaa" font-size="10">・LP1ページのみ</text>
  <text x="210" y="294" text-anchor="middle" fill="#aaaaaa" font-size="10">・SNS投稿を週3〜5回</text>
  <line x1="210" y1="213" x2="210" y2="220" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card above month 3 -->
  <rect x="280" y="60" width="165" height="110" rx="8" fill="#2a1a2a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="362" y="82" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">STEP 3</text>
  <text x="362" y="100" text-anchor="middle" fill="#ffffff" font-size="11">SNS本格運用</text>
  <text x="362" y="118" text-anchor="middle" fill="#aaaaaa" font-size="10">・運用代行を検討</text>
  <text x="362" y="134" text-anchor="middle" fill="#aaaaaa" font-size="10">・フォロワー100人目標</text>
  <text x="362" y="150" text-anchor="middle" fill="#aaaaaa" font-size="10">・HP改善を継続</text>
  <line x1="362" y1="170" x2="362" y2="188" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card below month 6 -->
  <rect x="455" y="220" width="175" height="110" rx="8" fill="#1a2a1a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="542" y="242" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">STEP 4</text>
  <text x="542" y="260" text-anchor="middle" fill="#ffffff" font-size="11">HP本格化＋広告</text>
  <text x="542" y="278" text-anchor="middle" fill="#aaaaaa" font-size="10">・実績ページ充実</text>
  <text x="542" y="294" text-anchor="middle" fill="#aaaaaa" font-size="10">・少額広告テスト開始</text>
  <text x="542" y="310" text-anchor="middle" fill="#aaaaaa" font-size="10">・月5〜10件問合せ目標</text>
  <line x1="542" y1="213" x2="542" y2="220" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card above month 12 -->
  <rect x="635" y="60" width="145" height="110" rx="8" fill="#2a2a1a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="707" y="82" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">STEP 5</text>
  <text x="707" y="100" text-anchor="middle" fill="#ffffff" font-size="11">統合戦略へ</text>
  <text x="707" y="118" text-anchor="middle" fill="#aaaaaa" font-size="10">・動画制作追加</text>
  <text x="707" y="134" text-anchor="middle" fill="#aaaaaa" font-size="10">・SEOコンテンツ強化</text>
  <text x="707" y="150" text-anchor="middle" fill="#aaaaaa" font-size="10">・三位一体運用へ</text>
  <line x1="707" y1="170" x2="720" y2="188" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Footer -->
  <text x="400" y="355" text-anchor="middle" fill="#aaaaaa" font-size="11">※各ステップの期間は予算・リソースにより前後します</text>
</svg>