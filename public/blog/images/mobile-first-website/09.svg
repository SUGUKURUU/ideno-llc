<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">フォーム最適化：入力体験を改善</text><text x="400" y="55" class="tg" text-anchor="middle">問い合わせ直前での離脱を防ぐ</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/><text x="70" y="110" class="gold" font-size="11" font-weight="bold">✓ type属性を正しく設定：メール・電話キーボード自動表示</text><text x="70" y="130" class="tw" font-size="9">type=\"email\" / type=\"tel\" で専用キーボードを呼び出す</text><line x1="50" y1="140" x2="750" y2="140" stroke="#c9a84c" stroke-width="1"/><text x="70" y="165" class="gold" font-size="11" font-weight="bold">✓ autocomplete属性：ブラウザ自動入力を活用</text><text x="70" y="185" class="tw" font-size="9">入力の手間を減らし、離脱を防ぐ</text><line x1="50" y1="195" x2="750" y2="195" stroke="#c9a84c" stroke-width="1"/><text x="70" y="220" class="gold" font-size="11" font-weight="bold">✓ フィールド間隔：十分な余白で誤タップ防止</text><text x="70" y="240" class="tw" font-size="9">ラジオボタン・チェックボックスのタップ領域を大きく</text><line x1="50" y1="250" x2="750" y2="250" stroke="#c9a84c" stroke-width="1"/><text x="70" y="275" class="gold" font-size="11" font-weight="bold">✓ 項目数削減：最小限の入力で送信可能</text><text x="70" y="295" class="tw" font-size="9">成功例：8項目→4項目に削減で完了率向上</text><line x1="50" y1="305" x2="750" y2="305" stroke="#c9a84c" stroke-width="1"/><text x="70" y="330" class="gold" font-size="11" font-weight="bold">✓ 明確なCTA：送信ボタンが目立つ位置に</text></svg>
