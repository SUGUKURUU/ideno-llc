<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">モバイルナビゲーション設計</text><text x="400" y="55" class="tg" text-anchor="middle">使いやすさの工夫</text><g><rect x="50" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="215" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">NG：PCと同じナビ</text><line x1="70" y1="120" x2="360" y2="120" stroke="#c9a84c" stroke-width="1"/><text x="70" y="145" class="tw" font-size="9">メニュー項目が多い</text><text x="70" y="165" class="tw" font-size="9">→スクロール長い</text><text x="70" y="185" class="tw" font-size="9">タップしにくい</text><text x="70" y="210" class="tg" font-size="8">ユーザー離脱の原因</text><text x="215" y="280" class="tw" text-anchor="middle" font-size="10">使いづらいナビは</text><text x="215" y="295" class="tw" text-anchor="middle" font-size="10">直帰につながる</text></g><g><rect x="420" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="585" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">OK：スマホ最適化</text><line x1="440" y1="120" x2="730" y2="120" stroke="#c9a84c" stroke-width="1"/><text x="440" y="145" class="tw" font-size="9">ハンバーガーメニュー</text><text x="440" y="165" class="tw" font-size="9">項目数：3-7個に絞る</text><text x="440" y="185" class="tw" font-size="9">固定フッターCTA</text><text x="440" y="210" class="tg" font-size="8">問い合わせへ即アクセス</text><text x="585" y="260" class="gold" text-anchor="middle" font-size="10" font-weight="bold">効果：</text><text x="585" y="280" class="tw" text-anchor="middle" font-size="9">直帰率低下</text><text x="585" y="295" class="tw" text-anchor="middle" font-size="9">コンバージョン向上</text></g></svg>
