<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">フォント・タップ最適化のガイドライン</text><text x="400" y="55" class="tg" text-anchor="middle">スマホユーザビリティ基準</text><g><rect x="50" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="215" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">フォントサイズ</text><line x1="70" y1="120" x2="360" y2="120" stroke="#c9a84c" stroke-width="1"/><text x="70" y="145" class="tw" font-size="9">本文：16px以上</text><text x="70" y="165" class="tw" font-size="9">見出しH2：20-24px</text><text x="70" y="185" class="tw" font-size="9">補足：14px以上</text><text x="70" y="210" class="tg" font-size="8">12px以下は避ける</text><text x="215" y="260" class="gold" text-anchor="middle" font-size="10" font-weight="bold">Google推奨基準</text><text x="215" y="280" class="tw" text-anchor="middle" font-size="9">読みやすさが重要</text></g><g><rect x="420" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="585" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">タップターゲット</text><line x1="440" y1="120" x2="730" y2="120" stroke="#c9a84c" stroke-width="1"/><text x="440" y="145" class="tw" font-size="9">最小：44×44px</text><text x="440" y="165" class="tw" font-size="9">ボタン間隔：8px以上</text><text x="440" y="185" class="tw" font-size="9">フォーム高さ：44px以上</text><text x="440" y="210" class="tg" font-size="8">誤タップ防止が目的</text><text x="585" y="260" class="gold" text-anchor="middle" font-size="10" font-weight="bold">Apple推奨基準</text><text x="585" y="280" class="tw" text-anchor="middle" font-size="9">使いやすさが重要</text></g></svg>
