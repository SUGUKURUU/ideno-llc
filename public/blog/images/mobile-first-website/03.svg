<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs>
  <rect class="bg" width="800" height="420"/>
  <text x="400" y="35" class="t" text-anchor="middle">モバイル対応：7つの実装ステップ</text>
  <text x="400" y="55" class="tg" text-anchor="middle">現状診断から継続改善まで</text>

  <g>
    <circle cx="80" cy="130" r="18" fill="#c9a84c"/>
    <text x="80" y="137" class="tw" text-anchor="middle" font-size="14" font-weight="bold">1</text>
  </g>
  <text x="120" y="125" class="tw" font-size="11" font-weight="bold">現状診断</text>
  <text x="120" y="142" class="tg" font-size="9">Google Search Console</text>

  <g>
    <circle cx="80" cy="190" r="18" fill="#c9a84c"/>
    <text x="80" y="197" class="tw" text-anchor="middle" font-size="14" font-weight="bold">2</text>
  </g>
  <text x="120" y="185" class="tw" font-size="11" font-weight="bold">レスポンシブ設計</text>
  <text x="120" y="202" class="tg" font-size="9">画面サイズに自動調整</text>

  <g>
    <circle cx="80" cy="250" r="18" fill="#c9a84c"/>
    <text x="80" y="257" class="tw" text-anchor="middle" font-size="14" font-weight="bold">3</text>
  </g>
  <text x="120" y="245" class="tw" font-size="11" font-weight="bold">フォント・タップ最適化</text>
  <text x="120" y="262" class="tg" font-size="9">16px以上、44×44px以上</text>

  <g>
    <circle cx="80" cy="310" r="18" fill="#c9a84c"/>
    <text x="80" y="317" class="tw" text-anchor="middle" font-size="14" font-weight="bold">4</text>
  </g>
  <text x="120" y="305" class="tw" font-size="11" font-weight="bold">画像最適化</text>
  <text x="120" y="322" class="tg" font-size="9">WebP変換、圧縮</text>

  <g>
    <circle cx="420" cy="130" r="18" fill="#c9a84c"/>
    <text x="420" y="137" class="tw" text-anchor="middle" font-size="14" font-weight="bold">5</text>
  </g>
  <text x="460" y="125" class="tw" font-size="11" font-weight="bold">ナビゲーション設計</text>
  <text x="460" y="142" class="tg" font-size="9">ハンバーガーメニュー</text>

  <g>
    <circle cx="420" cy="190" r="18" fill="#c9a84c"/>
    <text x="420" y="197" class="tw" text-anchor="middle" font-size="14" font-weight="bold">6</text>
  </g>
  <text x="460" y="185" class="tw" font-size="11" font-weight="bold">フォーム最適化</text>
  <text x="460" y="202" class="tg" font-size="9">入力しやすい設計</text>

  <g>
    <circle cx="420" cy="250" r="18" fill="#c9a84c"/>
    <text x="420" y="257" class="tw" text-anchor="middle" font-size="14" font-weight="bold">7</text>
  </g>
  <text x="460" y="245" class="tw" font-size="11" font-weight="bold">継続的改善</text>
  <text x="460" y="262" class="tg" font-size="9">月次モニタリング</text>

  <rect x="120" y="340" width="560" height="60" fill="#c9a84c" opacity="0.1" rx="3"/>
  <text x="400" y="365" class="gold" text-anchor="middle" font-size="11" font-weight="bold">★ モバイル対応は「一度やれば完了」ではなく、継続的な改善が必要</text>
