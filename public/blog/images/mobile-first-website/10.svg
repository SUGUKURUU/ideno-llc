<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">モバイル最適化チェックリスト</text><text x="400" y="55" class="tg" text-anchor="middle">実装確認のポイント</text><rect x="50" y="80" width="700" height="330" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/><text x="70" y="105" class="gold" font-size="10" font-weight="bold">【診断】</text><text x="70" y="125" class="tw" font-size="9">□ Google Search Console「モバイルユーザビリティ」でエラー確認</text><text x="70" y="143" class="tw" font-size="9">□ PageSpeed Insights でモバイルスコア確認（90以上推奨）</text><text x="70" y="161" class="tw" font-size="9">□ 複数スマートフォン機種で実機確認</text><line x1="50" y1="175" x2="750" y2="175" stroke="#c9a84c" stroke-width="1"/><text x="70" y="200" class="gold" font-size="10" font-weight="bold">【実装確認】</text><text x="70" y="220" class="tw" font-size="9">□ レスポンシブデザイン（画面サイズに自動調整）</text><text x="70" y="238" class="tw" font-size="9">□ 横スクロール発生なし</text><text x="70" y="256" class="tw" font-size="9">□ フォント16px以上、タップ44×44px以上</text><text x="70" y="274" class="tw" font-size="9">□ 画像WebP形式・最適サイズ</text><text x="70" y="292" class="tw" font-size="9">□ Core Web Vitals良好（LCP 2.5秒以内、CLS 0.1以下）</text><line x1="50" y1="305" x2="750" y2="305" stroke="#c9a84c" stroke-width="1"/><text x="70" y="330" class="gold" font-size="10" font-weight="bold">【継続改善】</text><text x="70" y="350" class="tw" font-size="9">□ 月次でPageSpeed Insights確認</text><text x="70" y="368" class="tw" font-size="9">□ 新機種対応確認、競合との比較</text></svg>
