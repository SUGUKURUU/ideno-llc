<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs>
  <rect class="bg" width="800" height="420"/>
  <text x="400" y="35" class="t" text-anchor="middle">成功事例：スマホ対応リニューアルの効果</text>
  <text x="400" y="55" class="tg" text-anchor="middle">飲食店チェーンの改善結果</text>

  <g>
    <rect x="50" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="215" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">リニューアル前</text>
    <line x1="70" y1="120" x2="360" y2="120" stroke="#c9a84c" stroke-width="1"/>
    <text x="70" y="145" class="tw" font-size="10">スマートフォン：全体65%</text>
    <text x="70" y="165" class="tw" font-size="10">直帰率：82%（PC 51%）</text>
    <text x="70" y="185" class="tw" font-size="10">予約完了率：PCの40%</text>
    <text x="215" y="230" class="tg" text-anchor="middle" font-size="9">実装内容：</text>
    <text x="215" y="250" class="tg" text-anchor="middle" font-size="9">レスポンシブ化</text>
    <text x="215" y="270" class="tg" text-anchor="middle" font-size="9">フォーム簡素化</text>
    <text x="215" y="290" class="tg" text-anchor="middle" font-size="9">固定フッターCTA設置</text>
  </g>

  <g>
    <rect x="420" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="585" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">リニューアル後</text>
    <line x1="440" y1="120" x2="730" y2="120" stroke="#c9a84c" stroke-width="1"/>
    <text x="440" y="145" class="tw" font-size="10">直帰率：82%→58%</text>
    <text x="440" y="165" class="tw" font-size="10">予約完了率：ほぼPC並み</text>
    <text x="440" y="185" class="tw" font-size="10">検索表示回数：+35%</text>
    <text x="585" y="230" class="gold" text-anchor="middle" font-size="10" font-weight="bold">3ヶ月で大幅改善</text>
    <text x="585" y="255" class="tw" text-anchor="middle" font-size="10">主な効果：</text>
    <text x="585" y="275" class="tw" text-anchor="middle" font-size="9">ユーザー体験向上</text>
    <text x="585" y="295" class="tw" text-anchor="middle" font-size="9">SEO順位改善</text>
  </g>
</svg>
