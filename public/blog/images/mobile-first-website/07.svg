<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">画像最適化テクニック</text><text x="400" y="55" class="tg" text-anchor="middle">表示速度改善の最大効果</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/><text x="70" y="110" class="gold" font-size="11" font-weight="bold">✓ WebP形式採用：JPEG比25-34%削減</text><text x="70" y="130" class="tw" font-size="9">互換性考慮して提供が必要</text><line x1="50" y1="140" x2="750" y2="140" stroke="#c9a84c" stroke-width="1"/><text x="70" y="165" class="gold" font-size="11" font-weight="bold">✓ 表示サイズに合った画像：2000px幅を200pxで表示しない</text><text x="70" y="185" class="tw" font-size="9">レスポンシブ対応で複数サイズ用意</text><line x1="50" y1="195" x2="750" y2="195" stroke="#c9a84c" stroke-width="1"/><text x="70" y="220" class="gold" font-size="11" font-weight="bold">✓ 圧縮ツール：TinyPNG、Squoosh でファイルサイズ削減</text><text x="70" y="240" class="tw" font-size="9">目安：ヒーロー画像200KB以内、コンテンツ画像100KB以内</text><line x1="50" y1="250" x2="750" y2="250" stroke="#c9a84c" stroke-width="1"/><text x="70" y="275" class="gold" font-size="11" font-weight="bold">✓ 遅延読み込み：loading=\"lazy\" 属性で画面外の画像を遅延</text><text x="70" y="295" class="tw" font-size="9">ファーストビューは fetchpriority=\"high\" で優先読み込み</text><line x1="50" y1="305" x2="750" y2="305" stroke="#c9a84c" stroke-width="1"/><text x="70" y="330" class="gold" font-size="11" font-weight="bold">✓ SVG形式：アイコン・ロゴに最適。軽量で拡大縮小可能</text></svg>
