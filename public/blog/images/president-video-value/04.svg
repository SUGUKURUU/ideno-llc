<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長動画制作の時間軸と投資対効果</text>

  <!-- 初年度 -->
  <rect x="80" y="90" width="150" height="280" fill="#c9a84c" rx="5"/>
  <text x="155" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">初年度</text>
  <line x1="95" y1="130" x2="215" y2="130" stroke="#111111" stroke-width="1"/>
  <text x="155" y="165" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">制作費</text>
  <text x="155" y="185" font-size="10" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">50-100万</text>
  <text x="155" y="220" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用効果</text>
  <text x="155" y="240" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5-10件</text>
  <text x="155" y="270" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ROI: 1年で</text>
  <text x="155" y="285" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">回収可能</text>

  <!-- 2年目 -->
  <rect x="260" y="90" width="150" height="280" fill="#8b7355" rx="5"/>
  <text x="335" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2年目</text>
  <line x1="275" y1="130" x2="395" y2="130" stroke="#ffffff" stroke-width="1"/>
  <text x="335" y="165" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">追加制作</text>
  <text x="335" y="185" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">30-50万</text>
  <text x="335" y="220" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">営業効果</text>
  <text x="335" y="240" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">8-15件</text>
  <text x="335" y="270" font-size="9" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">累積効果</text>
  <text x="335" y="285" font-size="9" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">急上昇</text>

  <!-- 3年目以降 -->
  <rect x="440" y="90" width="150" height="280" fill="#555555" rx="5"/>
  <text x="515" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3年目以降</text>
  <line x1="455" y1="130" x2="575" y2="130" stroke="#ffffff" stroke-width="1"/>
  <text x="515" y="165" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">メンテ費用</text>
  <text x="515" y="185" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">10-20万</text>
  <text x="515" y="220" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">資産化</text>
  <text x="515" y="240" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">20-30件</text>
  <text x="515" y="270" font-size="9" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">年間投資</text>
  <text x="515" y="285" font-size="9" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">最小化</text>

  <!-- 長期資産 -->
  <rect x="620" y="90" width="140" height="280" fill="#999999" rx="5"/>
  <text x="690" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">10年後</text>
  <line x1="635" y1="130" x2="745" y2="130" stroke="#111111" stroke-width="1"/>
  <text x="690" y="165" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">企業</text>
  <text x="690" y="185" font-size="10" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">遺産</text>
  <text x="690" y="220" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ブランド</text>
  <text x="690" y="240" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ストーリー</text>
  <text x="690" y="270" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">計り知れない</text>
  <text x="690" y="285" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">価値</text>
</svg>
