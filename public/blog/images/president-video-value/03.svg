<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長動画の活用シーン拡大マップ</text>

  <!-- 初期段階 -->
  <circle cx="150" cy="150" r="45" fill="#c9a84c"/>
  <text x="150" y="150" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用</text>
  <text x="150" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>

  <!-- 矢印1 -->
  <path d="M 200,150 L 250,150" stroke="#c9a84c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 営業 -->
  <circle cx="320" cy="150" r="45" fill="#8b7355"/>
  <text x="320" y="145" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">営業</text>
  <text x="320" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ツール</text>

  <!-- 矢印2 -->
  <path d="M 370,150 L 420,150" stroke="#8b7355" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- HP掲載 -->
  <circle cx="490" cy="150" r="45" fill="#555555"/>
  <text x="490" y="145" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP</text>
  <text x="490" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">掲載</text>

  <!-- 矢印3 -->
  <path d="M 540,150 L 590,150" stroke="#555555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- SNS配信 -->
  <circle cx="660" cy="150" r="45" fill="#999999"/>
  <text x="660" y="145" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS</text>
  <text x="660" y="165" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">配信</text>

  <!-- 下段：追加活用シーン -->
  <text x="400" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">さらに広がる活用シーン</text>

  <g>
    <rect x="80" y="280" width="140" height="100" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="150" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社員教育</text>
    <text x="150" y="325" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">新入社員</text>
    <text x="150" y="340" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">オンボーディング</text>
    <text x="150" y="360" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">研修資料</text>
  </g>

  <g>
    <rect x="280" y="280" width="140" height="100" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="350" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">資金調達</text>
    <text x="350" y="325" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">投資家向け</text>
    <text x="350" y="340" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">プレゼン</text>
    <text x="350" y="360" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ピッチ動画</text>
  </g>

  <g>
    <rect x="480" y="280" width="140" height="100" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="550" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">メディア対応</text>
    <text x="550" y="325" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">インタビュー</text>
    <text x="550" y="340" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">記事化</text>
    <text x="550" y="360" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">PR素材</text>
  </g>

  <g>
    <rect x="680" y="280" width="80" height="100" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="720" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">事業</text>
    <text x="720" y="325" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">承継時</text>
    <text x="720" y="350" font-size="9" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">企業</text>
    <text x="720" y="365" font-size="9" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">遺産</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>
