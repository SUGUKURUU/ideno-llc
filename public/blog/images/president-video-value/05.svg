<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画タイプ別：効果と制作期間</text>

  <!-- タイプ1：密着ドキュメンタリー -->
  <g>
    <rect x="80" y="80" width="150" height="300" fill="#c9a84c" rx="5"/>
    <text x="155" y="110" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">密着</text>
    <text x="155" y="127" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ドキュ</text>
    <line x1="95" y1="140" x2="215" y2="140" stroke="#111111" stroke-width="1"/>
    <text x="155" y="170" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">長さ：10-20分</text>
    <text x="155" y="190" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">制作期間：2-4週</text>
    <text x="155" y="210" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：採用◎◎◎</text>
    <text x="155" y="230" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">信頼◎◎◎</text>
    <text x="155" y="250" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知◎</text>
    <text x="155" y="270" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">費用：50-100万</text>
  </g>

  <!-- タイプ2：インタビュー -->
  <g>
    <rect x="260" y="80" width="150" height="300" fill="#8b7355" rx="5"/>
    <text x="335" y="110" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">インタビュー</text>
    <line x1="275" y1="140" x2="395" y2="140" stroke="#ffffff" stroke-width="1"/>
    <text x="335" y="170" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">長さ：5-10分</text>
    <text x="335" y="190" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">制作期間：1-2週</text>
    <text x="335" y="210" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：採用◎◎</text>
    <text x="335" y="230" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">信頼◎◎</text>
    <text x="335" y="250" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知◎</text>
    <text x="335" y="270" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">費用：20-40万</text>
  </g>

  <!-- タイプ3：解説動画 -->
  <g>
    <rect x="440" y="80" width="150" height="300" fill="#555555" rx="5"/>
    <text x="515" y="110" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">解説</text>
    <text x="515" y="127" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>
    <line x1="455" y1="140" x2="575" y2="140" stroke="#ffffff" stroke-width="1"/>
    <text x="515" y="170" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">長さ：3-8分</text>
    <text x="515" y="190" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">制作期間：1週</text>
    <text x="515" y="210" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：採用◎</text>
    <text x="515" y="230" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">信頼◎</text>
    <text x="515" y="250" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知◎◎◎</text>
    <text x="515" y="270" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">費用：10-20万</text>
  </g>

  <!-- タイプ4：ショート動画 -->
  <g>
    <rect x="620" y="80" width="140" height="300" fill="#999999" rx="5"/>
    <text x="690" y="110" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ショート</text>
    <text x="690" y="127" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>
    <line x1="635" y1="140" x2="745" y2="140" stroke="#111111" stroke-width="1"/>
    <text x="690" y="170" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">長さ：15-60秒</text>
    <text x="690" y="190" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">制作期間：数日</text>
    <text x="690" y="210" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：採用◎</text>
    <text x="690" y="230" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">信頼◎</text>
    <text x="690" y="250" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知◎◎◎◎</text>
    <text x="690" y="270" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">費用：5-10万</text>
  </g>

  <text x="400" y="405" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">長尺×ショートの組み合わせが、費用対効果を最大化</text>
</svg>
