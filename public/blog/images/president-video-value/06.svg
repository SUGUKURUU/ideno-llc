<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">事業承継での動画の役割</text>

  <!-- Before -->
  <g>
    <text x="200" y="70" font-size="13" font-weight="bold" text-anchor="middle" fill="#999999" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画なし</text>
    <rect x="80" y="90" width="240" height="280" fill="#333333" stroke="#666666" stroke-width="1" rx="5"/>

    <text x="200" y="130" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">後継者の課題</text>
    <line x1="100" y1="145" x2="300" y2="145" stroke="#666666" stroke-width="1"/>

    <text x="100" y="175" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✗ 「なぜこの事業を始めたのか」が不明確</text>
    <text x="100" y="200" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✗ 先代の想いが言語化されていない</text>
    <text x="100" y="225" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✗ 社員との「文化」の連続性が不透明</text>
    <text x="100" y="250" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✗ 経営判断の基準が曖昧</text>

    <rect x="95" y="280" width="210" height="70" fill="#666666" opacity="0.2" rx="2"/>
    <text x="200" y="305" font-size="10" font-weight="bold" text-anchor="middle" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">結果：混乱</text>
    <text x="200" y="325" font-size="10" text-anchor="middle" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社員離職 / 経営迷走</text>
  </g>

  <!-- After -->
  <g>
    <text x="600" y="70" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画あり</text>
    <rect x="480" y="90" width="240" height="280" fill="#222222" stroke="#c9a84c" stroke-width="2" rx="5"/>

    <text x="600" y="130" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">後継者の強み</text>
    <line x1="500" y1="145" x2="700" y2="145" stroke="#c9a84c" stroke-width="1"/>

    <text x="500" y="175" font-size="11" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">○ 先代の「声」「表情」から意図が明確</text>
    <text x="500" y="200" font-size="11" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">○ 社員に「文化」を体験させられる</text>
    <text x="500" y="225" font-size="11" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">○ 迷ったときの「判断の軸」が明確</text>
    <text x="500" y="250" font-size="11" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">○ 顧客・取引先への信頼が継続</text>

    <rect x="495" y="280" width="210" height="70" fill="#c9a84c" opacity="0.2" rx="2"/>
    <text x="600" y="305" font-size="10" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">結果：スムーズ</text>
    <text x="600" y="325" font-size="10" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">事業継続 / 信頼維持</text>
  </g>
</svg>
