<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">情報伝達効率：テキスト vs 動画</text>

  <!-- テキスト -->
  <rect x="80" y="90" width="300" height="280" fill="#333333" stroke="#555555" stroke-width="2" rx="5"/>
  <text x="230" y="120" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">テキスト（文章）</text>
  <line x1="100" y1="135" x2="360" y2="135" stroke="#555555" stroke-width="1"/>

  <text x="100" y="165" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">情報量：中程度</text>
  <text x="100" y="190" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">読み込み時間：要</text>
  <text x="100" y="215" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">感情伝達：限定的</text>
  <text x="100" y="240" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">スキャン可能：○</text>
  <text x="100" y="265" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">言語化必須：◎</text>
  <text x="100" y="290" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">検索適性：○</text>

  <rect x="90" y="320" width="280" height="30" fill="#c9a84c" opacity="0.2" rx="2"/>
  <text x="230" y="341" font-size="11" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">説明・理解向け</text>

  <!-- 動画 -->
  <rect x="420" y="90" width="300" height="280" fill="#222222" stroke="#c9a84c" stroke-width="2" rx="5"/>
  <text x="570" y="120" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>
  <line x1="440" y1="135" x2="700" y2="135" stroke="#c9a84c" stroke-width="1"/>

  <text x="440" y="165" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">情報量：豊富</text>
  <text x="440" y="190" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">視聴時間：決定的</text>
  <text x="440" y="215" font-size="11" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">感情伝達：◎◎◎</text>
  <text x="440" y="240" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">スキップ困難：△</text>
  <text x="440" y="265" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">非言語も伝達：◎</text>
  <text x="440" y="290" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">検索適性：△</text>

  <rect x="430" y="320" width="280" height="30" fill="#c9a84c" opacity="0.2" rx="2"/>
  <text x="570" y="341" font-size="11" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">感情・信頼形成向け</text>
</svg>
