<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">発信コンセプト設計の4要素</text>

  <g>
    <rect x="100" y="100" width="150" height="280" fill="#c9a84c" rx="5"/>
    <text x="175" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">発信者像</text>
    <text x="175" y="170" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「実直な現場主義者」など</text>
    <text x="175" y="210" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">どんな社長として見せたいか</text>
  </g>

  <g>
    <rect x="290" y="100" width="150" height="280" fill="#8b7355" rx="5"/>
    <text x="365" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ターゲット</text>
    <text x="365" y="170" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用候補者、見込み客、投資家</text>
    <text x="365" y="210" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">誰に届けたいか</text>
  </g>

  <g>
    <rect x="480" y="100" width="150" height="280" fill="#555555" rx="5"/>
    <text x="555" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">発信テーマ</text>
    <text x="555" y="170" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">業界知識、経営失敗、日常</text>
    <text x="555" y="210" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">何を話すか</text>
  </g>

  <g>
    <rect x="670" y="100" width="100" height="280" fill="#999999" rx="5"/>
    <text x="720" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">目的</text>
    <text x="720" y="170" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用強化、認知拡大、信頼獲得</text>
    <text x="720" y="210" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">何を達成するか</text>
  </g>
</svg>
