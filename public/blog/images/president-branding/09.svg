<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成功事例：密着動画で採用3倍化</text>
  <rect x="80" y="80" width="640" height="300" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="100" y="110" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">施策：「社長の一日」密着ドキュメンタリー動画を制作・YouTubeとHP掲載</text>
  <text x="100" y="140" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・採用応募数：前年比2.5倍に増加</text>
  <text x="100" y="160" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・動画視聴後の応募が60%以上（信頼度UP）</text>
  <text x="100" y="180" font-size="11" fill="#aaaaaa" font-family="'Hiragino sans','Noto Sans JP',sans-serif">・内定辞退率：低下（「動画と実際が一致している」評価）</text>
  <text x="100" y="210" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成功の要因：</text>
  <text x="130" y="235" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 求職者が知りたい「会社の雰囲気・社長の人柄」を直接伝えた</text>
  <text x="130" y="255" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ テキスト・画像では伝わらない「現場の空気感」を動画が補完</text>
  <text x="130" y="275" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ ミスマッチ減少→定着率向上の好循環</text>
</svg>
