<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">コンテンツカレンダー例：月12投稿</text>
  <rect x="80" y="80" width="640" height="310" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="100" y="110" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">業界知識（4）| サービス事例（3）| スタッフ紹介（2）| 日常（2）| 告知（1）</text>
  <text x="100" y="160" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Week1：業界知識 → サービス事例 → スタッフ紹介</text>
  <text x="100" y="190" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Week2：日常 → 業界知識 → サービス事例</text>
  <text x="100" y="220" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Week3：スタッフ紹介 → 業界知識 → 日常</text>
  <text x="100" y="250" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Week4：サービス事例 → 告知 → サービス事例</text>
  <text x="100" y="300" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">テーマをローテーションすることで、飽きさせず継続できる</text>
</svg>
