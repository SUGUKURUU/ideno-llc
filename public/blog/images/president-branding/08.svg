<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成功事例：税理士がXで認知獲得</text>
  <rect x="80" y="80" width="640" height="300" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="100" y="110" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">施策：中小企業向け節税実務をX（Twitter）で週4-5回発信</text>
  <text x="100" y="140" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・フォロワー：0 → 3,000人超（1年）</text>
  <text x="100" y="160" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・新規問い合わせ：月1-2件 → 月5-10件（純新規）</text>
  <text x="100" y="180" font-size="11" fill="#aaaaaa" font-family="'Hiragino sans','Noto Sans JP',sans-serif">・成約率：従来の紹介案件と同等以上（信頼ベース）</text>
  <text x="100" y="210" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成功の要因：</text>
  <text x="130" y="235" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 「一般向けにわかりやすい専門知識の解説」が支持された</text>
  <text x="130" y="255" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 宣伝は最小限で、知識提供を中心にした</text>
  <text x="130" y="275" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ DM経由の問い合わせが増加し、新しいチャネルが形成された</text>
</svg>
