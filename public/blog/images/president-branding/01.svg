<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長ブランディングの効果測定</text>

  <rect x="80" y="90" width="640" height="290" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="100" y="120" font-size="12" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用への効果</text>
  <text x="130" y="145" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・採用応募数：月2-3件 → 月6-8件（3-4倍）</text>
  <text x="130" y="165" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・内定辞退率：40% → 20%に改善</text>

  <text x="100" y="205" font-size="12" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">営業への効果</text>
  <text x="130" y="230" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・新規問い合わせ：月1-2件 → 月5-10件</text>
  <text x="130" y="250" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・成約率：既存比1.5倍（信頼ベースの商談）</text>

  <text x="100" y="290" font-size="12" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">広報への効果</text>
  <text x="130" y="315" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・メディア取材依頼増加　・業界内での認知向上</text>
  <text x="130" y="335" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・SNSフォロワー増加による広告効果補完</text>

  <text x="400" y="395" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">全ての効果が6ヶ月-1年の継続で顕著になる</text>
</svg>
