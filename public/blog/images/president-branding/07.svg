<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">投稿内容の黄金比：8:2ルール</text>

  <rect x="100" y="100" width="560" height="50" fill="#333333" rx="3"/>
  <rect x="100" y="100" width="448" height="50" fill="#c9a84c" rx="3"/>
  <text x="330" y="131" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">教育・共感・エンタメ（80%）</text>

  <rect x="548" y="100" width="112" height="50" fill="#8b7355" rx="3"/>
  <text x="604" y="131" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">告知・宣伝（20%）</text>

  <rect x="100" y="190" width="560" height="180" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="120" y="220" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">80%の投稿例：</text>
  <text x="140" y="245" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・業界の豆知識を解説</text>
  <text x="140" y="265" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・失敗体験から学んだことをシェア</text>
  <text x="140" y="285" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・チームメンバーの日常を紹介</text>
  <text x="140" y="305" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・読書や出張で得た気づき</text>
  <text x="140" y="325" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・業界トレンドへのコメント</text>

  <text x="120" y="360" font-size="11" font-weight="bold" fill="#8b7355" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">20%の投稿例：</text>
  <text x="140" y="385" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・新サービスリリース　・セミナー案内　・採用告知</text>
</svg>
