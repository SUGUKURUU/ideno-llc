<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <!-- Grid -->
  <line x1="0" y1="60" x2="800" y2="60" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="120" x2="800" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="180" x2="800" y2="180" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#c9a84c">月1回撮影から生まれる投稿本数｜コンテンツ分解フロー</text>
  <!-- Source box -->
  <rect x="40" y="80" width="160" height="80" rx="10" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="2"/>
  <text x="120" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#c9a84c">月1回撮影</text>
  <text x="120" y="132" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">半日（3〜4時間）</text>
  <text x="120" y="150" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">動画3〜5本 静止画15枚</text>
  <!-- Arrow right -->
  <line x1="200" y1="120" x2="270" y2="120" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowGold)"/>
  <defs>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c9a84c"/>
    </marker>
  </defs>
  <!-- Center process box -->
  <rect x="270" y="65" width="180" height="110" rx="10" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="360" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">コンテンツ分解</text>
  <text x="360" y="110" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">動画カット割り</text>
  <text x="360" y="126" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">静止画トリミング</text>
  <text x="360" y="142" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">テキスト投稿化</text>
  <text x="360" y="158" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">プラットフォーム最適化</text>
  <!-- Arrow right -->
  <line x1="450" y1="120" x2="510" y2="120" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowGold)"/>
  <!-- Output boxes -->
  <rect x="510" y="68" width="130" height="36" rx="6" fill="#1a1a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="575" y="82" text-anchor="middle" font-size="11" fill="#4ade80">Reels・TikTok</text>
  <text x="575" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">4〜6本</text>
  <rect x="510" y="112" width="130" height="36" rx="6" fill="#1a1a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="575" y="126" text-anchor="middle" font-size="11" fill="#4ade80">フィード静止画</text>
  <text x="575" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">4〜5本</text>
  <rect x="510" y="156" width="130" height="36" rx="6" fill="#1a1a1a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="575" y="170" text-anchor="middle" font-size="11" fill="#4ade80">Stories</text>
  <text x="575" y="184" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">5〜8本</text>
  <!-- Arrow to total -->
  <line x1="640" y1="120" x2="690" y2="120" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowGold)"/>
  <!-- Total box -->
  <rect x="688" y="75" width="95" height="90" rx="10" fill="#c9a84c" opacity="0.15" stroke="#c9a84c" stroke-width="2"/>
  <text x="735" y="108" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">合計</text>
  <text x="735" y="132" text-anchor="middle" font-size="28" font-weight="bold" fill="#c9a84c">15</text>
  <text x="735" y="153" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">本以上</text>
  <!-- Second row: non-shooting content -->
  <rect x="40" y="230" width="160" height="80" rx="10" fill="#1a1a1a" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="120" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.85)">撮影不要素材</text>
  <text x="120" y="282" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">テキスト・グラフィック</text>
  <text x="120" y="298" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.6)">引用・アーカイブ</text>
  <!-- Arrow -->
  <line x1="200" y1="270" x2="270" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <defs>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.4)"/>
    </marker>
  </defs>
  <rect x="270" y="248" width="180" height="44" rx="8" fill="#1a1a1a" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="360" y="268" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">テキスト・引用・ノウハウ投稿</text>
  <text x="360" y="284" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">週2〜3本 補完可能</text>
  <!-- Summary bar -->
  <rect x="40" y="340" width="720" height="58" rx="10" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="364" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.7)">月1回撮影（半日）＋撮影不要コンテンツ＝</text>
  <text x="400" y="385" text-anchor="middle" font-size="18" font-weight="bold" fill="#c9a84c">月20〜30本の投稿を実現（週4〜5本ペース）</text>
</svg>
