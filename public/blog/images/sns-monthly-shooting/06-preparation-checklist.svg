<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">撮影前準備チェックリスト（2週間前〜当日）</text>

  <!-- Timeline line -->
  <line x1="120" y1="70" x2="120" y2="390" stroke="#c9a84c" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- 2週間前 -->
  <circle cx="120" cy="90" r="10" fill="#c9a84c"/>
  <text x="120" y="94" text-anchor="middle" fill="#111" font-size="10" font-weight="bold">2W</text>
  <text x="148" y="88" fill="#c9a84c" font-size="13" font-weight="bold">2週間前</text>
  <rect x="148" y="98" width="600" height="56" rx="5" fill="rgba(201,168,76,0.07)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <!-- items -->
  <rect x="162" y="109" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="184" y="121" fill="rgba(255,255,255,0.8)" font-size="12">今月の撮影テーマを決定</text>
  <rect x="362" y="109" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="384" y="121" fill="rgba(255,255,255,0.8)" font-size="12">出演者・スタッフの確認</text>
  <rect x="162" y="132" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="184" y="144" fill="rgba(255,255,255,0.8)" font-size="12">撮影場所・ロケーション選定</text>
  <rect x="362" y="132" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="384" y="144" fill="rgba(255,255,255,0.8)" font-size="12">投稿プラットフォームを確認</text>

  <!-- 1週間前 -->
  <circle cx="120" cy="185" r="10" fill="#c9a84c"/>
  <text x="120" y="189" text-anchor="middle" fill="#111" font-size="10" font-weight="bold">1W</text>
  <text x="148" y="183" fill="#c9a84c" font-size="13" font-weight="bold">1週間前</text>
  <rect x="148" y="193" width="600" height="56" rx="5" fill="rgba(201,168,76,0.07)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <rect x="162" y="204" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="184" y="216" fill="rgba(255,255,255,0.8)" font-size="12">撮影台本・スクリプト作成</text>
  <rect x="362" y="204" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="384" y="216" fill="rgba(255,255,255,0.8)" font-size="12">小道具・衣装の準備</text>
  <rect x="162" y="227" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="184" y="239" fill="rgba(255,255,255,0.8)" font-size="12">機材リスト確認（カメラ・マイク・照明）</text>
  <rect x="362" y="227" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="384" y="239" fill="rgba(255,255,255,0.8)" font-size="12">撮影カットリスト完成</text>

  <!-- 前日 -->
  <circle cx="120" cy="280" r="10" fill="#c9a84c"/>
  <text x="120" y="284" text-anchor="middle" fill="#111" font-size="10" font-weight="bold">前日</text>
  <text x="148" y="278" fill="#c9a84c" font-size="13" font-weight="bold">前日</text>
  <rect x="148" y="288" width="600" height="34" rx="5" fill="rgba(201,168,76,0.07)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <rect x="162" y="298" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="184" y="310" fill="rgba(255,255,255,0.8)" font-size="12">ロケハン（現場確認）</text>
  <rect x="362" y="298" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="384" y="310" fill="rgba(255,255,255,0.8)" font-size="12">出演者への確認連絡</text>

  <!-- 当日 -->
  <circle cx="120" cy="350" r="10" fill="#c9a84c"/>
  <text x="120" y="354" text-anchor="middle" fill="#111" font-size="10" font-weight="bold">当日</text>
  <text x="148" y="348" fill="#c9a84c" font-size="13" font-weight="bold">当日</text>
  <rect x="148" y="358" width="600" height="34" rx="5" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="162" y="368" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="184" y="380" fill="rgba(255,255,255,0.9)" font-size="12">タイムスケジュール表を共有</text>
  <rect x="362" y="368" width="14" height="14" rx="2" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="384" y="380" fill="rgba(255,255,255,0.9)" font-size="12">バッテリー・SD カード充電確認</text>

  <text x="400" y="408" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">準備が整うと撮影効率が3〜5倍向上する</text>
</svg>
