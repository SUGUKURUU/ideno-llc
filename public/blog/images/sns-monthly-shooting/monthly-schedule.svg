<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#c9a84c">月間SNS運用スケジュール｜撮影〜投稿ガントチャート</text>
  <!-- Header row -->
  <rect x="140" y="50" width="630" height="30" fill="#1a1a1a"/>
  <!-- Week labels -->
  <text x="270" y="70" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">第1週（1〜7日）</text>
  <text x="427" y="70" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">第2週（8〜14日）</text>
  <text x="584" y="70" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">第3週（15〜21日）</text>
  <text x="741" y="70" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.5)">第4週（22〜28日）</text>
  <!-- Vertical separators -->
  <line x1="140" y1="50" x2="140" y2="410" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="200" y1="50" x2="200" y2="410" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="357" y1="50" x2="357" y2="410" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="514" y1="50" x2="514" y2="410" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="671" y1="50" x2="671" y2="410" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="770" y1="50" x2="770" y2="410" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Row backgrounds -->
  <rect x="140" y="80" width="630" height="38" fill="rgba(255,255,255,0.02)"/>
  <rect x="140" y="156" width="630" height="38" fill="rgba(255,255,255,0.02)"/>
  <rect x="140" y="232" width="630" height="38" fill="rgba(255,255,255,0.02)"/>
  <rect x="140" y="308" width="630" height="38" fill="rgba(255,255,255,0.02)"/>
  <!-- Row labels -->
  <text x="20" y="104" text-anchor="start" font-size="12" font-weight="bold" fill="#c9a84c">撮影準備</text>
  <text x="20" y="180" text-anchor="start" font-size="12" font-weight="bold" fill="#4ade80">撮影実施</text>
  <text x="20" y="256" text-anchor="start" font-size="12" font-weight="bold" fill="#60a5fa">編集・制作</text>
  <text x="20" y="332" text-anchor="start" font-size="12" font-weight="bold" fill="#f87171">投稿・分析</text>
  <!-- Row 1: 撮影準備 (week1-2) -->
  <rect x="200" y="87" width="270" height="24" rx="4" fill="#c9a84c" opacity="0.7"/>
  <text x="335" y="103" text-anchor="middle" font-size="11" fill="#111111" font-weight="bold">テーマ設計・撮影リスト作成・台本作り</text>
  <!-- Row 2: 撮影実施 (day8-9) -->
  <rect x="357" y="163" width="60" height="24" rx="4" fill="#4ade80" opacity="0.8"/>
  <text x="387" y="179" text-anchor="middle" font-size="11" fill="#111111" font-weight="bold">撮影（半日）</text>
  <!-- Row 3: 編集制作 (week2-3) -->
  <rect x="357" y="239" width="315" height="24" rx="4" fill="#60a5fa" opacity="0.7"/>
  <text x="514" y="255" text-anchor="middle" font-size="11" fill="#111111" font-weight="bold">動画編集・静止画加工・キャプション作成・予約設定</text>
  <!-- Row 4: 投稿・分析 (week1 ongoing + week3-4) -->
  <rect x="200" y="315" width="157" height="24" rx="4" fill="#f87171" opacity="0.5"/>
  <text x="278" y="331" text-anchor="middle" font-size="10" fill="#ffffff">先月分投稿継続</text>
  <rect x="514" y="315" width="256" height="24" rx="4" fill="#f87171" opacity="0.8"/>
  <text x="642" y="331" text-anchor="middle" font-size="11" fill="#111111" font-weight="bold">今月分投稿（週3〜4本）＋月次分析</text>
  <!-- Horizontal lines -->
  <line x1="140" y1="118" x2="770" y2="118" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="140" y1="156" x2="770" y2="156" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="140" y1="194" x2="770" y2="194" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="140" y1="232" x2="770" y2="232" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="140" y1="270" x2="770" y2="270" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="140" y1="308" x2="770" y2="308" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Key point -->
  <rect x="30" y="370" width="740" height="36" rx="8" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1"/>
  <text x="400" y="384" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">ポイント：翌月の投稿カレンダーは月初に完成させ、</text>
  <text x="400" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#c9a84c">予約投稿ツール（Buffer・Metricool）で自動化する</text>
</svg>
