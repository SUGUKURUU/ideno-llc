<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <!-- grid lines -->
  <line x1="0" y1="70" x2="800" y2="70" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="140" x2="800" y2="140" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="210" x2="800" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="350" x2="800" y2="350" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- title -->
  <text x="400" y="38" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">月1回撮影（半日）から生まれるコンテンツ数</text>
  <!-- center: shooting box -->
  <rect x="300" y="65" width="200" height="60" rx="8" fill="#c9a84c" opacity="0.15" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="91" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">📷 半日撮影</text>
  <text x="400" y="113" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">（3〜4時間）</text>
  <!-- arrows from center to outputs -->
  <!-- Reels 4本 -->
  <line x1="300" y1="95" x2="170" y2="160" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="150" width="200" height="52" rx="6" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="160" y="172" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">リール動画</text>
  <text x="160" y="192" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">4本</text>
  <!-- Stories 8本 -->
  <line x1="310" y1="125" x2="175" y2="235" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="225" width="200" height="52" rx="6" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="160" y="247" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">ストーリーズ素材</text>
  <text x="160" y="267" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">8本</text>
  <!-- カルーセル 3本 -->
  <line x1="315" y1="125" x2="175" y2="310" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="60" y="300" width="200" height="52" rx="6" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="160" y="322" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">静止画カルーセル</text>
  <text x="160" y="342" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">3本</text>
  <!-- YouTube Shorts 2本 -->
  <line x1="500" y1="95" x2="630" y2="160" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="540" y="150" width="200" height="52" rx="6" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="640" y="172" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">YouTube Shorts</text>
  <text x="640" y="192" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">2本</text>
  <!-- ブログ写真 20枚 -->
  <line x1="490" y1="125" x2="625" y2="235" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="540" y="225" width="200" height="52" rx="6" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="640" y="247" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">ブログ用写真</text>
  <text x="640" y="267" text-anchor="middle" fill="#c9a84c" font-size="16" font-weight="bold">20枚</text>
  <!-- total -->
  <rect x="285" y="300" width="230" height="70" rx="8" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="326" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13">合計コンテンツ数</text>
  <text x="400" y="358" text-anchor="middle" fill="#c9a84c" font-size="28" font-weight="bold">17本</text>
  <!-- footer note -->
  <text x="400" y="400" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11">※事前設計と分解戦略が整った場合の目安</text>
</svg>
