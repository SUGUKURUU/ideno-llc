<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="38" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">月間SNS運用スケジュール（月1撮影モデル）</text>
  <!-- column headers -->
  <rect x="30" y="55" width="120" height="34" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="90" y="77" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">タスク</text>
  <rect x="160" y="55" width="140" height="34" rx="4" fill="rgba(201,168,76,0.1)"/>
  <text x="230" y="77" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">第1週</text>
  <rect x="310" y="55" width="140" height="34" rx="4" fill="rgba(201,168,76,0.1)"/>
  <text x="380" y="77" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">第2週</text>
  <rect x="460" y="55" width="140" height="34" rx="4" fill="rgba(201,168,76,0.1)"/>
  <text x="530" y="77" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">第3週</text>
  <rect x="610" y="55" width="160" height="34" rx="4" fill="rgba(201,168,76,0.1)"/>
  <text x="690" y="77" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">第4週</text>

  <!-- row 1: 先月分投稿 -->
  <text x="90" y="116" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">先月分投稿</text>
  <rect x="165" y="100" width="130" height="28" rx="4" fill="#c9a84c" opacity="0.8"/>
  <text x="230" y="119" text-anchor="middle" fill="#111" font-size="11" font-weight="bold">投稿実施</text>
  <line x1="155" y1="114" x2="765" y2="114" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- row 2: ネタ収集 -->
  <text x="90" y="155" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">ネタ収集</text>
  <rect x="165" y="140" width="130" height="28" rx="4" fill="rgba(201,168,76,0.5)"/>
  <text x="230" y="159" text-anchor="middle" fill="#fff" font-size="11">収集・整理</text>
  <line x1="155" y1="154" x2="765" y2="154" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- row 3: コンテンツ企画 -->
  <text x="90" y="195" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">コンテンツ企画</text>
  <rect x="165" y="180" width="130" height="28" rx="4" fill="rgba(201,168,76,0.4)"/>
  <text x="230" y="199" text-anchor="middle" fill="#fff" font-size="11">企画立案</text>
  <line x1="155" y1="194" x2="765" y2="194" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- row 4: 撮影日 -->
  <text x="90" y="235" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">📷 撮影日</text>
  <rect x="315" y="220" width="60" height="28" rx="4" fill="#c9a84c"/>
  <text x="345" y="239" text-anchor="middle" fill="#111" font-size="11" font-weight="bold">撮影</text>
  <line x1="155" y1="234" x2="765" y2="234" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- row 5: 編集 -->
  <text x="90" y="275" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">動画編集</text>
  <rect x="315" y="260" width="130" height="28" rx="4" fill="rgba(201,168,76,0.5)"/>
  <text x="380" y="279" text-anchor="middle" fill="#fff" font-size="11">編集・加工</text>
  <line x1="155" y1="274" x2="765" y2="274" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- row 6: 投稿予約 -->
  <text x="90" y="315" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">投稿予約</text>
  <rect x="465" y="300" width="130" height="28" rx="4" fill="rgba(201,168,76,0.6)"/>
  <text x="530" y="319" text-anchor="middle" fill="#fff" font-size="11">スケジュール設定</text>
  <line x1="155" y1="314" x2="765" y2="314" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- row 7: 分析 -->
  <text x="90" y="355" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">分析・翌月企画</text>
  <rect x="615" y="340" width="150" height="28" rx="4" fill="rgba(201,168,76,0.4)"/>
  <text x="690" y="359" text-anchor="middle" fill="#fff" font-size="11">分析＋翌月企画</text>

  <!-- vertical grid lines -->
  <line x1="155" y1="55" x2="155" y2="380" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="305" y1="55" x2="305" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="455" y1="55" x2="455" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="605" y1="55" x2="605" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="400" y="405" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">月初に翌月分カレンダーを作成→予約投稿で自動化</text>
</svg>
