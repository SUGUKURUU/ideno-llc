<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#c9a84c">投稿頻度 vs 品質のトレードオフ｜最適ゾーンとは</text>
  <!-- Axes -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="80" y1="80" x2="80" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="80" y1="210" x2="720" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="135" x2="720" y2="135" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="240" y1="80" x2="240" y2="340" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="80" x2="400" y2="340" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="560" y1="80" x2="560" y2="340" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Axis labels -->
  <text x="400" y="375" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">投稿頻度（週あたり）</text>
  <text x="20" y="215" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)" transform="rotate(-90,20,215)">投稿品質・エンゲージメント率</text>
  <!-- X axis ticks -->
  <text x="160" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週1本</text>
  <text x="240" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週2本</text>
  <text x="320" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週3本</text>
  <text x="400" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週4本</text>
  <text x="480" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週5本</text>
  <text x="560" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週7本</text>
  <text x="640" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)">週10本+</text>
  <!-- Y axis ticks -->
  <text x="72" y="340" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">低</text>
  <text x="72" y="210" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">中</text>
  <text x="72" y="90" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">高</text>
  <!-- Quality curve (inverted U-ish, peaks at week3-4) -->
  <polyline points="80,310 160,230 240,170 320,120 400,100 480,130 560,180 640,250 720,320" fill="none" stroke="#4ade80" stroke-width="3"/>
  <!-- Optimal zone highlight -->
  <rect x="300" y="85" width="160" height="265" fill="#c9a84c" opacity="0.06"/>
  <rect x="300" y="85" width="160" height="265" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#c9a84c">最適ゾーン</text>
  <text x="380" y="124" text-anchor="middle" font-size="11" fill="#c9a84c">週3〜4本</text>
  <!-- Burnout zone -->
  <text x="660" y="108" text-anchor="middle" font-size="11" fill="#f87171">燃え尽き</text>
  <text x="660" y="122" text-anchor="middle" font-size="11" fill="#f87171">ゾーン</text>
  <!-- Dot for optimal -->
  <circle cx="400" cy="100" r="8" fill="#c9a84c"/>
  <circle cx="320" cy="120" r="7" fill="#4ade80" opacity="0.8"/>
  <!-- Annotation -->
  <line x1="400" y1="100" x2="450" y2="78" stroke="#c9a84c" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="456" y="74" font-size="11" fill="#c9a84c">品質・頻度バランス最高点</text>
  <!-- Note box -->
  <rect x="80" y="380" width="640" height="28" rx="6" fill="#1a1a1a" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="400" y="399" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)">月1回撮影モデル → 週3〜4本の高品質投稿を維持 → アルゴリズム評価が最大化する</text>
</svg>
