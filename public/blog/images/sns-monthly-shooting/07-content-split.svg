<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">月1撮影で作るコンテンツの内訳</text>

  <!-- Pie chart center: 380,220 radius: 140 -->
  <!-- Segment 1: 教育・Tips系 35% → 0° to 126° -->
  <path d="M380,220 L380,80 A140,140 0 0,1 501,150 Z" fill="#c9a84c"/>
  <!-- Segment 2: 事例・実績系 25% → 126° to 216° -->
  <path d="M380,220 L501,150 A140,140 0 0,1 359,361 Z" fill="rgba(201,168,76,0.55)"/>
  <!-- Segment 3: 人物・カルチャー系 25% → 216° to 306° -->
  <path d="M380,220 L359,361 A140,140 0 0,1 218,171 Z" fill="rgba(201,168,76,0.3)"/>
  <!-- Segment 4: 告知・プロモーション系 15% → 306° to 360° -->
  <path d="M380,220 L218,171 A140,140 0 0,1 380,80 Z" fill="rgba(201,168,76,0.12)"/>

  <!-- center circle -->
  <circle cx="380" cy="220" r="55" fill="#111111"/>
  <text x="380" y="215" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">コンテンツ</text>
  <text x="380" y="233" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">内訳</text>

  <!-- Legend -->
  <rect x="550" y="100" width="18" height="18" rx="3" fill="#c9a84c"/>
  <text x="576" y="114" fill="#ffffff" font-size="13" font-weight="bold">教育・Tips系</text>
  <text x="576" y="132" fill="rgba(255,255,255,0.6)" font-size="20" font-weight="bold">35%</text>

  <rect x="550" y="165" width="18" height="18" rx="3" fill="rgba(201,168,76,0.55)"/>
  <text x="576" y="179" fill="#ffffff" font-size="13" font-weight="bold">事例・実績系</text>
  <text x="576" y="197" fill="rgba(255,255,255,0.6)" font-size="20" font-weight="bold">25%</text>

  <rect x="550" y="230" width="18" height="18" rx="3" fill="rgba(201,168,76,0.3)"/>
  <text x="576" y="244" fill="#ffffff" font-size="13" font-weight="bold">人物・カルチャー系</text>
  <text x="576" y="262" fill="rgba(255,255,255,0.6)" font-size="20" font-weight="bold">25%</text>

  <rect x="550" y="295" width="18" height="18" rx="3" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="576" y="309" fill="#ffffff" font-size="13" font-weight="bold">告知・プロモーション系</text>
  <text x="576" y="327" fill="rgba(255,255,255,0.6)" font-size="20" font-weight="bold">15%</text>

  <!-- label lines -->
  <line x1="450" y1="118" x2="510" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="460" y1="290" x2="510" y2="230" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="270" y1="290" x2="240" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="290" y1="140" x2="260" y2="120" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="400" y="395" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">※告知・プロモーション系は全体の15%以内に抑えることでフォロワーの離脱を防ぐ</text>
</svg>
