<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">月1撮影モデル導入前後の変化</text>

  <!-- axes -->
  <line x1="100" y1="60" x2="100" y2="330" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="100" y1="330" x2="750" y2="330" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Y axis 0-100% scale -->
  <text x="92" y="334" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="10">0</text>
  <text x="92" y="280" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="10">20%</text>
  <text x="92" y="226" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="10">40%</text>
  <text x="92" y="172" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="10">60%</text>
  <text x="92" y="118" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="10">80%</text>
  <text x="92" y="64" text-anchor="end" fill="rgba(255,255,255,0.45)" font-size="10">100%</text>
  <line x1="100" y1="280" x2="750" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="226" x2="750" y2="226" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="172" x2="750" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="118" x2="750" y2="118" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="64" x2="750" y2="64" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- X axis: 導入前, 3ヶ月後, 6ヶ月後, 12ヶ月後 -->
  <!-- x positions: 160, 320, 480, 640 -->
  <text x="160" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">導入前</text>
  <text x="320" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">3ヶ月後</text>
  <text x="480" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">6ヶ月後</text>
  <text x="640" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">12ヶ月後</text>

  <!-- Series 1: フォロワー増加率 (0%, 30%, 80%, 300%→capped) -->
  <!-- y = 330 - (val/100)*270, capped at 64 -->
  <!-- 0→330, 30→249, 80→114, 150→capped to 90 (show overflow) -->
  <polyline points="160,330 320,249 480,114 640,87" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  <circle cx="160" cy="330" r="5" fill="#c9a84c"/>
  <circle cx="320" cy="249" r="5" fill="#c9a84c"/>
  <circle cx="480" cy="114" r="5" fill="#c9a84c"/>
  <circle cx="640" cy="87" r="5" fill="#c9a84c"/>
  <text x="640" y="78" text-anchor="middle" fill="#c9a84c" font-size="11" font-weight="bold">+320%</text>

  <!-- Series 2: エンゲージメント率 (1%, 2.5%, 4%, 5%) → scale *54 -->
  <!-- 1→330-5=325, 2.5→330-13=317, 4→330-22=308, 5→330-27=303 -->
  <!-- Let's use a different scale: 0-10% range → 270px, so 1%=27px -->
  <!-- 1→330-27=303, 2.5→330-68=262, 4→330-108=222, 5→330-135=195 -->
  <polyline points="160,303 320,262 480,222 640,195" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="160" cy="303" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="320" cy="262" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="480" cy="222" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="640" cy="195" r="4" fill="rgba(255,255,255,0.6)"/>
  <text x="660" y="192" fill="rgba(255,255,255,0.7)" font-size="11">5%</text>

  <!-- Series 3: 月間問い合わせ数 (0, 1, 4, 10) → scale *27 -->
  <!-- 0→330, 1→330-27=303, 4→330-108=222, 10→330-270=60 -->
  <polyline points="160,330 320,308 480,249 640,141" fill="none" stroke="rgba(201,168,76,0.45)" stroke-width="2" stroke-dasharray="3,3"/>
  <circle cx="160" cy="330" r="4" fill="rgba(201,168,76,0.6)"/>
  <circle cx="320" cy="308" r="4" fill="rgba(201,168,76,0.6)"/>
  <circle cx="480" cy="249" r="4" fill="rgba(201,168,76,0.6)"/>
  <circle cx="640" cy="141" r="4" fill="rgba(201,168,76,0.6)"/>
  <text x="660" y="139" fill="rgba(201,168,76,0.8)" font-size="11">月10件</text>

  <!-- legend -->
  <line x1="105" y1="378" x2="135" y2="378" stroke="#c9a84c" stroke-width="2.5"/>
  <text x="140" y="382" fill="rgba(255,255,255,0.8)" font-size="11">フォロワー増加率</text>
  <line x1="290" y1="378" x2="320" y2="378" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="325" y="382" fill="rgba(255,255,255,0.8)" font-size="11">エンゲージメント率</text>
  <line x1="490" y1="378" x2="520" y2="378" stroke="rgba(201,168,76,0.6)" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="525" y="382" fill="rgba(255,255,255,0.8)" font-size="11">月間問い合わせ数</text>
</svg>
