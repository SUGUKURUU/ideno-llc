<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">投稿頻度 vs コンテンツ品質のトレードオフ</text>

  <!-- axes -->
  <line x1="100" y1="60" x2="100" y2="360" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="100" y1="360" x2="740" y2="360" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- axis arrows -->
  <polygon points="100,55 95,68 105,68" fill="rgba(255,255,255,0.5)"/>
  <polygon points="745,360 732,355 732,365" fill="rgba(255,255,255,0.5)"/>

  <!-- axis labels -->
  <text x="90" y="220" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13" transform="rotate(-90,90,220)">コンテンツ品質（低→高）</text>
  <text x="420" y="395" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13">投稿頻度（低→高）</text>

  <!-- grid -->
  <line x1="100" y1="210" x2="740" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="420" y1="60" x2="420" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Zone: 低頻度・高品質（左上） -->
  <rect x="105" y="65" width="310" height="140" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="260" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="13">低頻度・高品質</text>
  <text x="260" y="150" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">発見されにくい</text>

  <!-- Zone: 高頻度・低品質（右下） -->
  <rect x="425" y="215" width="310" height="140" rx="6" fill="rgba(255,80,80,0.06)" stroke="rgba(255,80,80,0.2)" stroke-width="1"/>
  <text x="580" y="280" text-anchor="middle" fill="rgba(255,150,150,0.7)" font-size="13">高頻度・低品質</text>
  <text x="580" y="300" text-anchor="middle" fill="rgba(255,150,150,0.5)" font-size="11">疲弊・品質低下</text>

  <!-- Zone: 低頻度・低品質（左下） -->
  <rect x="105" y="215" width="310" height="140" rx="6" fill="rgba(100,100,100,0.06)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="260" y="285" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="13">低頻度・低品質</text>
  <text x="260" y="305" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="11">成果ゼロ</text>

  <!-- Zone: 月1撮影モデル（右上・ゴールドゾーン） -->
  <rect x="425" y="65" width="310" height="140" rx="6" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="2"/>
  <text x="580" y="118" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">中頻度・高品質</text>
  <text x="580" y="140" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">✓ 月1撮影モデルの到達点</text>
  <text x="580" y="160" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="11">週3〜4投稿 × 高品質素材</text>

  <!-- star marker -->
  <circle cx="560" cy="130" r="18" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="560" y="136" text-anchor="middle" fill="#c9a84c" font-size="18">★</text>

  <!-- axis tick labels -->
  <text x="97" y="365" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="11">低</text>
  <text x="97" y="75" text-anchor="end" fill="rgba(255,255,255,0.4)" font-size="11">高</text>
  <text x="108" y="378" fill="rgba(255,255,255,0.4)" font-size="11">低</text>
  <text x="720" y="378" fill="rgba(255,255,255,0.4)" font-size="11">高</text>
</svg>
