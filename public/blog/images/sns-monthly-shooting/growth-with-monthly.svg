<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#c9a84c">月1回撮影モデルの成長シミュレーション（12ヶ月）</text>
  <!-- Axes -->
  <line x1="80" y1="340" x2="740" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="80" y1="80" x2="80" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Grid -->
  <line x1="80" y1="265" x2="740" y2="265" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="190" x2="740" y2="190" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="115" x2="740" y2="115" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Y axis labels -->
  <text x="72" y="344" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">0</text>
  <text x="72" y="269" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">300</text>
  <text x="72" y="194" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">600</text>
  <text x="72" y="119" text-anchor="end" font-size="11" fill="rgba(255,255,255,0.5)">1000</text>
  <text x="30" y="215" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.6)" transform="rotate(-90,30,215)">フォロワー増加数</text>
  <!-- X axis labels -->
  <text x="135" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">1ヶ月</text>
  <text x="190" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">2</text>
  <text x="245" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">3</text>
  <text x="300" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">4</text>
  <text x="355" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">5</text>
  <text x="410" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">6</text>
  <text x="465" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">7</text>
  <text x="520" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">8</text>
  <text x="575" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">9</text>
  <text x="630" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">10</text>
  <text x="685" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">11</text>
  <text x="740" y="358" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">12</text>
  <!-- Follower growth line (accelerating) -->
  <!-- Points: 0→30,50,80,120,160,210,270,330,390,460,540,640 (cumulative) -->
  <!-- Scale: 0→340, 1000→80, so y = 340 - (val/1000)*260 -->
  <!-- vals: 30,50,80,120,160,210,270,330,390,460,540,640 → y= 332,327,319,309,298,285,270,254,238,220,199,174 -->
  <polyline points="80,340 135,332 190,327 245,319 300,309 355,298 410,285 465,270 520,254 575,238 630,220 685,199 740,174" fill="none" stroke="#c9a84c" stroke-width="3"/>
  <!-- Area fill -->
  <polygon points="80,340 135,332 190,327 245,319 300,309 355,298 410,285 465,270 520,254 575,238 630,220 685,199 740,174 740,340" fill="#c9a84c" opacity="0.1"/>
  <!-- Problem annotations (no-setting line) -->
  <polyline points="80,340 135,338 190,337 245,336 300,336 355,335 410,335 465,334 520,334 575,333 630,333 685,332 740,332" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Labels -->
  <text x="650" y="168" font-size="11" fill="#c9a84c">設計あり：+640人</text>
  <text x="650" y="326" font-size="11" fill="#f87171">設計なし：+8人</text>
  <!-- Phase annotations -->
  <rect x="90" y="88" width="100" height="32" rx="4" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1"/>
  <text x="140" y="102" text-anchor="middle" font-size="10" fill="#c9a84c">仕込み期</text>
  <text x="140" y="114" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)">1〜3ヶ月</text>
  <rect x="340" y="88" width="100" height="32" rx="4" fill="#1a1a1a" stroke="#4ade80" stroke-width="1"/>
  <text x="390" y="102" text-anchor="middle" font-size="10" fill="#4ade80">加速期</text>
  <text x="390" y="114" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)">4〜6ヶ月</text>
  <rect x="590" y="88" width="110" height="32" rx="4" fill="#1a1a1a" stroke="#60a5fa" stroke-width="1"/>
  <text x="645" y="102" text-anchor="middle" font-size="10" fill="#60a5fa">成果期</text>
  <text x="645" y="114" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.6)">7〜12ヶ月</text>
  <!-- Phase dividers -->
  <line x1="245" y1="80" x2="245" y2="340" stroke="#c9a84c" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="465" y1="80" x2="465" y2="340" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
</svg>
