<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">メッセージの明確さ vs 視聴後CV率</text>

  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="330" x2="720" y2="330" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- X: clarity score 1-10, width=620, 1unit=62px -->
  <text x="100" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">1</text>
  <text x="162" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">2</text>
  <text x="224" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">3</text>
  <text x="286" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">4</text>
  <text x="348" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">5</text>
  <text x="410" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">6</text>
  <text x="472" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">7</text>
  <text x="534" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">8</text>
  <text x="596" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">9</text>
  <text x="658" y="348" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">10</text>
  <text x="410" y="368" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">メッセージクリアスコア（1〜10）</text>

  <!-- Y: CV rate 0-5%, height=270 -->
  <text x="92" y="334" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="92" y="280" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">1%</text>
  <text x="92" y="226" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">2%</text>
  <text x="92" y="172" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">3%</text>
  <text x="92" y="118" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">4%</text>
  <text x="92" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">5%</text>
  <text x="38" y="200" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" transform="rotate(-90,38,200)">視聴後CV率</text>

  <!-- Grid -->
  <line x1="100" y1="280" x2="720" y2="280" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="226" x2="720" y2="226" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="172" x2="720" y2="172" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="118" x2="720" y2="118" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="64" x2="720" y2="64" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>

  <!-- Scatter plot points: (clarity, cv) pairs with noise -->
  <!-- y = 330 - (cv/5)*270 -->
  <!-- x = 100 + (clarity-1)*62 -->
  <!-- Approximate trend: cv ≈ 0.45*clarity - 0.1 -->
  <circle cx="100" cy="324" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="162" cy="316" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="162" cy="310" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="224" cy="302" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="224" cy="295" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="286" cy="286" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="286" cy="278" r="5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="348" cy="264" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="348" cy="272" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="410" cy="250" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="410" cy="240" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="472" cy="220" r="5" fill="#c9a84c" opacity="0.8"/>
  <circle cx="472" cy="210" r="5" fill="#c9a84c" opacity="0.8"/>
  <circle cx="534" cy="185" r="5" fill="#c9a84c" opacity="0.85"/>
  <circle cx="534" cy="175" r="5" fill="#c9a84c" opacity="0.85"/>
  <circle cx="596" cy="148" r="5" fill="#c9a84c" opacity="0.9"/>
  <circle cx="596" cy="140" r="5" fill="#c9a84c" opacity="0.9"/>
  <circle cx="658" cy="110" r="6" fill="#c9a84c"/>
  <circle cx="658" cy="100" r="6" fill="#c9a84c"/>

  <!-- Trend line -->
  <line x1="100" y1="322" x2="658" y2="98" stroke="#c9a84c" stroke-width="2" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Correlation label -->
  <rect x="400" y="255" width="200" height="36" rx="6" fill="#1e1e1e"/>
  <text x="500" y="273" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">相関係数 r ≈ 0.94</text>
  <text x="500" y="288" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">強い正の相関</text>

  <!-- Zone labels -->
  <rect x="108" y="65" width="100" height="28" rx="4" fill="#2a1a1a"/>
  <text x="158" y="84" fill="#ff6666" font-size="11" text-anchor="middle">低スコア帯</text>

  <rect x="560" y="65" width="100" height="28" rx="4" fill="#1a2a1a"/>
  <text x="610" y="84" fill="#88cc88" font-size="11" text-anchor="middle">高スコア帯</text>

  <text x="400" y="400" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">「誰に何を伝えるか」が明確なほどCV率が劇的に改善する</text>
</svg>
