<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">サムネイルタイプ別クリック率比較</text>

  <!-- Y axis -->
  <line x1="100" y1="58" x2="100" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="320" x2="740" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Scale: max=10%, height=262, 1%=26.2px -->
  <text x="92" y="324" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="92" y="272" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">2%</text>
  <text x="92" y="220" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">4%</text>
  <text x="92" y="168" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">6%</text>
  <text x="92" y="116" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">8%</text>
  <text x="92" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">10%</text>
  <text x="38" y="190" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" transform="rotate(-90,38,190)">クリック率（CTR）</text>

  <!-- Grid -->
  <line x1="100" y1="272" x2="740" y2="272" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="220" x2="740" y2="220" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="168" x2="740" y2="168" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="116" x2="740" y2="116" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>

  <!-- Bar 1: 社長の顔（表情豊か）8.2% → h=215 y=105 BEST -->
  <rect x="120" y="105" width="90" height="215" fill="#c9a84c" rx="3"/>
  <text x="165" y="97" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">8.2%</text>
  <text x="165" y="342" fill="#c9a84c" font-size="11" font-weight="bold" text-anchor="middle">社長の顔</text>
  <text x="165" y="357" fill="#c9a84c" font-size="10" text-anchor="middle">（表情豊か）</text>
  <rect x="128" y="112" width="74" height="20" rx="3" fill="#111111" opacity="0.5"/>
  <text x="165" y="127" fill="#c9a84c" font-size="10" font-weight="bold" text-anchor="middle">★ 最高CTR</text>

  <!-- Bar 2: テキストのみ 2.1% → h=55 y=265 -->
  <rect x="250" y="265" width="90" height="55" fill="#c9a84c" opacity="0.38" rx="3"/>
  <text x="295" y="257" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="bold" text-anchor="middle">2.1%</text>
  <text x="295" y="342" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">テキストのみ</text>

  <!-- Bar 3: 会社ロゴのみ 1.3% → h=34 y=286 -->
  <rect x="380" y="286" width="90" height="34" fill="#c9a84c" opacity="0.22" rx="3"/>
  <text x="425" y="278" fill="rgba(255,255,255,0.6)" font-size="13" font-weight="bold" text-anchor="middle">1.3%</text>
  <text x="425" y="342" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">会社ロゴのみ</text>

  <!-- Bar 4: 建物・施設外観 1.8% → h=47 y=273 -->
  <rect x="510" y="273" width="90" height="47" fill="#c9a84c" opacity="0.3" rx="3"/>
  <text x="555" y="265" fill="rgba(255,255,255,0.6)" font-size="13" font-weight="bold" text-anchor="middle">1.8%</text>
  <text x="555" y="342" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">建物・施設外観</text>

  <!-- Bar 5: 商品写真 3.4% → h=89 y=231 -->
  <rect x="640" y="231" width="90" height="89" fill="#c9a84c" opacity="0.55" rx="3"/>
  <text x="685" y="223" fill="rgba(255,255,255,0.8)" font-size="13" font-weight="bold" text-anchor="middle">3.4%</text>
  <text x="685" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">商品写真</text>

  <text x="400" y="395" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">人の顔（特に豊かな表情）が入ったサムネイルは他を圧倒するCTRを記録する</text>
</svg>
