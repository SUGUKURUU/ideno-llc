<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="28" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">映像品質 vs コンテンツ品質：どちらが重要か</text>

  <!-- Left side: High video quality, low content -->
  <g>
    <text x="200" y="65" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">❌ 映像品質重視</text>
    <text x="200" y="84" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">（コンテンツが薄い）</text>

    <!-- Visualization -->
    <rect x="80" y="110" width="240" height="200" rx="8" fill="rgba(220,38,38,0.08)" stroke="rgba(220,38,38,0.2)" stroke-width="1.5"/>

    <!-- Video quality meter -->
    <text x="100" y="140" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">映像品質</text>
    <rect x="100" y="150" width="180" height="15" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="100" y="150" width="162" height="15" rx="7" fill="#22c55e"/>
    <text x="280" y="163" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">90%</text>

    <!-- Content quality meter -->
    <text x="100" y="185" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">コンテンツ品質</text>
    <rect x="100" y="195" width="180" height="15" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="100" y="195" width="45" height="15" rx="7" fill="#dc2626"/>
    <text x="280" y="208" fill="#fca5a5" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">25%</text>

    <!-- Result -->
    <rect x="100" y="230" width="180" height="60" rx="5" fill="rgba(220,38,38,0.1)" stroke="rgba(220,38,38,0.3)" stroke-width="1"/>
    <text x="190" y="250" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">結果</text>
    <text x="190" y="270" fill="#fca5a5" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">視聴者の共感を</text>
    <text x="190" y="287" fill="#fca5a5" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">得られない</text>
  </g>

  <!-- Right side: High content quality, lower video quality -->
  <g>
    <text x="600" y="65" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">✓ コンテンツ品質重視</text>
    <text x="600" y="84" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">（映像は適度）</text>

    <!-- Visualization -->
    <rect x="480" y="110" width="240" height="200" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1.5"/>

    <!-- Video quality meter -->
    <text x="500" y="140" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">映像品質</text>
    <rect x="500" y="150" width="180" height="15" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="500" y="150" width="90" height="15" rx="7" fill="#0ea5e9"/>
    <text x="680" y="163" fill="#7dd3fc" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">50%</text>

    <!-- Content quality meter -->
    <text x="500" y="185" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">コンテンツ品質</text>
    <rect x="500" y="195" width="180" height="15" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="500" y="195" width="162" height="15" rx="7" fill="#22c55e"/>
    <text x="680" y="208" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold">90%</text>

    <!-- Result -->
    <rect x="500" y="230" width="180" height="60" rx="5" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="590" y="250" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">結果</text>
    <text x="590" y="270" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">視聴者の心を</text>
    <text x="590" y="287" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">動かす</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="330" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Bottom comparison -->
  <rect x="30" y="335" width="740" height="70" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="50" y="360" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">実例：スマートフォン撮影の粗削り動画でも</text>

  <text x="70" y="380" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">社長が正直に「失敗談」を語る → 視聴者は「信頼できる」と感じる</text>
  <text x="70" y="398" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">プロ並みの映像でも、「完璧なPR動画」に見えて「本音が隠れてる」と疑われる → 問い合わせ減少</text>
</svg>
