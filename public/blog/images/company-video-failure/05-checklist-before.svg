<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">動画制作前に確認すべき10項目</text>

  <!-- Left column: items 1-5 -->
  <rect x="40" y="58" width="360" height="44" rx="6" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <rect x="52" y="68" width="26" height="26" rx="4" fill="#c9a84c"/>
  <text x="65" y="86" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <text x="96" y="82" fill="#ffffff" font-size="13">誰に見せる動画か（ペルソナ）</text>
  <text x="96" y="96" fill="rgba(255,255,255,0.4)" font-size="10">ターゲットを1人に絞り込む</text>

  <rect x="40" y="110" width="360" height="44" rx="6" fill="#1a1a1a" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="52" y="120" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.85"/>
  <text x="65" y="138" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <text x="96" y="134" fill="#ffffff" font-size="13">何を伝えたいか（コアメッセージ）</text>
  <text x="96" y="148" fill="rgba(255,255,255,0.4)" font-size="10">1本の動画で1つのメッセージに絞る</text>

  <rect x="40" y="162" width="360" height="44" rx="6" fill="#1e1e1e" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="52" y="172" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.7"/>
  <text x="65" y="190" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <text x="96" y="186" fill="#ffffff" font-size="13">見た後にどうしてほしいか（CTA）</text>
  <text x="96" y="200" fill="rgba(255,255,255,0.4)" font-size="10">問い合わせ・応募・シェアなど</text>

  <rect x="40" y="214" width="360" height="44" rx="6" fill="#1a1a1a" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="52" y="224" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.55"/>
  <text x="65" y="242" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">4</text>
  <text x="96" y="238" fill="#ffffff" font-size="13">配信チャネルはどこか</text>
  <text x="96" y="252" fill="rgba(255,255,255,0.4)" font-size="10">YouTube/Instagram/採用サイト等</text>

  <rect x="40" y="266" width="360" height="44" rx="6" fill="#1e1e1e" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="52" y="276" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.4"/>
  <text x="65" y="294" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">5</text>
  <text x="96" y="290" fill="#ffffff" font-size="13">予算と制作期間</text>
  <text x="96" y="304" fill="rgba(255,255,255,0.4)" font-size="10">現実的な範囲で最大効果を目指す</text>

  <!-- Right column: items 6-10 -->
  <rect x="420" y="58" width="360" height="44" rx="6" fill="#1e1e1e" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="432" y="68" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.85"/>
  <text x="445" y="86" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <text x="476" y="82" fill="#ffffff" font-size="13">動画の主役は誰か</text>
  <text x="476" y="96" fill="rgba(255,255,255,0.4)" font-size="10">社長/社員/現場/商品 etc.</text>

  <rect x="420" y="110" width="360" height="44" rx="6" fill="#1a1a1a" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="432" y="120" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.7"/>
  <text x="445" y="138" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">7</text>
  <text x="476" y="134" fill="#ffffff" font-size="13">動画の適切な長さは？</text>
  <text x="476" y="148" fill="rgba(255,255,255,0.4)" font-size="10">チャネルと目的で最適尺を決定</text>

  <rect x="420" y="162" width="360" height="44" rx="6" fill="#1e1e1e" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="432" y="172" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.55"/>
  <text x="445" y="190" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">8</text>
  <text x="476" y="186" fill="#ffffff" font-size="13">競合他社の動画を調査したか</text>
  <text x="476" y="200" fill="rgba(255,255,255,0.4)" font-size="10">差別化ポイントを明確にする</text>

  <rect x="420" y="214" width="360" height="44" rx="6" fill="#1a1a1a" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="432" y="224" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.4"/>
  <text x="445" y="242" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">9</text>
  <text x="476" y="238" fill="#ffffff" font-size="13">公開後の運用計画はあるか</text>
  <text x="476" y="252" fill="rgba(255,255,255,0.4)" font-size="10">SNS投稿・求人掲載・メール添付等</text>

  <rect x="420" y="266" width="360" height="44" rx="6" fill="#1e1e1e" stroke="rgba(201,168,76,0.5)" stroke-width="1"/>
  <rect x="432" y="276" width="26" height="26" rx="4" fill="#c9a84c" opacity="0.25"/>
  <text x="445" y="294" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">10</text>
  <text x="476" y="290" fill="#ffffff" font-size="13">効果測定の指標を設定したか</text>
  <text x="476" y="304" fill="rgba(255,255,255,0.4)" font-size="10">再生数・CV率・問い合わせ数等</text>

  <!-- Bottom banner -->
  <rect x="40" y="328" width="720" height="52" rx="8" fill="#c9a84c"/>
  <text x="400" y="352" fill="#111111" font-size="14" font-weight="bold" text-anchor="middle">10項目すべてにYESと答えられる状態で制作をスタートしましょう</text>
  <text x="400" y="372" fill="#1a1a1a" font-size="12" text-anchor="middle">制作前の設計こそが動画投資の成否を決める最重要ステップ</text>
</svg>
