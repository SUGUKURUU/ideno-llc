<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">制作費 vs 視聴者反応率（実際のデータ）</text>

  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="320" x2="720" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Y: 0-10%, height=260 -->
  <text x="92" y="324" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="92" y="268" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">2%</text>
  <text x="92" y="216" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">4%</text>
  <text x="92" y="164" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">6%</text>
  <text x="92" y="112" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">8%</text>
  <text x="92" y="60" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">10%</text>
  <text x="38" y="190" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" transform="rotate(-90,38,190)">視聴者反応率</text>

  <!-- Grid -->
  <line x1="100" y1="268" x2="720" y2="268" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="216" x2="720" y2="216" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="164" x2="720" y2="164" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="112" x2="720" y2="112" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>

  <!-- Bars: 4 budget tiers -->
  <!-- Bar 1: 10万以下 2% → h=52 y=268 -->
  <rect x="140" y="268" width="100" height="52" fill="#c9a84c" opacity="0.4" rx="3"/>
  <text x="190" y="260" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="bold" text-anchor="middle">2%</text>
  <text x="190" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">10万円以下</text>

  <!-- Bar 2: 30〜50万 8% → h=208 y=112 (BEST) -->
  <rect x="300" y="112" width="100" height="208" fill="#c9a84c" rx="3"/>
  <text x="350" y="104" fill="#c9a84c" font-size="14" font-weight="bold" text-anchor="middle">8%</text>
  <text x="350" y="342" fill="#c9a84c" font-size="11" font-weight="bold" text-anchor="middle">30〜50万円</text>
  <text x="350" y="357" fill="#c9a84c" font-size="10" text-anchor="middle">★ 最もコスパ良</text>
  <!-- Star badge -->
  <rect x="310" y="118" width="80" height="24" rx="4" fill="#111111" opacity="0.6"/>
  <text x="350" y="135" fill="#c9a84c" font-size="11" font-weight="bold" text-anchor="middle">最高コスパ</text>

  <!-- Bar 3: 100〜200万 7% → h=182 y=138 -->
  <rect x="460" y="138" width="100" height="182" fill="#c9a84c" opacity="0.65" rx="3"/>
  <text x="510" y="130" fill="rgba(255,255,255,0.8)" font-size="13" font-weight="bold" text-anchor="middle">7%</text>
  <text x="510" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">100〜200万円</text>

  <!-- Bar 4: 300万〜 6% → h=156 y=164 -->
  <rect x="620" y="164" width="100" height="156" fill="#c9a84c" opacity="0.45" rx="3"/>
  <text x="670" y="156" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="bold" text-anchor="middle">6%</text>
  <text x="670" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">300万円〜</text>
  <text x="670" y="357" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">見た目は綺麗…</text>

  <!-- Annotation arrow -->
  <path d="M510,120 Q430,80 360,108" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="440" y="75" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">予算増加 ≠ 反応率向上</text>

  <text x="400" y="395" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">高額制作費より「コンテンツの設計・リアルさ」が視聴者反応を左右する</text>
</svg>
