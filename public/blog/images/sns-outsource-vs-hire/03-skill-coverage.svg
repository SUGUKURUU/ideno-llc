<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">スキルカバレッジ比較（採用 vs 外注）</text>

  <!-- レーダーチャート中心: cx=400, cy=235, r=155 -->
  <!-- 6軸: 0=撮影(top,270deg), 1=編集(330deg), 2=ライティング(30deg), 3=分析(90deg=bottom), 4=企画(150deg), 5=トレンド(210deg) -->
  <!-- 各軸先端 (r=155):
    撮影:    400, 80
    編集:    534.3, 157.5
    ライティング: 534.3, 312.5
    分析:    400, 390
    企画:    265.7, 312.5
    トレンド: 265.7, 157.5
  -->

  <!-- グリッド五角形 (20,40,60,80,100%) r=31,62,93,124,155 -->
  <polygon points="400,204 426.9,219.5 426.9,250.5 400,266 373.1,250.5 373.1,219.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <polygon points="400,173 453.8,204 453.8,266 400,297 346.2,266 346.2,204" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <polygon points="400,142 480.7,188.5 480.7,281.5 400,328 319.3,281.5 319.3,188.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <polygon points="400,111 507.6,173 507.6,297 400,359 292.4,297 292.4,173" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <polygon points="400,80 534.5,157.5 534.5,312.5 400,390 265.5,312.5 265.5,157.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- 軸線 -->
  <line x1="400" y1="235" x2="400" y2="80" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="400" y1="235" x2="534.5" y2="157.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="400" y1="235" x2="534.5" y2="312.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="400" y1="235" x2="400" y2="390" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="400" y1="235" x2="265.5" y2="312.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="400" y1="235" x2="265.5" y2="157.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- 外注チーム (90%平均, r=139.5):
    撮影:    400, 95.5
    編集:    520.8, 165.25
    ライティング: 520.8, 304.75
    分析:    400, 374.5
    企画:    279.2, 304.75
    トレンド: 279.2, 165.25
  -->
  <polygon points="400,95.5 520.8,165.25 520.8,304.75 400,374.5 279.2,304.75 279.2,165.25"
    fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="2.5"/>

  <!-- 1名採用 (52%平均, r=80.6):
    撮影:    400, 154.4
    編集:    469.9, 195.7
    ライティング: 469.9, 274.3
    分析:    400, 315.6
    企画:    330.1, 274.3
    トレンド: 330.1, 195.7
  -->
  <polygon points="400,154.4 469.9,195.7 469.9,274.3 400,315.6 330.1,274.3 330.1,195.7"
    fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- 軸ラベル -->
  <text x="400" y="70" fill="#ffffff" font-size="12" text-anchor="middle">動画撮影</text>
  <text x="552" y="153" fill="#ffffff" font-size="12" text-anchor="start">動画編集</text>
  <text x="552" y="318" fill="#ffffff" font-size="12" text-anchor="start">コピーライティング</text>
  <text x="400" y="408" fill="#ffffff" font-size="12" text-anchor="middle">データ分析</text>
  <text x="248" y="318" fill="#ffffff" font-size="12" text-anchor="end">企画力</text>
  <text x="248" y="153" fill="#ffffff" font-size="12" text-anchor="end">トレンド把握</text>

  <!-- スコアラベル -->
  <text x="400" y="88" fill="#c9a84c" font-size="10" text-anchor="middle">90</text>
  <text x="400" y="148" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">52</text>

  <!-- 凡例 -->
  <rect x="55" y="55" width="16" height="16" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="2" rx="2"/>
  <text x="76" y="67" fill="#c9a84c" font-size="12">外注チーム（平均90点）</text>
  <rect x="55" y="80" width="16" height="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-dasharray="4,2" rx="2"/>
  <text x="76" y="92" fill="rgba(255,255,255,0.7)" font-size="12">1名採用（平均52点）</text>

  <!-- 差分バッジ -->
  <rect x="560" y="210" width="180" height="50" fill="#1a1a0a" stroke="#c9a84c" stroke-width="1" rx="6"/>
  <text x="650" y="232" fill="#c9a84c" font-size="13" font-weight="bold" text-anchor="middle">スキル充足率</text>
  <text x="650" y="252" fill="#ffffff" font-size="12" text-anchor="middle">外注 90% vs 採用 52%</text>
</svg>