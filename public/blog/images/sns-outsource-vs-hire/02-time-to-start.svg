<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="30" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">着手から運用開始までの期間比較</text>

  <!-- タイムライン軸 -->
  <!-- 上段: 採用ルート, 下段: 外注ルート -->

  <!-- 採用ルート ラベル -->
  <text x="60" y="105" fill="#f87171" font-size="13" font-weight="bold" text-anchor="start">採用ルート</text>
  <text x="60" y="120" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="start">約4〜6ヶ月</text>

  <!-- 採用ルートの軸線 -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="rgba(248,113,113,0.3)" stroke-width="2"/>

  <!-- 採用ステップ: 求人掲載2週/書類選考2週/面接2週/内定1週/研修1ヶ月/習熟2ヶ月 -->
  <!-- 全体: 約6ヶ月=180日, 幅=680px → 1日=3.78px -->
  <!-- x開始=60 -->
  <!-- 求人掲載14日 → w=53 -->
  <rect x="60" y="135" width="53" height="30" fill="rgba(248,113,113,0.6)" rx="3"/>
  <text x="86" y="155" fill="#ffffff" font-size="10" text-anchor="middle">求人掲載</text>
  <!-- 書類選考14日 → w=53 -->
  <rect x="118" y="135" width="53" height="30" fill="rgba(248,113,113,0.55)" rx="3"/>
  <text x="144" y="155" fill="#ffffff" font-size="10" text-anchor="middle">書類選考</text>
  <!-- 面接14日 → w=53 -->
  <rect x="176" y="135" width="53" height="30" fill="rgba(248,113,113,0.5)" rx="3"/>
  <text x="202" y="155" fill="#ffffff" font-size="10" text-anchor="middle">面接・選考</text>
  <!-- 内定7日 → w=26 -->
  <rect x="234" y="135" width="26" height="30" fill="rgba(248,113,113,0.45)" rx="3"/>
  <text x="247" y="155" fill="#ffffff" font-size="9" text-anchor="middle">内定</text>
  <!-- 研修30日 → w=113 -->
  <rect x="265" y="135" width="113" height="30" fill="rgba(248,113,113,0.4)" rx="3"/>
  <text x="321" y="155" fill="#ffffff" font-size="10" text-anchor="middle">入社・研修（1ヶ月）</text>
  <!-- 習熟60日 → w=227 -->
  <rect x="383" y="135" width="227" height="30" fill="rgba(248,113,113,0.3)" rx="3"/>
  <text x="496" y="155" fill="#ffffff" font-size="10" text-anchor="middle">習熟期間（2〜3ヶ月）</text>

  <!-- 採用終点マーカー -->
  <circle cx="610" cy="150" r="8" fill="#f87171"/>
  <text x="614" y="175" fill="#f87171" font-size="11">運用開始</text>
  <line x1="610" y1="158" x2="610" y2="170" stroke="#f87171" stroke-width="1.5"/>

  <!-- 期間ラベル -->
  <text x="86" y="180" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">2週</text>
  <text x="144" y="180" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">2週</text>
  <text x="202" y="180" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">2週</text>
  <text x="247" y="180" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">1週</text>
  <text x="321" y="180" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">1ヶ月</text>
  <text x="496" y="180" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">2〜3ヶ月</text>

  <!-- 区切り線 -->
  <line x1="60" y1="220" x2="740" y2="220" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- 外注ルート ラベル -->
  <text x="60" y="252" fill="#c9a84c" font-size="13" font-weight="bold" text-anchor="start">外注ルート</text>
  <text x="60" y="267" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="start">約2〜3週間</text>

  <!-- 外注ルート軸線 -->
  <line x1="60" y1="300" x2="740" y2="300" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>

  <!-- 外注ステップ: 問い合わせ1日/提案1週/契約1週/開始 -->
  <!-- 全体: 約21日 → 幅=200px -->
  <rect x="60" y="285" width="30" height="30" fill="rgba(201,168,76,0.7)" rx="3"/>
  <text x="75" y="305" fill="#111111" font-size="9" font-weight="bold" text-anchor="middle">問合</text>

  <rect x="95" y="285" width="75" height="30" fill="rgba(201,168,76,0.65)" rx="3"/>
  <text x="132" y="305" fill="#111111" font-size="10" font-weight="bold" text-anchor="middle">提案・ヒアリング</text>

  <rect x="175" y="285" width="75" height="30" fill="rgba(201,168,76,0.6)" rx="3"/>
  <text x="212" y="305" fill="#111111" font-size="10" font-weight="bold" text-anchor="middle">契約・準備</text>

  <!-- 外注終点マーカー -->
  <circle cx="255" cy="300" r="10" fill="#c9a84c"/>
  <text x="255" y="296" fill="#111111" font-size="9" font-weight="bold" text-anchor="middle">開始</text>
  <line x1="255" y1="310" x2="255" y2="322" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="255" y="333" fill="#c9a84c" font-size="11" text-anchor="middle">運用開始</text>

  <!-- 期間ラベル -->
  <text x="75" y="328" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">1日</text>
  <text x="132" y="328" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">約1週間</text>
  <text x="212" y="328" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">約1週間</text>

  <!-- 比較バッジ -->
  <rect x="340" y="270" width="360" height="70" fill="#1a1a0a" stroke="#c9a84c" stroke-width="1.5" rx="8"/>
  <text x="520" y="296" fill="#c9a84c" font-size="15" font-weight="bold" text-anchor="middle">外注は採用より最大5ヶ月早い</text>
  <text x="520" y="318" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">採用の習熟まで：4〜6ヶ月</text>
  <text x="520" y="334" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">外注の開始まで：2〜3週間</text>

  <!-- 矢印で比較 -->
  <line x1="610" y1="158" x2="610" y2="210" stroke="rgba(248,113,113,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="255" y1="285" x2="255" y2="230" stroke="rgba(201,168,76,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- 凡例 -->
  <rect x="500" y="55" width="14" height="14" fill="rgba(248,113,113,0.6)" rx="2"/>
  <text x="520" y="67" fill="#f87171" font-size="12">採用ルート</text>
  <rect x="620" y="55" width="14" height="14" fill="rgba(201,168,76,0.7)" rx="2"/>
  <text x="640" y="67" fill="#c9a84c" font-size="12">外注ルート</text>
</svg>