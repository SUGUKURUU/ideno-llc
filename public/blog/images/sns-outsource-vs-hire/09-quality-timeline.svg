<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="30" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">時間経過とアウトプット品質の変化</text>

  <!-- グリッド x:80-740, y:60-350 -->
  <line x1="80" y1="60" x2="80" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="350" x2="740" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="60" x2="740" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="118" x2="740" y2="118" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="176" x2="740" y2="176" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="234" x2="740" y2="234" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="292" x2="740" y2="292" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y軸ラベル: 100%=60, 80%=118, 60%=176, 40%=234, 20%=292, 0%=350 -->
  <!-- y = 350 - (quality/100)*290 -->
  <text x="72" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">100%</text>
  <text x="72" y="122" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">80%</text>
  <text x="72" y="180" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">60%</text>
  <text x="72" y="238" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">40%</text>
  <text x="72" y="296" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">20%</text>
  <text x="72" y="354" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="30" y="205" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,30,205)">アウトプット品質</text>

  <!-- X軸: 0〜24ヶ月, x=80+27.5*n -->
  <text x="80" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">0</text>
  <text x="135" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2</text>
  <text x="190" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">4</text>
  <text x="245" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">6</text>
  <text x="300" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">8</text>
  <text x="355" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">10</text>
  <text x="410" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">12</text>
  <text x="465" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">14</text>
  <text x="520" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">16</text>
  <text x="575" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">18</text>
  <text x="630" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">20</text>
  <text x="685" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">22</text>
  <text x="740" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">24</text>
  <text x="410" y="395" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">経過月数（ヶ月）</text>

  <!-- 外注ライン (ゴールド): 初日から高品質85%、安定維持90%程度 -->
  <!-- y=350-(quality/100)*290 -->
  <!-- 85%→y=103, 88%→94, 90%→89 -->
  <polyline points="
    80,103
    135,98
    190,95
    245,92
    300,91
    355,90
    410,89
    465,89
    520,88
    575,88
    630,87
    685,87
    740,86
  " fill="none" stroke="#c9a84c" stroke-width="3"/>

  <!-- 外注ゾーン塗り -->
  <polygon points="80,103 740,86 740,350 80,350" fill="rgba(201,168,76,0.05)"/>

  <!-- 採用1年目ライン (白): 最初20%→徐々に上昇→12ヶ月で85%へ到達 -->
  <polyline points="
    80,292
    135,278
    190,255
    245,220
    300,190
    355,160
    410,103
    465,96
    520,92
    575,90
    630,89
    685,88
    740,87
  " fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- 12ヶ月交差点マーカー -->
  <circle cx="410" cy="103" r="6" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <line x1="410" y1="103" x2="410" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="368" y="42" width="84" height="18" fill="rgba(201,168,76,0.15)" rx="3"/>
  <text x="410" y="55" fill="#c9a84c" font-size="11" text-anchor="middle">12ヶ月で追いつく</text>

  <!-- フェーズラベル -->
  <rect x="86" y="310" width="90" height="24" fill="rgba(248,113,113,0.15)" rx="3"/>
  <text x="131" y="326" fill="#f87171" font-size="10" text-anchor="middle">習熟期間（低品質）</text>

  <rect x="86" y="78" width="90" height="20" fill="rgba(201,168,76,0.15)" rx="3"/>
  <text x="131" y="92" fill="#c9a84c" font-size="10" text-anchor="middle">初日から高品質</text>

  <!-- 凡例 -->
  <line x1="490" y1="55" x2="520" y2="55" stroke="#c9a84c" stroke-width="3"/>
  <text x="526" y="59" fill="#c9a84c" font-size="12">外注（初日から85%品質）</text>
  <line x1="490" y1="75" x2="520" y2="75" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="526" y="79" fill="rgba(255,255,255,0.7)" font-size="12">採用（12ヶ月で同水準に）</text>
</svg>