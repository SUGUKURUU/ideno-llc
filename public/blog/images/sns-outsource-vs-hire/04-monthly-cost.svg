<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">月額コスト比較（採用 vs 外注）</text>

  <!-- グリッド x:150-720, y:60-350, max=45万 -->
  <line x1="150" y1="60" x2="150" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="150" y1="350" x2="720" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="150" y1="60" x2="720" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="150" y1="125" x2="720" y2="125" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="150" y1="190" x2="720" y2="190" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="150" y1="255" x2="720" y2="255" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="150" y1="320" x2="720" y2="320" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y軸 0〜45万: 45=y60, 0=y350 → 1万=(290/45)=6.44px -->
  <text x="142" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">45万</text>
  <text x="142" y="129" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">35万</text>
  <text x="142" y="194" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">25万</text>
  <text x="142" y="259" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">15万</text>
  <text x="142" y="324" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">5万</text>
  <text x="142" y="354" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0</text>
  <text x="65" y="205" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle" transform="rotate(-90,65,205)">月額費用（円）</text>

  <!-- バー4本: x中心=230,360,510,640, w=100 -->
  <!-- 正社員全コスト 40万: h=40*6.44=257.6, y=350-258=92 -->
  <rect x="180" y="92" width="100" height="258" fill="#f87171" rx="4"/>
  <text x="230" y="84" fill="#f87171" font-size="15" font-weight="bold" text-anchor="middle">40万円</text>
  <text x="230" y="368" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">正社員</text>
  <text x="230" y="383" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（全コスト）</text>

  <!-- 正社員基本給 30万: h=30*6.44=193.3, y=350-193=157 -->
  <rect x="310" y="157" width="100" height="193" fill="rgba(248,113,113,0.55)" rx="4"/>
  <text x="360" y="149" fill="#f87171" font-size="15" font-weight="bold" text-anchor="middle">30万円</text>
  <text x="360" y="368" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">正社員</text>
  <text x="360" y="383" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（基本給のみ）</text>

  <!-- 外注プレミアム 15万: h=15*6.44=96.7, y=350-97=253 -->
  <rect x="460" y="253" width="100" height="97" fill="#c9a84c" rx="4"/>
  <text x="510" y="245" fill="#c9a84c" font-size="15" font-weight="bold" text-anchor="middle">15万円</text>
  <text x="510" y="368" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">外注</text>
  <text x="510" y="383" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（プレミアム）</text>

  <!-- 外注スタンダード 10万: h=10*6.44=64.4, y=350-64=286 -->
  <rect x="590" y="286" width="100" height="64" fill="rgba(201,168,76,0.6)" rx="4"/>
  <text x="640" y="278" fill="#c9a84c" font-size="15" font-weight="bold" text-anchor="middle">10万円</text>
  <text x="640" y="368" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">外注</text>
  <text x="640" y="383" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">（スタンダード）</text>

  <!-- 区切りライン (外注vs採用) -->
  <line x1="435" y1="60" x2="435" y2="350" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="292" y="52" fill="#f87171" font-size="11" text-anchor="middle">採用</text>
  <text x="575" y="52" fill="#c9a84c" font-size="11" text-anchor="middle">外注</text>

  <!-- 凡例 -->
  <rect x="155" y="55" width="12" height="12" fill="#f87171" rx="2"/>
  <text x="172" y="65" fill="rgba(255,255,255,0.6)" font-size="11">採用（高コスト）</text>
  <rect x="310" y="55" width="12" height="12" fill="#c9a84c" rx="2"/>
  <text x="327" y="65" fill="rgba(255,255,255,0.6)" font-size="11">外注（低コスト）</text>
</svg>