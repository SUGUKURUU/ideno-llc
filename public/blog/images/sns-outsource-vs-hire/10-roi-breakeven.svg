<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="30" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">投資回収タイムライン比較（24ヶ月）</text>

  <!-- グリッド x:80-740, y:60-350 -->
  <line x1="80" y1="60" x2="80" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="350" x2="740" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="90" x2="740" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="148" x2="740" y2="148" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="205" x2="740" y2="205" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- 0ライン y=263 (ROI=0) -->
  <line x1="80" y1="263" x2="740" y2="263" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="746" y="267" fill="rgba(255,255,255,0.4)" font-size="10">±0</text>
  <line x1="80" y1="320" x2="740" y2="320" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y軸ラベル (累積ROI: +300%=90, +200%=148, +100%=205, 0%=263, -100%=320, -150%=350) -->
  <!-- y = 263 - (roi/100)*58 -->
  <text x="72" y="94" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">+300%</text>
  <text x="72" y="152" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">+200%</text>
  <text x="72" y="209" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">+100%</text>
  <text x="72" y="267" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">0%</text>
  <text x="72" y="324" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">-100%</text>
  <text x="72" y="354" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="end">-150%</text>
  <text x="30" y="205" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,30,205)">累積ROI</text>

  <!-- X軸: 0〜24ヶ月 x=80+27.5*n -->
  <text x="80" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">0</text>
  <text x="135" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2</text>
  <text x="190" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">4</text>
  <text x="245" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">6</text>
  <text x="300" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">8</text>
  <text x="355" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">10</text>
  <text x="410" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">12</text>
  <text x="465" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">14</text>
  <text x="520" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">16</text>
  <text x="575" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">18</text>
  <text x="630" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">20</text>
  <text x="685" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">22</text>
  <text x="740" y="368" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">24</text>
  <text x="410" y="395" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">経過月数（ヶ月）</text>

  <!-- 外注ライン (ゴールド): 初期コスト低→4ヶ月で黒字転換→24ヶ月で+280% -->
  <!-- y = 263 - roi/100*58 -->
  <!-- 0m:-20%, 2m:0%, 4m:+30%, 6m:+70%, 8m:+100%, 10m:+130%, 12m:+160%, 14m:+190%, 16m:+210%, 18m:+230%, 20m:+250%, 22m:+265%, 24m:+280% -->
  <polyline points="
    80,275
    135,263
    190,246
    245,222
    300,205
    355,188
    410,170
    465,153
    520,141
    575,130
    630,118
    685,109
    740,100
  " fill="none" stroke="#c9a84c" stroke-width="3"/>

  <!-- 採用ライン (赤): 初期コスト高→18ヶ月でやっと黒字→24ヶ月で+50% -->
  <!-- 0m:-130%, 2m:-120%, 4m:-100%, 6m:-80%, 8m:-60%, 10m:-40%, 12m:-20%, 14m:-5%, 16m:+10%, 18m:+25%, 20m:+35%, 22m:+43%, 24m:+50% -->
  <polyline points="
    80,338
    135,333
    190,321
    245,309
    300,298
    355,286
    410,275
    465,266
    520,257
    575,248
    630,242
    685,238
    740,234
  " fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- 外注 黒字転換マーカー (4ヶ月=x190) -->
  <circle cx="135" cy="263" r="6" fill="#c9a84c"/>
  <line x1="135" y1="250" x2="135" y2="220" stroke="#c9a84c" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="88" y="202" width="96" height="18" fill="rgba(201,168,76,0.15)" rx="3"/>
  <text x="136" y="215" fill="#c9a84c" font-size="10" text-anchor="middle">2ヶ月で黒字転換</text>

  <!-- 採用 黒字転換マーカー (16ヶ月=x520) -->
  <circle cx="520" cy="257" r="6" fill="#f87171"/>
  <line x1="520" y1="244" x2="520" y2="214" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="476" y="196" width="88" height="18" fill="rgba(248,113,113,0.15)" rx="3"/>
  <text x="520" y="209" fill="#f87171" font-size="10" text-anchor="middle">16ヶ月で黒字転換</text>

  <!-- 24ヶ月時点比較バッジ -->
  <rect x="500" y="55" width="230" height="70" fill="#1a1a0a" stroke="#c9a84c" stroke-width="1" rx="6"/>
  <text x="615" y="75" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">24ヶ月後のROI比較</text>
  <text x="615" y="96" fill="#c9a84c" font-size="13" font-weight="bold" text-anchor="middle">外注: +280%</text>
  <text x="615" y="115" fill="#f87171" font-size="13" font-weight="bold" text-anchor="middle">採用: +50%</text>

  <!-- 凡例 -->
  <line x1="85" y1="55" x2="115" y2="55" stroke="#c9a84c" stroke-width="3"/>
  <text x="120" y="59" fill="#c9a84c" font-size="12">外注（推奨）</text>
  <line x1="220" y1="55" x2="250" y2="55" stroke="#f87171" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="255" y="59" fill="#f87171" font-size="12">正社員採用</text>
</svg>