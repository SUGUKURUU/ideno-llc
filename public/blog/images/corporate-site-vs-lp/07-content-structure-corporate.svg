<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" font-weight="bold" text-anchor="middle">コーポレートサイトの理想ページ構成（ツリー）</text>

  <!-- Root: トップページ -->
  <rect x="300" y="55" width="200" height="44" rx="8" fill="rgba(201,168,76,0.25)" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="72" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">トップページ</text>
  <text x="400" y="89" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">会社の世界観・主力サービス概要</text>

  <!-- 縦線からトップ -->
  <line x1="400" y1="99" x2="400" y2="130" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <!-- 横線 -->
  <line x1="100" y1="130" x2="700" y2="130" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>

  <!-- 各ページへの縦線 -->
  <line x1="100" y1="130" x2="100" y2="155" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <line x1="220" y1="130" x2="220" y2="155" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <line x1="340" y1="130" x2="340" y2="155" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <line x1="460" y1="130" x2="460" y2="155" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <line x1="580" y1="130" x2="580" y2="155" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <line x1="700" y1="130" x2="700" y2="155" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>

  <!-- 会社概要 -->
  <rect x="44" y="155" width="112" height="44" rx="6" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="100" y="173" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">会社概要</text>
  <text x="100" y="190" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">代表メッセージ・沿革</text>

  <!-- サービス一覧 -->
  <rect x="164" y="155" width="112" height="44" rx="6" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="220" y="173" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">サービス一覧</text>
  <text x="220" y="190" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">各サービス詳細へリンク</text>

  <!-- 実績・事例 -->
  <rect x="284" y="155" width="112" height="44" rx="6" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="340" y="173" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">実績・事例</text>
  <text x="340" y="190" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">導入企業・成果数値</text>

  <!-- ブログ -->
  <rect x="404" y="155" width="112" height="44" rx="6" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="460" y="173" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">ブログ・コラム</text>
  <text x="460" y="190" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">SEOコンテンツ</text>

  <!-- 採用 -->
  <rect x="524" y="155" width="112" height="44" rx="6" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1.2"/>
  <text x="580" y="173" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">採用ページ</text>
  <text x="580" y="190" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">求人・会社の魅力</text>

  <!-- お問い合わせ -->
  <rect x="644" y="155" width="112" height="44" rx="6" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="700" y="173" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">お問い合わせ</text>
  <text x="700" y="190" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">フォーム・電話番号</text>

  <!-- サービス一覧の子ページ -->
  <line x1="220" y1="199" x2="220" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="160" y1="230" x2="280" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="160" y1="230" x2="160" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="220" y1="230" x2="220" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="280" y1="230" x2="280" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="110" y="248" width="100" height="36" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="160" y="266" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">サービスA詳細</text>
  <text x="160" y="279" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">料金・内容・事例</text>
  <rect x="170" y="248" width="100" height="36" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="220" y="266" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">サービスB詳細</text>
  <text x="220" y="279" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">料金・内容・事例</text>
  <rect x="230" y="248" width="100" height="36" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="280" y="266" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">サービスC詳細</text>
  <text x="280" y="279" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">料金・内容・事例</text>

  <!-- ブログ子ページ -->
  <line x1="460" y1="199" x2="460" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="400" y1="230" x2="520" y2="230" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="400" y1="230" x2="400" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="460" y1="230" x2="460" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="520" y1="230" x2="520" y2="248" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="350" y="248" width="100" height="36" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="400" y="266" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">記事カテゴリA</text>
  <rect x="410" y="248" width="100" height="36" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="460" y="266" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">記事カテゴリB</text>
  <rect x="470" y="248" width="100" height="36" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="520" y="266" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">個別記事ページ</text>

  <!-- ポイント説明 -->
  <rect x="30" y="310" width="740" height="82" rx="8" fill="rgba(201,168,76,0.06)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="400" y="332" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">コーポレートサイト設計のポイント</text>
  <text x="185" y="355" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">① トップ→サービス→事例→問い合わせの導線を設計</text>
  <text x="590" y="355" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">② 各ページから「お問い合わせ」へのCTAを常設</text>
  <text x="400" y="378" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">③ ブログで長期SEOを担い、サービスページへ内部リンクを張る</text>
</svg>
