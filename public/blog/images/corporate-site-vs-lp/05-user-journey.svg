<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" font-weight="bold" text-anchor="middle">ユーザーの行動経路の違い</text>

  <!-- LP経路ラベル -->
  <text x="400" y="68" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">▼ LP経路（1ページ完結）</text>

  <!-- LP flow: 広告クリック → LP → 即コンバージョン -->
  <rect x="30" y="82" width="130" height="44" rx="6" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="95" y="100" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="middle">広告クリック</text>
  <text x="95" y="117" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">SNS・検索広告</text>

  <polygon points="165,104 180,104 172,112" fill="#c9a84c"/>
  <line x1="160" y1="104" x2="182" y2="104" stroke="#c9a84c" stroke-width="2"/>

  <rect x="182" y="82" width="210" height="44" rx="6" fill="rgba(201,168,76,0.25)" stroke="#c9a84c" stroke-width="2"/>
  <text x="287" y="100" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="middle" font-weight="bold">LP（1ページ完結）</text>
  <text x="287" y="117" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">問題提起→解決策→実績→CTA</text>

  <polygon points="397,104 412,104 404,112" fill="#c9a84c"/>
  <line x1="392" y1="104" x2="414" y2="104" stroke="#c9a84c" stroke-width="2"/>

  <rect x="414" y="82" width="150" height="44" rx="6" fill="rgba(74,222,128,0.2)" stroke="#4ade80" stroke-width="2"/>
  <text x="489" y="100" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">即コンバージョン</text>
  <text x="489" y="117" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">申し込み・購入・問い合わせ</text>

  <text x="590" y="108" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">平均3〜10分</text>

  <!-- Divider -->
  <line x1="30" y1="148" x2="770" y2="148" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- コーポレート経路ラベル -->
  <text x="400" y="174" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">▼ コーポレートサイト経路（複数ページ遷移）</text>

  <!-- Step boxes -->
  <!-- 検索 -->
  <rect x="20" y="190" width="96" height="50" rx="6" fill="rgba(74,143,212,0.15)" stroke="#4a8fd4" stroke-width="1.5"/>
  <text x="68" y="210" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">Google検索</text>
  <text x="68" y="228" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">SEOキーワード</text>

  <polygon points="119,215 131,215 125,222" fill="#4a8fd4"/>
  <line x1="116" y1="215" x2="133" y2="215" stroke="#4a8fd4" stroke-width="1.5"/>

  <!-- トップ -->
  <rect x="133" y="190" width="96" height="50" rx="6" fill="rgba(74,143,212,0.15)" stroke="#4a8fd4" stroke-width="1.5"/>
  <text x="181" y="210" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">トップページ</text>
  <text x="181" y="228" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">第一印象・概要</text>

  <polygon points="232,215 244,215 238,222" fill="#4a8fd4"/>
  <line x1="229" y1="215" x2="246" y2="215" stroke="#4a8fd4" stroke-width="1.5"/>

  <!-- サービス -->
  <rect x="246" y="190" width="96" height="50" rx="6" fill="rgba(74,143,212,0.15)" stroke="#4a8fd4" stroke-width="1.5"/>
  <text x="294" y="210" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">サービス詳細</text>
  <text x="294" y="228" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">内容・料金確認</text>

  <polygon points="345,215 357,215 351,222" fill="#4a8fd4"/>
  <line x1="342" y1="215" x2="359" y2="215" stroke="#4a8fd4" stroke-width="1.5"/>

  <!-- 事例 -->
  <rect x="359" y="190" width="96" height="50" rx="6" fill="rgba(74,143,212,0.15)" stroke="#4a8fd4" stroke-width="1.5"/>
  <text x="407" y="210" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">実績・事例</text>
  <text x="407" y="228" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">信頼確認</text>

  <polygon points="458,215 470,215 464,222" fill="#4a8fd4"/>
  <line x1="455" y1="215" x2="472" y2="215" stroke="#4a8fd4" stroke-width="1.5"/>

  <!-- 会社概要 -->
  <rect x="472" y="190" width="96" height="50" rx="6" fill="rgba(74,143,212,0.15)" stroke="#4a8fd4" stroke-width="1.5"/>
  <text x="520" y="210" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">会社概要</text>
  <text x="520" y="228" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">代表・沿革</text>

  <polygon points="571,215 583,215 577,222" fill="#4a8fd4"/>
  <line x1="568" y1="215" x2="585" y2="215" stroke="#4a8fd4" stroke-width="1.5"/>

  <!-- 問い合わせ -->
  <rect x="585" y="190" width="110" height="50" rx="6" fill="rgba(74,222,128,0.18)" stroke="#4ade80" stroke-width="2"/>
  <text x="640" y="210" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">問い合わせ</text>
  <text x="640" y="228" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">CV達成</text>

  <text x="400" y="265" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">平均10〜30分 ／ 複数ページを回遊してから意思決定</text>

  <!-- 比較まとめ -->
  <rect x="30" y="285" width="350" height="100" rx="8" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.35)" stroke-width="1"/>
  <text x="205" y="308" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">LP の強み</text>
  <text x="205" y="328" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">・1ページで完結→離脱ポイントが少ない</text>
  <text x="205" y="348" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">・広告と組み合わせてCVRを最大化</text>
  <text x="205" y="368" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">CVR目標：広告流入で2〜5%</text>

  <rect x="420" y="285" width="350" height="100" rx="8" fill="rgba(74,143,212,0.08)" stroke="rgba(74,143,212,0.35)" stroke-width="1"/>
  <text x="595" y="308" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">コーポレートの強み</text>
  <text x="595" y="328" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">・複数ページで信頼を段階的に醸成</text>
  <text x="595" y="348" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">・SEOで長期的なオーガニック流入</text>
  <text x="595" y="368" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">BtoB商談前の「会社確認」に最適</text>
</svg>
