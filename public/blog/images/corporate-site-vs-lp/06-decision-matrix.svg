<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" font-weight="bold" text-anchor="middle">目的別「どちらを選ぶべきか」マトリクス</text>

  <!-- 軸 -->
  <line x1="400" y1="60" x2="400" y2="390" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="60" y1="225" x2="740" y2="225" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- 軸ラベル -->
  <text x="400" y="54" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="middle">長期ブランド重視</text>
  <text x="400" y="408" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="middle">短期CV重視</text>
  <text x="68" y="228" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="middle">BtoC</text>
  <text x="730" y="228" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="middle">BtoB</text>

  <!-- 第1象限：長期×BtoB → コーポレートサイト強く推奨 -->
  <rect x="408" y="68" width="324" height="149" rx="8" fill="rgba(201,168,76,0.12)" stroke="rgba(201,168,76,0.4)" stroke-width="1.5"/>
  <text x="570" y="120" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">コーポレートサイト</text>
  <text x="570" y="145" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">◎ 強く推奨</text>
  <text x="570" y="168" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">採用・信頼醸成・商談材料</text>
  <text x="570" y="185" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">SEOで長期オーガニック流入</text>

  <!-- 第2象限：長期×BtoC → コーポレート推奨 -->
  <rect x="68" y="68" width="324" height="149" rx="8" fill="rgba(201,168,76,0.07)" stroke="rgba(201,168,76,0.25)" stroke-width="1.5"/>
  <text x="230" y="120" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" font-weight="bold" text-anchor="middle">コーポレートサイト</text>
  <text x="230" y="145" fill="rgba(255,255,255,0.65)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">○ 推奨</text>
  <text x="230" y="168" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">ブランド認知・ECサイトへの誘導</text>
  <text x="230" y="185" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">SNS連携でファン育成</text>

  <!-- 第3象限：短期×BtoC → LP強く推奨 -->
  <rect x="68" y="233" width="324" height="149" rx="8" fill="rgba(74,143,212,0.12)" stroke="rgba(74,143,212,0.4)" stroke-width="1.5"/>
  <text x="230" y="285" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">LP</text>
  <text x="230" y="310" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">◎ 強く推奨</text>
  <text x="230" y="333" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">EC商品購入・期間限定キャンペーン</text>
  <text x="230" y="350" fill="rgba(255,255,255,0.55)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">広告×LP でCVR最大化</text>

  <!-- 第4象限：短期×BtoB → LP+コーポレート併用 -->
  <rect x="408" y="233" width="324" height="149" rx="8" fill="rgba(74,222,128,0.07)" stroke="rgba(74,222,128,0.25)" stroke-width="1.5"/>
  <text x="570" y="278" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">LP ＋ コーポレート併用</text>
  <text x="570" y="300" fill="rgba(255,255,255,0.65)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">△ 状況に応じて</text>
  <text x="570" y="323" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">LP：資料請求・セミナー申込</text>
  <text x="570" y="340" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">コーポレート：信頼確認用に常設</text>

  <!-- 中心点 -->
  <circle cx="400" cy="225" r="5" fill="#c9a84c"/>
</svg>
