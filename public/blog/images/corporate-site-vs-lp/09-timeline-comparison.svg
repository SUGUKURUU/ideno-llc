<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" font-weight="bold" text-anchor="middle">制作期間の比較タイムライン</text>

  <!-- X axis: 0〜6ヶ月 -->
  <!-- scale: 0〜180日、1日=3.6px、開始x=120 -->
  <!-- 0w=120, 4w=120+28=148, 8w=120+57=177, 12w=120+85=205, 16w=120+113=233, 24w=120+170=290 -->
  <!-- 実際: 1week=3.6*7=25.2px、1month=3.6*30=108px -->
  <!-- 軸: 0〜180日 → 120〜120+180*3.6=768 wide 645 -->
  <!-- 簡易: 120〜750 = 630px for 6ヶ月 → 1month=105px -->

  <line x1="120" y1="380" x2="760" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- month markers -->
  <line x1="120" y1="375" x2="120" y2="385" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="227" y1="375" x2="227" y2="385" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="334" y1="375" x2="334" y2="385" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="441" y1="375" x2="441" y2="385" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="548" y1="375" x2="548" y2="385" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="654" y1="375" x2="654" y2="385" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="760" y1="375" x2="760" y2="385" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="120" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">着手</text>
  <text x="227" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">1ヶ月</text>
  <text x="334" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">2ヶ月</text>
  <text x="441" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">3ヶ月</text>
  <text x="548" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">4ヶ月</text>
  <text x="654" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">5ヶ月</text>
  <text x="760" y="400" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">6ヶ月</text>

  <!-- Row 1: LP（シンプル） 2〜4週間 = 0.5〜1ヶ月 -->
  <text x="110" y="93" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">LP（シンプル）</text>
  <rect x="120" y="75" width="107" height="30" rx="5" fill="#c9a84c" opacity="0.85"/>
  <text x="173" y="95" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">2〜4週間</text>
  <circle cx="227" cy="90" r="5" fill="#c9a84c"/>
  <text x="236" y="94" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">公開</text>

  <!-- Row 2: LP（本格） 1〜2ヶ月 -->
  <text x="110" y="153" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">LP（本格）</text>
  <rect x="120" y="135" width="214" height="30" rx="5" fill="#c9a84c" opacity="0.7"/>
  <text x="227" y="155" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">1〜2ヶ月</text>
  <circle cx="334" cy="150" r="5" fill="#c9a84c" opacity="0.7"/>
  <text x="343" y="154" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">公開</text>

  <!-- Row 3: コーポレート（小） 1〜2ヶ月 -->
  <text x="110" y="213" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">コーポレート（小）</text>
  <rect x="120" y="195" width="214" height="30" rx="5" fill="#4a8fd4" opacity="0.85"/>
  <text x="227" y="215" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">1〜2ヶ月</text>
  <circle cx="334" cy="210" r="5" fill="#4a8fd4"/>
  <text x="343" y="214" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">公開</text>

  <!-- Row 4: コーポレート（中〜大） 3〜6ヶ月 -->
  <text x="110" y="273" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">コーポレート（中）</text>
  <rect x="120" y="255" width="534" height="30" rx="5" fill="#4a8fd4" opacity="0.65"/>
  <text x="387" y="275" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3〜6ヶ月</text>
  <circle cx="654" cy="270" r="5" fill="#4a8fd4" opacity="0.8"/>
  <text x="663" y="274" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">公開</text>

  <!-- Row 5: コーポレート（大） 6ヶ月〜 -->
  <text x="110" y="333" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">コーポレート（大）</text>
  <rect x="120" y="315" width="640" height="30" rx="5" fill="#4a8fd4" opacity="0.45"/>
  <text x="440" y="335" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">6ヶ月〜（上限なし）</text>
  <text x="768" y="335" fill="rgba(74,143,212,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12">→</text>

  <!-- legend -->
  <rect x="250" y="358" width="14" height="12" fill="#c9a84c" opacity="0.85"/>
  <text x="270" y="369" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">LP系</text>
  <rect x="340" y="358" width="14" height="12" fill="#4a8fd4" opacity="0.85"/>
  <text x="360" y="369" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">コーポレートサイト系</text>
</svg>
