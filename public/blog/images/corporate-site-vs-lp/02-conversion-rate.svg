<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="80" y1="340" x2="750" y2="340" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="80" y1="270" x2="750" y2="270" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="200" x2="750" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="130" x2="750" y2="130" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="80" y1="60" x2="750" y2="60" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Y axis labels -->
  <text x="70" y="344" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">0%</text>
  <text x="70" y="274" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">5%</text>
  <text x="70" y="204" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">10%</text>
  <text x="70" y="134" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">15%</text>
  <text x="70" y="64" text-anchor="end" fill="rgba(255,255,255,0.5)" font-size="11">20%</text>
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#c9a84c" font-size="17" font-weight="bold">目的別CVR比較：LP vs コーポレートサイト</text>
  <!-- Bars - 4 categories -->
  <!-- Category 1: 広告流入 -->
  <text x="175" y="360" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">広告流入</text>
  <rect x="120" y="116" width="50" height="224" fill="#c9a84c" opacity="0.9" rx="3"/>
  <text x="145" y="110" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">18%</text>
  <rect x="180" y="270" width="50" height="70" fill="#4ade80" opacity="0.7" rx="3"/>
  <text x="205" y="264" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">5%</text>
  <!-- Category 2: SEO流入 -->
  <text x="350" y="360" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">SEO流入</text>
  <rect x="295" y="214" width="50" height="126" fill="#c9a84c" opacity="0.9" rx="3"/>
  <text x="320" y="208" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">9%</text>
  <rect x="355" y="228" width="50" height="112" fill="#4ade80" opacity="0.7" rx="3"/>
  <text x="380" y="222" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">8%</text>
  <!-- Category 3: SNS流入 -->
  <text x="525" y="360" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">SNS流入</text>
  <rect x="470" y="242" width="50" height="98" fill="#c9a84c" opacity="0.9" rx="3"/>
  <text x="495" y="236" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">7%</text>
  <rect x="530" y="270" width="50" height="70" fill="#4ade80" opacity="0.7" rx="3"/>
  <text x="555" y="264" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">5%</text>
  <!-- Category 4: 指名検索 -->
  <text x="700" y="360" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">指名検索</text>
  <rect x="645" y="242" width="50" height="98" fill="#c9a84c" opacity="0.9" rx="3"/>
  <text x="670" y="236" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">7%</text>
  <rect x="705" y="200" width="50" height="140" fill="#4ade80" opacity="0.7" rx="3"/>
  <text x="730" y="194" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">10%</text>
  <!-- Legend -->
  <rect x="250" y="385" width="14" height="14" fill="#c9a84c" rx="2"/>
  <text x="270" y="397" fill="rgba(255,255,255,0.7)" font-size="12">LP（ランディングページ）</text>
  <rect x="460" y="385" width="14" height="14" fill="#4ade80" opacity="0.7" rx="2"/>
  <text x="480" y="397" fill="rgba(255,255,255,0.7)" font-size="12">コーポレートサイト</text>
</svg>