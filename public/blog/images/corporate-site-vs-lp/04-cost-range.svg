<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" font-weight="bold" text-anchor="middle">制作コスト比較（横棒グラフ・万円）</text>
  <!-- X axis -->
  <line x1="200" y1="60" x2="200" y2="370" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="200" y1="370" x2="760" y2="370" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- X grid / labels: 0,100,200,300,400,500 -->
  <line x1="200" y1="60" x2="200" y2="370" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="312" y1="60" x2="312" y2="370" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="424" y1="60" x2="424" y2="370" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="536" y1="60" x2="536" y2="370" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="648" y1="60" x2="648" y2="370" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="760" y1="60" x2="760" y2="370" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="200" y="385" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">0</text>
  <text x="312" y="385" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">100万</text>
  <text x="424" y="385" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">200万</text>
  <text x="536" y="385" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">300万</text>
  <text x="648" y="385" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">400万</text>
  <text x="760" y="385" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">500万+</text>

  <!-- Row 1: シンプルLP 30〜80万 -->
  <text x="190" y="98" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">シンプルLP</text>
  <rect x="200" y="80" width="33" height="26" fill="#c9a84c" opacity="0.3" rx="3"/>
  <rect x="233" y="80" width="56" height="26" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="295" y="97" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">30〜80万円</text>

  <!-- Row 2: 本格LP 80〜200万 -->
  <text x="190" y="148" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">本格LP</text>
  <rect x="200" y="130" width="89" height="26" fill="#c9a84c" opacity="0.3" rx="3"/>
  <rect x="289" y="130" width="134" height="26" fill="#c9a84c" opacity="0.85" rx="3"/>
  <text x="430" y="147" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">80〜200万円</text>

  <!-- Row 3: コーポレート（小） 50〜150万 -->
  <text x="190" y="198" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">コーポレート（小）</text>
  <rect x="200" y="180" width="56" height="26" fill="#4a8fd4" opacity="0.3" rx="3"/>
  <rect x="256" y="180" width="112" height="26" fill="#4a8fd4" opacity="0.85" rx="3"/>
  <text x="375" y="197" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">50〜150万円</text>

  <!-- Row 4: コーポレート（中） 150〜500万 -->
  <text x="190" y="248" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">コーポレート（中）</text>
  <rect x="200" y="230" width="168" height="26" fill="#4a8fd4" opacity="0.3" rx="3"/>
  <rect x="368" y="230" width="392" height="26" fill="#4a8fd4" opacity="0.85" rx="3"/>
  <text x="568" y="247" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">150〜500万円</text>

  <!-- Row 5: コーポレート（大） 500万〜 -->
  <text x="190" y="298" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">コーポレート（大）</text>
  <rect x="200" y="280" width="560" height="26" fill="#4a8fd4" opacity="0.9" rx="3"/>
  <text x="530" y="297" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">500万円〜（上限なし）</text>

  <!-- Legend -->
  <rect x="200" y="330" width="14" height="12" fill="#c9a84c" opacity="0.85"/>
  <text x="220" y="341" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">LP系</text>
  <rect x="280" y="330" width="14" height="12" fill="#4a8fd4" opacity="0.85"/>
  <text x="300" y="341" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">コーポレートサイト系</text>
  <text x="400" y="410" fill="rgba(255,255,255,0.35)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">※ 薄い部分=最安値帯、濃い部分=一般的な相場帯</text>
</svg>
