<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="500" fill="#111111"/>
  <line x1="0" y1="125" x2="800" y2="125" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="375" x2="800" y2="375" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="32" text-anchor="middle" fill="#c9a84c" font-size="17" font-weight="bold">ユーザー訪問〜CV経路の違い</text>
  <!-- LP Journey -->
  <text x="200" y="65" text-anchor="middle" fill="#c9a84c" font-size="14" font-weight="bold">LP（ランディングページ）の経路</text>
  <rect x="50" y="80" width="120" height="44" rx="8" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="110" y="98" text-anchor="middle" fill="#ffffff" font-size="11">広告クリック</text>
  <text x="110" y="115" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">SNS/検索広告</text>
  <line x1="170" y1="102" x2="195" y2="102" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowGold)"/>
  <rect x="195" y="80" width="120" height="44" rx="8" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="255" y="98" text-anchor="middle" fill="#ffffff" font-size="11">LPに着地</text>
  <text x="255" y="115" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">1ページで全情報</text>
  <line x1="315" y1="102" x2="340" y2="102" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="337,97 347,102 337,107" fill="#c9a84c"/>
  <rect x="340" y="80" width="120" height="44" rx="8" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle" fill="#ffffff" font-size="11">スクロール読了</text>
  <text x="400" y="115" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">CVRが高い構成</text>
  <line x1="460" y1="102" x2="485" y2="102" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="482,97 492,102 482,107" fill="#c9a84c"/>
  <rect x="485" y="80" width="120" height="44" rx="8" fill="rgba(74,222,128,0.2)" stroke="#4ade80" stroke-width="2"/>
  <text x="545" y="98" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">CV達成</text>
  <text x="545" y="115" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">問い合わせ・購入</text>
  <text x="350" y="148" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">平均所要時間：3〜10分 ／ 離脱ポイントは少ない</text>
  <!-- Corporate Journey -->
  <text x="400" y="185" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">コーポレートサイトの経路</text>
  <rect x="20" y="200" width="100" height="44" rx="8" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="70" y="218" text-anchor="middle" fill="#ffffff" font-size="10">検索流入</text>
  <text x="70" y="234" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">SEOキーワード</text>
  <line x1="120" y1="222" x2="138" y2="222" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="135,217 145,222 135,227" fill="#4ade80"/>
  <rect x="138" y="200" width="100" height="44" rx="8" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="188" y="218" text-anchor="middle" fill="#ffffff" font-size="10">トップページ</text>
  <text x="188" y="234" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">会社の第一印象</text>
  <line x1="238" y1="222" x2="256" y2="222" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="253,217 263,222 253,227" fill="#4ade80"/>
  <rect x="256" y="200" width="100" height="44" rx="8" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="306" y="218" text-anchor="middle" fill="#ffffff" font-size="10">サービスページ</text>
  <text x="306" y="234" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">詳細確認</text>
  <line x1="356" y1="222" x2="374" y2="222" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="371,217 381,222 371,227" fill="#4ade80"/>
  <rect x="374" y="200" width="100" height="44" rx="8" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="424" y="218" text-anchor="middle" fill="#ffffff" font-size="10">会社概要</text>
  <text x="424" y="234" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">信頼性の確認</text>
  <line x1="474" y1="222" x2="492" y2="222" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="489,217 499,222 489,227" fill="#4ade80"/>
  <rect x="492" y="200" width="100" height="44" rx="8" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="542" y="218" text-anchor="middle" fill="#ffffff" font-size="10">実績・事例</text>
  <text x="542" y="234" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">導入前の判断材料</text>
  <line x1="592" y1="222" x2="610" y2="222" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="607,217 617,222 607,227" fill="#4ade80"/>
  <rect x="610" y="200" width="110" height="44" rx="8" fill="rgba(74,222,128,0.2)" stroke="#4ade80" stroke-width="2"/>
  <text x="665" y="218" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">CV達成</text>
  <text x="665" y="234" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">問い合わせ</text>
  <text x="400" y="265" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">平均所要時間：10〜30分 ／ 複数ページを回遊してから問い合わせ</text>
  <!-- Key insight -->
  <rect x="40" y="295" width="340" height="80" rx="8" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="210" y="318" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">LPの特徴</text>
  <text x="210" y="338" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">・1ページで完結するため離脱が少ない</text>
  <text x="210" y="356" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">・広告との相性が良く即時CVに特化</text>
  <text x="210" y="374" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">CVR目標：広告流入で15〜25%</text>
  <rect x="420" y="295" width="340" height="80" rx="8" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
  <text x="590" y="318" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">コーポレートサイトの特徴</text>
  <text x="590" y="338" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">・複数ページを回遊して信頼を醸成</text>
  <text x="590" y="356" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11">・SEOで長期的に検索流入を獲得</text>
  <text x="590" y="374" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">CVR目標：SEO流入で3〜8%</text>
  <!-- Note -->
  <text x="400" y="460" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10">※CVR数値は業種・サービス内容により異なります。上記は参考値です。</text>
</svg>