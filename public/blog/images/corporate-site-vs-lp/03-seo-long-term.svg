<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="17" font-weight="bold" text-anchor="middle">長期SEO効果の比較（オーガニック流入数）</text>
  <!-- Axes -->
  <line x1="80" y1="55" x2="80" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="80" y1="340" x2="760" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Grid -->
  <line x1="80" y1="340" x2="760" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="80" y1="270" x2="760" y2="270" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="80" y1="200" x2="760" y2="200" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="80" y1="130" x2="760" y2="130" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="80" y1="60" x2="760" y2="60" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Y labels -->
  <text x="70" y="344" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">0</text>
  <text x="70" y="274" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">低</text>
  <text x="70" y="204" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">中</text>
  <text x="70" y="134" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">高</text>
  <text x="70" y="64" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">最高</text>
  <!-- X axis labels: 0〜24ヶ月 -->
  <text x="80" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">0</text>
  <text x="220" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">6ヶ月</text>
  <text x="360" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">12ヶ月</text>
  <text x="500" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">18ヶ月</text>
  <text x="640" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">24ヶ月</text>

  <!-- コーポレートサイト: 緩やかだが長期で大きく伸びる -->
  <!-- points: 0→340, 6m→320, 12m→260, 18m→170, 24m→80 -->
  <polyline points="80,338 220,318 360,255 500,165 640,78" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- 点 -->
  <circle cx="80" cy="338" r="4" fill="#c9a84c"/>
  <circle cx="220" cy="318" r="4" fill="#c9a84c"/>
  <circle cx="360" cy="255" r="4" fill="#c9a84c"/>
  <circle cx="500" cy="165" r="4" fill="#c9a84c"/>
  <circle cx="640" cy="78" r="4" fill="#c9a84c"/>

  <!-- LP（広告なし）: ほぼ横ばい -->
  <polyline points="80,336 220,332 360,328 500,325 640,322" fill="none" stroke="#ff7043" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="80" cy="336" r="4" fill="#ff7043"/>
  <circle cx="640" cy="322" r="4" fill="#ff7043"/>

  <!-- SNS広告+LP: 費用次第で波がある -->
  <polyline points="80,336 130,200 180,250 230,180 280,230 330,160 380,200 430,140 480,180 530,120 580,160 640,100" fill="none" stroke="#4a8fd4" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="80" cy="336" r="4" fill="#4a8fd4"/>
  <circle cx="640" cy="100" r="4" fill="#4a8fd4"/>

  <!-- Labels at right -->
  <text x="648" y="74" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">コーポレートサイト</text>
  <text x="648" y="318" fill="#ff7043" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">LP（SEOのみ）</text>
  <text x="648" y="96" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">SNS広告+LP</text>

  <!-- Legend -->
  <line x1="100" y1="390" x2="128" y2="390" stroke="#c9a84c" stroke-width="2.5"/>
  <text x="134" y="394" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">コーポレートサイト（SEO）</text>
  <line x1="330" y1="390" x2="358" y2="390" stroke="#ff7043" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="364" y="394" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">LP単体</text>
  <line x1="450" y1="390" x2="478" y2="390" stroke="#4a8fd4" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="484" y="394" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">SNS広告+LP（費用次第）</text>
</svg>
