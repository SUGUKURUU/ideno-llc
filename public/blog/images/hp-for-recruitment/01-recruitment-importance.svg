<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">採用において企業サイトが重要な理由</text>

  <!-- Timeline steps -->
  <g id="step1">
    <circle cx="80" cy="200" r="35" fill="#c9a84c" opacity="0.3"/>
    <circle cx="80" cy="200" r="30" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="80" y="210" text-anchor="middle" fill="#c9a84c" font-size="24" font-weight="bold">1</text>
    <text x="80" y="260" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">求人サイトで</text>
    <text x="80" y="275" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">企業を発見</text>
  </g>

  <g id="arrow1">
    <path d="M 120 200 L 160 200" stroke="#c9a84c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step2">
    <circle cx="220" cy="200" r="35" fill="#c9a84c" opacity="0.3"/>
    <circle cx="220" cy="200" r="30" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="220" y="210" text-anchor="middle" fill="#c9a84c" font-size="24" font-weight="bold">2</text>
    <text x="220" y="260" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">企業の公式</text>
    <text x="220" y="275" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">サイトを確認</text>
  </g>

  <g id="arrow2">
    <path d="M 260 200 L 300 200" stroke="#c9a84c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  </g>

  <g id="step3">
    <circle cx="360" cy="200" r="35" fill="#c9a84c" opacity="0.3"/>
    <circle cx="360" cy="200" r="30" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="360" y="210" text-anchor="middle" fill="#c9a84c" font-size="24" font-weight="bold">3</text>
    <text x="360" y="260" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">応募するか</text>
    <text x="360" y="275" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">判断</text>
  </g>

  <!-- Key insight box -->
  <rect x="420" y="130" width="330" height="140" rx="8" fill="#c9a84c" opacity="0.15" stroke="#c9a84c" stroke-width="1"/>
  <text x="585" y="155" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">採用の最終判断は</text>
  <text x="585" y="175" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">企業サイトで決まる</text>
  <text x="585" y="200" text-anchor="middle" fill="#aaaaaa" font-size="10">良い求人票も</text>
  <text x="585" y="217" text-anchor="middle" fill="#aaaaaa" font-size="10">企業サイトが「伝わらない」作りなら</text>
  <text x="585" y="234" text-anchor="middle" fill="#aaaaaa" font-size="10">候補者は応募しない</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>