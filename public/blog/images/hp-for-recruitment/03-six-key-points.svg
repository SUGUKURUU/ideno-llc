<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">採用につながる企業サイト 6つのポイント</text>

  <!-- Point 1 -->
  <rect x="30" y="70" width="100" height="130" rx="6" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="80" y="85" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">①</text>
  <text x="80" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">代表</text>
  <text x="80" y="120" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">メッセージ</text>
  <text x="80" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">人間らしい言葉</text>
  <text x="80" y="163" text-anchor="middle" fill="#aaaaaa" font-size="9">リアルな話</text>

  <!-- Point 2 -->
  <rect x="140" y="70" width="100" height="130" rx="6" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="190" y="85" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">②</text>
  <text x="190" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">社員</text>
  <text x="190" y="120" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">インタビュー</text>
  <text x="190" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">リアルな言葉</text>
  <text x="190" y="163" text-anchor="middle" fill="#aaaaaa" font-size="9">多様な属性</text>

  <!-- Point 3 -->
  <rect x="250" y="70" width="100" height="130" rx="6" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="300" y="85" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">③</text>
  <text x="300" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">仕事内容・</text>
  <text x="300" y="120" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">キャリアパス</text>
  <text x="300" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">成長事例</text>
  <text x="300" y="163" text-anchor="middle" fill="#aaaaaa" font-size="9">具体的ステップ</text>

  <!-- Point 4 -->
  <rect x="360" y="70" width="100" height="130" rx="6" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="410" y="85" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">④</text>
  <text x="410" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">職場</text>
  <text x="410" y="120" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">環境</text>
  <text x="410" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">文化・雰囲気</text>
  <text x="410" y="163" text-anchor="middle" fill="#aaaaaa" font-size="9">写真・動画</text>

  <!-- Point 5 -->
  <rect x="470" y="70" width="100" height="130" rx="6" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="520" y="85" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">⑤</text>
  <text x="520" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">給与・</text>
  <text x="520" y="120" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">福利厚生</text>
  <text x="520" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">透明性</text>
  <text x="520" y="163" text-anchor="middle" fill="#aaaaaa" font-size="9">具体的な数字</text>

  <!-- Point 6 -->
  <rect x="580" y="70" width="100" height="130" rx="6" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="630" y="85" text-anchor="middle" fill="#c9a84c" font-size="22" font-weight="bold">⑥</text>
  <text x="630" y="105" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">採用</text>
  <text x="630" y="120" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">フロー</text>
  <text x="630" y="150" text-anchor="middle" fill="#aaaaaa" font-size="9">面接日程</text>
  <text x="630" y="163" text-anchor="middle" fill="#aaaaaa" font-size="9">選考期間</text>

  <!-- Additional info -->
  <rect x="690" y="70" width="80" height="130" rx="6" fill="#50c878" opacity="0.15" stroke="#50c878" stroke-width="1.5"/>
  <text x="730" y="110" text-anchor="middle" fill="#50c878" font-size="12" font-weight="bold">全てが</text>
  <text x="730" y="130" text-anchor="middle" fill="#50c878" font-size="12" font-weight="bold">「具体的」に</text>
  <text x="730" y="155" text-anchor="middle" fill="#aaaaaa" font-size="9">これが採用の</text>
  <text x="730" y="168" text-anchor="middle" fill="#aaaaaa" font-size="9">決定打になる</text>

  <!-- Bottom message -->
  <rect x="20" y="230" width="760" height="150" rx="6" fill="#c9a84c" opacity="0.08"/>
  <text x="400" y="260" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">企業側が伝えたいこと vs 候補者が知りたいこと</text>

  <text x="100" y="295" fill="#ffffff" font-size="11" font-weight="bold">❌ 企業側が発信しがちな言葉</text>
  <text x="100" y="313" fill="#aaaaaa" font-size="10">「社員一人ひとりを大切に」</text>
  <text x="100" y="328" fill="#aaaaaa" font-size="10">「チャレンジできる環境」</text>
  <text x="100" y="343" fill="#aaaaaa" font-size="10">「アットホームな職場」</text>

  <text x="500" y="295" fill="#ffffff" font-size="11" font-weight="bold">✅ 候補者が本当に知りたいこと</text>
  <text x="500" y="313" fill="#c9a84c" font-size="10">具体的な仕事内容・働く人の実態</text>
  <text x="500" y="328" fill="#c9a84c" font-size="10">キャリアパス・給与の透明性</text>
  <text x="500" y="343" fill="#c9a84c" font-size="10">会社の文化を具体的に示すデータ</text>
</svg>