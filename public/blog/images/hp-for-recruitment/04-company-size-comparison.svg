<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">大手企業 vs 中小企業 採用競争における優劣</text>

  <!-- Large company -->
  <rect x="60" y="80" width="280" height="300" rx="8" fill="#4a9eff" opacity="0.1" stroke="#4a9eff" stroke-width="2"/>
  <text x="200" y="110" text-anchor="middle" fill="#4a9eff" font-size="14" font-weight="bold">大手企業</text>

  <!-- Advantages (green) -->
  <text x="80" y="145" fill="#50c878" font-size="11" font-weight="bold">✓ 優位性</text>
  <text x="80" y="165" fill="#c9a84c" font-size="10">・知名度が高い</text>
  <text x="80" y="183" fill="#c9a84c" font-size="10">・給与水準が高い</text>
  <text x="80" y="201" fill="#c9a84c" font-size="10">・福利厚生が充実</text>
  <text x="80" y="219" fill="#c9a84c" font-size="10">・研修体制が整っている</text>

  <!-- Disadvantages (red) -->
  <text x="80" y="255" fill="#ff6b6b" font-size="11" font-weight="bold">✗ 不利な点</text>
  <text x="80" y="275" fill="#aaaaaa" font-size="10">・個人の意見が反映されない</text>
  <text x="80" y="293" fill="#aaaaaa" font-size="10">・意思決定が遅い</text>
  <text x="80" y="311" fill="#aaaaaa" font-size="10">・経営層との距離が遠い</text>
  <text x="80" y="329" fill="#aaaaaa" font-size="10">・サイトが「つまらない」ことも</text>

  <!-- Small/mid company -->
  <rect x="460" y="80" width="280" height="300" rx="8" fill="#50c878" opacity="0.1" stroke="#50c878" stroke-width="2"/>
  <text x="600" y="110" text-anchor="middle" fill="#50c878" font-size="14" font-weight="bold">中小企業</text>

  <!-- Disadvantages (red) -->
  <text x="480" y="145" fill="#ff6b6b" font-size="11" font-weight="bold">✗ 不利な点</text>
  <text x="480" y="165" fill="#aaaaaa" font-size="10">・知名度が低い</text>
  <text x="480" y="183" fill="#aaaaaa" font-size="10">・給与水準が低い傾向</text>
  <text x="480" y="201" fill="#aaaaaa" font-size="10">・福利厚生が限定的</text>
  <text x="480" y="219" fill="#aaaaaa" font-size="10">・研修体制が不十分なことも</text>

  <!-- Advantages (green) -->
  <text x="480" y="255" fill="#50c878" font-size="11" font-weight="bold">✓ 武器</text>
  <text x="480" y="275" fill="#c9a84c" font-size="10">・具体性・透明性・人間らしさ</text>
  <text x="480" y="293" fill="#c9a84c" font-size="10">・経営層の顔が見える</text>
  <text x="480" y="311" fill="#c9a84c" font-size="10">・個人の意見が反映される</text>
  <text x="480" y="329" fill="#c9a84c" font-size="10">・意思決定が速い</text>

  <!-- Key insight -->
  <rect x="30" y="360" width="740" height="45" rx="4" fill="#c9a84c" opacity="0.15" border="1" stroke="#c9a84c"/>
  <text x="400" y="378" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">中小企業が採用で成功するポイント</text>
  <text x="400" y="395" text-anchor="middle" fill="#ffffff" font-size="10">企業サイトで「働く実態」を丁寧に伝えることで、大手にはない「具体性・透明性・人間らしさ」を武器に出来る</text>
</svg>