<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">採用フロー・選考期間を明記するメリット</text>

  <!-- Timeline -->
  <!-- Step 1 -->
  <g>
    <rect x="30" y="80" width="110" height="100" rx="6" fill="#4a9eff" opacity="0.15" stroke="#4a9eff" stroke-width="2"/>
    <text x="85" y="105" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">① 応募</text>
    <text x="85" y="125" text-anchor="middle" fill="#ffffff" font-size="9">面接日程を</text>
    <text x="85" y="140" text-anchor="middle" fill="#ffffff" font-size="9">3日以内に</text>
    <text x="85" y="155" text-anchor="middle" fill="#ffffff" font-size="9">連絡</text>
  </g>

  <path d="M 145 130 L 165 130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <g>
    <rect x="170" y="80" width="110" height="100" rx="6" fill="#50c878" opacity="0.15" stroke="#50c878" stroke-width="2"/>
    <text x="225" y="105" text-anchor="middle" fill="#50c878" font-size="11" font-weight="bold">② 1次面接</text>
    <text x="225" y="125" text-anchor="middle" fill="#ffffff" font-size="9">60分</text>
    <text x="225" y="140" text-anchor="middle" fill="#ffffff" font-size="9">面接官：採用担当</text>
    <text x="225" y="155" text-anchor="middle" fill="#aaaaaa" font-size="8">フィーリング重視</text>
  </g>

  <path d="M 285 130 L 305 130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <g>
    <rect x="310" y="80" width="110" height="100" rx="6" fill="#e91e63" opacity="0.15" stroke="#e91e63" stroke-width="2"/>
    <text x="365" y="105" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold">③ 2次面接</text>
    <text x="365" y="125" text-anchor="middle" fill="#ffffff" font-size="9">90分</text>
    <text x="365" y="140" text-anchor="middle" fill="#ffffff" font-size="9">面接官：管理職</text>
    <text x="365" y="155" text-anchor="middle" fill="#aaaaaa" font-size="8">業務適性確認</text>
  </g>

  <path d="M 425 130 L 445 130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <g>
    <rect x="450" y="80" width="110" height="100" rx="6" fill="#ff9800" opacity="0.15" stroke="#ff9800" stroke-width="2"/>
    <text x="505" y="105" text-anchor="middle" fill="#ff9800" font-size="11" font-weight="bold">④ 最終面接</text>
    <text x="505" y="125" text-anchor="middle" fill="#ffffff" font-size="9">45分</text>
    <text x="505" y="140" text-anchor="middle" fill="#ffffff" font-size="9">面接官：代表</text>
    <text x="505" y="155" text-anchor="middle" fill="#aaaaaa" font-size="8">経営方針の共有</text>
  </g>

  <path d="M 565 130 L 585 130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5 -->
  <g>
    <rect x="590" y="80" width="110" height="100" rx="6" fill="#9c27b0" opacity="0.15" stroke="#9c27b0" stroke-width="2"/>
    <text x="645" y="105" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="bold">⑤ 内定</text>
    <text x="645" y="125" text-anchor="middle" fill="#ffffff" font-size="9">合否連絡</text>
    <text x="645" y="140" text-anchor="middle" fill="#ffffff" font-size="9">3営業日以内</text>
    <text x="645" y="155" text-anchor="middle" fill="#aaaaaa" font-size="8">条件提示</text>
  </g>

  <!-- Timeline info -->
  <rect x="30" y="200" width="670" height="70" rx="6" fill="#c9a84c" opacity="0.08"/>
  <text x="50" y="220" fill="#c9a84c" font-size="11" font-weight="bold">⏱️ 選考期間の目安</text>
  <text x="50" y="240" fill="#ffffff" font-size="10">1次面接～最終面接：2-3週間</text>
  <text x="50" y="258" fill="#ffffff" font-size="10">応募から内定まで：1-2ヶ月程度が目安。「いつまでに判断する」を明記すると候補者の離脱を防げる</text>

  <!-- Benefits section -->
  <text x="30" y="295" fill="#50c878" font-size="12" font-weight="bold">✓ 採用フロー・期間を明記するメリット</text>

  <g>
    <circle cx="40" cy="325" r="4" fill="#c9a84c"/>
    <text x="60" y="330" fill="#ffffff" font-size="10">候補者の不安が軽減される</text>
  </g>

  <g>
    <circle cx="40" cy="350" r="4" fill="#c9a84c"/>
    <text x="60" y="355" fill="#ffffff" font-size="10">「隠蔽している」という疑いがなくなる</text>
  </g>

  <g>
    <circle cx="40" cy="375" r="4" fill="#c9a84c"/>
    <text x="60" y="380" fill="#ffffff" font-size="10">プロセスの透明性が他社との差別化につながる</text>
  </g>

  <g>
    <circle cx="40" cy="400" r="4" fill="#c9a84c"/>
    <text x="60" y="405" fill="#ffffff" font-size="10">優秀な候補者から「信頼できる企業」と評価される</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>