<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">プラットフォーム別：最適な投稿頻度</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">頻度と品質のバランスが重要</text>

  <!-- テーブル -->
  <rect x="50" y="85" width="700" height="280" fill="none" stroke="#c9a84c" stroke-width="2" rx="3"/>

  <!-- ヘッダー -->
  <rect x="50" y="85" width="700" height="35" fill="#c9a84c" opacity="0.2"/>
  <text x="130" y="110" class="text-white" text-anchor="middle" font-size="12" font-weight="bold">プラットフォーム</text>
  <text x="280" y="110" class="text-white" text-anchor="middle" font-size="12" font-weight="bold">最低頻度</text>
  <text x="420" y="110" class="text-white" text-anchor="middle" font-size="12" font-weight="bold">理想頻度</text>
  <text x="580" y="110" class="text-white" text-anchor="middle" font-size="12" font-weight="bold">コメント</text>

  <!-- 行分け線 -->
  <line x1="50" y1="120" x2="750" y2="120" stroke="#c9a84c" stroke-width="1"/>
  <line x1="210" y1="85" x2="210" y2="365" stroke="#c9a84c" stroke-width="1"/>
  <line x1="350" y1="85" x2="350" y2="365" stroke="#c9a84c" stroke-width="1"/>
  <line x1="490" y1="85" x2="490" y2="365" stroke="#c9a84c" stroke-width="1"/>

  <!-- Instagram リール -->
  <text x="130" y="155" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">Instagram</text>
  <text x="130" y="170" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">（リール）</text>
  <text x="280" y="162" class="text-gold" text-anchor="middle" font-size="10">週1本</text>
  <text x="420" y="162" class="text-gold" text-anchor="middle" font-size="10">週2〜3本</text>
  <text x="580" y="155" class="text-gray" text-anchor="middle" font-size="9">動画は</text>
  <text x="580" y="168" class="text-gray" text-anchor="middle" font-size="9">優先度高</text>

  <!-- Instagram フィード -->
  <text x="130" y="210" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">Instagram</text>
  <text x="130" y="225" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">（フィード）</text>
  <text x="280" y="217" class="text-gold" text-anchor="middle" font-size="10">週2〜3本</text>
  <text x="420" y="217" class="text-gold" text-anchor="middle" font-size="10">週4〜5本</text>
  <text x="580" y="210" class="text-gray" text-anchor="middle" font-size="9">統一感が</text>
  <text x="580" y="223" class="text-gray" text-anchor="middle" font-size="9">重要</text>

  <!-- TikTok -->
  <text x="130" y="265" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">TikTok</text>
  <text x="280" y="265" class="text-gold" text-anchor="middle" font-size="10">週3〜4本</text>
  <text x="420" y="265" class="text-gold" text-anchor="middle" font-size="10">毎日1〜2本</text>
  <text x="580" y="258" class="text-gray" text-anchor="middle" font-size="9">高頻度</text>
  <text x="580" y="271" class="text-gray" text-anchor="middle" font-size="9">推奨</text>

  <!-- YouTube Shorts -->
  <text x="130" y="320" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">YouTube</text>
  <text x="130" y="335" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">Shorts</text>
  <text x="280" y="327" class="text-gold" text-anchor="middle" font-size="10">週1〜2本</text>
  <text x="420" y="327" class="text-gold" text-anchor="middle" font-size="10">週3本</text>
  <text x="580" y="320" class="text-gray" text-anchor="middle" font-size="9">SEO</text>
  <text x="580" y="333" class="text-gray" text-anchor="middle" font-size="9">メリット</text>

  <!-- 下部ポイント -->
  <rect x="60" y="385" width="680" height="20" fill="#c9a84c" opacity="0.15" rx="3"/>
  <text x="400" y="400" class="gold" text-anchor="middle" font-size="11" font-weight="bold">★ コンテンツバンク：月1回まとめて撮影・制作して「在庫」を作っておく</text>
</svg>
