<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">改善で失敗するケース：よくある間違い</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">何度改善を試しても伸びない理由</text>

  <!-- 失敗1 -->
  <g>
    <rect x="50" y="80" width="320" height="100" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="210" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">失敗1：一度変えてすぐ諦める</text>
    <text x="210" y="120" class="text-white" text-anchor="middle" font-size="9">「1週間やったが変化なし」</text>
    <text x="210" y="135" class="text-white" text-anchor="middle" font-size="9">→ 元に戻す</text>
    <text x="210" y="160" class="gold" text-anchor="middle" font-size="10" font-weight="bold">✓ 対策：最低1ヶ月（10本以上）試す</text>
  </g>

  <!-- 失敗2 -->
  <g>
    <rect x="430" y="80" width="320" height="100" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="590" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">失敗2：複数変数を同時に変える</text>
    <text x="590" y="120" class="text-white" text-anchor="middle" font-size="9">テーマ・形式・頻度・ハッシュタグ</text>
    <text x="590" y="135" class="text-white" text-anchor="middle" font-size="9">同時に変更</text>
    <text x="590" y="160" class="gold" text-anchor="middle" font-size="10" font-weight="bold">✓ 対策：1つずつ改善する</text>
  </g>

  <!-- 失敗3 -->
  <g>
    <rect x="50" y="210" width="320" height="110" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="210" y="230" class="gold" text-anchor="middle" font-size="11" font-weight="bold">失敗3：フォロワー数だけを目標に</text>
    <text x="210" y="250" class="text-white" text-anchor="middle" font-size="9">フォロワー増えても</text>
    <text x="210" y="265" class="text-white" text-anchor="middle" font-size="9">エンゲージメント低い</text>
    <text x="210" y="285" class="text-white" text-anchor="middle" font-size="9">（「幽霊フォロワー」が多い）</text>
    <text x="210" y="310" class="gold" text-anchor="middle" font-size="9" font-weight="bold">✓ 対策：エンゲージメント率を</text>
    <text x="210" y="323" class="gold" text-anchor="middle" font-size="9" font-weight="bold">優先指標に</text>
  </g>

  <!-- 失敗4 -->
  <g>
    <rect x="430" y="210" width="320" height="110" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="590" y="230" class="gold" text-anchor="middle" font-size="11" font-weight="bold">失敗4：改善を試すが継続しない</text>
    <text x="590" y="250" class="text-white" text-anchor="middle" font-size="9">忙しくなると新しい</text>
    <text x="590" y="265" class="text-white" text-anchor="middle" font-size="9">試みを止める</text>
    <text x="590" y="285" class="text-white" text-anchor="middle" font-size="9">→ 成果が出る前に諦める</text>
    <text x="590" y="310" class="gold" text-anchor="middle" font-size="9" font-weight="bold">✓ 対策：半年以上継続</text>
    <text x="590" y="323" class="gold" text-anchor="middle" font-size="9" font-weight="bold">する覚悟を持つ</text>
  </g>

  <!-- 下部 -->
  <rect x="60" y="340" width="680" height="60" fill="#c9a84c" opacity="0.15" rx="3"/>
  <text x="400" y="360" class="gold" text-anchor="middle" font-size="12" font-weight="bold">成功した企業の共通点：改善を続けた、最低6ヶ月〜1年</text>
  <text x="400" y="380" class="gold" text-anchor="middle" font-size="12" font-weight="bold">小さな改善の積み重ねが数ヶ月後に大きな差になる</text>
</svg>
