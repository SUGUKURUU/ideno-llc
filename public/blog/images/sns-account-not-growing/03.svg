<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">投稿の「冒頭3秒」に全力を注ぐ</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">フックが弱いと最初の数秒で離脱される</text>

  <!-- 動画の場合 -->
  <text x="210" y="85" class="text-white" text-anchor="middle" font-size="13" font-weight="bold">【動画の場合】</text>

  <!-- NG例 -->
  <rect x="50" y="110" width="320" height="90" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/>
  <text x="210" y="130" class="gold" text-anchor="middle" font-size="11" font-weight="bold">❌ NG：冒頭で離脱される</text>
  <text x="210" y="152" class="text-white" text-anchor="middle" font-size="10">「こんにちは！〇〇です。</text>
  <text x="210" y="167" class="text-white" text-anchor="middle" font-size="10">今日は〇〇についてお話しします」</text>
  <text x="210" y="187" class="text-gray" text-anchor="middle" font-size="9">→ ユーザーは既にスクロール済み</text>

  <!-- OK例 -->
  <rect x="430" y="110" width="320" height="90" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/>
  <text x="590" y="130" class="gold" text-anchor="middle" font-size="11" font-weight="bold">✓ OK：結論先出し・問いかけ</text>
  <text x="590" y="152" class="text-white" text-anchor="middle" font-size="10">「肩こりの9割は〇〇が原因です」</text>
  <text x="590" y="167" class="text-white" text-anchor="middle" font-size="10">「毎日デスクワークしている方、</text>
  <text x="590" y="182" class="text-white" text-anchor="middle" font-size="10">この動作やってみてください」</text>

  <!-- 画像の場合 -->
  <text x="210" y="230" class="text-white" text-anchor="middle" font-size="13" font-weight="bold">【画像の場合】</text>

  <!-- NG例 -->
  <rect x="50" y="255" width="320" height="85" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/>
  <text x="210" y="273" class="gold" text-anchor="middle" font-size="11" font-weight="bold">❌ NG：1枚目に商品写真</text>
  <text x="210" y="293" class="text-white" text-anchor="middle" font-size="10">会社のロゴ入り商品写真</text>
  <text x="210" y="313" class="text-gray" text-anchor="middle" font-size="9">→ スクロールされて終わり</text>

  <!-- OK例 -->
  <rect x="430" y="255" width="320" height="85" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/>
  <text x="590" y="273" class="gold" text-anchor="middle" font-size="11" font-weight="bold">✓ OK：インパクトあるテキスト</text>
  <text x="590" y="293" class="text-white" text-anchor="middle" font-size="10">「〇〇の人が読んでほしい話」</text>
  <text x="590" y="313" class="text-white" text-anchor="middle" font-size="10">「知らないと損する〇〇の方法」</text>

  <!-- 下部ポイント -->
  <rect x="80" y="360" width="640" height="40" fill="#c9a84c" opacity="0.15" rx="3"/>
  <text x="400" y="382" class="gold" text-anchor="middle" font-size="11" font-weight="bold">★ 最初の1秒で「見続ける価値があるか」をユーザーは判断している</text>
</svg>
