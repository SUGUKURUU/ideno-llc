<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">注目すべき指標の優先順位</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">月次PDCA分析で改善する</text>

  <!-- テーブル -->
  <rect x="40" y="85" width="720" height="290" fill="none" stroke="#c9a84c" stroke-width="2" rx="3"/>

  <!-- ヘッダー -->
  <rect x="40" y="85" width="720" height="35" fill="#c9a84c" opacity="0.2"/>
  <text x="110" y="110" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">指標</text>
  <text x="200" y="110" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">重要度</text>
  <text x="360" y="110" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">説明</text>
  <text x="650" y="110" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">目安</text>

  <!-- 区切り線 -->
  <line x1="40" y1="120" x2="760" y2="120" stroke="#c9a84c" stroke-width="1"/>
  <line x1="150" y1="85" x2="150" y2="375" stroke="#c9a84c" stroke-width="1"/>
  <line x1="250" y1="85" x2="250" y2="375" stroke="#c9a84c" stroke-width="1"/>
  <line x1="550" y1="85" x2="550" y2="375" stroke="#c9a84c" stroke-width="1"/>

  <!-- 保存数 -->
  <text x="110" y="150" class="text-white" text-anchor="middle" font-size="10" font-weight="bold">保存数</text>
  <text x="200" y="150" class="gold" text-anchor="middle" font-size="11">★★★★★</text>
  <text x="360" y="135" class="text-white" text-anchor="middle" font-size="9">「後で見返したい」</text>
  <text x="360" y="150" class="text-white" text-anchor="middle" font-size="9">という意図の表れ</text>
  <text x="360" y="165" class="text-white" text-anchor="middle" font-size="9">最重要指標</text>
  <text x="650" y="150" class="text-gray" text-anchor="middle" font-size="9">高いほど良好</text>

  <!-- シェア数 -->
  <text x="110" y="210" class="text-white" text-anchor="middle" font-size="10" font-weight="bold">シェア数</text>
  <text x="200" y="210" class="gold" text-anchor="middle" font-size="11">★★★★☆</text>
  <text x="360" y="195" class="text-white" text-anchor="middle" font-size="9">拡散力の指標</text>
  <text x="360" y="210" class="text-white" text-anchor="middle" font-size="9">フォロワー以外への</text>
  <text x="360" y="225" class="text-white" text-anchor="middle" font-size="9">リーチに直結</text>
  <text x="650" y="210" class="text-gray" text-anchor="middle" font-size="9">増加が重要</text>

  <!-- コメント数 -->
  <text x="110" y="270" class="text-white" text-anchor="middle" font-size="10" font-weight="bold">コメント数</text>
  <text x="200" y="270" class="gold" text-anchor="middle" font-size="11">★★★★☆</text>
  <text x="360" y="255" class="text-white" text-anchor="middle" font-size="9">エンゲージメント</text>
  <text x="360" y="270" class="text-white" text-anchor="middle" font-size="9">の深さを示す</text>
  <text x="360" y="285" class="text-white" text-anchor="middle" font-size="9"></text>
  <text x="650" y="270" class="text-gray" text-anchor="middle" font-size="9">質的評価</text>

  <!-- いいね数 -->
  <text x="110" y="330" class="text-white" text-anchor="middle" font-size="10" font-weight="bold">いいね数</text>
  <text x="200" y="330" class="gold" text-anchor="middle" font-size="11">★★★☆☆</text>
  <text x="360" y="315" class="text-white" text-anchor="middle" font-size="9">表面的なエンゲージメント</text>
  <text x="360" y="330" class="text-white" text-anchor="middle" font-size="9">指標のみ</text>
  <text x="360" y="345" class="text-white" text-anchor="middle" font-size="9"></text>
  <text x="650" y="330" class="text-gray" text-anchor="middle" font-size="9">参考値</text>

  <!-- 下部 -->
  <rect x="50" y="390" width="700" height="20" fill="#c9a84c" opacity="0.15" rx="3"/>
  <text x="400" y="405" class="gold" text-anchor="middle" font-size="10" font-weight="bold">★ 月次で「上位5投稿・下位5投稿」を分析してパターンを特定</text>
</svg>
