<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">理想のフォロワー像を「1人」に絞り込む</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">ターゲット明確化による改善</text>

  <!-- NG例 -->
  <rect x="50" y="75" width="320" height="140" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
  <text x="210" y="95" class="gold" text-anchor="middle" font-size="12" font-weight="bold">NG：誰にでも届けようとする</text>
  <line x1="70" y1="110" x2="350" y2="110" stroke="#c9a84c" stroke-width="1"/>
  <text x="210" y="130" class="text-white" text-anchor="middle" font-size="10">「幅広い方に届けたい」</text>
  <text x="210" y="150" class="text-white" text-anchor="middle" font-size="10">投稿内容がバラバラで統一感がない</text>
  <text x="210" y="170" class="text-white" text-anchor="middle" font-size="10">結果：誰にも刺さらない</text>
  <text x="210" y="190" class="gold" text-anchor="middle" font-size="10" font-weight="bold">→ エンゲージメント取れず</text>

  <!-- OK例 -->
  <rect x="430" y="75" width="320" height="280" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
  <text x="590" y="95" class="gold" text-anchor="middle" font-size="12" font-weight="bold">OK：理想の1人に絞り込む</text>
  <line x1="450" y1="110" x2="730" y2="110" stroke="#c9a84c" stroke-width="1"/>

  <text x="590" y="135" class="text-white" text-anchor="middle" font-size="10" font-weight="bold">具体的なペルソナ：</text>
  <text x="460" y="160" class="text-white" font-size="10">✓ 30代の女性</text>
  <text x="460" y="178" class="text-white" font-size="10">✓ 都市部在住</text>
  <text x="460" y="196" class="text-white" font-size="10">✓ 育児と仕事を両立</text>
  <text x="460" y="214" class="text-white" font-size="10">✓ 自分時間を大切にしている</text>
  <text x="460" y="232" class="text-white" font-size="10">✓ 美容に興味あるが効率重視</text>

  <line x1="450" y1="250" x2="730" y2="250" stroke="#c9a84c" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="590" y="275" class="gold" text-anchor="middle" font-size="11" font-weight="bold">その人が見て「これ、私のことだ」と思える投稿</text>
  <text x="590" y="300" class="gold" text-anchor="middle" font-size="11" font-weight="bold">を意識するだけで</text>
  <text x="590" y="325" class="gold" text-anchor="middle" font-size="11" font-weight="bold">コンテンツの方向性が劇的に定まる</text>
</svg>
