<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">成長への道：5つの改善ステップ</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">優先度をつけて実装する</text>

  <!-- タイムライン -->
  <line x1="80" y1="120" x2="720" y2="120" stroke="#c9a84c" stroke-width="2"/>

  <!-- ステップ1 -->
  <g>
    <circle cx="100" cy="120" r="15" fill="#c9a84c"/>
    <text x="100" y="125" class="text-white" text-anchor="middle" font-size="16" font-weight="bold">1</text>
  </g>
  <text x="100" y="155" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">ターゲット</text>
  <text x="100" y="170" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">を絞る</text>
  <text x="100" y="195" class="text-gray" text-anchor="middle" font-size="9">理想の1人を決める</text>
  <text x="100" y="210" class="text-gray" text-anchor="middle" font-size="9">（1週間）</text>

  <!-- ステップ2 -->
  <g>
    <circle cx="250" cy="120" r="15" fill="#c9a84c"/>
    <text x="250" y="125" class="text-white" text-anchor="middle" font-size="16" font-weight="bold">2</text>
  </g>
  <text x="250" y="155" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">冒頭</text>
  <text x="250" y="170" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">を改善</text>
  <text x="250" y="195" class="text-gray" text-anchor="middle" font-size="9">結論先出し・問いかけ</text>
  <text x="250" y="210" class="text-gray" text-anchor="middle" font-size="9">に変更（即）</text>

  <!-- ステップ3 -->
  <g>
    <circle cx="400" cy="120" r="15" fill="#c9a84c"/>
    <text x="400" y="125" class="text-white" text-anchor="middle" font-size="16" font-weight="bold">3</text>
  </g>
  <text x="400" y="155" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">投稿頻度</text>
  <text x="400" y="170" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">を安定化</text>
  <text x="400" y="195" class="text-gray" text-anchor="middle" font-size="9">コンテンツバンク</text>
  <text x="400" y="210" class="text-gray" text-anchor="middle" font-size="9">を作る（2週間）</text>

  <!-- ステップ4 -->
  <g>
    <circle cx="550" cy="120" r="15" fill="#c9a84c"/>
    <text x="550" y="125" class="text-white" text-anchor="middle" font-size="16" font-weight="bold">4</text>
  </g>
  <text x="550" y="155" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">プロフィール</text>
  <text x="550" y="170" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">最適化</text>
  <text x="550" y="195" class="text-gray" text-anchor="middle" font-size="9">キーワード・価値提案</text>
  <text x="550" y="210" class="text-gray" text-anchor="middle" font-size="9">追加（1週間）</text>

  <!-- ステップ5 -->
  <g>
    <circle cx="700" cy="120" r="15" fill="#c9a84c"/>
    <text x="700" y="125" class="text-white" text-anchor="middle" font-size="16" font-weight="bold">5</text>
  </g>
  <text x="700" y="155" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">月次</text>
  <text x="700" y="170" class="text-white" text-anchor="middle" font-size="11" font-weight="bold">分析</text>
  <text x="700" y="195" class="text-gray" text-anchor="middle" font-size="9">データで改善</text>
  <text x="700" y="210" class="text-gray" text-anchor="middle" font-size="9">を繰り返す</text>

  <!-- 下部メッセージ -->
  <rect x="60" y="250" width="680" height="140" fill="#c9a84c" opacity="0.15" rx="5"/>
  <text x="400" y="280" class="gold" text-anchor="middle" font-size="14" font-weight="bold">すべてを一度に直す必要はない</text>
  <text x="400" y="300" class="text-white" text-anchor="middle" font-size="11">まず自社で最も問題になっている原因1つを特定し、</text>
  <text x="400" y="320" class="text-white" text-anchor="middle" font-size="11">そこから改善を始めましょう</text>
  <text x="400" y="345" class="gold" text-anchor="middle" font-size="12" font-weight="bold">小さな改善の積み重ねが、数ヶ月後に大きな差になる</text>
</svg>
