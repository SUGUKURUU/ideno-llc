<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">企業アカウントが伸びない5つの原因</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">95%のケースはこれに当てはまる</text>

  <!-- 5つの原因 -->
  <g>
    <rect x="50" y="85" width="130" height="140" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="115" y="105" class="gold" text-anchor="middle" font-size="12" font-weight="bold">原因1</text>
    <text x="115" y="130" class="text-white" text-anchor="middle" font-size="10">ターゲットが</text>
    <text x="115" y="145" class="text-white" text-anchor="middle" font-size="10">曖昧</text>
    <text x="115" y="165" class="text-gray" text-anchor="middle" font-size="9">誰にも刺さらない</text>
    <text x="115" y="178" class="text-gray" text-anchor="middle" font-size="9">コンテンツ</text>
    <text x="115" y="210" class="gold" text-anchor="middle" font-size="10" font-weight="bold">→ 1人に絞る</text>
  </g>

  <g>
    <rect x="200" y="85" width="130" height="140" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="265" y="105" class="gold" text-anchor="middle" font-size="12" font-weight="bold">原因2</text>
    <text x="265" y="130" class="text-white" text-anchor="middle" font-size="10">冒頭の</text>
    <text x="265" y="145" class="text-white" text-anchor="middle" font-size="10">フックが弱い</text>
    <text x="265" y="165" class="text-gray" text-anchor="middle" font-size="9">最初の3秒で</text>
    <text x="265" y="178" class="text-gray" text-anchor="middle" font-size="9">離脱される</text>
    <text x="265" y="210" class="gold" text-anchor="middle" font-size="10" font-weight="bold">→ 結論先出し</text>
  </g>

  <g>
    <rect x="350" y="85" width="130" height="140" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="415" y="105" class="gold" text-anchor="middle" font-size="12" font-weight="bold">原因3</text>
    <text x="415" y="130" class="text-white" text-anchor="middle" font-size="10">投稿頻度と</text>
    <text x="415" y="145" class="text-white" text-anchor="middle" font-size="10">品質の</text>
    <text x="415" y="160" class="text-white" text-anchor="middle" font-size="10">バランス崩れ</text>
    <text x="415" y="180" class="text-gray" text-anchor="middle" font-size="9">低品質な投稿で</text>
    <text x="415" y="193" class="text-gray" text-anchor="middle" font-size="9">評価低下</text>
    <text x="415" y="225" class="gold" text-anchor="middle" font-size="10" font-weight="bold">→ 品質優先</text>
  </g>

  <g>
    <rect x="500" y="85" width="130" height="140" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="565" y="105" class="gold" text-anchor="middle" font-size="12" font-weight="bold">原因4</text>
    <text x="565" y="130" class="text-white" text-anchor="middle" font-size="10">プロフィール</text>
    <text x="565" y="145" class="text-white" text-anchor="middle" font-size="10">が最適化</text>
    <text x="565" y="160" class="text-white" text-anchor="middle" font-size="10">されていない</text>
    <text x="565" y="180" class="text-gray" text-anchor="middle" font-size="9">検索されない</text>
    <text x="565" y="193" class="text-gray" text-anchor="middle" font-size="9">フォローされない</text>
    <text x="565" y="225" class="gold" text-anchor="middle" font-size="10" font-weight="bold">→ キーワード追加</text>
  </g>

  <g>
    <rect x="650" y="85" width="130" height="140" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="715" y="105" class="gold" text-anchor="middle" font-size="12" font-weight="bold">原因5</text>
    <text x="715" y="130" class="text-white" text-anchor="middle" font-size="10">分析をせず</text>
    <text x="715" y="145" class="text-white" text-anchor="middle" font-size="10">PDCA</text>
    <text x="715" y="160" class="text-white" text-anchor="middle" font-size="10">が回らない</text>
    <text x="715" y="180" class="text-gray" text-anchor="middle" font-size="9">感覚的な運用</text>
    <text x="715" y="193" class="text-gray" text-anchor="middle" font-size="9">のみ</text>
    <text x="715" y="225" class="gold" text-anchor="middle" font-size="10" font-weight="bold">→ 月次分析</text>
  </g>

  <!-- 下部メッセージ -->
  <rect x="80" y="250" width="640" height="80" fill="#c9a84c" opacity="0.15" rx="5"/>
  <text x="400" y="275" class="gold" text-anchor="middle" font-size="14" font-weight="bold">アカウントが伸びない理由は「特別な何か」が足りないのではなく</text>
  <text x="400" y="295" class="gold" text-anchor="middle" font-size="14" font-weight="bold">基本的なこの5つの改善で解決できる</text>
  <text x="400" y="320" class="text-gray" text-anchor="middle" font-size="11">優先度をつけて改善することが成長の最短ルート</text>
</svg>
