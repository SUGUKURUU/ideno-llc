<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">制作方法別の費用・特徴比較</text>

  <!-- Row headers -->
  <text x="40" y="75" fill="#c9a84c" font-size="11" font-weight="bold">方法</text>
  <text x="160" y="75" fill="#c9a84c" font-size="11" font-weight="bold">費用目安</text>
  <text x="280" y="75" fill="#c9a84c" font-size="11" font-weight="bold">期間</text>
  <text x="380" y="75" fill="#c9a84c" font-size="11" font-weight="bold">特徴</text>

  <!-- Divider line -->
  <line x1="30" y1="85" x2="770" y2="85" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>

  <!-- Row 1: Wix/Jimdo -->
  <rect x="30" y="95" width="740" height="50" fill="#4a9eff" opacity="0.08"/>
  <text x="40" y="120" fill="#4a9eff" font-size="10" font-weight="bold">Wix・Jimdo</text>
  <text x="160" y="120" fill="#ffffff" font-size="10">月1,500～3,000円</text>
  <text x="280" y="120" fill="#ffffff" font-size="10">1-2週間</text>
  <text x="380" y="110" fill="#c9a84c" font-size="9">ノーコードツール・自社制作</text>
  <text x="380" y="123" fill="#aaaaaa" font-size="8">品質は自分次第・継続的メンテ必要</text>

  <!-- Row 2: STUDIO -->
  <rect x="30" y="150" width="740" height="50" fill="#50c878" opacity="0.08"/>
  <text x="40" y="175" fill="#50c878" font-size="10" font-weight="bold">STUDIO</text>
  <text x="160" y="175" fill="#ffffff" font-size="10">月2,000～7,000円</text>
  <text x="280" y="175" fill="#ffffff" font-size="10">1-2週間</text>
  <text x="380" y="165" fill="#c9a84c" font-size="9">デザイン品質が高い・ノーコード</text>
  <text x="380" y="178" fill="#aaaaaa" font-size="8">運用は自社・拡張性限定</text>

  <!-- Row 3: WordPress テンプレート -->
  <rect x="30" y="205" width="740" height="50" fill="#e91e63" opacity="0.08"/>
  <text x="40" y="230" fill="#e91e63" font-size="10" font-weight="bold">WordPress（テンプレート）</text>
  <text x="160" y="230" fill="#ffffff" font-size="10">10～30万円</text>
  <text x="280" y="230" fill="#ffffff" font-size="10">2-4週間</text>
  <text x="380" y="220" fill="#c9a84c" font-size="9">拡張性が高い・WordPressスキル必要</text>
  <text x="380" y="233" fill="#aaaaaa" font-size="8">月額費用なし・保守が大事</text>

  <!-- Row 4: フリーランス発注 -->
  <rect x="30" y="260" width="740" height="50" fill="#ff9800" opacity="0.08"/>
  <text x="40" y="285" fill="#ff9800" font-size="10" font-weight="bold">フリーランス発注（ランサーズ等）</text>
  <text x="160" y="285" fill="#ffffff" font-size="10">5～20万円</text>
  <text x="280" y="285" fill="#ffffff" font-size="10">3-8週間</text>
  <text x="380" y="275" fill="#c9a84c" font-size="9">価格が安い・品質にばらつき</text>
  <text x="380" y="288" fill="#aaaaaa" font-size="8">保守体制が不確実な場合がある</text>

  <!-- Bottom note -->
  <rect x="30" y="330" width="740" height="70" rx="4" fill="#c9a84c" opacity="0.12"/>
  <text x="50" y="350" fill="#c9a84c" font-size="11" font-weight="bold">選択の基準</text>
  <text x="50" y="368" fill="#ffffff" font-size="10">・とにかく速く・安く: Wix/STUDIO</text>
  <text x="50" y="383" fill="#ffffff" font-size="10">・カスタマイズ性重視: WordPress + フリーランス</text>
  <text x="50" y="398" fill="#ffffff" font-size="10">・安定運用・サポート: 制作会社（30-100万円）</text>
</svg>