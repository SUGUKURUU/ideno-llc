<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">限られた予算で最大効果を出す予算配分戦略</text>

  <!-- Total budget -->
  <text x="50" y="75" fill="#c9a84c" font-size="12" font-weight="bold">想定総予算：100万円</text>

  <!-- Option 1 -->
  <text x="50" y="110" fill="#4a9eff" font-size="11" font-weight="bold">✗ 悪い例：制作に全力</text>
  <rect x="50" y="125" width="300" height="30" rx="4" fill="#4a9eff" opacity="0.3"/>
  <text x="65" y="147" fill="#ffffff" font-size="10">制作費：100万円</text>
  <text x="160" y="147" fill="#aaaaaa" font-size="9">保守・運用：0円</text>

  <text x="50" y="170" fill="#aaaaaa" font-size="9">問題：公開後すぐに放置→成果が出ない</text>

  <!-- Option 2 -->
  <text x="50" y="200" fill="#50c878" font-size="11" font-weight="bold">✓ 推奨例：制作＋運用のバランス</text>
  <rect x="50" y="215" width="210" height="30" rx="4" fill="#50c878" opacity="0.3"/>
  <text x="65" y="237" fill="#ffffff" font-size="10">制作費：70万円</text>

  <rect x="265" y="215" width="85" height="30" rx="4" fill="#c9a84c" opacity="0.3"/>
  <text x="275" y="237" fill="#ffffff" font-size="10">保守・運用：30万円</text>

  <text x="50" y="260" fill="#aaaaaa" font-size="9">効果：制作後も継続的に改善・SEO対策</text>

  <!-- Monthly breakdown -->
  <text x="450" y="110" fill="#c9a84c" font-size="12" font-weight="bold">月別予算配分例（70万円の場合）</text>

  <!-- Month 1-3 -->
  <g>
    <rect x="430" y="135" width="310" height="70" rx="4" fill="#4a9eff" opacity="0.1" stroke="#4a9eff" stroke-width="1"/>
    <text x="450" y="155" fill="#4a9eff" font-size="10" font-weight="bold">1-3ヶ月（初期制作）</text>
    <text x="450" y="172" fill="#ffffff" font-size="9">・デザイン＆実装：40万円</text>
    <text x="450" y="187" fill="#ffffff" font-size="9">・初期SEO設定：10万円</text>
    <text x="450" y="202" fill="#c9a84c" font-size="9">月2-3万円の人件費含む</text>
  </g>

  <!-- Month 4-12 -->
  <g>
    <rect x="430" y="220" width="310" height="85" rx="4" fill="#50c878" opacity="0.1" stroke="#50c878" stroke-width="1"/>
    <text x="450" y="240" fill="#50c878" font-size="10" font-weight="bold">4-12ヶ月（継続運用）</text>
    <text x="450" y="257" fill="#ffffff" font-size="9">・月額保守：1.5万円/月</text>
    <text x="450" y="272" fill="#ffffff" font-size="9">・コンテンツ制作：月3-5万円</text>
    <text x="450" y="287" fill="#ffffff" font-size="9">  （記事作成・画像作成等）</text>
    <text x="450" y="302" fill="#c9a84c" font-size="9">年間運用費：20万円</text>
  </g>

  <!-- Result -->
  <rect x="430" y="320" width="310" height="70" rx="4" fill="#c9a84c" opacity="0.15"/>
  <text x="450" y="340" fill="#c9a84c" font-size="11" font-weight="bold">結果：継続的に成果が出るサイトに</text>
  <text x="450" y="358" fill="#ffffff" font-size="9">・SEO順位の継続改善</text>
  <text x="450" y="373" fill="#ffffff" font-size="9">・月の問い合わせ数が徐々に増加</text>
  <text x="450" y="388" fill="#ffffff" font-size="9">・2年目以降は投資対効果が高まる</text>
</svg>