<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">ホームページ制作費用の決定フローチャート</text>

  <!-- Start -->
  <rect x="330" y="60" width="140" height="40" rx="6" fill="#c9a84c" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" fill="#111111" font-size="11" font-weight="bold">ホームページ制作開始</text>

  <!-- Decision 1 -->
  <path d="M 400 100 L 400 130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <polygon points="400,130 380,110 420,110" fill="#c9a84c"/>

  <text x="400" y="160" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">今すぐ公開が必要？</text>

  <!-- Path Yes -->
  <text x="240" y="190" fill="#c9a84c" font-size="10" font-weight="bold">はい（1-2週間で）</text>
  <line x1="300" y1="180" x2="230" y2="210" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="80" y="210" width="150" height="60" rx="4" fill="#4a9eff" opacity="0.2" stroke="#4a9eff" stroke-width="2"/>
  <text x="155" y="235" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="bold">STUDIO/Wix</text>
  <text x="155" y="252" text-anchor="middle" fill="#c9a84c" font-size="10">～30万円</text>

  <!-- Path No -->
  <text x="550" y="190" fill="#c9a84c" font-size="10" font-weight="bold">いいえ（時間がある）</text>
  <line x1="500" y1="180" x2="570" y2="210" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision 2 -->
  <polygon points="570,210 550,190 590,190" fill="#c9a84c"/>
  <path d="M 570 210 L 570 240" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <text x="570" y="275" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">主な目的は何？</text>

  <!-- Purpose 1: Recruitment -->
  <line x1="520" y1="290" x2="420" y2="320" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="450" y="310" fill="#c9a84c" font-size="9">採用強化</text>

  <rect x="350" y="320" width="140" height="60" rx="4" fill="#e91e63" opacity="0.2" stroke="#e91e63" stroke-width="2"/>
  <text x="420" y="345" text-anchor="middle" fill="#e91e63" font-size="11" font-weight="bold">フルオーダー</text>
  <text x="420" y="362" text-anchor="middle" fill="#c9a84c" font-size="10">100-300万円</text>

  <!-- Purpose 2: Sales -->
  <line x1="570" y1="290" x2="570" y2="320" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="590" y="310" fill="#c9a84c" font-size="9">営業支援</text>

  <rect x="510" y="320" width="120" height="60" rx="4" fill="#50c878" opacity="0.2" stroke="#50c878" stroke-width="2"/>
  <text x="570" y="345" text-anchor="middle" fill="#50c878" font-size="11" font-weight="bold">中価格帯</text>
  <text x="570" y="362" text-anchor="middle" fill="#c9a84c" font-size="10">30-100万円</text>

  <!-- Purpose 3: Existence -->
  <line x1="620" y1="290" x2="680" y2="320" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="680" y="310" fill="#c9a84c" font-size="9">とにかく存在</text>

  <rect x="640" y="320" width="120" height="60" rx="4" fill="#ff9800" opacity="0.2" stroke="#ff9800" stroke-width="2"/>
  <text x="700" y="345" text-anchor="middle" fill="#ff9800" font-size="11" font-weight="bold">テンプレート</text>
  <text x="700" y="362" text-anchor="middle" fill="#c9a84c" font-size="10">30-50万円</text>

  <!-- Final message -->
  <rect x="30" y="410" width="740" height="0" rx="4"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>