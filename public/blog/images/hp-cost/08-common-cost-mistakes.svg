<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">ホームページ制作費用の失敗パターン</text>

  <!-- Mistake 1 -->
  <g>
    <rect x="30" y="70" width="330" height="130" rx="6" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
    <text x="195" y="95" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">❌ 失敗1：予算オーバー</text>

    <text x="50" y="125" fill="#ffffff" font-size="10">当初100万円の予定が</text>
    <text x="50" y="140" fill="#ffffff" font-size="10">途中で追加要望が増え</text>
    <text x="50" y="155" fill="#ffffff" font-size="10">最終的に200万円に…</text>

    <text x="50" y="180" fill="#aaaaaa" font-size="9">対策：最初から20%の余裕を持つ</text>
  </g>

  <!-- Mistake 2 -->
  <g>
    <rect x="410" y="70" width="330" height="130" rx="6" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
    <text x="575" y="95" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">❌ 失敗2：保守費用の計上漏れ</text>

    <text x="430" y="125" fill="#ffffff" font-size="10">制作費30万円で満足して</text>
    <text x="430" y="140" fill="#ffffff" font-size="10">保守費がなく、セキュリティ放置</text>
    <text x="430" y="155" fill="#ffffff" font-size="10">サイトが改ざんされた</text>

    <text x="430" y="180" fill="#aaaaaa" font-size="9">対策：制作費の5-10%を月額保守に</text>
  </g>

  <!-- Mistake 3 -->
  <g>
    <rect x="30" y="225" width="330" height="130" rx="6" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
    <text x="195" y="250" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">❌ 失敗3：制作会社選びの失敗</text>

    <text x="50" y="280" fill="#ffffff" font-size="10">「格安で作ってくれる」との</text>
    <text x="50" y="295" fill="#ffffff" font-size="10">触れ込みで契約→</text>
    <text x="50" y="310" fill="#ffffff" font-size="10">完成後サポートが全くない</text>

    <text x="50" y="335" fill="#aaaaaa" font-size="9">対策：実績・評判・契約内容を確認</text>
  </g>

  <!-- Mistake 4 -->
  <g>
    <rect x="410" y="225" width="330" height="130" rx="6" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
    <text x="575" y="250" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">❌ 失敗4：スケール拡大時の後悔</text>

    <text x="430" y="280" fill="#ffffff" font-size="10">テンプレートで作ったサイトが</text>
    <text x="430" y="295" fill="#ffffff" font-size="10">手狭になり、大規模サイトに</text>
    <text x="430" y="310" fill="#ffffff" font-size="10">作り替え→二重投資</text>

    <text x="430" y="335" fill="#aaaaaa" font-size="9">対策：3年先までの成長を見据える</text>
  </g>
</svg>