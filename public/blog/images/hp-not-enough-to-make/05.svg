<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px}.t{font-size:17px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">コンテンツ追加の効果と継続戦略</text><text x="400" y="55" class="tg" text-anchor="middle">ブログ・FAQ・事例の活用</text><g><rect x="50" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="215" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">コンテンツ追加の効果</text><text x="70" y="135" class="tw" font-size="9">✓ 検索で見つかるキーワード数が増える</text><text x="70" y="155" class="tw" font-size="9">✓ サイト専門性・権威性が評価される</text><text x="70" y="175" class="tw" font-size="9">✓ 「また来たい」思えるサイトになる</text><text x="215" y="220" class="gold" text-anchor="middle" font-size="11" font-weight="bold">追加しやすいコンテンツ</text><text x="70" y="245" class="tw" font-size="8">FAQ：制作時間短、SEO効果高</text><text x="70" y="260" class="tw" font-size="8">事例：具体例で信頼度UP</text><text x="70" y="275" class="tw" font-size="8">スタッフ紹介：採用にも有効</text><text x="70" y="290" class="tw" font-size="8">コラム：業界知識を発信</text><text x="215" y="340" class="gold" text-anchor="middle" font-size="10" font-weight="bold">目安：月2-4本継続</text></g><g><rect x="420" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="585" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">継続戦略</text><text x="440" y="135" class="tw" font-size="9">仕組み化が継続の鍵</text><text x="440" y="155" class="tw" font-size="8">・担当者を決める</text><text x="440" y="168" class="tw" font-size="8">・月のスケジュールに組み込む</text><text x="440" y="181" class="tw" font-size="8">・外部に委託する</text><text x="585" y="225" class="gold" text-anchor="middle" font-size="11" font-weight="bold">外注の場合</text><text x="440" y="250" class="tw" font-size="8">費用：1本1-5万円</text><text x="440" y="265" class="tw" font-size="8">WebライターやSEO会社に委託</text><text x="440" y="280" class="tw" font-size="8">ホームページ制作会社が</text><text x="440" y="293" class="tw" font-size="8">セット対応するケースも</text><text x="585" y="340" class="gold" text-anchor="middle" font-size="10" font-weight="bold">継続できる仕組みづくり</text></g></svg>
