<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px}.t{font-size:17px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">HP+SNS連動による相乗効果</text><text x="400" y="55" class="tg" text-anchor="middle">ユーザーの行動導線</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><circle cx="100" cy="130" r="15" fill="#c9a84c"/><text x="100" y="137" class="tw" text-anchor="middle" font-size="14">①</text><text x="100" y="165" class="tw" text-anchor="middle" font-size="9">SNSで興味</text><text x="100" y="180" class="tw" text-anchor="middle" font-size="9">を持つ</text><line x1="130" y1="130" x2="200" y2="130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="250" cy="130" r="15" fill="#c9a84c"/><text x="250" y="137" class="tw" text-anchor="middle" font-size="14">②</text><text x="250" y="165" class="tw" text-anchor="middle" font-size="9">HPで詳細</text><text x="250" y="180" class="tw" text-anchor="middle" font-size="9">を確認</text><line x1="280" y1="130" x2="350" y2="130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="400" cy="130" r="15" fill="#c9a84c"/><text x="400" y="137" class="tw" text-anchor="middle" font-size="14">③</text><text x="400" y="165" class="tw" text-anchor="middle" font-size="9">フォーム</text><text x="400" y="180" class="tw" text-anchor="middle" font-size="9">で連絡</text><line x1="430" y1="130" x2="500" y2="130" stroke="#c9a84c" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="550" cy="130" r="15" fill="#c9a84c"/><text x="550" y="137" class="tw" text-anchor="middle" font-size="14">④</text><text x="550" y="165" class="tw" text-anchor="middle" font-size="9">問い合わせ</text><text x="550" y="180" class="tw" text-anchor="middle" font-size="9">成約</text><text x="400" y="240" class="gold" text-anchor="middle" font-size="11" font-weight="bold">SNS+HPの連動が重要な理由</text><text x="400" y="265" class="tw" text-anchor="middle" font-size="9">SNSで興味を持ってもらっても、確認できるHPがなければ問い合わせに繋がらない</text><text x="400" y="285" class="tw" text-anchor="middle" font-size="9">SNSのプロフィール・投稿からHP へのリンク設置が必須</text><text x="400" y="310" class="gold" text-anchor="middle" font-size="10" font-weight="bold">★ ユーザー行動の流れを設計することが成約率向上のカギ</text></svg>
