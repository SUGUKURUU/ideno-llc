<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px}.t{font-size:17px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">HP公開後の運用：5つのアクション総まとめ</text><text x="400" y="55" class="tg" text-anchor="middle">成果を出すための完全ガイド</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="400" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">5つのアクション</text><line x1="70" y1="120" x2="730" y2="120" stroke="#c9a84c" stroke-width="1"/><text x="70" y="145" class="tw" font-size="9">1. サーチコンソール登録 → インデックス促進</text><text x="70" y="163" class="tw" font-size="9">2. Analyticsを設置 → アクセスデータ計測</text><text x="70" y="181" class="tw" font-size="9">3. コンテンツ定期更新 → 月2-4本追加</text><text x="70" y="199" class="tw" font-size="9">4. SNS連動 → HPへの導線設計</text><text x="70" y="217" class="tw" font-size="9">5. 分析・改善PDCA → 月次でデータ確認</text><line x1="70" y1="230" x2="730" y2="230" stroke="#c9a84c" stroke-width="1"/><text x="400" y="260" class="gold" text-anchor="middle" font-size="11" font-weight="bold">これら5つを「仕組み」にすることが重要</text><text x="400" y="280" class="tw" text-anchor="middle" font-size="10">「やろうと思っているがなかなかできない」が最も成果を出せない状態</text><text x="400" y="300" class="tw" text-anchor="middle" font-size="10">担当者を決める・外部に委託するなど、動く仕組みを作ること</text><text x="400" y="345" class="gold" text-anchor="middle" font-size="10" font-weight="bold">★ ホームページの成果は「公開後の運用」で決まる</text></svg>
