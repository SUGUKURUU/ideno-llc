<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px}.t{font-size:17px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">HP公開後のチェックリスト</text><text x="400" y="55" class="tg" text-anchor="middle">最初の3ヶ月で実施</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/><text x="70" y="110" class="gold" font-size="11" font-weight="bold">【公開直後】</text><text x="70" y="130" class="tw" font-size="9">□ Google Search Consoleに登録・URL送信</text><text x="70" y="148" class="tw" font-size="9">□ Google Analytics 4を設定</text><text x="70" y="166" class="tw" font-size="9">□ Google Business Profile登録（地域ビジネス）</text><text x="70" y="184" class="tw" font-size="9">□ SNSプロフィールにHP URLリンク設置</text><line x1="50" y1="200" x2="750" y2="200" stroke="#c9a84c" stroke-width="1"/><text x="70" y="225" class="gold" font-size="11" font-weight="bold">【1ヶ月以内】</text><text x="70" y="245" class="tw" font-size="9">□ コンテンツ追加計画を立てる（月2-4本）</text><text x="70" y="263" class="tw" font-size="9">□ 「お知らせ」「ブログ」第1弾を公開</text><text x="70" y="281" class="tw" font-size="9">□ SNS投稿でHP記事をシェア</text><line x1="50" y1="295" x2="750" y2="295" stroke="#c9a84c" stroke-width="1"/><text x="70" y="320" class="gold" font-size="11" font-weight="bold">【3ヶ月目】</text><text x="70" y="340" class="tw" font-size="9">□ Analyticsでアクセス状況確認・改善策を検討</text><text x="70" y="358" class="tw" font-size="9">□ Search Consoleでどのキーワードで見つかっているか確認</text><text x="70" y="376" class="tw" font-size="9">□ コンテンツ継続計画を調整</text></svg>
