<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">成功事例：公開後の運用で成果を出した企業</text><text x="400" y="55" class="tg" text-anchor="middle">小規模事業の改善パターン</text><g><rect x="50" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="215" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">事例A：整体院</text><text x="70" y="135" class="tw" font-size="9">状況：公開6ヶ月でアクセスほぼゼロ</text><text x="70" y="155" class="tw" font-size="9">取り組み：</text><text x="70" y="175" class="tw" font-size="8">・GA4・SC設定</text><text x="70" y="190" class="tw" font-size="8">・毎月「症状コラム」2本追加</text><text x="70" y="205" class="tw" font-size="8">・Instagramと連動</text><text x="215" y="250" class="gold" text-anchor="middle" font-size="10" font-weight="bold">6ヶ月後の成果</text><text x="215" y="270" class="tw" text-anchor="middle" font-size="9">訪問者：120→450件</text><text x="215" y="290" class="tw" text-anchor="middle" font-size="9">新規予約：2→8件</text><text x="215" y="310" class="tw" text-anchor="middle" font-size="9">SEO対象KW：12個</text></g><g><rect x="420" y="85" width="330" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="585" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">事例B：設計事務所</text><text x="440" y="135" class="tw" font-size="9">状況：紹介営業がほとんど</text><text x="440" y="155" class="tw" font-size="9">取り組み：</text><text x="440" y="175" class="tw" font-size="8">・施工事例を毎月1-2件追加</text><text x="440" y="190" class="tw" font-size="8">・設計コラムを月1本追加</text><text x="440" y="205" class="tw" font-size="8">・問い合わせCTA改善</text><text x="585" y="250" class="gold" text-anchor="middle" font-size="10" font-weight="bold">1年後の成果</text><text x="585" y="270" class="tw" text-anchor="middle" font-size="9">Google流入：月300人超</text><text x="585" y="290" class="tw" text-anchor="middle" font-size="9">問い合わせ：年12件</text><text x="585" y="310" class="tw" text-anchor="middle" font-size="9">新規受注：4件</text></g></svg>
