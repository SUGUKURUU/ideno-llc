<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">HP公開後の失敗パターン</text><text x="400" y="55" class="tg" text-anchor="middle">よくある間違い4つ</text><rect x="50" y="80" width="700" height="320" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/><text x="70" y="105" class="gold" font-size="11" font-weight="bold">失敗1：公開後、一切手を加えない</text><text x="70" y="125" class="tw" font-size="9">→ 情報が古くなり、Google評価も下がり、訪問者の信頼感も失われる</text><text x="70" y="145" class="tg" font-size="8">対策：「公開後3ヶ月以内にブログ3本追加」など具体的計画を立てる</text><line x1="50" y1="160" x2="750" y2="160" stroke="#c9a84c" stroke-width="1"/><text x="70" y="185" class="gold" font-size="11" font-weight="bold">失敗2：アクセス解析ツールを設置していない</text><text x="70" y="205" class="tw" font-size="9">→ 「何人来ているかわからない」状態では改善の手がかりがない</text><text x="70" y="225" class="tg" font-size="8">対策：制作会社に「GA4とサーチコンソール設定を含める」と明示</text><line x1="50" y1="240" x2="750" y2="240" stroke="#c9a84c" stroke-width="1"/><text x="70" y="265" class="gold" font-size="11" font-weight="bold">失敗3：SEOを「公開後の別作業」と考える</text><text x="70" y="285" class="tw" font-size="9">→ サイト構造がSEOに適していない状態で公開されてしまう</text><text x="70" y="305" class="tg" font-size="8">対策：制作段階からSEO対応を明示的に依頼</text><line x1="50" y1="320" x2="750" y2="320" stroke="#c9a84c" stroke-width="1"/><text x="70" y="345" class="gold" font-size="11" font-weight="bold">失敗4：コンテンツ更新を「気が向いた時」に行う</text><text x="70" y="365" class="tw" font-size="9">→ 3ヶ月で止まってしまい、継続が困難に</text><text x="70" y="385" class="tg" font-size="8">対策：「毎月第1水曜日」など仕組みを作る、または外部委託</text></svg>
