<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">ホームページ公開後に必要な5つのアクション</text><text x="400" y="55" class="tg" text-anchor="middle">「作って終わり」から「運用で成果」へ</text><line x1="80" y1="110" x2="720" y2="110" stroke="#c9a84c" stroke-width="2"/><g><circle cx="100" cy="110" r="12" fill="#c9a84c"/><text x="100" y="117" class="tw" text-anchor="middle" font-size="11" font-weight="bold">1</text></g><text x="100" y="150" class="tw" text-anchor="middle" font-size="10" font-weight="bold">Search Console</text><text x="100" y="168" class="tw" text-anchor="middle" font-size="9">登録・URL送信</text><text x="100" y="200" class="tg" text-anchor="middle" font-size="8">インデックス促進</text><g><circle cx="270" cy="110" r="12" fill="#c9a84c"/><text x="270" y="117" class="tw" text-anchor="middle" font-size="11" font-weight="bold">2</text></g><text x="270" y="150" class="tw" text-anchor="middle" font-size="10" font-weight="bold">Analytics</text><text x="270" y="168" class="tw" text-anchor="middle" font-size="9">GA4設置</text><text x="270" y="200" class="tg" text-anchor="middle" font-size="8">データ計測</text><g><circle cx="440" cy="110" r="12" fill="#c9a84c"/><text x="440" y="117" class="tw" text-anchor="middle" font-size="11" font-weight="bold">3</text></g><text x="440" y="150" class="tw" text-anchor="middle" font-size="10" font-weight="bold">コンテンツ</text><text x="440" y="168" class="tw" text-anchor="middle" font-size="9">定期更新</text><text x="440" y="200" class="tg" text-anchor="middle" font-size="8">月2-4本追加</text><g><circle cx="610" cy="110" r="12" fill="#c9a84c"/><text x="610" y="117" class="tw" text-anchor="middle" font-size="11" font-weight="bold">4</text></g><text x="610" y="150" class="tw" text-anchor="middle" font-size="10" font-weight="bold">SNS連動</text><text x="610" y="168" class="tw" text-anchor="middle" font-size="9">流入経路確保</text><text x="610" y="200" class="tg" text-anchor="middle" font-size="8">導線設計</text><g><circle cx="700" cy="110" r="12" fill="#c9a84c"/><text x="700" y="117" class="tw" text-anchor="middle" font-size="11" font-weight="bold">5</text></g><text x="700" y="150" class="tw" text-anchor="middle" font-size="10" font-weight="bold">分析・改善</text><text x="700" y="168" class="tw" text-anchor="middle" font-size="9">PDCA</text><text x="700" y="200" class="tg" text-anchor="middle" font-size="8">月次確認</text><rect x="60" y="240" width="680" height="150" fill="#c9a84c" opacity="0.1" rx="5"/><text x="400" y="265" class="gold" text-anchor="middle" font-size="12" font-weight="bold">ホームページの価値は「公開後の運用」で決まる</text><text x="400" y="290" class="tw" text-anchor="middle" font-size="11">制作費でも制作会社でもなく、継続的な運用が成果を左右する</text><text x="400" y="315" class="tw" text-anchor="middle" font-size="10">3-6ヶ月後から成果が出始め、1-2年で大きな資産になる</text><text x="400" y="360" class="gold" text-anchor="middle" font-size="10" font-weight="bold">★ 「完璧を目指す」より「継続する」が重要</text></svg>
