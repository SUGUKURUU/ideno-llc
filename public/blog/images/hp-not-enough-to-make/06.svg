<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px}.t{font-size:17px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">HP公開後のアクセス推移：予想タイムライン</text><text x="400" y="55" class="tg" text-anchor="middle">成果が出るまでのプロセス</text><line x1="80" y1="120" x2="720" y2="120" stroke="#c9a84c" stroke-width="2"/><g><circle cx="100" cy="120" r="10" fill="#c9a84c"/></g><text x="100" y="155" class="tw" text-anchor="middle" font-size="10" font-weight="bold">0ヶ月</text><text x="100" y="172" class="tw" text-anchor="middle" font-size="9">公開直後</text><text x="100" y="190" class="tg" text-anchor="middle" font-size="8">ほぼアクセス</text><text x="100" y="203" class="tg" text-anchor="middle" font-size="8">なし</text><g><circle cx="300" cy="120" r="10" fill="#c9a84c"/></g><text x="300" y="155" class="tw" text-anchor="middle" font-size="10" font-weight="bold">3ヶ月</text><text x="300" y="172" class="tw" text-anchor="middle" font-size="9">緩やかに増加</text><text x="300" y="190" class="tg" text-anchor="middle" font-size="8">検索開始</text><text x="300" y="203" class="tg" text-anchor="middle" font-size="8">される</text><g><circle cx="500" cy="120" r="10" fill="#c9a84c"/></g><text x="500" y="155" class="tw" text-anchor="middle" font-size="10" font-weight="bold">6ヶ月</text><text x="500" y="172" class="tw" text-anchor="middle" font-size="9">安定した流入</text><text x="500" y="190" class="tg" text-anchor="middle" font-size="8">複数キーワード</text><text x="500" y="203" class="tg" text-anchor="middle" font-size="8">で表示</text><g><circle cx="700" cy="120" r="10" fill="#c9a84c"/></g><text x="700" y="155" class="tw" text-anchor="middle" font-size="10" font-weight="bold">12ヶ月</text><text x="700" y="172" class="tw" t