<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">月次改善サイクル：PDCA実装</text><text x="400" y="55" class="tg" text-anchor="middle">データ駆動型の運用</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/><text x="400" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">毎月1回：確認すべき指標</text><line x1="70" y1="120" x2="730" y2="120" stroke="#c9a84c" stroke-width="1"/><text x="70" y="145" class="tw" font-size="9">✓ 前月比でセッション数・ユーザー数が増えているか</text><text x="70" y="163" class="tw" font-size="9">✓ どのページへのアクセスが多いか</text><text x="70" y="181" class="tw" font-size="9">✓ どのキーワードで検索されているか（SC確認）</text><text x="70" y="199" class="tw" font-size="9">✓ コンバージョン数はどうか</text><line x1="70" y1="215" x2="730" y2="215" stroke="#c9a84c" stroke-width="1"/><text x="400" y="245" class="gold" text-anchor="middle" font-size="11" font-weight="bold">改善の判断基準</text><text x="70" y="270" class="tw" font-size="9">訪問者少ない → SEO強化・SNS連動・ブログ更新</text><text x="70" y="288" class="tw" font-size="9">訪問あるが直帰率高 → ファーストビュー改善・読みやすさ改善</text><text x="70" y="306" class="tw" font-size="9">見ているが問い合わせない → CTA改善・信頼性要素追加</text><text x="70" y="324" class="tw" font-size="9">問い合わせあるが質が低 → ターゲット絞り込みコンテンツ充実</text></svg>
