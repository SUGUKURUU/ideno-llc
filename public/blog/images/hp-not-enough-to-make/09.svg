<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg"><defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:13px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px}.t{font-size:17px;font-weight:bold;fill:#fff}</style></defs><rect class="bg" width="800" height="420"/><text x="400" y="35" class="t" text-anchor="middle">HP運用で避けるべき失敗5つ</text><text x="400" y="55" class="tg" text-anchor="middle">実装しないとHP効果は0に</text><rect x="50" y="85" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/><text x="70" y="110" class="gold" font-size="10" font-weight="bold">失敗1：CMS（更新システム）なしの静的サイト</text><text x="70" y="130" class="tw" font-size="8">更新するたびに制作会社依頼→毎回費用発生</text><line x1="50" y1="143" x2="750" y2="143" stroke="#c9a84c" stroke-width="1"/><text x="70" y="168" class="gold" font-size="10" font-weight="bold">失敗2：制作費に予算集中→運用費ゼロ</text><text x="70" y="188" class="tw" font-size="8">制作100万→保守・更新費用がない→サイト放置</text><line x1="50" y1="201" x2="750" y2="201" stroke="#c9a84c" stroke-width="1"/><text x="70" y="226" class="gold" font-size="10" font-weight="bold">失敗3：素材準備遅延で制作期間延伸</text><text x="70" y="246" class="tw" font-size="8">3ヶ月→半年に。テキスト・画像準備を計画に組み込む</text><line x1="50" y1="259" x2="750" y2="259" stroke="#c9a84c" stroke-width="1"/><text x="70" y="284" class="gold" font-size="10" font-weight="bold">失敗4：「修正無制限」の罠</text><text x="70" y="304" class="tw" font-size="8">実は「確認・修正サイクルが何回でも」の意味。内容確認前に確認</text><line x1="50" y1="317" x2="750" y2="317" stroke="#c9a84c" stroke-width="1"/><text x="70" y="342" class="gold" font-size="10" font-weight="bold">失敗5：SEO対応を後付けにする</text><text x="70" y="362" class="tw" font-size="8">制作段階からSEO対応を明示的に依頼する必要あり</text></svg>
