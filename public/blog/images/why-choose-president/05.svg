<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用市場における「社長チェック」の浸透率</text>

  <!-- スケール背景 -->
  <rect x="100" y="80" width="600" height="50" fill="#333333" rx="5"/>

  <!-- 2015年 -->
  <rect x="100" y="80" width="30" height="50" fill="#c9a84c" rx="3"/>
  <text x="115" y="115" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2015</text>
  <text x="115" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5%</text>

  <!-- 2018年 -->
  <rect x="140" y="80" width="90" height="50" fill="#8b7355" rx="3"/>
  <text x="185" y="115" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2018</text>
  <text x="185" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">15%</text>

  <!-- 2021年 -->
  <rect x="240" y="80" width="210" height="50" fill="#555555" rx="3"/>
  <text x="345" y="115" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2021</text>
  <text x="345" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">35%</text>

  <!-- 2024年 -->
  <rect x="460" y="80" width="240" height="50" fill="#999999" rx="3"/>
  <text x="580" y="115" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2024</text>
  <text x="580" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">60%以上</text>

  <!-- チェック内容 -->
  <g>
    <text x="100" y="190" font-size="13" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">求職者がチェックする内容</text>
    <rect x="100" y="200" width="600" height="180" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

    <text x="120" y="225" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ Instagram・X（Twitter）アカウント</text>
    <text x="120" y="245" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ YouTube・ブログでの発信</text>
    <text x="120" y="265" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 新聞・雑誌のインタビュー記事</text>
    <text x="120" y="285" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 業界での知名度・評判</text>
    <text x="120" y="305" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ HPでの代表プロフィール・メッセージ</text>
    <text x="120" y="325" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ Google検索での口コミ・評価</text>
    <text x="120" y="345" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ LinkedIn での経歴・推薦</text>
    <text x="120" y="365" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ Wantedly、note等での発信</text>
  </g>
</svg>
