<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長ブランディング：よくある失敗パターン</text>

  <!-- 失敗1 -->
  <g>
    <rect x="80" y="80" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="100" y="105" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗1：権威を見せようとする</text>
    <text x="100" y="125" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「累計○億円」「○○受賞」</text>
    <text x="100" y="142" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ばかりで共感を生みにくい</text>
    <text x="100" y="159" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→ストーリーに転換すること</text>
  </g>

  <!-- 失敗2 -->
  <g>
    <rect x="410" y="80" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="430" y="105" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗2：企業のお知らせばかり</text>
    <text x="430" y="125" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「新サービスリリース」</text>
    <text x="430" y="142" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「○○のお知らせ」で差別化できず</text>
    <text x="430" y="159" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→社長個人の視点を前面に</text>
  </g>

  <!-- 失敗3 -->
  <g>
    <rect x="80" y="200" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="100" y="225" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗3：炎上を恐れすぎる</text>
    <text x="100" y="245" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「誰かに批判されそう」で</text>
    <text x="100" y="262" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">当たり障りのない発信のみ</text>
    <text x="100" y="279" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→特定層に強く刺さることが肝心</text>
  </g>

  <!-- 失敗4 -->
  <g>
    <rect x="410" y="200" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="430" y="225" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗4：短期で結果を求める</text>
    <text x="430" y="245" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「3ヶ月で効果がない」と</text>
    <text x="430" y="262" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">あきらめてしまう</text>
    <text x="430" y="279" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→6-12ヶ月は必須の期間</text>
  </g>

  <!-- 失敗5 -->
  <g>
    <rect x="80" y="320" width="640" height="70" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="100" y="345" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗5：発信内容と実態の乖離</text>
    <text x="100" y="365" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNSでは「従業員を大切に」と演出しながら、実態は離職率が高い。採用候補者が入社後にギャップを感じる</text>
  </g>
</svg>
