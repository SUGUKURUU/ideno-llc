<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長ブランド構築：オンライン vs オフライン</text>

  <!-- オンラインチャネル -->
  <rect x="80" y="80" width="310" height="280" fill="#c9a84c" opacity="0.1" stroke="#c9a84c" stroke-width="2" rx="5"/>
  <text x="235" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">オンラインチャネル</text>

  <text x="100" y="150" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ Instagram：日常を見せる</text>
  <text x="100" y="170" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ X（Twitter）：思考・知見</text>
  <text x="100" y="190" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ YouTube：深い発信</text>
  <text x="100" y="210" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ note：専門知識</text>
  <text x="100" y="230" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ LinkedIn：業界内認知</text>
  <text x="100" y="250" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ ホームページ：統一メッセージ</text>
  <text x="100" y="270" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ メールマガジン：深い関係構築</text>

  <text x="235" y="310" font-size="11" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">24/7 発信可能</text>
  <text x="235" y="330" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">費用：低コスト</text>

  <!-- オフラインチャネル -->
  <rect x="410" y="80" width="310" height="280" fill="#8b7355" opacity="0.1" stroke="#8b7355" stroke-width="2" rx="5"/>
  <text x="565" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#8b7355" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">オフラインチャネル</text>

  <text x="430" y="150" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 業界イベント登壇</text>
  <text x="430" y="170" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 商工会議所活動</text>
  <text x="430" y="190" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ メディア出演・掲載</text>
  <text x="430" y="210" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ セミナー・勉強会開催</text>
  <text x="430" y="230" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 交流会・ネットワーキング</text>
  <text x="430" y="250" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 業界団体での活動</text>
  <text x="430" y="270" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 寄稿・コラム執筆</text>

  <text x="565" y="310" font-size="11" font-weight="bold" text-anchor="middle" fill="#8b7355" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">深い信頼形成</text>
  <text x="565" y="330" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">費用：高い可能性</text>

  <text x="400" y="395" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">オンライン＋オフラインの連動により、相乗効果が生まれる</text>
</svg>
