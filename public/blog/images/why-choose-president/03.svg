<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">業種別：社長ブランドの効果度</text>

  <!-- グリッド背景 -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="290" x2="720" y2="290" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="230" x2="720" y2="230" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="170" x2="720" y2="170" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="110" x2="720" y2="110" stroke="#333333" stroke-width="1"/>

  <!-- Y軸ラベル -->
  <text x="50" y="355" font-size="11" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">低</text>
  <text x="50" y="175" font-size="11" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">中</text>
  <text x="50" y="115" font-size="11" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">高</text>

  <!-- バー1：コンサル・士業 -->
  <rect x="100" y="110" width="100" height="240" fill="#c9a84c"/>
  <text x="150" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">コンサル</text>
  <text x="150" y="385" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・士業</text>

  <!-- バー2：製造業 -->
  <rect x="230" y="160" width="100" height="190" fill="#8b7355"/>
  <text x="280" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">製造業</text>
  <text x="280" y="385" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif"></text>

  <!-- バー3：IT・スタートアップ -->
  <rect x="360" y="130" width="100" height="220" fill="#555555"/>
  <text x="410" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">IT・</text>
  <text x="410" y="385" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">スタートアップ</text>

  <!-- バー4：飲食・小売 -->
  <rect x="490" y="190" width="100" height="160" fill="#999999"/>
  <text x="540" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">飲食・小売</text>
  <text x="540" y="385" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif"></text>

  <!-- バー5：建設・不動産 -->
  <rect x="620" y="150" width="100" height="200" fill="#666666"/>
  <text x="670" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">建設・</text>
  <text x="670" y="385" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">不動産</text>

  <text x="400" y="405" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">コンサルなど「信頼が購買決定の鍵」業種ほど、社長ブランドが効果的</text>
</svg>
