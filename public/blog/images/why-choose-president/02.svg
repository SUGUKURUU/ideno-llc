<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS発信による信頼形成の段階</text>

  <!-- 段階1 -->
  <g>
    <circle cx="150" cy="200" r="50" fill="#c9a84c"/>
    <text x="150" y="190" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">初期</text>
    <text x="150" y="210" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1-3ヶ月</text>
  </circle>

  <!-- 矢印 -->
  <path d="M 210,200 L 250,200" stroke="#c9a84c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 段階2 -->
  <g>
    <circle cx="320" cy="200" r="55" fill="#8b7355"/>
    <text x="320" y="185" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知</text>
    <text x="320" y="210" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3-6ヶ月</text>
  </circle>

  <!-- 矢印 -->
  <path d="M 385,200 L 425,200" stroke="#8b7355" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 段階3 -->
  <g>
    <circle cx="495" cy="200" r="60" fill="#555555"/>
    <text x="495" y="180" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">信頼形成</text>
    <text x="495" y="210" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">6-12ヶ月</text>
  </circle>

  <!-- 矢印 -->
  <path d="M 565,200 L 605,200" stroke="#555555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- 段階4 -->
  <g>
    <circle cx="680" cy="200" r="60" fill="#999999"/>
    <text x="680" y="175" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ファン化</text>
    <text x="680" y="205" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">12ヶ月以上</text>
  </circle>

  <!-- 下部説明 -->
  <text x="150" y="290" font-size="10" fill="#aaaaaa" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー数増</text>
  <text x="320" y="290" font-size="10" fill="#aaaaaa" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「この人知ってる」</text>
  <text x="495" y="290" font-size="10" fill="#aaaaaa" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「この人なら信頼」</text>
  <text x="680" y="290" font-size="10" fill="#aaaaaa" text-anchor="middle" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「応援する」</text>

  <!-- 成果への影響 -->
  <rect x="100" y="330" width="600" height="70" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="120" y="355" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成果の最大化：採用応募 / 新規問い合わせ / 紹介依頼 は「信頼形成段階」以降に大幅に増加</text>
  <text x="120" y="375" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3ヶ月で結果を求めるのは時期尚早。6-12ヶ月継続がターニングポイント</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>
