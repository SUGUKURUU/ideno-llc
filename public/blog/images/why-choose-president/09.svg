<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長ブランド構築タイムライン</text>

  <!-- 0-1ヶ月 -->
  <g>
    <rect x="80" y="100" width="130" height="220" fill="#c9a84c" rx="5"/>
    <text x="145" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">0-1ヶ月</text>
    <line x1="100" y1="145" x2="190" y2="145" stroke="#111111" stroke-width="1"/>
    <text x="145" y="170" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・コンセプト</text>
    <text x="145" y="188" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・チャネル選定</text>
    <text x="145" y="206" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・初投稿</text>
    <text x="145" y="250" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
    <text x="145" y="265" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">0-100</text>
  </g>

  <!-- 1-3ヶ月 -->
  <g>
    <rect x="230" y="100" width="130" height="220" fill="#8b7355" rx="5"/>
    <text x="295" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1-3ヶ月</text>
    <line x1="250" y1="145" x2="340" y2="145" stroke="#ffffff" stroke-width="1"/>
    <text x="295" y="170" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・継続投稿</text>
    <text x="295" y="188" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・型作り</text>
    <text x="295" y="206" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・反応測定</text>
    <text x="295" y="250" font-size="9" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
    <text x="295" y="265" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">100-300</text>
  </g>

  <!-- 3-6ヶ月 -->
  <g>
    <rect x="380" y="100" width="130" height="220" fill="#555555" rx="5"/>
    <text x="445" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3-6ヶ月</text>
    <line x1="400" y1="145" x2="490" y2="145" stroke="#ffffff" stroke-width="1"/>
    <text x="445" y="170" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・認知拡大</text>
    <text x="445" y="188" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・ネットワーク</text>
    <text x="445" y="206" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・初問い合わせ</text>
    <text x="445" y="250" font-size="9" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
    <text x="445" y="265" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">500-1000</text>
  </g>

  <!-- 6-12ヶ月 -->
  <g>
    <rect x="530" y="100" width="130" height="220" fill="#999999" rx="5"/>
    <text x="595" y="130" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">6-12ヶ月</text>
    <line x1="550" y1="145" x2="640" y2="145" stroke="#111111" stroke-width="1"/>
    <text x="595" y="170" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・信頼確立</text>
    <text x="595" y="188" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・効果実感</text>
    <text x="595" y="206" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・ファン化</text>
    <text x="595" y="250" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
    <text x="595" y="265" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1000-3000</text>
  </g>

  <text x="400" y="370" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">各フェーズでの課題や目標が異なる。継続がすべてを解決する</text>
  <text x="400" y="390" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">12ヶ月以降は「ファン化」から「ビジネス効果」へ転換</text>
</svg>
