<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">発信チャネル別：効果測定指標</text>

  <!-- X（Twitter） -->
  <rect x="80" y="90" width="140" height="280" fill="#c9a84c" rx="5" stroke="#c9a84c" stroke-width="1"/>
  <text x="150" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">X</text>
  <text x="150" y="135" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">リアルタイム性</text>

  <text x="150" y="165" font-size="10" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    <tspan x="95" dy="0">・フォロワー数</tspan>
    <tspan x="95" dy="15">・リツイート数</tspan>
    <tspan x="95" dy="15">・クリック率</tspan>
    <tspan x="95" dy="15">・エンゲージ</tspan>
    <tspan x="95" dy="12">メント率</tspan>
  </text>

  <!-- Instagram -->
  <rect x="240" y="90" width="140" height="280" fill="#8b7355" rx="5" stroke="#8b7355" stroke-width="1"/>
  <text x="310" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Instagram</text>
  <text x="310" y="135" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ビジュアル重視</text>

  <text x="310" y="165" font-size="10" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    <tspan x="250" dy="0">・フォロワー数</tspan>
    <tspan x="250" dy="15">・いいね数</tspan>
    <tspan x="250" dy="15">・コメント数</tspan>
    <tspan x="250" dy="15">・DM問い合わせ</tspan>
    <tspan x="250" dy="12">・プロフアクセス</tspan>
  </text>

  <!-- YouTube -->
  <rect x="400" y="90" width="140" height="280" fill="#555555" rx="5" stroke="#555555" stroke-width="1"/>
  <text x="470" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">YouTube</text>
  <text x="470" y="135" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">長期資産</text>

  <text x="470" y="165" font-size="10" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    <tspan x="410" dy="0">・視聴数</tspan>
    <tspan x="410" dy="15">・視聴継続率</tspan>
    <tspan x="410" dy="15">・高評価数</tspan>
    <tspan x="410" dy="15">・コメント数</tspan>
    <tspan x="410" dy="12">・クリック率</tspan>
  </text>

  <!-- LinkedIn -->
  <rect x="560" y="90" width="140" height="280" fill="#999999" rx="5" stroke="#999999" stroke-width="1"/>
  <text x="630" y="115" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">LinkedIn</text>
  <text x="630" y="135" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">BtoB特化</text>

  <text x="630" y="165" font-size="10" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    <tspan x="570" dy="0">・フォロワー数</tspan>
    <tspan x="570" dy="15">・リーチ数</tspan>
    <tspan x="570" dy="15">・エンゲージ</tspan>
    <tspan x="570" dy="12">メント率</tspan>
    <tspan x="570" dy="15">・DM問い合わせ</tspan>
  </text>

  <text x="400" y="405" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">チャネルごとに異なるKPIを設定し、月次で効果を検証</text>
</svg>
