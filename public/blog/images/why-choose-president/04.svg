<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">パーソナルブランド構築の5要素</text>

  <!-- 中央の円 -->
  <circle cx="400" cy="220" r="80" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="2"/>
  <text x="400" y="215" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長</text>
  <text x="400" y="235" font-size="13" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ブランド</text>

  <!-- 要素1：ビジョン -->
  <circle cx="150" cy="100" r="45" fill="#c9a84c" stroke="#c9a84c" stroke-width="2"/>
  <text x="150" y="105" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ビジョン</text>
  <text x="150" y="125" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">何を実現したいか</text>
  <line x1="185" y1="135" x2="330" y2="180" stroke="#c9a84c" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 要素2：行動 -->
  <circle cx="650" cy="100" r="45" fill="#8b7355" stroke="#8b7355" stroke-width="2"/>
  <text x="650" y="105" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">行動</text>
  <text x="650" y="125" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">実際の取り組み</text>
  <line x1="615" y1="135" x2="470" y2="180" stroke="#8b7355" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 要素3：人柄 -->
  <circle cx="400" cy="340" r="45" fill="#555555" stroke="#555555" stroke-width="2"/>
  <text x="400" y="340" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">人柄</text>
  <text x="400" y="360" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">個性・価値観</text>
  <line x1="400" y1="295" x2="400" y2="310" stroke="#555555" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 要素4：知見 -->
  <circle cx="100" cy="280" r="45" fill="#999999" stroke="#999999" stroke-width="2"/>
  <text x="100" y="280" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">知見</text>
  <text x="100" y="300" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">経験・学び</text>
  <line x1="135" y1="260" x2="320" y2="240" stroke="#999999" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- 要素5：発信 -->
  <circle cx="700" cy="280" r="45" fill="#666666" stroke="#666666" stroke-width="2"/>
  <text x="700" y="280" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">発信</text>
  <text x="700" y="300" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS・動画</text>
  <line x1="665" y1="260" x2="480" y2="240" stroke="#666666" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="400" y="405" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5つの要素が有機的に連結することで、強いブランドが形成される</text>
</svg>
