<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ワンコンテンツ・マルチ展開</text>

  <rect x="100" y="90" width="600" height="300" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="120" y="120" font-size="12" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1本の長尺動画（10分）から以下を生成：</text>
  <line x1="120" y1="135" x2="680" y2="135" stroke="#333333" stroke-width="1"/>

  <text x="130" y="165" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ ショート動画（30秒版） → Instagram Reels・TikTok・YouTube Shorts</text>
  <text x="130" y="190" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ サムネイル画像＋冒頭30秒 → X・Instagram投稿</text>
  <text x="130" y="215" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 動画の内容をテキスト化 → ブログ記事・noteコンテンツ</text>
  <text x="130" y="240" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 名言・セリフ抜粋 → カード画像投稿</text>
  <text x="130" y="265" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 撮影の裏側 → Instagram Story・Behind-the-scenes</text>

  <text x="400" y="325" font-size="11" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">制作コスト：1本分 → 効果：5-10倍（各チャネルで複数コンテンツ）</text>
</svg>
