<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP内での動画配置戦略</text>

  <text x="100" y="100" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">トップページファーストビュー</text>
  <text x="130" y="125" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">15-30秒のブランド動画→訪問者の離脱防止・世界観伝達</text>

  <text x="100" y="165" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">サービス紹介ページ</text>
  <text x="130" y="190" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">サービス詳細説明動画→テキストでは伝わらない「使い勝手」を補完</text>

  <text x="100" y="230" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">事例・実績ページ</text>
  <text x="130" y="255" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">顧客インタビュー動画→テキスト体験談より信頼性が高い</text>

  <text x="100" y="295" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用ページ</text>
  <text x="130" y="320" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社内の様子・社員インタビュー動画→採用候補者の不安を解消</text>
</svg>
