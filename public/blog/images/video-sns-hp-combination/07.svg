<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成功事例：社長密着動画が全媒体に波及</text>

  <rect x="80" y="90" width="640" height="280" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="100" y="120" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">施策：代表弁護士の一日密着動画を制作</text>

  <text x="100" y="150" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・YouTube長尺版 → Instagramリール・X投稿で告知 → HP採用ページに埋め込み</text>

  <text x="100" y="180" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：</text>
  <text x="130" y="205" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ HP問い合わせ：通常月比2.3倍（2週間で増加）</text>
  <text x="130" y="225" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ Instagramフォロワー：3週間で+800人</text>
  <text x="130" y="245" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 商談時「動画を見ました」が増加→初回面談時間短縮</text>

  <text x="100" y="280" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ポイント：士業は「人間性」の開示が信頼形成の決め手。動画での「人格」公開が極めて有効</text>
</svg>
