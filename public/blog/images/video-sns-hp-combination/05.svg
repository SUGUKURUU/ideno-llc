<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">チャネル間の導線設計</text>

  <rect x="80" y="100" width="640" height="280" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="100" y="130" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS → HP</text>
  <text x="130" y="155" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ プロフィールリンクにHP URLを設置（必須）</text>
  <text x="130" y="175" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 投稿末尾に「詳細はプロフィールから」と記載</text>

  <text x="100" y="215" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP → SNS</text>
  <text x="130" y="240" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ フッターにSNSアイコンを設置</text>
  <text x="130" y="260" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ ブログにSNS シェアボタン設置</text>

  <text x="100" y="300" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画 → HP</text>
  <text x="130" y="325" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ YouTube概要欄にHP リンク必須　✓ 動画内で「詳細はHP」と案内</text>
</svg>
