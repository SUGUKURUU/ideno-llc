<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">三位一体戦略：実装チェックリスト</text>

  <rect x="80" y="80" width="640" height="320" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="100" y="110" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Step1: 動画制作</text>
  <text x="130" y="135" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">□ 長尺動画1本（3-10分）制作　□ YouTube にアップロード</text>
  <text x="130" y="155" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">□ ショート動画（30秒版）作成　□ 概要欄にHP URLを記載</text>

  <text x="100" y="195" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Step2: SNS配信</text>
  <text x="130" y="220" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">□ Instagram・X・TikTokで告知投稿　□ プロフィールリンク確認</text>
  <text x="130" y="240" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">□ ショート動画を各プラットフォームで配信</text>

  <text x="100" y="280" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Step3: HP掲載・導線設定</text>
  <text x="130" y="305" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">□ トップページ・採用ページに動画埋め込み　□ SNS→HP導線確認</text>
  <text x="130" y="325" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">□ HP→SNS導線確認　□ 全チャネルでメッセージ一貫性確認</text>

  <text x="400" y="375" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3つが揃って初めて、認知→信頼→行動の完全な流れが完成する</text>
</svg>
