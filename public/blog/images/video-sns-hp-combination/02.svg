<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">顧客ジャーニー：認知→信頼→行動</text>

  <circle cx="150" cy="150" r="50" fill="#c9a84c"/>
  <text x="150" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1. 認知</text>
  <text x="150" y="210" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS</text>

  <path d="M 210,150 L 270,150" stroke="#c9a84c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <circle cx="360" cy="150" r="50" fill="#8b7355"/>
  <text x="360" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2. 理解</text>
  <text x="360" y="210" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>

  <path d="M 420,150 L 480,150" stroke="#8b7355" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <circle cx="570" cy="150" r="50" fill="#555555"/>
  <text x="570" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3. 検討</text>
  <text x="570" y="210" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP</text>

  <path d="M 630,150 L 690,150" stroke="#555555" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <circle cx="735" cy="150" r="30" fill="#999999"/>
  <text x="735" y="155" font-size="10" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">4.行動</text>

  <rect x="80" y="270" width="640" height="130" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="100" y="300" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto sans JP',sans-serif">この流れが整っていることが三位一体戦略の成功条件</text>
  <text x="100" y="325" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">どれか1つが欠けると、顧客は離脱する</text>
  <text x="100" y="350" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">例：SNSで認知→動画なし→HPで情報不足→問い合わせせず</text>
  <text x="100" y="370" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">　 SNS・動画・HPすべてが揃えば、各段階で顧客が進む</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>
