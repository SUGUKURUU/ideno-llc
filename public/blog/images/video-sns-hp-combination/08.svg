<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成功事例：サービス紹介動画が成約率1.8倍に</text>

  <rect x="80" y="90" width="640" height="280" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="100" y="120" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">施策：3分のサービス紹介動画を制作</text>

  <text x="100" y="150" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・LinkedIn広告・Instagram広告で配信 → HP LPに掲載</text>

  <text x="100" y="180" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：</text>
  <text x="130" y="205" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 動画ありLPと動画なしLPを比較：問い合わせ率1.8倍</text>
  <text x="130" y="225" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ LinkedIn広告クリック率：業界平均の2倍超</text>
  <text x="130" y="245" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ HP平均滞在時間：+45秒（動画掲載前比）</text>

  <text x="100" y="280" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ポイント：動画はSNS広告の「素材」としても使え、制作費の効果が一層高まる</text>
