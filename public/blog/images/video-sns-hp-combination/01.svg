<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">三位一体戦略：各チャネルの役割</text>

  <g>
    <rect x="80" y="90" width="200" height="280" fill="#c9a84c" opacity="0.2" stroke="#c9a84c" stroke-width="2" rx="3"/>
    <text x="180" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>
    <text x="180" y="165" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">感情移入</text>
    <text x="180" y="185" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">信頼形成</text>
    <text x="180" y="220" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">情報量が豊富で、言語化しにくい魅力を伝える</text>
  </g>

  <g>
    <rect x="300" y="90" width="200" height="280" fill="#8b7355" opacity="0.2" stroke="#8b7355" stroke-width="2" rx="3"/>
    <text x="400" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#8b7355" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS</text>
    <text x="400" y="165" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知拡大</text>
    <text x="400" y="185" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">拡散</text>
    <text x="400" y="220" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">アルゴリズム拡散で潜在顧客にリーチできる</text>
  </g>

  <g>
    <rect x="520" y="90" width="200" height="280" fill="#555555" opacity="0.2" stroke="#555555" stroke-width="2" rx="3"/>
    <text x="620" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#555555" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP</text>
    <text x="620" y="165" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">意思決定</text>
    <text x="620" y="185" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">コンバージョン</text>
    <text x="620" y="220" font-size="10" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">詳細情報を体系的に提示し、問い合わせに転換</text>
  </g>
</svg>
