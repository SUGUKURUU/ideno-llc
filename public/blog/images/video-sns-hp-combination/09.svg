<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画制作のコスト vs 効果：ROI分析</text>

  <rect x="80" y="90" width="640" height="300" fill="none" stroke="#333333" stroke-width="1" rx="3"/>

  <text x="100" y="120" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">初期投資：長尺動画1本 50-100万円</text>

  <text x="100" y="155" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1本の動画から派生するコンテンツ：</text>
  <text x="130" y="180" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ ショート動画5-10本（SNS配信用）</text>
  <text x="130" y="200" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ テキストコンテンツ3-5本（ブログ・note）</text>
  <text x="130" y="220" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ HP掲載・採用ページ・LP用素材</text>

  <text x="100" y="260" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：年間20-30件の新規問い合わせ獲得が見込める場合、</text>
  <text x="100" y="285" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">従来の採用媒体費用（年100-200万円）の大幅削減が可能</text>

  <text x="400" y="330" font-size="11" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3-6ヶ月で初期投資を回収できるケースが多い</text>
</svg>
