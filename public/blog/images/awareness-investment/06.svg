<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs>
  <rect class="bg" width="800" height="420"/>
  <text x="400" y="35" class="t" text-anchor="middle">失敗パターン：認知拡大で陥る罠</text>
  <text x="400" y="55" class="tg" text-anchor="middle">よくある間違い5つ</text>

  <rect x="50" y="80" width="700" height="310" fill="none" stroke="#c9a84c" stroke-width="1" rx="3"/>

  <text x="70" y="105" class="gold" font-size="11" font-weight="bold">失敗1：広告費を最初に使い過ぎる</text>
  <text x="70" y="125" class="tw" font-size="9">創業直後に月20-30万円を広告に投じる→着地先が未整備で離脱率高→問い合わせゼロ</text>
  <text x="70" y="145" class="tg" font-size="9">対策：広告は基盤が整ってから。最初の予算80%をコンテンツ発信に</text>

  <line x1="50" y1="160" x2="750" y2="160" stroke="#c9a84c" stroke-width="1"/>

  <text x="70" y="185" class="gold" font-size="11" font-weight="bold">失敗2：高品質HPだけに投資</text>
  <text x="70" y="205" class="tw" font-size="9">100-200万円かけてHP制作→月間訪問者数十人→宝の持ち腐れ</text>
  <text x="70" y="225" class="tg" font-size="9">対策：HP制作費をコンテンツ発信・集客費用と合わせて予算化</text>

  <line x1="50" y1="240" x2="750" y2="240" stroke="#c9a84c" stroke-width="1"/>

  <text x="70" y="265" class="gold" font-size="11" font-weight="bold">失敗3：複数施策に分散投資</text>
  <text x="70" y="285" class="tw" font-size="9">月5万円を各1万円ずつ5施策に分散→全部中途半端で効果なし</text>
  <text x="70" y="305" class="tg" font-size="9">対策：1つの施策に予算70%以上を集中。小さく始めて成功パターンを作る</text>

  <line x1="50" y1="320" x2="750" y2="320" stroke="#c9a84c" stroke-width="1"/>

  <text x="70" y="345" class="gold" font-size="11" font-weight="bold">失敗4：成果の定義が曖昧</text>
  <text x="70" y="365" class="tw" font-size="9">「認知が広がった気がする」と感覚的に判断→実際の問い合わせは増えず</text>
  <text x="70" y="385" class="tg" font-size="9">対策：投資前に3ヶ月後の目標数値を設定（訪問者500人・フォロワー+200など）</text>
</svg>
