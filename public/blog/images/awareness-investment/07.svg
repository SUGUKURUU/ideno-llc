<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs>
  <rect class="bg" width="800" height="420"/>
  <text x="400" y="35" class="t" text-anchor="middle">成功事例：認知拡大の実績</text>
  <text x="400" y="55" class="tg" text-anchor="middle">SNS運用代行で成果が出た企業</text>

  <g>
    <rect x="50" y="85" width="330" height="300" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="215" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">事例A：月5万円でSNS代行</text>
    <text x="215" y="130" class="tw" text-anchor="middle" font-size="9">経営コンサルティング会社（代表1名）</text>
    <line x1="70" y1="140" x2="360" y2="140" stroke="#c9a84c" stroke-width="1"/>
    <text x="70" y="165" class="tw" font-size="9">【6ヶ月の成果】</text>
    <text x="70" y="185" class="tw" font-size="9">✓ Instagram：300人→2,100人</text>
    <text x="70" y="205" class="tw" font-size="9">✓ HP訪問者：80人→420人</text>
    <text x="70" y="225" class="tw" font-size="9">✓ 問い合わせ：0-1件→8-12件</text>
    <text x="215" y="260" class="tg" text-anchor="middle" font-size="9">ポイント：広告なし、オーガニック運用のみ</text>
    <text x="215" y="280" class="tg" text-anchor="middle" font-size="9">継続性・質・戦略性が効果的</text>
  </g>

  <g>
    <rect x="420" y="85" width="330" height="300" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="585" y="110" class="gold" text-anchor="middle" font-size="11" font-weight="bold">事例B：SNS検証→HP制作</text>
    <text x="585" y="130" class="tw" text-anchor="middle" font-size="9">スタートアップ新規サービス立ち上げ</text>
    <line x1="440" y1="140" x2="730" y2="140" stroke="#c9a84c" stroke-width="1"/>
    <text x="440" y="165" class="tw" font-size="9">【戦略】</text>
    <text x="440" y="185" class="tw" font-size="9">✓ Instagramで価値提案を試験</text>
    <text x="440" y="205" class="tw" font-size="9">✓ フォロワーの反応を収集</text>
    <text x="440" y="225" class="tw" font-size="9">✓ 声を反映してHP制作</text>
    <text x="585" y="260" class="tg" text-anchor="middle" font-size="9">結果：CVR高いサイトを低コストで実現</text>
    <text x="585" y="280" class="tg" text-anchor="middle" font-size="9">SNSはマーケットリサーチの場に</text>
  </g>
</svg>
