<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.bg{fill:#111111}.gold{fill:#c9a84c}.tw{fill:#fff;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px}.tg{fill:#aaa;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:12px}.t{font-size:18px;font-weight:bold;fill:#fff}</style></defs>
  <rect class="bg" width="800" height="420"/>
  <text x="400" y="35" class="t" text-anchor="middle">オーガニック vs 有料広告</text>
  <text x="400" y="55" class="tg" text-anchor="middle">使い分けと組み合わせ方</text>

  <g>
    <rect x="50" y="85" width="340" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="220" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">オーガニックマーケティング</text>
    <text x="220" y="135" class="tg" text-anchor="middle" font-size="9">SNS・SEO・コンテンツ</text>
    <line x1="70" y1="145" x2="370" y2="145" stroke="#c9a84c" stroke-width="1"/>
    <text x="70" y="170" class="tw" font-size="10">即効性：低い（3-12ヶ月）</text>
    <text x="70" y="190" class="tw" font-size="10">継続性：高い（資産化）</text>
    <text x="70" y="210" class="tw" font-size="10">コスト：低〜中</text>
    <text x="70" y="230" class="tw" font-size="10">適フェーズ：0〜2</text>
    <text x="220" y="280" class="gold" text-anchor="middle" font-size="11" font-weight="bold">投資と成長の</text>
    <text x="220" y="298" class="gold" text-anchor="middle" font-size="11" font-weight="bold">両立が可能</text>
    <text x="220" y="380" class="tg" text-anchor="middle" font-size="9">長期的に最高のROI</text>
  </g>

  <g>
    <rect x="410" y="85" width="340" height="310" fill="none" stroke="#c9a84c" stroke-width="2" rx="5"/>
    <text x="580" y="110" class="gold" text-anchor="middle" font-size="12" font-weight="bold">有料広告</text>
    <text x="580" y="135" class="tg" text-anchor="middle" font-size="9">SNS広告・検索広告</text>
    <line x1="430" y1="145" x2="730" y2="145" stroke="#c9a84c" stroke-width="1"/>
    <text x="430" y="170" class="tw" font-size="10">即効性：高い（翌日から）</text>
    <text x="430" y="190" class="tw" font-size="10">継続性：低い（停止で終了）</text>
    <text x="430" y="210" class="tw" font-size="10">コスト：中〜高</text>
    <text x="430" y="230" class="tw" font-size="10">適フェーズ：2〜3</text>
    <text x="580" y="280" class="gold" text-anchor="middle" font-size="11" font-weight="bold">基盤がある場合</text>
    <text x="580" y="298" class="gold" text-anchor="middle" font-size="11" font-weight="bold">最高の効果</text>
    <text x="580" y="380" class="tg" text-anchor="middle" font-size="9">短期的な成果が重要</text>
  </g>
</svg>
