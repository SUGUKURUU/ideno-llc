<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="30" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">CTAボタン文言別クリック率（CTR）比較 A/Bテスト結果</text>

  <!-- Axes -->
  <line x1="80" y1="55" x2="80" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="80" y1="340" x2="750" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Grid -->
  <line x1="80" y1="272" x2="750" y2="272" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="204" x2="750" y2="204" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="136" x2="750" y2="136" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="68" x2="750" y2="68" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y labels: 0,1,2,3,4,5,6% → 0〜6% = 272px range → 1%=45.3px -->
  <text x="70" y="344" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">0%</text>
  <text x="70" y="276" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">1.5%</text>
  <text x="70" y="208" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">3.0%</text>
  <text x="70" y="140" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">4.5%</text>
  <text x="70" y="72" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">6.0%</text>

  <!-- Bar 1: お問い合わせ 2.1% → h=2.1/6*272=95, y=340-95=245 -->
  <rect x="115" y="245" width="100" height="95" rx="4" fill="#c9a84c" opacity="0.5"/>
  <rect x="115" y="245" width="100" height="6" rx="2" fill="#c9a84c"/>
  <text x="165" y="238" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">2.1%</text>
  <rect x="100" y="352" width="130" height="34" rx="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="165" y="366" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">「お問い合わせ」</text>
  <text x="165" y="380" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">一般的なボタン文言</text>

  <!-- Bar 2: 無料相談する 3.8% → h=3.8/6*272=172, y=168 -->
  <rect x="283" y="168" width="100" height="172" rx="4" fill="#c9a84c" opacity="0.65"/>
  <rect x="283" y="168" width="100" height="6" rx="2" fill="#c9a84c"/>
  <text x="333" y="161" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">3.8%</text>
  <rect x="268" y="352" width="130" height="34" rx="5" fill="rgba(201,168,76,0.1)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="333" y="366" fill="rgba(255,255,255,0.8)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">「無料相談する」</text>
  <text x="333" y="380" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">ハードル低減</text>

  <!-- Bar 3: まずは話を聞く 4.2% → h=4.2/6*272=190, y=150 -->
  <rect x="451" y="150" width="100" height="190" rx="4" fill="#c9a84c" opacity="0.8"/>
  <rect x="451" y="150" width="100" height="6" rx="2" fill="#c9a84c"/>
  <text x="501" y="143" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">4.2%</text>
  <rect x="436" y="352" width="130" height="34" rx="5" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <text x="501" y="366" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">「まずは話を聞く」</text>
  <text x="501" y="380" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">親しみやすい表現</text>

  <!-- Bar 4: 30秒で申し込む 5.1% → h=5.1/6*272=231, y=109 -->
  <rect x="619" y="109" width="100" height="231" rx="4" fill="#c9a84c" opacity="0.95"/>
  <rect x="619" y="109" width="100" height="6" rx="2" fill="#c9a84c"/>
  <text x="669" y="100" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="15" font-weight="bold" text-anchor="middle">5.1%</text>
  <!-- Crown -->
  <text x="669" y="86" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" text-anchor="middle">★</text>
  <rect x="604" y="352" width="130" height="34" rx="5" fill="rgba(201,168,76,0.25)" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="669" y="366" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">「30秒で申し込む」</text>
  <text x="669" y="380" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">具体性で不安を解消</text>

  <!-- Improvement arrows -->
  <text x="400" y="410" fill="rgba(255,255,255,0.3)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">※ 同一サービスページでのA/Bテスト参考値。業種・サービスにより異なります。</text>
</svg>
