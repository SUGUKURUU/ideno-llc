<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="30" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">ページ表示速度とCV率の相関</text>

  <!-- Axes -->
  <line x1="100" y1="55" x2="100" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="340" x2="720" y2="340" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Y grid -->
  <line x1="100" y1="272" x2="720" y2="272" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="204" x2="720" y2="204" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="136" x2="720" y2="136" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="68" x2="720" y2="68" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y labels: 0〜4% in 272px range → 1%=68px -->
  <text x="88" y="344" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">0%</text>
  <text x="88" y="276" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">1%</text>
  <text x="88" y="208" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">2%</text>
  <text x="88" y="140" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">3%</text>
  <text x="88" y="72" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="end">4%</text>

  <!-- X labels: 1s,2s,3s,4s,5s at x=155,310,465,620 -->
  <!-- spacing: (720-100)/4=155 -->
  <text x="155" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">1秒</text>
  <text x="310" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">2秒</text>
  <text x="465" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">3秒</text>
  <text x="620" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">4秒</text>
  <text x="720" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" text-anchor="middle">5秒</text>
  <text x="400" y="378" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">← 表示速度（秒）</text>

  <!-- Data points: 1s=3.2%, 2s=2.1%, 3s=1.4%, 4s=0.9%, 5s=0.6% -->
  <!-- y = 340 - (val/4)*272 -->
  <!-- 1s: y=340-3.2/4*272=340-217.6=122.4≈122 -->
  <!-- 2s: y=340-2.1/4*272=340-142.8=197.2≈197 -->
  <!-- 3s: y=340-1.4/4*272=340-95.2=244.8≈245 -->
  <!-- 4s: y=340-0.9/4*272=340-61.2=278.8≈279 -->
  <!-- 5s: y=340-0.6/4*272=340-40.8=299.2≈299 -->

  <!-- Area fill -->
  <polygon points="155,122 310,197 465,245 620,279 720,299 720,340 155,340" fill="rgba(201,168,76,0.1)"/>

  <!-- Line -->
  <polyline points="155,122 310,197 465,245 620,279 720,299" fill="none" stroke="#c9a84c" stroke-width="2.5"/>

  <!-- Points -->
  <circle cx="155" cy="122" r="6" fill="#c9a84c"/>
  <circle cx="310" cy="197" r="6" fill="#c9a84c"/>
  <circle cx="465" cy="245" r="6" fill="#c9a84c"/>
  <circle cx="620" cy="279" r="6" fill="#c9a84c"/>
  <circle cx="720" cy="299" r="6" fill="#ff5c3c"/>

  <!-- Value labels -->
  <text x="155" y="110" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">3.2%</text>
  <text x="310" y="185" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">2.1%</text>
  <text x="465" y="233" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">1.4%</text>
  <text x="620" y="267" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">0.9%</text>
  <text x="720" y="287" fill="#ff5c3c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">0.6%</text>

  <!-- Annotations -->
  <rect x="108" y="58" width="110" height="32" rx="4" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/>
  <text x="163" y="72" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">★ 理想: 1秒以内</text>
  <text x="163" y="84" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">CV率が最大になる</text>

  <rect x="378" y="220" width="174" height="32" rx="4" fill="rgba(255,80,60,0.1)" stroke="rgba(255,80,60,0.35)" stroke-width="1"/>
  <text x="465" y="234" fill="#ff5c3c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">⚠ 3秒超で離脱急増</text>
  <text x="465" y="246" fill="rgba(255,255,255,0.45)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">Googleも3秒以内を推奨</text>

  <text x="400" y="400" fill="rgba(255,255,255,0.3)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">※ Google調査をもとにした参考値。業種・デバイスにより異なります。</text>
</svg>
