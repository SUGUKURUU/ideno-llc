<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="30" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">信頼性要素が問い合わせ率に与える影響（相対値）</text>

  <!-- X axis -->
  <line x1="60" y1="380" x2="760" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- X grid -->
  <line x1="60" y1="55" x2="760" y2="55" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="200" y1="55" x2="200" y2="380" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="55" x2="340" y2="380" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="480" y1="55" x2="480" y2="380" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="55" x2="620" y2="380" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="760" y1="55" x2="760" y2="380" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- X labels -->
  <text x="60" y="396" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">0%</text>
  <text x="200" y="396" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">+10%</text>
  <text x="340" y="396" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">+20%</text>
  <text x="480" y="396" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">+30%</text>
  <text x="620" y="396" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">+40%</text>
  <text x="760" y="396" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">+50%</text>

  <!-- Rows: 5 items, each height ~52px -->
  <!-- 1. 実績・導入事例 +45% → width = 45/50*(760-60)=630px -->
  <text x="55" y="86" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">実績・導入事例</text>
  <rect x="60" y="68" width="630" height="30" rx="5" fill="#c9a84c" opacity="0.9"/>
  <text x="698" y="88" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold">+45%</text>
  <text x="55" y="100" fill="rgba(255,255,255,0.35)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="end">最も効果的</text>

  <!-- 2. お客様の声・レビュー +38% → width=532 -->
  <text x="55" y="146" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">お客様の声・レビュー</text>
  <rect x="60" y="128" width="532" height="30" rx="5" fill="#c9a84c" opacity="0.78"/>
  <text x="600" y="148" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold">+38%</text>

  <!-- 3. メディア掲載実績 +22% → width=308 -->
  <text x="55" y="206" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">メディア掲載実績</text>
  <rect x="60" y="188" width="308" height="30" rx="5" fill="#4a8fd4" opacity="0.82"/>
  <text x="376" y="208" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold">+22%</text>

  <!-- 4. 代表者の顔写真 +25% → width=350 -->
  <text x="55" y="266" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">代表者の顔写真</text>
  <rect x="60" y="248" width="350" height="30" rx="5" fill="#4a8fd4" opacity="0.7"/>
  <text x="418" y="268" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold">+25%</text>

  <!-- 5. 認定・受賞歴 +18% → width=252 -->
  <text x="55" y="326" fill="rgba(255,255,255,0.85)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" text-anchor="end">認定・受賞歴</text>
  <rect x="60" y="308" width="252" height="30" rx="5" fill="#4a8fd4" opacity="0.55"/>
  <text x="320" y="328" fill="#4a8fd4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold">+18%</text>

  <text x="400" y="414" fill="rgba(255,255,255,0.3)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">※ 同一条件の信頼要素なしページと比較した場合の問い合わせ率向上の参考値</text>
</svg>
