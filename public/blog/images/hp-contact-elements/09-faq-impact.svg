<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="28" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">FAQセクションの問い合わせへの効果</text>

  <!-- Without FAQ -->
  <g>
    <text x="200" y="55" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">FAQ なし</text>

    <!-- Visitor flow without FAQ -->
    <circle cx="120" cy="100" r="20" fill="rgba(201,168,76,0.3)" stroke="#c9a84c" stroke-width="1.5"/>
    <text x="120" y="108" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">訪問者</text>
    <text x="120" y="145" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">100人</text>

    <!-- Arrow down -->
    <line x1="120" y1="125" x2="120" y2="160" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- Service page -->
    <rect x="70" y="170" width="100" height="50" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="120" y="190" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">サービス説明</text>
    <text x="120" y="205" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">ページ</text>

    <!-- Arrow down -->
    <line x1="120" y1="225" x2="120" y2="260" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
    <polygon points="115,255 120,265 125,255" fill="rgba(201,168,76,0.3)"/>

    <!-- Doubts -->
    <circle cx="120" cy="290" r="18" fill="rgba(220,38,38,0.2)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="120" y="298" fill="#fca5a5" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold" text-anchor="middle">疑問</text>
    <text x="120" y="328" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">35%</text>
    <text x="120" y="345" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">問い合わせに</text>
    <text x="120" y="358" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">至らず離脱</text>
  </g>

  <!-- With FAQ -->
  <g>
    <text x="600" y="55" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">FAQ あり</text>

    <!-- Visitor flow with FAQ -->
    <circle cx="600" cy="100" r="20" fill="rgba(201,168,76,0.3)" stroke="#c9a84c" stroke-width="1.5"/>
    <text x="600" y="108" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">訪問者</text>
    <text x="600" y="145" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">100人</text>

    <!-- Arrow down -->
    <line x1="600" y1="125" x2="600" y2="160" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- Service page -->
    <rect x="550" y="170" width="100" height="50" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="600" y="190" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">サービス説明</text>
    <text x="600" y="205" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">ページ</text>

    <!-- Arrow down -->
    <line x1="600" y1="225" x2="600" y2="260" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="4,4"/>

    <!-- FAQ section -->
    <rect x="550" y="265" width="100" height="40" rx="5" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    <text x="600" y="283" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">FAQ</text>
    <text x="600" y="298" fill="rgba(74,222,128,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">で疑問解消</text>

    <!-- Arrow down -->
    <line x1="600" y1="310" x2="600" y2="340" stroke="rgba(74,222,128,0.5)" stroke-width="2"/>
    <polygon points="595,335 600,345 605,335" fill="rgba(74,222,128,0.5)"/>

    <!-- Contact -->
    <circle cx="600" cy="370" r="18" fill="rgba(74,222,128,0.2)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="600" y="378" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold" text-anchor="middle">問い合わせ</text>
  </g>

  <!-- Vertical divider -->
  <line x1="400" y1="50" x2="400" y2="380" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Impact metrics -->
  <rect x="80" y="375" width="240" height="35" rx="5" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="100" y="392" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">問い合わせ率</text>
  <text x="100" y="407" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">65% ↑</text>

  <rect x="480" y="375" width="240" height="35" rx="5" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
  <text x="500" y="392" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">FAQの有無による</text>
  <text x="500" y="407" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">効果差</text>
</svg>
