<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="30" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">社会的証明の種類と効果比較</text>

  <!-- Header row -->
  <rect x="30" y="48" width="350" height="34" rx="4" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="205" y="70" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">社会的証明の種類</text>
  <rect x="390" y="48" width="180" height="34" rx="4" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="480" y="70" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">効果</text>
  <rect x="580" y="48" width="190" height="34" rx="4" fill="rgba(201,168,76,0.15)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <text x="675" y="70" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">実装のポイント</text>

  <!-- Row 1: お客様の声（顔写真付き） ★★★★★ -->
  <rect x="30" y="88" width="350" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text x="50" y="110" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold">お客様の声（顔写真・実名付き）</text>
  <text x="50" y="130" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">Before→After形式で具体的な成果を掲載</text>
  <rect x="390" y="88" width="180" height="52" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="480" y="118" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">★★★★★</text>
  <rect x="580" y="88" width="190" height="52" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="675" y="108" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">許諾を得た実名・顔写真で</text>
  <text x="675" y="124" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">信頼性を最大化</text>

  <!-- Row 2: 数値実績 ★★★★★ -->
  <rect x="30" y="146" width="350" height="52" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="50" y="168" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold">数値実績（累計〇社・継続率〇%）</text>
  <text x="50" y="188" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">ファーストビューに大きく表示する</text>
  <rect x="390" y="146" width="180" height="52" rx="4" fill="rgba(255,255,255,0.02)"/>
  <text x="480" y="176" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">★★★★★</text>
  <rect x="580" y="146" width="190" height="52" rx="4" fill="rgba(255,255,255,0.02)"/>
  <text x="675" y="166" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">具体的な数字で</text>
  <text x="675" y="182" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">「実績の重さ」を伝える</text>

  <!-- Row 3: 導入企業ロゴ ★★★★ -->
  <rect x="30" y="204" width="350" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text x="50" y="226" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold">導入企業ロゴ一覧</text>
  <text x="50" y="246" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">認知度のある企業ロゴほど効果大</text>
  <rect x="390" y="204" width="180" height="52" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="480" y="234" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">★★★★</text>
  <rect x="580" y="204" width="190" height="52" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="675" y="224" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">許諾取得後に掲載。</text>
  <text x="675" y="240" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">グレースケールで整列が◎</text>

  <!-- Row 4: メディア掲載 ★★★★ -->
  <rect x="30" y="262" width="350" height="52" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="50" y="284" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold">メディア掲載実績</text>
  <text x="50" y="304" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">雑誌・Web媒体への掲載・出演歴</text>
  <rect x="390" y="262" width="180" height="52" rx="4" fill="rgba(255,255,255,0.02)"/>
  <text x="480" y="292" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">★★★★</text>
  <rect x="580" y="262" width="190" height="52" rx="4" fill="rgba(255,255,255,0.02)"/>
  <text x="675" y="282" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">「As Seen In」形式で</text>
  <text x="675" y="298" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">ロゴ横並び表示が効果的</text>

  <!-- Row 5: 受賞・認定 ★★★ -->
  <rect x="30" y="320" width="350" height="52" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <text x="50" y="342" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold">受賞・認定バッジ</text>
  <text x="50" y="362" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">業界認定・アワード受賞歴</text>
  <rect x="390" y="320" width="180" height="52" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="480" y="350" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="18" text-anchor="middle">★★★</text>
  <rect x="580" y="320" width="190" height="52" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="675" y="340" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">認知度の低い賞は</text>
  <text x="675" y="356" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">効果が薄いため厳選する</text>

  <text x="400" y="408" fill="rgba(255,255,255,0.3)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">★の数は問い合わせ率向上への相対的な影響度を示しています</text>
</svg>
