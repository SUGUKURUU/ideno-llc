<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="30" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">フォーム最適化のビフォーアフター効果比較</text>

  <!-- Before side -->
  <rect x="30" y="52" width="350" height="320" rx="8" fill="rgba(255,80,60,0.06)" stroke="rgba(255,80,60,0.35)" stroke-width="1.5"/>
  <text x="205" y="76" fill="#ff5c3c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="14" font-weight="bold" text-anchor="middle">BEFORE（改善前）</text>

  <!-- Form fields: 12 items -->
  <text x="50" y="102" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">入力項目：12個</text>
  <rect x="50" y="108" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="121" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">会社名（必須）</text>
  <rect x="50" y="130" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="143" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">担当者名（必須）</text>
  <rect x="50" y="152" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="165" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">役職（必須）</text>
  <rect x="50" y="174" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="187" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">電話番号（必須）</text>
  <rect x="50" y="196" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="209" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">FAX番号（必須）</text>
  <rect x="50" y="218" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="231" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">メールアドレス（必須）</text>
  <rect x="50" y="240" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="253" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">郵便番号・住所（必須）</text>
  <rect x="50" y="262" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="275" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">従業員規模（必須）</text>
  <rect x="50" y="284" width="310" height="18" rx="3" fill="rgba(255,255,255,0.06)" stroke="rgba(255,80,60,0.3)" stroke-width="1"/>
  <text x="58" y="297" fill="rgba(255,255,255,0.35)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">+ さらに4項目…</text>
  <!-- Submit button -->
  <rect x="50" y="310" width="310" height="34" rx="6" fill="rgba(255,80,60,0.2)" stroke="rgba(255,80,60,0.4)" stroke-width="1"/>
  <text x="205" y="332" fill="#ff5c3c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">送信する</text>
  <!-- CVR -->
  <text x="205" y="358" fill="#ff5c3c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="bold" text-anchor="middle">送信率 5%</text>

  <!-- Arrow -->
  <text x="400" y="215" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="36" text-anchor="middle">→</text>
  <text x="400" y="240" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" text-anchor="middle">最適化</text>

