  <text x="440" y="102" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">入力項目：4個</text>
  <rect x="440" y="108" width="310" height="28" rx="4" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <text x="452" y="127" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">お名前（必須）</text>
  <rect x="440" y="142" width="310" height="28" rx="4" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <text x="452" y="161" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">会社名（必須）</text>
  <rect x="440" y="176" width="310" height="28" rx="4" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <text x="452" y="195" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">メールアドレス（必須）</text>
  <rect x="440" y="210" width="310" height="60" rx="4" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.35)" stroke-width="1"/>
  <text x="452" y="229" fill="rgba(255,255,255,0.75)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11">ご相談内容（必須）</text>
  <text x="452" y="252" fill="rgba(255,255,255,0.3)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">自由記述</text>

  <text x="595" y="296" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">※ 電話番号・住所は任意→ヒアリングで確認</text>

  <!-- Submit button -->
  <rect x="440" y="308" width="310" height="38" rx="8" fill="rgba(74,222,128,0.25)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="595" y="332" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="13" font-weight="bold" text-anchor="middle">まずは無料相談する</text>
  <!-- CVR -->
  <text x="595" y="358" fill="#4ade80" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" font-weight="bold" text-anchor="middle">送信率 18%</text>

  <!-- improvement tag -->
  <rect x="310" y="375" width="180" height="30" rx="6" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1"/>
  <text x="400" y="395" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">送信率 3.6倍に改善</text>
