<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="28" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="16" font-weight="bold" text-anchor="middle">問い合わせ改善を測定する主要KPI</text>

  <!-- Metric 1: Bounce Rate -->
  <g>
    <text x="100" y="65" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">直帰率</text>
    <text x="100" y="85" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">(Bounce Rate)</text>

    <!-- Before -->
    <rect x="30" y="105" width="140" height="180" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="100" y="125" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">改善前</text>

    <!-- Gauge -->
    <circle cx="100" cy="170" r="25" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
    <path d="M 100 145 A 25 25 0 0 1 123.5 157.5" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
    <text x="100" y="180" fill="#fca5a5" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="14" font-weight="bold" text-anchor="middle">78%</text>

    <!-- Status -->
    <text x="100" y="235" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">⚠️ 高い</text>
    <text x="100" y="250" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">コンテンツ品質</text>
    <text x="100" y="262" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">に問題あり</text>

    <!-- After -->
    <rect x="30" y="275" width="140" height="110" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="100" y="295" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10">改善後</text>

    <circle cx="100" cy="330" r="18" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <path d="M 100 312 A 18 18 0 0 1 118 324" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
    <text x="100" y="338" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">55%</text>

    <text x="100" y="365" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">✓ 改善</text>
  </g>

  <!-- Metric 2: Exit Rate -->
  <g>
    <text x="300" y="65" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">離脱率</text>
    <text x="300" y="85" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">(Exit Rate)</text>

    <!-- Stacked bar before/after -->
    <text x="300" y="120" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">改善前</text>
    <rect x="255" y="135" width="90" height="20" rx="3" fill="#dc2626"/>
    <text x="355" y="150" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">68%</text>

    <!-- Improvement arrow -->
    <line x1="300" y1="170" x2="300" y2="190" stroke="#c9a84c" stroke-width="2"/>
    <polygon points="295,185 300,195 305,185" fill="#c9a84c"/>

    <text x="300" y="215" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">改善後</text>
    <rect x="255" y="230" width="72" height="20" rx="3" fill="#22c55e"/>
    <text x="355" y="245" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">44%</text>

    <!-- Percentage improvement -->
    <text x="300" y="280" fill="#86efac" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">-24pt</text>
    <text x="300" y="298" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">導線改善で</text>
    <text x="300" y="312" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">離脱を削減</text>

    <!-- CVR bar -->
    <rect x="260" y="330" width="80" height="35" rx="4" fill="rgba(74,222,128,0.1)" stroke="rgba(74,222,128,0.3)" stroke-width="1"/>
    <text x="300" y="348" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">CVR向上</text>
    <text x="300" y="364" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">+36%</text>
  </g>

  <!-- Metric 3: Form Completion -->
  <g>
    <text x="500" y="65" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">フォーム完了率</text>
    <text x="500" y="85" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">(Form Completion)</text>

    <!-- Funnel visualization -->
    <!-- Page visit -->
    <rect x="450" y="110" width="100" height="30" rx="3" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="1.5"/>
    <text x="500" y="130" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold" text-anchor="middle">100人</text>
    <text x="535" y="130" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="start">訪問</text>

    <!-- To form view -->
    <line x1="500" y1="145" x2="500" y2="160" stroke="rgba(201,168,76,0.3)" stroke-width="1.5"/>

    <!-- Form view -->
    <rect x="450" y="165" width="100" height="30" rx="3" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1"/>
    <text x="500" y="185" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold" text-anchor="middle">65人</text>
    <text x="540" y="185" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="start">フォーム閲覧</text>

    <!-- To form submit -->
    <line x1="500" y1="200" x2="500" y2="215" stroke="rgba(201,168,76,0.3)" stroke-width="1.5"/>

    <!-- Form submit -->
    <rect x="450" y="220" width="100" height="30" rx="3" fill="rgba(74,222,128,0.2)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="500" y="240" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold" text-anchor="middle">48人</text>
    <text x="540" y="240" fill="rgba(255,255,255,0.5)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="start">送信完了</text>

    <!-- Metrics -->
    <rect x="440" y="270" width="120" height="35" rx="4" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <text x="500" y="287" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">フォーム閲覧率</text>
    <text x="500" y="303" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">65%</text>

    <rect x="440" y="320" width="120" height="35" rx="4" fill="rgba(74,222,128,0.08)" stroke="rgba(74,222,128,0.2)" stroke-width="1"/>
    <text x="500" y="337" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">完了率</text>
    <text x="500" y="353" fill="#22c55e" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="10" font-weight="bold" text-anchor="middle">74% / 65%</text>
  </g>

  <!-- Metric 4: Device comparison -->
  <g>
    <text x="700" y="65" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold">デバイス別</text>
    <text x="700" y="85" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9">CVR比較</text>

    <!-- PC CVR -->
    <circle cx="680" cy="135" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
    <path d="M 710 135 A 30 30 0 0 1 709.7 105.1" fill="none" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
    <text x="680" y="142" fill="#ec4899" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">3.2%</text>
    <text x="680" y="180" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">💻 PC</text>

    <!-- Mobile CVR -->
    <circle cx="730" cy="135" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
    <path d="M 760 135 A 30 30 0 0 1 754.2 107.6" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round"/>
    <text x="730" y="142" fill="#06b6d4" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="11" font-weight="bold" text-anchor="middle">2.1%</text>
    <text x="730" y="180" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">📱 Mobile</text>

    <!-- Alert box -->
    <rect x="655" y="210" width="150" height="110" rx="5" fill="rgba(220,38,38,0.08)" stroke="rgba(220,38,38,0.2)" stroke-width="1"/>
    <text x="730" y="235" fill="rgba(255,255,255,0.7)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" text-anchor="middle">モバイルの CVR が低い</text>
    <text x="730" y="253" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">→ 入力フィールドの</text>
    <text x="730" y="268" fill="rgba(255,255,255,0.6)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">最適化が優先課題</text>
    <text x="730" y="310" fill="#fca5a5" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="9" font-weight="bold" text-anchor="middle">⚠️ 改善推奨</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="390" fill="rgba(255,255,255,0.4)" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="8" text-anchor="middle">これらの指標を Googleアナリティクス・ヒートマップツールで定期的に確認すること</text>
</svg>
