<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">提案書の比較フレームワーク（スコアリング方式）</text>

  <!-- Header row -->
  <rect x="20" y="55" width="760" height="34" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="130" y="77" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">比較項目</text>
  <text x="290" y="77" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">A社</text>
  <text x="420" y="77" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">B社</text>
  <text x="550" y="77" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">C社</text>
  <text x="680" y="77" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">重要度</text>

  <!-- dividers -->
  <line x1="220" y1="55" x2="220" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="350" y1="55" x2="350" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="480" y1="55" x2="480" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="610" y1="55" x2="610" y2="360" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Row data: criteria / A / B / C / weight -->
  <!-- Row 1: 提案内容 -->
  <rect x="20" y="89" width="760" height="46" rx="0" fill="rgba(255,255,255,0.02)"/>
  <text x="130" y="108" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">① 提案内容の具体性</text>
  <text x="130" y="125" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">目的への具体的な提案があるか</text>
  <!-- A: star fill bars -->
  <text x="290" y="118" text-anchor="middle" fill="#c9a84c" font-size="16">★★★★★</text>
  <text x="290" y="130" text-anchor="middle" fill="#c9a84c" font-size="10">5点</text>
  <text x="420" y="118" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="16">★★★☆☆</text>
  <text x="420" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">3点</text>
  <text x="550" y="118" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="16">★★★★☆</text>
  <text x="550" y="130" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">4点</text>
  <text x="680" y="118" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">×3</text>
  <line x1="20" y1="135" x2="780" y2="135" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 2: 費用 -->
  <rect x="20" y="135" width="760" height="46" rx="0"/>
  <text x="130" y="154" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">② 費用の内訳明確性</text>
  <text x="130" y="171" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">一式ではなく項目別か</text>
  <text x="290" y="164" text-anchor="middle" fill="#c9a84c" font-size="16">★★★★☆</text>
  <text x="290" y="176" text-anchor="middle" fill="#c9a84c" font-size="10">4点</text>
  <text x="420" y="164" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="16">★★☆☆☆</text>
  <text x="420" y="176" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">2点</text>
  <text x="550" y="164" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="16">★★★★☆</text>
  <text x="550" y="176" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">4点</text>
  <text x="680" y="164" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">×2</text>
  <line x1="20" y1="181" x2="780" y2="181" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 3: 納期 -->
  <rect x="20" y="181" width="760" height="46" rx="0" fill="rgba(255,255,255,0.02)"/>
  <text x="130" y="200" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">③ 納期の妥当性</text>
  <text x="130" y="217" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">スケジュールが現実的か</text>
  <text x="290" y="210" text-anchor="middle" fill="#c9a84c" font-size="16">★★★★☆</text>
  <text x="290" y="222" text-anchor="middle" fill="#c9a84c" font-size="10">4点</text>
  <text x="420" y="210" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="16">★★★★★</text>
  <text x="420" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">5点</text>
  <text x="550" y="210" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="16">★★★☆☆</text>
  <text x="550" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">3点</text>
  <text x="680" y="210" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">×1</text>
  <line x1="20" y1="227" x2="780" y2="227" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 4: 実績 -->
  <rect x="20" y="227" width="760" height="46" rx="0"/>
  <text x="130" y="246" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">④ 同業種の実績</text>
  <text x="130" y="263" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">近い業種の制作実績があるか</text>
  <text x="290" y="256" text-anchor="middle" fill="#c9a84c" font-size="16">★★★★★</text>
  <text x="290" y="268" text-anchor="middle" fill="#c9a84c" font-size="10">5点</text>
  <text x="420" y="256" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="16">★★☆☆☆</text>
  <text x="420" y="268" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">2点</text>
  <text x="550" y="256" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="16">★★★☆☆</text>
  <text x="550" y="268" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">3点</text>
  <text x="680" y="256" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">×3</text>
  <line x1="20" y1="273" x2="780" y2="273" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 5: サポート -->
  <rect x="20" y="273" width="760" height="46" rx="0" fill="rgba(255,255,255,0.02)"/>
  <text x="130" y="292" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">⑤ 公開後サポート</text>
  <text x="130" y="309" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">保守・更新体制が明確か</text>
  <text x="290" y="302" text-anchor="middle" fill="#c9a84c" font-size="16">★★★★★</text>
  <text x="290" y="314" text-anchor="middle" fill="#c9a84c" font-size="10">5点</text>
  <text x="420" y="302" text-anchor="middle" fill="rgba(201,168,76,0.4)" font-size="16">★★★☆☆</text>
  <text x="420" y="314" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">3点</text>
  <text x="550" y="302" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="16">★★★★☆</text>
  <text x="550" y="314" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">4点</text>
  <text x="680" y="302" text-anchor="middle" fill="#c9a84c" font-size="12" font-weight="bold">×2</text>

  <!-- Total row -->
  <rect x="20" y="325" width="760" height="40" rx="4" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="1"/>
  <text x="130" y="350" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">加重合計スコア</text>
  <rect x="240" y="330" width="100" height="30" rx="4" fill="#c9a84c"/>
  <text x="290" y="350" text-anchor="middle" fill="#111" font-size="14" font-weight="bold">62点 ★</text>
  <text x="420" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">37点</text>
  <text x="550" y="350" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">47点</text>
  <text x="680" y="350" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11">満点70点</text>

  <text x="400" y="408" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">重要度の高い項目（×3）を重視して評価することで客観的な比較が可能</text>
</svg>
