<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" text-anchor="middle" fill="#c9a84c" font-size="18" font-weight="bold">ポートフォリオを見る5つのポイント</text>

  <!-- 5 cards in a row -->
  <!-- Card 1 -->
  <rect x="30" y="62" width="140" height="300" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <rect x="30" y="62" width="140" height="8" rx="4" fill="#c9a84c"/>
  <text x="100" y="98" text-anchor="middle" fill="#c9a84c" font-size="28">🏢</text>
  <text x="100" y="128" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">① 業種の近さ</text>
  <line x1="45" y1="138" x2="155" y2="138" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="100" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">自社と同じ</text>
  <text x="100" y="178" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">業種・規模の</text>
  <text x="100" y="194" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">実績があるか</text>
  <text x="100" y="230" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">業種によって</text>
  <text x="100" y="246" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">必要な設計が</text>
  <text x="100" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">異なる</text>
  <rect x="45" y="330" width="110" height="22" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="100" y="345" text-anchor="middle" fill="#c9a84c" font-size="10" font-weight="bold">重要度 ★★★★★</text>

  <!-- Card 2 -->
  <rect x="188" y="62" width="140" height="300" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <rect x="188" y="62" width="140" height="8" rx="4" fill="rgba(201,168,76,0.75)"/>
  <text x="258" y="98" text-anchor="middle" fill="#c9a84c" font-size="28">🎨</text>
  <text x="258" y="128" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">② デザインの好み</text>
  <line x1="203" y1="138" x2="313" y2="138" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="258" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">自社ブランドに</text>
  <text x="258" y="178" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">合うデザイン</text>
  <text x="258" y="194" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">テイストか</text>
  <text x="258" y="230" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">デザインは</text>
  <text x="258" y="246" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">言語化が難しい</text>
  <text x="258" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">→参考例を共有</text>
  <rect x="203" y="330" width="110" height="22" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="258" y="345" text-anchor="middle" fill="#c9a84c" font-size="10" font-weight="bold">重要度 ★★★★☆</text>

  <!-- Card 3 -->
  <rect x="346" y="62" width="140" height="300" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <rect x="346" y="62" width="140" height="8" rx="4" fill="rgba(201,168,76,0.5)"/>
  <text x="416" y="98" text-anchor="middle" fill="#c9a84c" font-size="28">📱</text>
  <text x="416" y="128" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">③ スマホ対応</text>
  <line x1="361" y1="138" x2="471" y2="138" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="416" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">スマートフォンで</text>
  <text x="416" y="178" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">実際に確認して</text>
  <text x="416" y="194" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">みること</text>
  <text x="416" y="230" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">閲覧の60%以上</text>
  <text x="416" y="246" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">がスマホ経由</text>
  <text x="416" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">非対応は論外</text>
  <rect x="361" y="330" width="110" height="22" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="416" y="345" text-anchor="middle" fill="#c9a84c" font-size="10" font-weight="bold">重要度 ★★★★★</text>

  <!-- Card 4 -->
  <rect x="504" y="62" width="140" height="300" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <rect x="504" y="62" width="140" height="8" rx="4" fill="rgba(201,168,76,0.3)"/>
  <text x="574" y="98" text-anchor="middle" fill="#c9a84c" font-size="28">⚡</text>
  <text x="574" y="128" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">④ 表示速度</text>
  <line x1="519" y1="138" x2="629" y2="138" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="574" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">PageSpeed</text>
  <text x="574" y="178" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Insightsで</text>
  <text x="574" y="194" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">スコアを確認</text>
  <text x="574" y="230" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">遅いサイトは</text>
  <text x="574" y="246" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">SEO評価が低下</text>
  <text x="574" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">目安: 70点以上</text>
  <rect x="519" y="330" width="110" height="22" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="574" y="345" text-anchor="middle" fill="#c9a84c" font-size="10" font-weight="bold">重要度 ★★★★☆</text>

  <!-- Card 5 -->
  <rect x="630" y="62" width="140" height="300" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <rect x="630" y="62" width="140" height="8" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="700" y="98" text-anchor="middle" fill="#c9a84c" font-size="28">🔍</text>
  <text x="700" y="128" text-anchor="middle" fill="#c9a84c" font-size="13" font-weight="bold">⑤ SEO対応</text>
  <line x1="645" y1="138" x2="755" y2="138" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="700" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Googleで</text>
  <text x="700" y="178" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">検索して実際に</text>
  <text x="700" y="194" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">上位表示されるか</text>
  <text x="700" y="230" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">制作したサイトが</text>
  <text x="700" y="246" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">実際に検索で</text>
  <text x="700" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="10">見つかるかが証拠</text>
  <rect x="645" y="330" width="110" height="22" rx="4" fill="rgba(201,168,76,0.15)"/>
  <text x="700" y="345" text-anchor="middle" fill="#c9a84c" font-size="10" font-weight="bold">重要度 ★★★★★</text>

  <text x="400" y="400" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">ポートフォリオは「見た目の好み」だけでなく「技術的な品質」を必ず確認すること</text>
</svg>
