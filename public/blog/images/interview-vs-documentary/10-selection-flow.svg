<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="34" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">どちらの形式を選ぶべきか判断フロー</text>

  <!-- Start -->
  <rect x="300" y="52" width="200" height="38" rx="19" fill="#c9a84c"/>
  <text x="400" y="76" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">動画制作を検討中</text>

  <!-- Arrow down -->
  <line x1="400" y1="90" x2="400" y2="115" stroke="#c9a84c" stroke-width="1.5"/>
  <polygon points="394,115 400,128 406,115" fill="#c9a84c"/>

  <!-- Q1 -->
  <rect x="220" y="128" width="360" height="38" rx="6" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="152" fill="#ffffff" font-size="13" text-anchor="middle">予算は100万円以上使える？</text>

  <!-- Q1 No → left -->
  <line x1="220" y1="147" x2="120" y2="147" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="120" y1="147" x2="120" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="120" y1="240" x2="155" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="170" y="143" fill="rgba(255,255,255,0.6)" font-size="11">No</text>

  <!-- Q1 Yes → down -->
  <line x1="400" y1="166" x2="400" y2="193" stroke="#c9a84c" stroke-width="1.5"/>
  <polygon points="394,193 400,206 406,193" fill="#c9a84c"/>
  <text x="415" y="183" fill="#c9a84c" font-size="11">Yes</text>

  <!-- Q2 -->
  <rect x="220" y="206" width="360" height="38" rx="6" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="230" fill="#ffffff" font-size="13" text-anchor="middle">採用強化がメイン目的？</text>

  <!-- Q2 Yes → right -->
  <line x1="580" y1="225" x2="660" y2="225" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="660" y1="225" x2="660" y2="330" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="590" y1="330" x2="660" y2="330" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="615" y="218" fill="#c9a84c" font-size="11">Yes</text>

  <!-- Q2 No → down -->
  <line x1="400" y1="244" x2="400" y2="271" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <polygon points="394,271 400,284 406,271" fill="rgba(255,255,255,0.5)"/>
  <text x="415" y="261" fill="rgba(255,255,255,0.6)" font-size="11">No</text>

  <!-- Q3 -->
  <rect x="220" y="284" width="360" height="38" rx="6" fill="#1e1e1e" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="400" y="308" fill="#ffffff" font-size="13" text-anchor="middle">制作期間が2週間以内？</text>

  <!-- Q3 Yes → left result -->
  <line x1="220" y1="303" x2="155" y2="303" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <text x="188" y="298" fill="rgba(255,255,255,0.6)" font-size="11">Yes</text>

  <!-- Q3 No → right result (documentary) -->
  <line x1="580" y1="303" x2="645" y2="303" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="645" y1="303" x2="645" y2="330" stroke="#c9a84c" stroke-width="1.5"/>
  <line x1="590" y1="330" x2="645" y2="330" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="608" y="298" fill="#c9a84c" font-size="11">No</text>

  <!-- Result: インタビュー推奨 -->
  <rect x="40" y="218" width="190" height="82" rx="8" fill="#c9a84c" opacity="0.85"/>
  <text x="135" y="249" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">インタビュー動画</text>
  <text x="135" y="267" fill="#111111" font-size="12" font-weight="bold" text-anchor="middle">推奨</text>
  <text x="135" y="285" fill="#1a1a1a" font-size="10" text-anchor="middle">低コスト・短期制作・</text>
  <text x="135" y="298" fill="#1a1a1a" font-size="10" text-anchor="middle">ビジョン伝達に最適</text>

  <!-- Result: 密着推奨 -->
  <rect x="590" y="308" width="190" height="82" rx="8" fill="#c9a84c"/>
  <text x="685" y="339" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">密着ドキュメンタリー</text>
  <text x="685" y="357" fill="#111111" font-size="12" font-weight="bold" text-anchor="middle">推奨</text>
  <text x="685" y="375" fill="#1a1a1a" font-size="10" text-anchor="middle">採用・ブランディング・</text>
  <text x="685" y="388" fill="#1a1a1a" font-size="10" text-anchor="middle">感情訴求に最適</text>
</svg>
