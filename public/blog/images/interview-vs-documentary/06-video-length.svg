<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">動画尺と視聴完了率（形式別）</text>

  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="320" x2="740" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Y: 0-100%, height=260px -->
  <text x="92" y="324" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="92" y="255" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">25%</text>
  <text x="92" y="190" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">50%</text>
  <text x="92" y="125" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">75%</text>
  <text x="92" y="63" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">100%</text>
  <text x="38" y="190" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" transform="rotate(-90,38,190)">視聴完了率</text>

  <!-- Grid -->
  <line x1="100" y1="255" x2="740" y2="255" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="190" x2="740" y2="190" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="125" x2="740" y2="125" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
  <line x1="100" y1="60" x2="740" y2="60" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>

  <!-- X positions for 4 categories -->
  <!-- インタビュー短尺(2-5分): x=180, インタビュー長尺(10分〜): x=340, 密着短尺(5-8分): x=500, 密着長尺(15分〜): x=660 -->

  <!-- Bar: インタビュー短尺 65% → y=320-169=151 h=169 -->
  <rect x="140" y="151" width="80" height="169" fill="#c9a84c" opacity="0.8" rx="3"/>
  <text x="180" y="143" fill="#c9a84c" font-size="13" font-weight="bold" text-anchor="middle">65%</text>
  <text x="180" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">インタビュー</text>
  <text x="180" y="357" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">短尺（2〜5分）</text>

  <!-- Bar: インタビュー長尺 28% → y=320-73=247 h=73 -->
  <rect x="300" y="247" width="80" height="73" fill="#c9a84c" opacity="0.4" rx="3"/>
  <text x="340" y="239" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="bold" text-anchor="middle">28%</text>
  <text x="340" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">インタビュー</text>
  <text x="340" y="357" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">長尺（10分〜）</text>

  <!-- Bar: 密着短尺 58% → y=320-151=169 h=151 -->
  <rect x="460" y="169" width="80" height="151" fill="rgba(255,255,255,0.7)" rx="3"/>
  <text x="500" y="161" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="bold" text-anchor="middle">58%</text>
  <text x="500" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">密着動画</text>
  <text x="500" y="357" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">短尺（5〜8分）</text>

  <!-- Bar: 密着長尺 45% → y=320-117=203 h=117 -->
  <rect x="620" y="203" width="80" height="117" fill="rgba(255,255,255,0.45)" rx="3"/>
  <text x="660" y="195" fill="rgba(255,255,255,0.8)" font-size="13" font-weight="bold" text-anchor="middle">45%</text>
  <text x="660" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">密着動画</text>
  <text x="660" y="357" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">長尺（15分〜）</text>

  <!-- Insight -->
  <rect x="100" y="375" width="540" height="22" rx="4" fill="#1e1e1e"/>
  <text x="370" y="390" fill="#c9a84c" font-size="11" text-anchor="middle">★ 採用目的には「5〜10分」の密着動画が最も高い完了率と共感度を両立</text>
</svg>
