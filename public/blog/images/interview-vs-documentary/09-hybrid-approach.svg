<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">インタビュー＋密着のハイブリッド戦略</text>

  <!-- Step 1 -->
  <rect x="40" y="70" width="200" height="100" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="2"/>
  <text x="140" y="98" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">STEP 1</text>
  <text x="140" y="120" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">インタビュー動画</text>
  <text x="140" y="140" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">第一印象を作る</text>
  <text x="140" y="158" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">3〜5分・採用サイト掲載</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="120" x2="290" y2="120" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="290,113 305,120 290,127" fill="#c9a84c"/>

  <!-- Step 2 -->
  <rect x="305" y="70" width="200" height="100" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="2"/>
  <text x="405" y="98" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">STEP 2</text>
  <text x="405" y="120" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">密着動画</text>
  <text x="405" y="140" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">深い理解を得る</text>
  <text x="405" y="158" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">10〜20分・YouTube公開</text>

  <!-- Arrow 2 -->
  <line x1="505" y1="120" x2="555" y2="120" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="555,113 570,120 555,127" fill="#c9a84c"/>

  <!-- Step 3 -->
  <rect x="570" y="70" width="200" height="100" rx="8" fill="#1e1e1e" stroke="#c9a84c" stroke-width="2"/>
  <text x="670" y="98" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">STEP 3</text>
  <text x="670" y="120" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">SNSクリップ展開</text>
  <text x="670" y="140" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">認知を広げる</text>
  <text x="670" y="158" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">1〜2分・リール/TikTok</text>

  <!-- Synergy arrows pointing down to result box -->
  <line x1="140" y1="170" x2="140" y2="220" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="405" y1="170" x2="405" y2="220" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="670" y1="170" x2="670" y2="220" stroke="rgba(201,168,76,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="140" y1="220" x2="670" y2="220" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/>
  <line x1="405" y1="220" x2="405" y2="250" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="398,250 405,265 412,250" fill="#c9a84c"/>

  <!-- Result box -->
  <rect x="155" y="265" width="500" height="70" rx="8" fill="#c9a84c"/>
  <text x="405" y="292" fill="#111111" font-size="15" font-weight="bold" text-anchor="middle">相乗効果</text>
  <text x="405" y="314" fill="#111111" font-size="13" text-anchor="middle">採用強化 ＋ ブランド向上 ＋ SNS拡散 を同時に実現</text>
  <text x="405" y="330" fill="#1a1a1a" font-size="11" text-anchor="middle">コンテンツを使い回すことで制作コストを最小化</text>

  <!-- Bottom benefits -->
  <rect x="40" y="355" width="220" height="50" rx="6" fill="#1a1a1a"/>
  <text x="150" y="376" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">採用効果</text>
  <text x="150" y="394" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">応募率・定着率が大幅向上</text>

  <rect x="290" y="355" width="220" height="50" rx="6" fill="#1a1a1a"/>
  <text x="400" y="376" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">ブランド効果</text>
  <text x="400" y="394" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">会社・社長の認知度が上がる</text>

  <rect x="540" y="355" width="220" height="50" rx="6" fill="#1a1a1a"/>
  <text x="650" y="376" fill="#c9a84c" font-size="12" font-weight="bold" text-anchor="middle">長期ROI</text>
  <text x="650" y="394" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">1回制作で複数年活用可能</text>
</svg>
