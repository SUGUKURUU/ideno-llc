<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect fill="#111111" width="800" height="420"/>
  <text x="400" y="36" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">コンテンツタイプ別「本物感」スコア（視聴者調査）</text>

  <!-- Y axis -->
  <line x1="100" y1="58" x2="100" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="100" y1="320" x2="740" y2="320" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Scale: max=100, height=262px, 10=26.2px -->
  <line x1="100" y1="188" x2="740" y2="188" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4,4"/>
  <line x1="100" y1="57" x2="740" y2="57" stroke="rgba(255,255,255,0.1)" stroke-dasharray="4,4"/>
  <text x="92" y="324" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0</text>
  <text x="92" y="192" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">50</text>
  <text x="92" y="61" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">100</text>
  <text x="40" y="190" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle" transform="rotate(-90,40,190)">本物感スコア（100点満点）</text>

  <!-- Bar 1: 台本なしインタビュー 72点 → height=72*2.62=188.6 top=131 -->
  <rect x="130" y="131" width="110" height="189" fill="#c9a84c" opacity="0.65" rx="3"/>
  <text x="185" y="123" fill="rgba(255,255,255,0.8)" font-size="14" font-weight="bold" text-anchor="middle">72点</text>
  <text x="185" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">台本なし</text>
  <text x="185" y="357" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">インタビュー</text>

  <!-- Bar 2: 台本ありインタビュー 45点 → height=118 top=202 -->
  <rect x="290" y="202" width="110" height="118" fill="#c9a84c" opacity="0.35" rx="3"/>
  <text x="345" y="194" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold" text-anchor="middle">45点</text>
  <text x="345" y="342" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">台本あり</text>
  <text x="345" y="357" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">インタビュー</text>

  <!-- Bar 3: 密着ドキュメンタリー 91点 → height=238 top=82 -->
  <rect x="450" y="82" width="110" height="238" fill="#c9a84c" rx="3"/>
  <text x="505" y="74" fill="#c9a84c" font-size="15" font-weight="bold" text-anchor="middle">91点</text>
  <text x="505" y="342" fill="#c9a84c" font-size="11" font-weight="bold" text-anchor="middle">密着</text>
  <text x="505" y="357" fill="#c9a84c" font-size="10" text-anchor="middle">ドキュメンタリー</text>
  <!-- Star badge -->
  <text x="505" y="110" fill="#111111" font-size="20" text-anchor="middle">★</text>

  <!-- Bar 4: テキスト記事 38点 → height=100 top=220 -->
  <rect x="610" y="220" width="110" height="100" fill="#c9a84c" opacity="0.22" rx="3"/>
  <text x="665" y="212" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold" text-anchor="middle">38点</text>
  <text x="665" y="342" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">テキスト記事</text>

  <text x="400" y="400" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">密着ドキュメンタリーは「本物感」で他を圧倒。求職者・取引先の信頼獲得に最も効果的。</text>
</svg>
