<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>

  <!-- タイトル -->
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    YouTubeの成功パターン：月間再生数の推移
  </text>

  <!-- グリッド背景 -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="290" x2="720" y2="290" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="230" x2="720" y2="230" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="170" x2="720" y2="170" stroke="#333333" stroke-width="1"/>
  <line x1="80" y1="110" x2="720" y2="110" stroke="#333333" stroke-width="1"/>

  <!-- Y軸ラベル -->
  <text x="50" y="355" font-size="12" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">0</text>
  <text x="50" y="295" font-size="12" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5k</text>
  <text x="50" y="235" font-size="12" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">10k</text>
  <text x="50" y="175" font-size="12" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">15k</text>
  <text x="50" y="115" font-size="12" text-anchor="end" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">20k</text>

  <!-- ラインチャート -->
  <polyline points="100,320 150,290 200,260 250,220 300,180 350,140 400,110 450,120 500,90 550,70 600,60 650,50 700,40"
            fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- データポイント -->
  <circle cx="100" cy="320" r="5" fill="#c9a84c"/>
  <circle cx="150" cy="290" r="5" fill="#c9a84c"/>
  <circle cx="200" cy="260" r="5" fill="#c9a84c"/>
  <circle cx="250" cy="220" r="5" fill="#c9a84c"/>
  <circle cx="300" cy="180" r="5" fill="#c9a84c"/>
  <circle cx="350" cy="140" r="5" fill="#c9a84c"/>
  <circle cx="400" cy="110" r="5" fill="#c9a84c"/>
  <circle cx="450" cy="120" r="5" fill="#c9a84c"/>
  <circle cx="500" cy="90" r="5" fill="#c9a84c"/>
  <circle cx="550" cy="70" r="5" fill="#c9a84c"/>
  <circle cx="600" cy="60" r="5" fill="#c9a84c"/>
  <circle cx="650" cy="50" r="5" fill="#c9a84c"/>
  <circle cx="700" cy="40" r="5" fill="#c9a84c"/>

  <!-- X軸ラベル -->
  <text x="100" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1月</text>
  <text x="200" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3月</text>
  <text x="300" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5月</text>
  <text x="400" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">7月</text>
  <text x="500" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">9月</text>
  <text x="600" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">11月</text>
  <text x="700" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">13月</text>

  <!-- 説明 -->
  <text x="400" y="405" font-size="12" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
    定期的な更新と戦略的なSEO最適化により、再生数は継続的に向上
  </text>
</svg>
