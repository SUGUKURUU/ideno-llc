<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">エンゲージメント率の分布（ターゲット別）</text>

  <!-- ターゲット1：採用候補者 -->
  <circle cx="180" cy="180" r="80" fill="#c9a84c" opacity="0.8"/>
  <text x="180" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用候補者</text>
  <text x="180" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">8.2%</text>
  <text x="180" y="210" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">高確度</text>

  <!-- ターゲット2：見込み客 -->
  <circle cx="480" cy="180" r="70" fill="#8b7355" opacity="0.8"/>
  <text x="480" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">見込み客</text>
  <text x="480" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5.6%</text>
  <text x="480" y="210" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">中確度</text>

  <!-- ターゲット3：業界関心層 -->
  <circle cx="630" cy="220" r="60" fill="#555555" opacity="0.8"/>
  <text x="630" y="205" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">業界関心層</text>
  <text x="630" y="225" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3.1%</text>

  <!-- X軸ラベル -->
  <text x="180" y="300" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">社長密着動画は</text>
  <text x="180" y="318" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">採用候補者に最高の</text>
  <text x="180" y="336" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果を発揮</text>

  <text x="400" y="405" font-size="12" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">円のサイズ＝エンゲージメント率の大きさ</text>
</svg>
