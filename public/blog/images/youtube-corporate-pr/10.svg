<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">撮影・編集・運用の分業体制</text>

  <!-- 撮影フェーズ -->
  <rect x="80" y="80" width="140" height="240" fill="#c9a84c" rx="5"/>
  <text x="150" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">撮影</text>
  <line x1="95" y1="125" x2="205" y2="125" stroke="#111111" stroke-width="2"/>
  <text x="150" y="155" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・社内</text>
  <text x="150" y="175" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">OR</text>
  <text x="150" y="195" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・外注</text>
  <text x="150" y="225" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">月1-2回</text>
  <text x="150" y="242" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">固定化</text>

  <!-- 矢印 -->
  <polygon points="235,210 225,205 225,215" fill="#c9a84c"/>
  <line x1="225" y1="210" x2="245" y2="210" stroke="#c9a84c" stroke-width="2"/>

  <!-- 編集フェーズ -->
  <rect x="245" y="80" width="140" height="240" fill="#8b7355" rx="5"/>
  <text x="315" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">編集</text>
  <line x1="260" y1="125" x2="370" y2="125" stroke="#ffffff" stroke-width="2"/>
  <text x="315" y="155" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・社内担当</text>
  <text x="315" y="175" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">OR</text>
  <text x="315" y="195" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・外注</text>
  <text x="315" y="225" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">品質と</text>
  <text x="315" y="242" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">速度両立</text>

  <!-- 矢印 -->
  <polygon points="400,210 390,205 390,215" fill="#8b7355"/>
  <line x1="390" y1="210" x2="410" y2="210" stroke="#8b7355" stroke-width="2"/>

  <!-- 運用フェーズ -->
  <rect x="410" y="80" width="140" height="240" fill="#555555" rx="5"/>
  <text x="480" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">運用</text>
  <line x1="425" y1="125" x2="535" y2="125" stroke="#ffffff" stroke-width="2"/>
  <text x="480" y="155" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・YouTubeUP</text>
  <text x="480" y="175" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・SNS告知</text>
  <text x="480" y="195" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・HP掲載</text>
  <text x="480" y="225" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">専任者</text>
  <text x="480" y="242" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">配置</text>

  <!-- 矢印 -->
  <polygon points="565,210 555,205 555,215" fill="#555555"/>
  <line x1="555" y1="210" x2="575" y2="210" stroke="#555555" stroke-width="2"/>

  <!-- 分析フェーズ -->
  <rect x="575" y="80" width="140" height="240" fill="#999999" rx="5"/>
  <text x="645" y="110" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">分析</text>
  <line x1="590" y1="125" x2="700" y2="125" stroke="#111111" stroke-width="2"/>
  <text x="645" y="155" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・再生数</text>
  <text x="645" y="175" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・クリック数</text>
  <text x="645" y="195" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">・コメント</text>
  <text x="645" y="225" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">月次</text>
  <text x="645" y="242" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">レビュー</text>

  <text x="400" y="405" font-size="12" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">分業化により、継続的で高品質な運用が実現する</text>
</svg>
