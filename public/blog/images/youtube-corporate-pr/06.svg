<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画SEO最適化の重要度マトリクス</text>

  <!-- X軸線 -->
  <line x1="120" y1="240" x2="720" y2="240" stroke="#333333" stroke-width="2"/>
  <!-- Y軸線 -->
  <line x1="420" y1="80" x2="420" y2="340" stroke="#333333" stroke-width="2"/>

  <!-- X軸ラベル -->
  <text x="120" y="365" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">実装の難度：低</text>
  <text x="680" y="365" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">実装の難度：高</text>

  <!-- Y軸ラベル -->
  <text x="80" y="90" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：高</text>
  <text x="80" y="350" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">効果：低</text>

  <!-- 優先度1：高い -->
  <circle cx="200" cy="140" r="45" fill="#c9a84c" opacity="0.8"/>
  <text x="200" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">タイトル</text>
  <text x="200" y="150" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">最適化</text>

  <!-- 優先度2 -->
  <circle cx="320" cy="170" r="40" fill="#8b7355" opacity="0.8"/>
  <text x="320" y="165" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">説明文</text>
  <text x="320" y="180" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">記載</text>

  <!-- 優先度3 -->
  <circle cx="520" cy="130" r="35" fill="#555555" opacity="0.8"/>
  <text x="520" y="130" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">タグ設定</text>

  <!-- 優先度4 -->
  <circle cx="600" cy="200" r="30" fill="#999999" opacity="0.8"/>
  <text x="600" y="205" font-size="9" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">字幕</text>

  <!-- 優先度5 -->
  <circle cx="280" cy="290" r="28" fill="#666666" opacity="0.8"/>
  <text x="280" y="295" font-size="9" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">再生時間</text>

  <text x="400" y="405" font-size="12" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">円のサイズ＝優先度の高さ</text>
</svg>
