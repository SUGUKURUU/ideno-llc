<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">顧客心理：チャネル別の信頼形成プロセス</text>

  <!-- フェーズ1：認知 -->
  <g>
    <rect x="80" y="100" width="130" height="100" fill="#c9a84c" rx="5"/>
    <text x="145" y="130" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知</text>
    <text x="145" y="155" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS</text>
    <text x="145" y="172" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">広告</text>
  </g>

  <!-- 矢印 -->
  <path d="M 220,150 L 260,150" stroke="#c9a84c" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- フェーズ2：理解 -->
  <g>
    <rect x="260" y="100" width="130" height="100" fill="#8b7355" rx="5"/>
    <text x="325" y="130" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">理解</text>
    <text x="325" y="155" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">動画</text>
    <text x="325" y="172" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">ブログ</text>
  </g>

  <!-- 矢印 -->
  <path d="M 400,150 L 440,150" stroke="#c9a84c" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- フェーズ3：検討 -->
  <g>
    <rect x="440" y="100" width="130" height="100" fill="#555555" rx="5"/>
    <text x="505" y="130" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">検討</text>
    <text x="505" y="155" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP</text>
    <text x="505" y="172" font-size="11" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">見積</text>
  </g>

  <!-- 矢印 -->
  <path d="M 580,150 L 620,150" stroke="#c9a84c" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- フェーズ4：決定 -->
  <g>
    <rect x="620" y="100" width="130" height="100" fill="#999999" rx="5"/>
    <text x="685" y="130" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">決定</text>
    <text x="685" y="155" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">問い合わせ</text>
    <text x="685" y="172" font-size="11" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">申込</text>
  </g>

  <!-- 下部説明 -->
  <text x="400" y="260" font-size="12" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">各フェーズで異なるコンテンツが必要：SNS→動画→HP→問い合わせ</text>

  <!-- 定義 -->
  <rect x="100" y="310" width="600" height="80" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="120" y="335" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">適切なコンテンツ配置：認知段階ではSNS、理解段階では動画、</text>
  <text x="120" y="355" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">検討段階ではHP、決定段階では問い合わせ導線が重要</text>
  <text x="120" y="375" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">4つすべてが揃うことで初めて「採用・営業への効果」が最大化</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>
