<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">外注後のSNSフォロワー成長推移</text>

  <!-- グリッド -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="340" x2="740" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="80" y1="60" x2="740" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="116" x2="740" y2="116" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="172" x2="740" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="228" x2="740" y2="228" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="80" y1="284" x2="740" y2="284" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y軸ラベル -->
  <text x="72" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">5000</text>
  <text x="72" y="120" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">4000</text>
  <text x="72" y="176" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">3000</text>
  <text x="72" y="232" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">2000</text>
  <text x="72" y="288" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">1000</text>
  <text x="72" y="344" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0</text>
  <text x="30" y="200" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,30,200)">フォロワー数</text>

  <!-- X軸ラベル -->
  <!-- 0〜12ヶ月: x=80+(660/12)*n -->
  <text x="80" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">0</text>
  <text x="135" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">1</text>
  <text x="190" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">2</text>
  <text x="245" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">3</text>
  <text x="300" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">4</text>
  <text x="355" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">5</text>
  <text x="410" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">6</text>
  <text x="465" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">7</text>
  <text x="520" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">8</text>
  <text x="575" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">9</text>
  <text x="630" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">10</text>
  <text x="685" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">11</text>
  <text x="740" y="358" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">12</text>
  <text x="410" y="390" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">経過月数（ヶ月）</text>

  <!-- 縦グリッド補助 -->
  <line x1="245" y1="60" x2="245" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="410" y1="60" x2="410" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="740" y1="60" x2="740" y2="340" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Y変換: y = 340 - (value/5000)*280 -->
  <!-- 外注ライン (ゴールド): 0→50→150→300→700→1200→1800→2500→3200→3800→4300→4600→4800 -->
  <polyline points="
    80,340
    135,337
    190,331
    245,323
    300,301
    355,273
    410,239
    465,200
    520,161
    575,125
    630,98
    685,82
    740,76
  " fill="none" stroke="#c9a84c" stroke-width="3"/>

  <!-- 自社運用ライン (白破線): 0→30→80→150→230→320→420→520→620→720→800→880→950 -->
  <polyline points="
    80,340
    135,338
    190,335
    245,332
    300,327
    355,322
    410,316
    465,311
    520,305
    575,299
    630,295
    685,290
    740,287
  " fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- データポイント・ラベル（外注） -->
  <circle cx="245" cy="323" r="5" fill="#c9a84c"/>
  <rect x="218" y="295" width="56" height="24" fill="rgba(201,168,76,0.15)" rx="4"/>
  <text x="246" y="311" fill="#c9a84c" font-size="11" text-anchor="middle">3ヶ月:300</text>

  <circle cx="410" cy="239" r="5" fill="#c9a84c"/>
  <rect x="378" y="211" width="64" height="24" fill="rgba(201,168,76,0.15)" rx="4"/>
  <text x="410" y="227" fill="#c9a84c" font-size="11" text-anchor="middle">6ヶ月:1200</text>

  <circle cx="740" cy="76" r="5" fill="#c9a84c"/>
  <rect x="702" y="48" width="76" height="24" fill="rgba(201,168,76,0.15)" rx="4"/>
  <text x="740" y="64" fill="#c9a84c" font-size="11" text-anchor="middle">12ヶ月:4800</text>

  <!-- 凡例 -->
  <line x1="480" y1="55" x2="510" y2="55" stroke="#c9a84c" stroke-width="3"/>
  <text x="516" y="59" fill="#c9a84c" font-size="12">外注運用</text>
  <line x1="600" y1="55" x2="630" y2="55" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="636" y="59" fill="rgba(255,255,255,0.6)" font-size="12">自社運用</text>
</svg>