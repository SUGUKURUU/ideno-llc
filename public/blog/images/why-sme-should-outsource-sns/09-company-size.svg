<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">企業規模別SNS外注率</text>

  <!-- グリッド y:60-340, 0%-60% -->
  <line x1="100" y1="60" x2="100" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="340" x2="740" y2="340" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="100" y1="60" x2="740" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="107" x2="740" y2="107" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="153" x2="740" y2="153" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="200" x2="740" y2="200" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="247" x2="740" y2="247" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="100" y1="293" x2="740" y2="293" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y軸ラベル: 60%=y60, 50%=107, 40%=153, 30%=200, 20%=247, 10%=293, 0%=340 -->
  <text x="90" y="64" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">60%</text>
  <text x="90" y="111" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">50%</text>
  <text x="90" y="157" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">40%</text>
  <text x="90" y="204" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">30%</text>
  <text x="90" y="251" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">20%</text>
  <text x="90" y="297" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">10%</text>
  <text x="90" y="344" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">0%</text>
  <text x="40" y="210" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle" transform="rotate(-90,40,210)">SNS外注率</text>

  <!-- 4本のバー: x幅=(740-100)/4=160, 各バー幅=90, 間隔=70 -->
  <!-- バー中心: 180, 340, 500, 660 -->
  <!-- y = 340 - (pct/60)*280 -->
  <!-- 18% → y = 340 - (18/60)*280 = 340 - 84 = 256, h=84 -->
  <rect x="135" y="256" width="90" height="84" fill="#c9a84c" rx="4"/>
  <text x="180" y="248" fill="#c9a84c" font-size="16" font-weight="bold" text-anchor="middle">18%</text>
  <text x="180" y="358" fill="#ffffff" font-size="13" text-anchor="middle">〜10名</text>
  <text x="180" y="375" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">スモール</text>

  <!-- 36% → y=340-(36/60)*280=340-168=172, h=168 -->
  <rect x="295" y="172" width="90" height="168" fill="#c9a84c" rx="4"/>
  <text x="340" y="164" fill="#c9a84c" font-size="16" font-weight="bold" text-anchor="middle">36%</text>
  <text x="340" y="358" fill="#ffffff" font-size="13" text-anchor="middle">11〜30名</text>
  <text x="340" y="375" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">小規模</text>

  <!-- 52% → y=340-(52/60)*280=340-242.7=97.3, h=242.7 -->
  <rect x="455" y="97" width="90" height="243" fill="#c9a84c" rx="4"/>
  <!-- ★ 最大値バッジ -->
  <circle cx="500" cy="85" r="18" fill="#c9a84c"/>
  <text x="500" y="82" fill="#111111" font-size="10" font-weight="bold" text-anchor="middle">最高</text>
  <text x="500" y="95" fill="#111111" font-size="10" font-weight="bold" text-anchor="middle">52%</text>
  <text x="500" y="358" fill="#ffffff" font-size="13" text-anchor="middle">31〜100名</text>
  <text x="500" y="375" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">中規模</text>

  <!-- 38% → y=340-(38/60)*280=340-177.3=162.7, h=177.3 -->
  <rect x="615" y="163" width="90" height="177" fill="rgba(201,168,76,0.55)" rx="4"/>
  <text x="660" y="155" fill="rgba(201,168,76,0.8)" font-size="16" font-weight="bold" text-anchor="middle">38%</text>
  <text x="660" y="358" fill="#ffffff" font-size="13" text-anchor="middle">100名〜</text>
  <text x="660" y="375" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">大規模</text>

  <!-- 平均ライン: 36% → y=172 -->
  <line x1="100" y1="172" x2="740" y2="172" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="745" y="176" fill="rgba(255,255,255,0.5)" font-size="11">平均</text>

  <!-- 注釈 -->
  <text x="400" y="405" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">※ 中小企業SNS活用実態調査（推定値）より作成</text>
</svg>