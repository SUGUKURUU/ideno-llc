<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">経営者の週間時間配分（外注前後）</text>

  <!-- 左円グラフ：外注前 cx=210, cy=220, r=130 -->
  <!-- 週45時間: SNS10h=80deg, 本業30h=240deg, その他5h=40deg -->
  <!-- SNS10h: 赤 #f87171 0deg→80deg -->
  <path d="M210,220 L210,90 A130,130 0 0,1 337.7,155 Z" fill="#f87171"/>
  <!-- 本業30h: ゴールド 80deg→320deg (240deg) -->
  <path d="M210,220 L337.7,155 A130,130 0 1,1 143.7,333.3 Z" fill="#c9a84c"/>
  <!-- その他5h: グレー 320deg→360deg (40deg) -->
  <path d="M210,220 L143.7,333.3 A130,130 0 0,1 210,90 Z" fill="#555555"/>

  <text x="210" y="215" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">週45時間</text>
  <text x="210" y="233" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">合計</text>
  <text x="210" y="390" fill="rgba(255,255,255,0.8)" font-size="14" font-weight="bold" text-anchor="middle">外注前</text>

  <!-- 右円グラフ：外注後 cx=590, cy=220, r=130 -->
  <!-- 本業40h=320deg, その他5h=40deg -->
  <!-- 本業40h: ゴールド 0deg→320deg -->
  <path d="M590,220 L590,90 A130,130 0 1,1 520.7,333.3 Z" fill="#c9a84c"/>
  <!-- その他5h: グレー 320deg→360deg -->
  <path d="M590,220 L520.7,333.3 A130,130 0 0,1 590,90 Z" fill="#555555"/>

  <text x="590" y="215" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">週45時間</text>
  <text x="590" y="233" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">合計</text>
  <text x="590" y="390" fill="rgba(255,255,255,0.8)" font-size="14" font-weight="bold" text-anchor="middle">外注後</text>

  <!-- 矢印 -->
  <line x1="360" y1="220" x2="440" y2="220" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="440,214 455,220 440,226" fill="#c9a84c"/>
  <text x="400" y="210" fill="#c9a84c" font-size="11" text-anchor="middle">外注</text>

  <!-- 凡例 -->
  <rect x="60" y="55" width="14" height="14" fill="#f87171" rx="2"/>
  <text x="80" y="67" fill="rgba(255,255,255,0.7)" font-size="12">SNS業務（10h）</text>
  <rect x="200" y="55" width="14" height="14" fill="#c9a84c" rx="2"/>
  <text x="220" y="67" fill="rgba(255,255,255,0.7)" font-size="12">本業（外注前30h／後40h）</text>
  <rect x="480" y="55" width="14" height="14" fill="#555555" rx="2"/>
  <text x="500" y="67" fill="rgba(255,255,255,0.7)" font-size="12">その他（5h）</text>

  <!-- 各パイのラベル -->
  <text x="268" y="145" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">SNS</text>
  <text x="268" y="159" fill="#ffffff" font-size="11" text-anchor="middle">10h</text>
  <text x="170" y="240" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">本業</text>
  <text x="170" y="256" fill="#111111" font-size="12" text-anchor="middle">30h</text>
  <text x="175" y="330" fill="#ffffff" font-size="11" text-anchor="middle">5h</text>

  <text x="590" y="240" fill="#111111" font-size="13" font-weight="bold" text-anchor="middle">本業</text>
  <text x="590" y="256" fill="#111111" font-size="12" text-anchor="middle">40h</text>
  <text x="548" y="330" fill="#ffffff" font-size="11" text-anchor="middle">5h</text>

  <!-- +10h バッジ -->
  <circle cx="590" cy="155" r="28" fill="#c9a84c"/>
  <text x="590" y="150" fill="#111111" font-size="11" font-weight="bold" text-anchor="middle">+10h</text>
  <text x="590" y="165" fill="#111111" font-size="10" text-anchor="middle">本業へ</text>
</svg>