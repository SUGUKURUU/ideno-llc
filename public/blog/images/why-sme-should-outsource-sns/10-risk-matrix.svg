<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="30" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">自社SNS運用のリスクマップ</text>

  <!-- 4象限エリア -->
  <!-- 全体: x80-720, y50-380 → 中心x=400, y=215 -->
  <!-- 左下: 低×小 -->
  <rect x="80" y="215" width="320" height="165" fill="rgba(74,222,128,0.05)" rx="0"/>
  <!-- 右下: 低×大 -->
  <rect x="400" y="215" width="320" height="165" fill="rgba(251,191,36,0.05)" rx="0"/>
  <!-- 左上: 高×小 -->
  <rect x="80" y="50" width="320" height="165" fill="rgba(251,191,36,0.05)" rx="0"/>
  <!-- 右上: 高×大 (危険) -->
  <rect x="400" y="50" width="320" height="165" fill="rgba(248,113,113,0.1)" rx="0"/>

  <!-- 象限ラベル -->
  <text x="240" y="290" fill="rgba(74,222,128,0.3)" font-size="13" text-anchor="middle">低リスク</text>
  <text x="560" y="290" fill="rgba(251,191,36,0.3)" font-size="13" text-anchor="middle">要注意</text>
  <text x="240" y="125" fill="rgba(251,191,36,0.3)" font-size="13" text-anchor="middle">管理可能</text>
  <text x="560" y="125" fill="rgba(248,113,113,0.4)" font-size="14" font-weight="bold" text-anchor="middle">⚠ 高リスクゾーン</text>

  <!-- 軸線 -->
  <line x1="80" y1="215" x2="720" y2="215" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="400" y1="50" x2="400" y2="380" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- 外枠 -->
  <rect x="80" y="50" width="640" height="330" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- 軸ラベル -->
  <!-- 縦軸: 発生確率 (低→高 下→上) -->
  <text x="55" y="220" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">低</text>
  <text x="55" y="60" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">高</text>
  <text x="30" y="215" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle" transform="rotate(-90,30,215)">発生確率</text>
  <line x1="80" y1="380" x2="80" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <polygon points="75,55 80,45 85,55" fill="rgba(255,255,255,0.3)"/>

  <!-- 横軸: ダメージ (小→大) -->
  <text x="95" y="400" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">小</text>
  <text x="710" y="400" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">大</text>
  <text x="400" y="410" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">ダメージ（ビジネスへの影響）</text>
  <line x1="80" y1="380" x2="720" y2="380" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <polygon points="715,375 725,380 715,385" fill="rgba(255,255,255,0.3)"/>

  <!-- リスクプロット -->
  <!-- ネタ切れ: 高発生×小ダメージ → 左上: x=220, y=120 -->
  <circle cx="210" cy="120" r="32" fill="rgba(248,113,113,0.25)" stroke="#f87171" stroke-width="2"/>
  <text x="210" y="116" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">ネタ切れ</text>
  <text x="210" y="132" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">発生確率：高</text>

  <!-- 品質低下: 高発生×大ダメージ → 右上: x=480, y=100 -->
  <circle cx="490" cy="105" r="36" fill="rgba(248,113,113,0.35)" stroke="#f87171" stroke-width="2.5"/>
  <text x="490" y="101" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">品質低下</text>
  <text x="490" y="117" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">ブランド毀損</text>

  <!-- 担当離職: 高発生×大ダメージ → 右上: x=600, y=140 -->
  <circle cx="610" cy="155" r="38" fill="rgba(248,113,113,0.4)" stroke="#f87171" stroke-width="3"/>
  <text x="610" y="151" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">担当離職</text>
  <text x="610" y="167" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">ノウハウ消失</text>

  <!-- 炎上リスク: 低発生×大ダメージ → 右下: x=580, y=300 -->
  <circle cx="570" cy="300" r="30" fill="rgba(251,191,36,0.2)" stroke="#fbbf24" stroke-width="2"/>
  <text x="570" y="296" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">炎上リスク</text>
  <text x="570" y="312" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">低頻度×大打撃</text>

  <!-- 投稿停止: 高×小 -->
  <circle cx="320" cy="155" r="28" fill="rgba(248,113,113,0.2)" stroke="#f87171" stroke-width="1.5"/>
  <text x="320" y="151" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">投稿停止</text>
  <text x="320" y="167" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">継続性破綻</text>

  <!-- 外注なら解決バッジ -->
  <rect x="82" y="52" width="160" height="28" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1" rx="4"/>
  <text x="162" y="70" fill="#c9a84c" font-size="11" text-anchor="middle">外注で全リスク回避可能</text>
</svg>