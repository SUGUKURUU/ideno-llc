<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="30" fill="#c9a84c" font-size="18" font-weight="bold" text-anchor="middle">外注を検討すべき会社か？判断フロー</text>

  <!-- スタートボックス -->
  <rect x="300" y="50" width="200" height="44" fill="#c9a84c" rx="22"/>
  <text x="400" y="77" fill="#111111" font-size="14" font-weight="bold" text-anchor="middle">SNS担当者がいる？</text>

  <!-- Yes矢印 右へ -->
  <line x1="500" y1="72" x2="580" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <polygon points="580,67 592,72 580,77" fill="rgba(255,255,255,0.4)"/>
  <text x="536" y="65" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">Yes</text>

  <!-- No矢印 下へ -->
  <line x1="400" y1="94" x2="400" y2="134" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <polygon points="395,134 400,146 405,134" fill="rgba(255,255,255,0.4)"/>
  <text x="415" y="118" fill="rgba(255,255,255,0.5)" font-size="11">No</text>

  <!-- No側 第2菱形 -->
  <polygon points="400,146 490,182 400,218 310,182" fill="#1e1e1e" stroke="#c9a84c" stroke-width="1.5"/>
  <text x="400" y="178" fill="#ffffff" font-size="12" text-anchor="middle">時間・コストを</text>
  <text x="400" y="194" fill="#ffffff" font-size="12" text-anchor="middle">かけられる？</text>

  <!-- No側 No → 外注推奨 -->
  <line x1="400" y1="218" x2="400" y2="258" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <polygon points="395,258 400,270 405,258" fill="rgba(255,255,255,0.4)"/>
  <text x="415" y="242" fill="rgba(255,255,255,0.5)" font-size="11">No</text>

  <!-- No側 Yes → 右へ（自社検討） -->
  <line x1="490" y1="182" x2="580" y2="182" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <polygon points="580,177 592,182 580,187" fill="rgba(255,255,255,0.4)"/>
  <text x="532" y="175" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">Yes</text>

  <!-- Yes側 第2菱形 -->
  <polygon points="660,50 750,86 660,122 570,86" fill="#1e1e1e" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="660" y="82" fill="#ffffff" font-size="12" text-anchor="middle">成果が</text>
  <text x="660" y="98" fill="#ffffff" font-size="12" text-anchor="middle">出ている？</text>

  <!-- 成果出ている Yes → 現状維持 -->
  <line x1="660" y1="122" x2="660" y2="162" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <polygon points="655,162 660,174 665,162" fill="rgba(255,255,255,0.4)"/>
  <text x="675" y="146" fill="rgba(255,255,255,0.5)" font-size="11">Yes</text>

  <!-- 成果出ていない No → 外注推奨ライン -->
  <line x1="660" y1="86" x2="660" y2="182" stroke="rgba(255,255,255,0)" stroke-width="0"/>
  <!-- No arrow left -->
  <line x1="570" y1="86" x2="490" y2="86" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="490" y1="86" x2="490" y2="182" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="528" y="79" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">No</text>

  <!-- 自社で継続検討ボックス -->
  <rect x="592" y="162" width="136" height="44" fill="#1e2a1e" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" rx="6"/>
  <text x="660" y="185" fill="rgba(255,255,255,0.7)" font-size="12" text-anchor="middle">現状維持・</text>
  <text x="660" y="200" fill="rgba(255,255,255,0.7)" font-size="12" text-anchor="middle">自社強化を検討</text>

  <!-- No担当者側 yes→右側も外注へ収束 -->
  <rect x="592" y="162" width="0" height="0"/>

  <!-- 自社検討 Yes側を外注推奨へ接続 -->
  <line x1="592" y1="182" x2="560" y2="182" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="560" y1="182" x2="560" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="560" y1="270" x2="510" y2="270" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <text x="548" y="228" fill="rgba(255,255,255,0.4)" font-size="10">改善せず</text>

  <!-- 外注推奨ボックス -->
  <rect x="280" y="270" width="230" height="56" fill="#c9a84c" rx="8"/>
  <text x="395" y="295" fill="#111111" font-size="16" font-weight="bold" text-anchor="middle">外注を強く推奨</text>
  <text x="395" y="315" fill="#111111" font-size="12" text-anchor="middle">今すぐ専門会社に相談を</text>

  <!-- 外注推奨から下へ -->
  <line x1="395" y1="326" x2="395" y2="366" stroke="#c9a84c" stroke-width="2"/>
  <polygon points="389,366 395,378 401,366" fill="#c9a84c"/>

  <!-- 成果指標ボックス -->
  <rect x="280" y="378" width="230" height="36" fill="#1a1a0e" stroke="#c9a84c" stroke-width="1" rx="6"/>
  <text x="395" y="401" fill="#c9a84c" font-size="12" text-anchor="middle">月3〜15万円 / 最短2週間で開始</text>
</svg>