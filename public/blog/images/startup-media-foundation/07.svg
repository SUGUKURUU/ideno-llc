<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">チャネル間の導線設計</text>

  <!-- SNS -->
  <circle cx="150" cy="180" r="60" fill="#c9a84c"/>
  <text x="150" y="185" font-size="12" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS</text>

  <!-- 矢印 -->
  <path d="M 220,180 L 280,180" stroke="#c9a84c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="250" y="165" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">プロフィール</text>
  <text x="250" y="180" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">リンク</text>

  <!-- HP -->
  <circle cx="400" cy="180" r="60" fill="#8b7355"/>
  <text x="400" y="185" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP</text>

  <!-- 矢印 -->
  <path d="M 470,180 L 530,180" stroke="#8b7355" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="500" y="160" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フッター</text>
  <text x="500" y="175" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">SNS</text>
  <text x="500" y="190" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">アイコン</text>

  <!-- 問い合わせ -->
  <circle cx="650" cy="180" r="60" fill="#555555"/>
  <text x="650" y="175" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">問い合わせ</text>
  <text x="650" y="195" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォーム</text>

  <!-- 下部説明 -->
  <rect x="80" y="290" width="640" height="110" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
  <text x="100" y="315" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">必須の導線設計：</text>
  <text x="100" y="335" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ SNSプロフィール → HPへのリンク（必須）</text>
  <text x="100" y="355" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ HP → SNSアカウントへのリンク（フッター等）</text>
  <text x="100" y="375" font-size="11" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">✓ 全チャネルで問い合わせ先を統一する</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9a84c"/>
    </marker>
  </defs>
</svg>
