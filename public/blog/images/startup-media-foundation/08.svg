<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">月別KPI目標設定（最初の6ヶ月）</text>

  <!-- 1-2ヶ月 -->
  <rect x="80" y="90" width="130" height="280" fill="#c9a84c" rx="5"/>
  <text x="145" y="115" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1-2ヶ月</text>
  <text x="145" y="145" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
  <text x="145" y="163" font-size="10" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">50-100</text>
  <text x="145" y="195" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">エンゲージ</text>
  <text x="145" y="213" font-size="10" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2-3%</text>
  <text x="145" y="245" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP訪問</text>
  <text x="145" y="263" font-size="10" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">10-20</text>

  <!-- 3-4ヶ月 -->
  <rect x="240" y="90" width="130" height="280" fill="#8b7355" rx="5"/>
  <text x="305" y="115" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3-4ヶ月</text>
  <text x="305" y="145" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
  <text x="305" y="163" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">200-300</text>
  <text x="305" y="195" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">エンゲージ</text>
  <text x="305" y="213" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">2-4%</text>
  <text x="305" y="245" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">HP訪問</text>
  <text x="305" y="263" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">30-50</text>

  <!-- 5-6ヶ月 -->
  <rect x="400" y="90" width="130" height="280" fill="#555555" rx="5"/>
  <text x="465" y="115" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">5-6ヶ月</text>
  <text x="465" y="145" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">フォロワー</text>
  <text x="465" y="163" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">500-800</text>
  <text x="465" y="195" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">エンゲージ</text>
  <text x="465" y="213" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">3-5%</text>
  <text x="465" y="245" font-size="10" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">問い合わせ</text>
  <text x="465" y="263" font-size="10" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">1-3件</text>

  <!-- 継続パターン -->
  <rect x="580" y="90" width="140" height="280" fill="#999999" rx="5"/>
  <text x="650" y="115" font-size="11" font-weight="bold" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">6ヶ月以降</text>
  <text x="650" y="150" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">KPI検証</text>
  <text x="650" y="170" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">6ヶ月時点での</text>
  <text x="650" y="185" font-size="9" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">成果を検証</text>
  <text x="650" y="205" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→</text>
  <text x="650" y="225" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">継続 or</text>
  <text x="650" y="245" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">チャネル</text>
  <text x="650" y="263" font-size="10" text-anchor="middle" fill="#111111" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">変更</text>
</svg>
