<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">メッセージシート：5つの必須設問</text>

  <g>
    <rect x="80" y="80" width="640" height="300" fill="none" stroke="#333333" stroke-width="1" rx="3"/>
    <text x="100" y="110" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Q1. 誰のためのサービスか？</text>
    <text x="110" y="130" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">例：30代男性・中小企業社長・年商5000万円以下</text>

    <text x="100" y="160" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Q2. 顧客が抱える課題は何か？</text>
    <text x="110" y="180" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">例：SNSをやった方がいいとわかるが、時間がない・やり方がわからない</text>

    <text x="100" y="210" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Q3. 自社はその課題をどう解決するのか？</text>
    <text x="110" y="230" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">例：経営者の代わりにSNSを運用し、認知拡大と集客を支援</text>

    <text x="100" y="260" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Q4. なぜ自社がこの課題を解決できるのか？（競合との差別化）</text>
    <text x="110" y="280" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">例：実際の経営者経験を持つスタッフが戦略設計から投稿まで一貫担当</text>

    <text x="100" y="310" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Q5. 顧客が得られる具体的なベネフィットは何か？</text>
    <text x="110" y="330" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">例：半年でフォロワー1000人以上、月3-5件の新規問い合わせ獲得</text>

    <text x="400" y="370" font-size="11" text-anchor="middle" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">この5問の回答がすべてのチャネルの発信基盤になる</text>
  </g>
</svg>
