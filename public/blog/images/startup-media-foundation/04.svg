<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#111111"/>
  <text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">スタートアップのよくある失敗</text>

  <g>
    <rect x="80" y="80" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="235" y="105" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗1：発信しないまま時間が経つ</text>
    <text x="100" y="130" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">「もう少し準備が整ってから」と先送り</text>
    <text x="100" y="148" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→今すぐ始めることが最優先</text>
  </g>

  <g>
    <rect x="410" y="80" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="565" y="105" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗2：チャネルを増やしすぎる</text>
    <text x="430" y="130" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">Instagram・X・YouTube全部やろうとする</text>
    <text x="430" y="148" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→1チャネル集中が成功の鍵</text>
  </g>

  <g>
    <rect x="80" y="210" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="235" y="235" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗3：HPに予算をかけすぎる</text>
    <text x="100" y="260" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">認知がない段階で完璧HPに100万円</text>
    <text x="100" y="278" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→最小限HPで早期公開が正解</text>
  </g>

  <g>
    <rect x="410" y="210" width="310" height="100" fill="#333333" stroke="#555555" stroke-width="1" rx="3"/>
    <text x="565" y="235" font-size="11" font-weight="bold" fill="#c9a84c" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">失敗4：広告を最初に打つ</text>
    <text x="430" y="260" font-size="10" fill="#aaaaaa" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">発信基盤がないまま広告費を消費</text>
    <text x="430" y="278" font-size="10" fill="#888888" font-family="'Hiragino Sans','Noto Sans JP',sans-serif">→まずオーガニック成長を優先</text>
  </g>
</svg>
