<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">季節・イベントカレンダー：年間コンテンツ企画</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">12ヶ月分のタイムリーコンテンツを先に計画</text>

  <!-- 月別カレンダー -->
  <g>
    <rect x="60" y="75" width="660" height="250" fill="none" stroke="#c9a84c" stroke-width="1"/>

    <!-- 1月 -->
    <rect x="70" y="85" width="80" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="110" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">1月</text>
    <text x="110" y="118" class="text-white" text-anchor="middle" font-size="9">年始挨拶</text>
    <text x="110" y="130" class="text-white" text-anchor="middle" font-size="9">今年の目標</text>

    <!-- 2-3月 -->
    <rect x="160" y="85" width="80" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="200" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">2-3月</text>
    <text x="200" y="118" class="text-white" text-anchor="middle" font-size="9">花粉症対策</text>
    <text x="200" y="130" class="text-white" text-anchor="middle" font-size="9">年度末対応</text>

    <!-- 4月 -->
    <rect x="250" y="85" width="80" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="290" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">4月</text>
    <text x="290" y="118" class="text-white" text-anchor="middle" font-size="9">新社会人向け</text>
    <text x="290" y="130" class="text-white" text-anchor="middle" font-size="9">春のコンテンツ</text>

    <!-- 5月 -->
    <rect x="340" y="85" width="80" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="380" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">5月</text>
    <text x="380" y="118" class="text-white" text-anchor="middle" font-size="9">GW企画</text>
    <text x="380" y="130" class="text-white" text-anchor="middle" font-size="9">気持ちリセット</text>

    <!-- 6-7月 -->
    <rect x="430" y="85" width="80" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="470" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">6-7月</text>
    <text x="470" y="118" class="text-white" text-anchor="middle" font-size="9">梅雨・熱中症</text>
    <text x="470" y="130" class="text-white" text-anchor="middle" font-size="9">夏キャンペーン</text>

    <!-- 8月 -->
    <rect x="520" y="85" width="80" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="560" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">8月</text>
    <text x="560" y="118" class="text-white" text-anchor="middle" font-size="9">夏休み企画</text>
    <text x="560" y="130" class="text-white" text-anchor="middle" font-size="9">お盆</text>

    <!-- 9-10月 -->
    <rect x="610" y="85" width="100" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="660" y="100" class="gold" text-anchor="middle" font-size="11" font-weight="bold">9-10月</text>
    <text x="660" y="118" class="text-white" text-anchor="middle" font-size="9">秋仕様企画</text>
    <text x="660" y="130" class="text-white" text-anchor="middle" font-size="9">新規プロジェクト</text>

    <!-- 11-12月 -->
    <rect x="70" y="155" width="100" height="60" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <text x="120" y="170" class="gold" text-anchor="middle" font-size="11" font-weight="bold">11-12月</text>
    <text x="120" y="188" class="text-white" text-anchor="middle" font-size="9">年末の振り返り</text>
    <text x="120" y="200" class="text-white" text-anchor="middle" font-size="9">来年の準備</text>

    <!-- 業界特有イベント -->
    <rect x="190" y="155" width="520" height="60" fill="none" stroke="#c9a84c" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="450" y="170" class="gold" text-anchor="middle" font-size="11" font-weight="bold">+ 業界特有のイベント・キャンペーン</text>
    <text x="450" y="190" class="text-white" text-anchor="middle" font-size="10">（決算セール、業界イベント、注目企画など）</text>
  </g>

  <!-- 効果数字 -->
  <rect x="80" y="330" width="250" height="60" fill="#c9a84c" opacity="0.1" rx="5"/>
  <text x="205" y="350" class="gold" text-anchor="middle" font-size="14" font-weight="bold">年間24〜30本分の</text>
  <text x="205" y="370" class="gold" text-anchor="middle" font-size="14" font-weight="bold">コンテンツ枠が埋まる</text>

  <rect x="470" y="330" width="250" height="60" fill="#c9a84c" opacity="0.1" rx="5"/>
  <text x="595" y="350" class="gold" text-anchor="middle" font-size="14" font-weight="bold">「何を投稿しよう」</text>
  <text x="595" y="370" class="gold" text-anchor="middle" font-size="14" font-weight="bold">という悩みが解消</text>
</svg>
