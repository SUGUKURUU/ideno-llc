<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">ネタメモ帳：毎日のネタ収集習慣</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">スマートフォンメモアプリで常時記録</text>

  <!-- メモアプリイメージ -->
  <rect x="50" y="75" width="300" height="280" fill="none" stroke="#c9a84c" stroke-width="2" rx="10"/>
  <rect x="50" y="75" width="300" height="40" fill="#c9a84c" rx="10" rx="10"/>
  <text x="200" y="100" class="text-white" text-anchor="middle" font-size="14" font-weight="bold">SNS ネタ帳</text>

  <!-- メモの例 -->
  <text x="70" y="135" class="text-white" font-size="12">✓ 季節の変わり目に肩こり悪化</text>
  <text x="70" y="160" class="text-white" font-size="12">✓ 工場見学で子ども驚くポイント</text>
  <text x="70" y="185" class="text-white" font-size="12">✓ 面接でよく聞かれる質問TOP3</text>
  <text x="70" y="210" class="text-white" font-size="12">✓ 新商品開発での気づき</text>
  <text x="70" y="235" class="text-white" font-size="12">✓ クレーム対応のコツ</text>
  <text x="70" y="260" class="text-white" font-size="12">✓ お客様から「知らなかった！」</text>
  <text x="70" y="285" class="text-white" font-size="12">✓ 業界トレンドの最新情報</text>
  <text x="70" y="310" class="text-white" font-size="12">✓ 失敗経験からの学び</text>

  <!-- ネタの源泉 -->
  <text x="450" y="90" class="text-white" text-anchor="middle" font-size="13" font-weight="bold">ネタの源泉</text>

  <g>
    <circle cx="450" cy="140" r="35" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="450" y="130" class="text-white" text-anchor="middle" font-size="20">👥</text>
    <text x="450" y="160" class="text-white" text-anchor="middle" font-size="11">お客様との</text>
    <text x="450" y="173" class="text-white" text-anchor="middle" font-size="11">会話</text>
  </g>

  <g>
    <circle cx="550" cy="140" r="35" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="550" y="130" class="text-white" text-anchor="middle" font-size="20">💡</text>
    <text x="550" y="160" class="text-white" text-anchor="middle" font-size="11">社内の</text>
    <text x="550" y="173" class="text-white" text-anchor="middle" font-size="11">気づき</text>
  </g>

  <g>
    <circle cx="650" cy="140" r="35" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="650" y="130" class="text-white" text-anchor="middle" font-size="20">📰</text>
    <text x="650" y="160" class="text-white" text-anchor="middle" font-size="11">ニュース</text>
    <text x="650" y="173" class="text-white" text-anchor="middle" font-size="11">トレンド</text>
  </g>

  <g>
    <circle cx="750" cy="140" r="35" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <text x="750" y="130" class="text-white" text-anchor="middle" font-size="20">⚠️</text>
    <text x="750" y="160" class="text-white" text-anchor="middle" font-size="11">よくある</text>
    <text x="750" y="173" class="text-white" text-anchor="middle" font-size="11">質問</text>
  </g>

  <!-- 時間軸 -->
  <text x="450" y="220" class="text-white" text-anchor="middle" font-size="14" font-weight="bold">毎日の習慣化：気づいた瞬間に記録</text>

  <line x1="420" y1="260" x2="780" y2="260" stroke="#c9a84c" stroke-width="2"/>

  <circle cx="450" cy="260" r="8" fill="#c9a84c"/>
  <text x="450" y="285" class="text-white" text-anchor="middle" font-size="11">朝礼で気づき</text>

  <circle cx="550" cy="260" r="8" fill="#c9a84c"/>
  <text x="550" y="285" class="text-white" text-anchor="middle" font-size="11">営業後の</text>
  <text x="550" y="298" class="text-white" text-anchor="middle" font-size="11">振り返り</text>

  <circle cx="650" cy="260" r="8" fill="#c9a84c"/>
  <text x="650" y="285" class="text-white" text-anchor="middle" font-size="11">お客様との</text>
  <text x="650" y="298" class="text-white" text-anchor="middle" font-size="11">会話</text>

  <circle cx="750" cy="260" r="8" fill="#c9a84c"/>
  <text x="750" y="285" class="text-white" text-anchor="middle" font-size="11">寝る前の</text>
  <text x="750" y="298" class="text-white" text-anchor="middle" font-size="11">整理</text>

  <!-- 効果 -->
  <text x="400" y="340" class="text-white" text-anchor="middle" font-size="15" font-weight="bold">★ 1ヶ月で20〜30個のアイデアが蓄積 ★</text>
  <text x="400" y="365" class="text-gray" text-anchor="middle" font-size="12">記録の工夫：1行のポイントだけでOK（後で肉付けすればいい）</text>
</svg>
