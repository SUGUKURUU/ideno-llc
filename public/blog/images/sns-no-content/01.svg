<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #111111; }
      .gold { fill: #c9a84c; }
      .text-white { fill: #ffffff; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 14px; }
      .text-gray { fill: #aaaaaa; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; font-size: 12px; }
      .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="800" height="420"/>

  <!-- タイトル -->
  <text x="400" y="35" class="title" text-anchor="middle">コンテンツの7つのテーマ軸</text>
  <text x="400" y="55" class="text-gray" text-anchor="middle">企業SNSで継続するためのテーマ設計</text>

  <!-- テーマピラー -->
  <rect x="60" y="75" width="100" height="120" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="110" y="95" class="text-white" text-anchor="middle" font-size="12">教育・解説系</text>
  <text x="110" y="115" class="text-gray" text-anchor="middle" font-size="11">業界知識</text>
  <text x="110" y="135" class="text-gray" text-anchor="middle" font-size="11">よくある誤解</text>
  <text x="110" y="155" class="text-gray" text-anchor="middle" font-size="11">専門家視点</text>

  <rect x="180" y="75" width="100" height="120" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="230" y="95" class="text-white" text-anchor="middle" font-size="12">実用・How to系</text>
  <text x="230" y="115" class="text-gray" text-anchor="middle" font-size="11">手順・方法</text>
  <text x="230" y="135" class="text-gray" text-anchor="middle" font-size="11">チェック</text>
  <text x="230" y="155" class="text-gray" text-anchor="middle" font-size="11">リスト</text>

  <rect x="300" y="75" width="100" height="120" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="350" y="95" class="text-white" text-anchor="middle" font-size="12">信頼・共感系</text>
  <text x="350" y="115" class="text-gray" text-anchor="middle" font-size="11">スタッフ紹介</text>
  <text x="350" y="135" class="text-gray" text-anchor="middle" font-size="11">舞台裏</text>
  <text x="350" y="155" class="text-gray" text-anchor="middle" font-size="11">こだわり</text>

  <rect x="420" y="75" width="100" height="120" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="470" y="95" class="text-white" text-anchor="middle" font-size="12">Q&A系</text>
  <text x="470" y="115" class="text-gray" text-anchor="middle" font-size="11">よくある質問</text>
  <text x="470" y="135" class="text-gray" text-anchor="middle" font-size="11">Q&A形式</text>
  <text x="470" y="155" class="text-gray" text-anchor="middle" font-size="11">解説</text>

  <rect x="540" y="75" width="100" height="120" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="590" y="95" class="text-white" text-anchor="middle" font-size="12">B/A系</text>
  <text x="590" y="115" class="text-gray" text-anchor="middle" font-size="11">改善・変化</text>
  <text x="590" y="135" class="text-gray" text-anchor="middle" font-size="11">比較</text>
  <text x="590" y="155" class="text-gray" text-anchor="middle" font-size="11">ビフォーアフター</text>

  <rect x="660" y="75" width="100" height="120" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="710" y="95" class="text-white" text-anchor="middle" font-size="12">タイムリー系</text>
  <text x="710" y="115" class="text-gray" text-anchor="middle" font-size="11">季節・ニュース</text>
  <text x="710" y="135" class="text-gray" text-anchor="middle" font-size="11">トレンド</text>
  <text x="710" y="155" class="text-gray" text-anchor="middle" font-size="11">投稿</text>

  <!-- 下部テキスト -->
  <text x="400" y="230" class="text-white" text-anchor="middle" font-size="16" font-weight="bold">各テーマから1本ずつ出す → 5週間分のコンテンツが自動確保</text>

  <!-- メリット表示 -->
  <circle cx="120" cy="280" r="25" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="120" y="285" class="text-white" text-anchor="middle" font-size="24">✓</text>
  <text x="160" y="283" class="text-white" font-size="13">ネタ切れ防止</text>

  <circle cx="350" cy="280" r="25" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="350" y="285" class="text-white" text-anchor="middle" font-size="24">✓</text>
  <text x="390" y="283" class="text-white" font-size="13">戦略的な運用</text>

  <circle cx="580" cy="280" r="25" fill="none" stroke="#c9a84c" stroke-width="2"/>
  <text x="580" y="285" class="text-white" text-anchor="middle" font-size="24">✓</text>
  <text x="620" y="283" class="text-white" font-size="13">持続可能な体制</text>

  <!-- 注記 -->
  <text x="400" y="350" class="text-gray" text-anchor="middle" font-size="12">このテーマ軸が決まれば「今週は何を投稿しよう」ではなく</text>
  <text x="400" y="368" class="text-gray" text-anchor="middle" font-size="12">「今週はどのテーマから選ぼう」という思考に変わります</text>
</svg>
