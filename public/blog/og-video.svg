<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#100a08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e5c76b"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c9a84c"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Spotlight effect -->
  <ellipse cx="950" cy="315" rx="320" ry="280" fill="url(#spotlight)"/>

  <!-- Film frame decorations -->
  <g opacity="0.15">
    <rect x="730" y="60" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="752" y="60" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="774" y="60" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="796" y="60" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="730" y="546" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="752" y="546" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="774" y="546" width="16" height="24" rx="2" fill="#c9a84c"/>
    <rect x="796" y="546" width="16" height="24" rx="2" fill="#c9a84c"/>
  </g>

  <!-- Main video frame -->
  <g transform="translate(750, 100)">
    <rect width="380" height="214" rx="8" fill="#111" stroke="#c9a84c" stroke-width="2" opacity="0.9"/>
    <!-- Video content background -->
    <rect x="2" y="2" width="376" height="210" rx="6" fill="#0d0d0d"/>
    <!-- Person silhouette (CEO/president) -->
    <circle cx="190" cy="80" r="40" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
    <circle cx="190" cy="68" r="20" fill="#c9a84c" opacity="0.2"/>
    <path d="M 150 80 Q 190 120 230 80" fill="#c9a84c" opacity="0.15"/>
    <!-- Play button overlay -->
    <circle cx="190" cy="107" r="30" fill="#c9a84c" opacity="0.15"/>
    <circle cx="190" cy="107" r="30" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
    <polygon points="183,97 183,117 203,107" fill="#c9a84c" opacity="0.9"/>
    <!-- Progress bar -->
    <rect x="20" y="192" width="340" height="3" rx="1.5" fill="white" opacity="0.1"/>
    <rect x="20" y="192" width="140" height="3" rx="1.5" fill="#c9a84c" opacity="0.7"/>
    <circle cx="160" cy="193.5" r="5" fill="#c9a84c"/>
    <!-- Time -->
    <text x="20" y="210" font-family="monospace" font-size="9" fill="white" opacity="0.5">0:45</text>
    <text x="340" y="210" font-family="monospace" font-size="9" fill="white" opacity="0.5" text-anchor="end">3:20</text>
  </g>

  <!-- Camera icon -->
  <g transform="translate(800, 360)" opacity="0.75">
    <rect width="100" height="70" rx="8" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <circle cx="48" cy="35" r="20" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <circle cx="48" cy="35" r="10" fill="#c9a84c" opacity="0.2"/>
    <rect x="80" y="18" width="22" height="34" rx="4" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="14" y="8" width="24" height="12" rx="4" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <circle cx="88" cy="12" r="4" fill="#c9a84c" opacity="0.7"/>
  </g>

  <!-- REC indicator -->
  <g transform="translate(930, 370)" opacity="0.8">
    <circle cx="10" cy="10" r="8" fill="#c9a84c" opacity="0.3"/>
    <circle cx="10" cy="10" r="5" fill="#c9a84c" opacity="0.7"/>
    <text x="26" y="15" font-family="monospace" font-size="14" fill="#c9a84c" font-weight="bold">REC</text>
  </g>

  <!-- Waveform -->
  <g transform="translate(820, 470)" opacity="0.5">
    <rect x="0" y="20" width="6" height="20" rx="3" fill="#c9a84c"/>
    <rect x="10" y="10" width="6" height="40" rx="3" fill="#c9a84c"/>
    <rect x="20" y="5" width="6" height="50" rx="3" fill="#c9a84c"/>
    <rect x="30" y="15" width="6" height="30" rx="3" fill="#c9a84c"/>
    <rect x="40" y="20" width="6" height="20" rx="3" fill="#c9a84c"/>
    <rect x="50" y="8" width="6" height="44" rx="3" fill="#c9a84c"/>
    <rect x="60" y="18" width="6" height="24" rx="3" fill="#c9a84c"/>
    <rect x="70" y="12" width="6" height="36" rx="3" fill="#c9a84c"/>
    <rect x="80" y="22" width="6" height="16" rx="3" fill="#c9a84c"/>
    <rect x="90" y="6" width="6" height="48" rx="3" fill="#c9a84c"/>
    <rect x="100" y="20" width="6" height="20" rx="3" fill="#c9a84c"/>
    <rect x="110" y="14" width="6" height="32" rx="3" fill="#c9a84c"/>
  </g>

  <!-- Left content -->
  <rect x="80" y="80" width="240" height="36" rx="18" fill="#c9a84c" opacity="0.15"/>
  <rect x="80" y="80" width="240" height="36" rx="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="200" y="104" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#c9a84c" letter-spacing="2">動画・社長ブランディング</text>

  <text x="80" y="220" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.95">密着ドキュメンタリー</text>
  <text x="80" y="290" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="url(#gold)">制作ガイド</text>

  <line x1="80" y1="330" x2="440" y2="330" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <text x="80" y="370" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">社長の魅力を映像で残す</text>
  <text x="80" y="398" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">採用・ブランディング動画の作り方</text>

  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#c9a84c" letter-spacing="3" opacity="0.8">ideno LLC</text>
  <text x="80" y="582" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white" opacity="0.4">合同会社出野</text>
</svg>
