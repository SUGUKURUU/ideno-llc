<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e5c76b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c9a84c"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Network nodes - strategy diagram -->
  <!-- Center hub -->
  <circle cx="960" cy="315" r="50" fill="#c9a84c" opacity="0.12"/>
  <circle cx="960" cy="315" r="50" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.8"/>
  <text x="960" y="310" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c" font-weight="bold">発信</text>
  <text x="960" y="326" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c" font-weight="bold">戦略</text>

  <!-- SNS node -->
  <line x1="910" y1="280" x2="810" y2="185" stroke="#c9a84c" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="790" cy="170" r="36" fill="#c9a84c" opacity="0.1"/>
  <circle cx="790" cy="170" r="36" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <text x="790" y="175" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="13" fill="#c9a84c">SNS</text>

  <!-- HP node -->
  <line x1="1010" y1="280" x2="1110" y2="185" stroke="#c9a84c" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="1130" cy="170" r="36" fill="#c9a84c" opacity="0.1"/>
  <circle cx="1130" cy="170" r="36" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <text x="1130" y="175" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="13" fill="#c9a84c">HP</text>

  <!-- Video node -->
  <line x1="960" y1="365" x2="960" y2="445" stroke="#c9a84c" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="960" cy="470" r="36" fill="#c9a84c" opacity="0.1"/>
  <circle cx="960" cy="470" r="36" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <text x="960" y="465" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">動画</text>
  <text x="960" y="480" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">コンテンツ</text>

  <!-- Branding node -->
  <line x1="915" y1="350" x2="810" y2="445" stroke="#c9a84c" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="790" cy="465" r="36" fill="#c9a84c" opacity="0.1"/>
  <circle cx="790" cy="465" r="36" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.6"/>
  <text x="790" y="460" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">社長</text>
  <text x="790" y="475" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">ブランド</text>

  <!-- Result node -->
  <line x1="1005" y1="350" x2="1110" y2="445" stroke="#c9a84c" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <circle cx="1130" cy="465" r="36" fill="#c9a84c" opacity="0.15"/>
  <circle cx="1130" cy="465" r="36" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.8"/>
  <text x="1130" y="460" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c" font-weight="bold">問合せ</text>
  <text x="1130" y="475" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c" font-weight="bold">獲得</text>

  <!-- Arrow to result -->
  <circle cx="1130" cy="465" r="42" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3" stroke-dasharray="2,3"/>

  <!-- Growth chart line -->
  <g transform="translate(740, 520)" opacity="0.4">
    <polyline points="0,40 60,30 120,20 180,10 240,5 300,0" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <circle cx="300" cy="0" r="4" fill="#c9a84c"/>
  </g>

  <!-- Left content -->
  <rect x="80" y="80" width="240" height="36" rx="18" fill="#c9a84c" opacity="0.15"/>
  <rect x="80" y="80" width="240" height="36" rx="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="200" y="104" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#c9a84c" letter-spacing="2">総合マーケティング</text>

  <text x="80" y="220" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.95">発信戦略</text>
  <text x="80" y="290" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="url(#gold)">設計ガイド</text>

  <line x1="80" y1="330" x2="380" y2="330" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <text x="80" y="370" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">SNS・HP・動画を組み合わせた</text>
  <text x="80" y="398" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">中小企業の認知拡大戦略</text>

  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#c9a84c" letter-spacing="3" opacity="0.8">ideno LLC</text>
  <text x="80" y="582" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white" opacity="0.4">合同会社出野</text>
</svg>
