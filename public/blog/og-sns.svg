<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141008"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e5c76b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold accent lines -->
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <!-- Background grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c9a84c"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Large decorative circle -->
  <circle cx="950" cy="315" r="280" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.08"/>
  <circle cx="950" cy="315" r="200" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.12"/>

  <!-- SNS Icon cluster -->
  <!-- Instagram-like icon -->
  <g transform="translate(820, 180)" opacity="0.9">
    <rect width="90" height="90" rx="20" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="45" cy="45" r="22" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="68" cy="22" r="5" fill="#c9a84c"/>
  </g>

  <!-- TikTok-like icon -->
  <g transform="translate(940, 140)" opacity="0.85">
    <rect width="90" height="90" rx="20" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <text x="45" y="60" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="42" fill="#c9a84c">♪</text>
  </g>

  <!-- YouTube-like icon -->
  <g transform="translate(880, 300)" opacity="0.8">
    <rect width="100" height="70" rx="15" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <polygon points="40,18 40,52 72,35" fill="#c9a84c" opacity="0.9"/>
  </g>

  <!-- Connecting lines between icons -->
  <line x1="865" y1="270" x2="880" y2="300" stroke="#c9a84c" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="985" y1="230" x2="980" y2="300" stroke="#c9a84c" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Bar chart -->
  <g transform="translate(820, 420)" opacity="0.7">
    <rect x="0" y="60" width="22" height="40" fill="#c9a84c" opacity="0.4" rx="3"/>
    <rect x="28" y="40" width="22" height="60" fill="#c9a84c" opacity="0.6" rx="3"/>
    <rect x="56" y="20" width="22" height="80" fill="#c9a84c" opacity="0.8" rx="3"/>
    <rect x="84" y="0" width="22" height="100" fill="#c9a84c" rx="3"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Upward arrow -->
  <g transform="translate(1060, 350)" opacity="0.5">
    <line x1="0" y1="80" x2="60" y2="20" stroke="#c9a84c" stroke-width="2"/>
    <polygon points="52,10 70,28 60,20" fill="#c9a84c"/>
  </g>

  <!-- Left content area -->
  <!-- Category label -->
  <rect x="80" y="80" width="160" height="36" rx="18" fill="#c9a84c" opacity="0.15"/>
  <rect x="80" y="80" width="160" height="36" rx="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="160" y="104" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#c9a84c" letter-spacing="2">SNS運用</text>

  <!-- Main title area -->
  <text x="80" y="220" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.95">SNS運用代行</text>
  <text x="80" y="290" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="url(#gold)">ノウハウ</text>

  <!-- Divider -->
  <line x1="80" y1="330" x2="360" y2="330" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">中小企業・スタートアップのための</text>
  <text x="80" y="398" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">実践的SNS運用ガイド</text>

  <!-- Brand -->
  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#c9a84c" letter-spacing="3" opacity="0.8">ideno LLC</text>
  <text x="80" y="582" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white" opacity="0.4">合同会社出野</text>
</svg>
