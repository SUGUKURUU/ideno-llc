<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#08100a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e5c76b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <!-- Grid dots -->
  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c9a84c"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="315" r="300" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.06"/>
  <circle cx="950" cy="315" r="220" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.09"/>

  <!-- Browser window mockup -->
  <g transform="translate(740, 120)">
    <!-- Browser frame -->
    <rect width="380" height="280" rx="12" fill="#111" stroke="#c9a84c" stroke-width="1.5" opacity="0.9"/>
    <!-- Title bar -->
    <rect width="380" height="40" rx="12" fill="#1a1a1a" stroke="none"/>
    <rect y="28" width="380" height="12" fill="#1a1a1a"/>
    <!-- Traffic lights -->
    <circle cx="22" cy="20" r="6" fill="#c9a84c" opacity="0.5"/>
    <circle cx="42" cy="20" r="6" fill="#c9a84c" opacity="0.3"/>
    <circle cx="62" cy="20" r="6" fill="#c9a84c" opacity="0.2"/>
    <!-- Address bar -->
    <rect x="80" y="11" width="240" height="18" rx="9" fill="#222" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
    <text x="200" y="24" text-anchor="middle" font-family="monospace" font-size="9" fill="#c9a84c" opacity="0.7">ideno-llc.vercel.app</text>
    <!-- Content lines -->
    <rect x="20" y="60" width="200" height="12" rx="3" fill="#c9a84c" opacity="0.15"/>
    <rect x="20" y="80" width="340" height="8" rx="3" fill="white" opacity="0.08"/>
    <rect x="20" y="96" width="280" height="8" rx="3" fill="white" opacity="0.06"/>
    <rect x="20" y="112" width="320" height="8" rx="3" fill="white" opacity="0.06"/>
    <!-- CTA button -->
    <rect x="20" y="132" width="120" height="32" rx="16" fill="#c9a84c" opacity="0.7"/>
    <text x="80" y="152" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="12" fill="#0a0a0a" font-weight="bold">お問い合わせ</text>
    <!-- Divider -->
    <line x1="20" y1="185" x2="360" y2="185" stroke="white" stroke-width="0.5" opacity="0.1"/>
    <!-- Cards -->
    <rect x="20" y="200" width="100" height="60" rx="6" fill="#1a1a1a" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>
    <rect x="140" y="200" width="100" height="60" rx="6" fill="#1a1a1a" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>
    <rect x="260" y="200" width="100" height="60" rx="6" fill="#1a1a1a" stroke="#c9a84c" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Mobile mockup -->
  <g transform="translate(1000, 260)" opacity="0.7">
    <rect width="80" height="140" rx="12" fill="#111" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="4" y="16" width="72" height="108" rx="4" fill="#1a1a1a"/>
    <rect x="28" y="10" width="24" height="4" rx="2" fill="#c9a84c" opacity="0.4"/>
    <!-- Mobile content -->
    <rect x="8" y="20" width="64" height="8" rx="2" fill="#c9a84c" opacity="0.2"/>
    <rect x="8" y="34" width="48" height="5" rx="2" fill="white" opacity="0.1"/>
    <rect x="8" y="44" width="56" height="5" rx="2" fill="white" opacity="0.08"/>
    <rect x="8" y="60" width="64" height="40" rx="4" fill="#c9a84c" opacity="0.1"/>
    <rect x="20" y="110" width="40" height="10" rx="5" fill="#c9a84c" opacity="0.5"/>
  </g>

  <!-- Speed indicator -->
  <g transform="translate(800, 440)" opacity="0.75">
    <circle cx="40" cy="40" r="35" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.3"/>
    <path d="M 10 40 A 30 30 0 0 1 70 40" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="58" y2="22" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="4" fill="#c9a84c"/>
    <text x="40" y="68" text-anchor="middle" font-family="Arial" font-size="9" fill="#c9a84c" opacity="0.7">SPEED</text>
  </g>

  <!-- SEO check marks -->
  <g transform="translate(900, 435)" opacity="0.7">
    <text x="0" y="20" font-family="Arial" font-size="13" fill="#c9a84c">✓ SEO対策</text>
    <text x="0" y="42" font-family="Arial" font-size="13" fill="#c9a84c">✓ スマホ対応</text>
    <text x="0" y="64" font-family="Arial" font-size="13" fill="#c9a84c">✓ 高速表示</text>
  </g>

  <!-- Left content -->
  <rect x="80" y="80" width="180" height="36" rx="18" fill="#c9a84c" opacity="0.15"/>
  <rect x="80" y="80" width="180" height="36" rx="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="170" y="104" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#c9a84c" letter-spacing="2">HP制作</text>

  <text x="80" y="220" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.95">ホームページ</text>
  <text x="80" y="290" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="url(#gold)">制作ガイド</text>

  <line x1="80" y1="330" x2="380" y2="330" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <text x="80" y="370" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">中小企業のための</text>
  <text x="80" y="398" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">Web制作実践ノウハウ</text>

  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#c9a84c" letter-spacing="3" opacity="0.8">ideno LLC</text>
  <text x="80" y="582" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white" opacity="0.4">合同会社出野</text>
</svg>
