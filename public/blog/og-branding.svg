<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e5c76b"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <g opacity="0.05">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#c9a84c"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Aura behind person -->
  <ellipse cx="950" cy="260" rx="180" ry="180" fill="url(#aura)"/>

  <!-- Outer rings -->
  <circle cx="950" cy="260" r="200" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.08"/>
  <circle cx="950" cy="260" r="160" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.12"/>
  <circle cx="950" cy="260" r="120" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.18"/>

  <!-- Person silhouette -->
  <!-- Head -->
  <circle cx="950" cy="210" r="45" fill="#1a1a1a" stroke="#c9a84c" stroke-width="2" opacity="0.9"/>
  <circle cx="950" cy="210" r="35" fill="#c9a84c" opacity="0.1"/>
  <!-- Body -->
  <path d="M 880 340 Q 880 290 950 280 Q 1020 290 1020 340 L 1040 420 L 860 420 Z" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>

  <!-- Crown above head -->
  <g transform="translate(920, 152)" opacity="0.9">
    <polygon points="30,0 10,25 0,15 15,40 60,40 45,15 60,25" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <polygon points="30,0 10,25 0,15 15,40 60,40 45,15 60,25" fill="#c9a84c" opacity="0.15"/>
    <circle cx="30" cy="5" r="4" fill="#c9a84c" opacity="0.8"/>
    <circle cx="8" cy="20" r="3" fill="#c9a84c" opacity="0.6"/>
    <circle cx="52" cy="20" r="3" fill="#c9a84c" opacity="0.6"/>
  </g>

  <!-- Radiating lines from person -->
  <g opacity="0.2">
    <line x1="950" y1="260" x2="760" y2="150" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="950" y1="260" x2="760" y2="370" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="950" y1="260" x2="1140" y2="150" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="950" y1="260" x2="1140" y2="370" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4,6"/>
  </g>

  <!-- Brand keywords floating -->
  <g opacity="0.6">
    <!-- Trust -->
    <rect x="760" y="130" width="80" height="28" rx="14" fill="#c9a84c" opacity="0.1"/>
    <rect x="760" y="130" width="80" height="28" rx="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
    <text x="800" y="149" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">信頼</text>

    <!-- Influence -->
    <rect x="1070" y="130" width="90" height="28" rx="14" fill="#c9a84c" opacity="0.1"/>
    <rect x="1070" y="130" width="90" height="28" rx="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
    <text x="1115" y="149" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">影響力</text>

    <!-- Vision -->
    <rect x="760" y="360" width="80" height="28" rx="14" fill="#c9a84c" opacity="0.1"/>
    <rect x="760" y="360" width="80" height="28" rx="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
    <text x="800" y="379" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">ビジョン</text>

    <!-- Story -->
    <rect x="1070" y="360" width="80" height="28" rx="14" fill="#c9a84c" opacity="0.1"/>
    <rect x="1070" y="360" width="80" height="28" rx="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
    <text x="1110" y="379" text-anchor="middle" font-family="'Hiragino Sans', sans-serif" font-size="11" fill="#c9a84c">ストーリー</text>
  </g>

  <!-- Stat bar -->
  <g transform="translate(780, 470)" opacity="0.7">
    <text x="0" y="16" font-family="'Hiragino Sans', sans-serif" font-size="12" fill="white" opacity="0.5">社長の認知度</text>
    <rect x="0" y="24" width="340" height="6" rx="3" fill="white" opacity="0.1"/>
    <rect x="0" y="24" width="255" height="6" rx="3" fill="#c9a84c" opacity="0.7"/>
    <text x="260" y="36" font-family="Arial" font-size="11" fill="#c9a84c" opacity="0.8">75%</text>
  </g>

  <!-- Left content -->
  <rect x="80" y="80" width="220" height="36" rx="18" fill="#c9a84c" opacity="0.15"/>
  <rect x="80" y="80" width="220" height="36" rx="18" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
  <text x="190" y="104" text-anchor="middle" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="14" fill="#c9a84c" letter-spacing="2">社長ブランディング</text>

  <text x="80" y="220" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="white" opacity="0.95">社長で</text>
  <text x="80" y="290" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="52" font-weight="bold" fill="url(#gold)">選ばれる時代</text>

  <line x1="80" y1="330" x2="400" y2="330" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>

  <text x="80" y="370" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">経営者ブランディングの本質と</text>
  <text x="80" y="398" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="18" fill="white" opacity="0.6">実践的アプローチ</text>

  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#c9a84c" letter-spacing="3" opacity="0.8">ideno LLC</text>
  <text x="80" y="582" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="13" fill="white" opacity="0.4">合同会社出野</text>
</svg>
